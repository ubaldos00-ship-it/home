<!-- ※ v4b 예정: 측정 바텀시트 전환 · 길이 cm 표시 · 면적 중앙 ㎡/평 라벨 · 측정 저장/목록 · 이미지 공유 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- ═══════════ TenarCrypto 보안 저장 계층 (보안 테스트) ═══════════
     · 브라우저 캐시(localStorage): 기기키로 자동 암호화/복호화 (비밀번호 불필요)
     · JSON 파일: PBKDF2 비밀번호 기반 암호화 (기본 2026)
     · 지도 표시/핀/확대 로직은 건드리지 않고 저장 전후에만 암복호화가 투명하게 동작 -->
<script>
(function(){
  'use strict';
  if(window.TenarCrypto) return;
  var CRYPTO_OK = !!(window.crypto && window.crypto.subtle && window.TextEncoder);

  function bufToB64(buf){ var b=new Uint8Array(buf),s=''; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
  function b64ToBuf(b64){ var bin=atob(b64),b=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b.buffer; }
  var enc = CRYPTO_OK ? new TextEncoder() : null;
  var dec = CRYPTO_OK ? new TextDecoder() : null;
  function kstNow(){ return new Date(Date.now()+9*3600000).toISOString().replace('Z','+09:00'); }

  var DEVICE_KEY_NAME='__tenar_secure_device_key_v1';
  var _rawGet=localStorage.getItem.bind(localStorage);
  var _rawSet=localStorage.setItem.bind(localStorage);

  function generateDeviceKey(){ return bufToB64(crypto.getRandomValues(new Uint8Array(32)).buffer); }
  var _deviceKeyPromise=null;
  function getDeviceKey(){
    if(_deviceKeyPromise) return _deviceKeyPromise;
    _deviceKeyPromise=(async function(){
      var b64=null; try{ b64=_rawGet(DEVICE_KEY_NAME); }catch(e){}
      if(!b64){ b64=generateDeviceKey(); try{ _rawSet(DEVICE_KEY_NAME,b64); }catch(e){} }
      return crypto.subtle.importKey('raw', b64ToBuf(b64), {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    })();
    return _deviceKeyPromise;
  }

  async function encryptForDeviceCache(plainStr, appName){
    var key=await getDeviceKey();
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, enc.encode(String(plainStr)));
    return { tenarSecure:true, secureType:'device-cache', version:1, app:appName,
             encryptedAt:kstNow(), algorithm:'AES-GCM', iv:bufToB64(iv.buffer), ciphertext:bufToB64(ct) };
  }
  async function decryptFromDeviceCache(obj){
    var key=await getDeviceKey();
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b64ToBuf(obj.iv))}, key, b64ToBuf(obj.ciphertext));
    return dec.decode(pt);
  }
  async function _deriveKey(password, saltBuf, iterations){
    var baseKey=await crypto.subtle.importKey('raw', enc.encode(String(password)), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt:new Uint8Array(saltBuf), iterations:iterations, hash:'SHA-256'},
                                   baseKey, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
  }
  async function encryptForPasswordFile(dataObj, password, appName){
    var salt=crypto.getRandomValues(new Uint8Array(16));
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var iterations=210000;
    var key=await _deriveKey(password, salt.buffer, iterations);
    var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, enc.encode(JSON.stringify(dataObj)));
    return { tenarSecure:true, secureType:'password-file', version:1, app:appName, encryptedAt:kstNow(),
             algorithm:'AES-GCM', kdf:'PBKDF2', iterations:iterations,
             salt:bufToB64(salt.buffer), iv:bufToB64(iv.buffer), ciphertext:bufToB64(ct) };
  }
  async function decryptFromPasswordFile(obj, password){
    var key=await _deriveKey(password, b64ToBuf(obj.salt), obj.iterations||210000);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b64ToBuf(obj.iv))}, key, b64ToBuf(obj.ciphertext));
    return JSON.parse(dec.decode(pt));
  }
  function isSecureObject(v){ return !!(v && typeof v==='object' && v.tenarSecure===true); }

  window.TenarCrypto={
    ok:CRYPTO_OK,
    encryptForDeviceCache:encryptForDeviceCache, decryptFromDeviceCache:decryptFromDeviceCache,
    encryptForPasswordFile:encryptForPasswordFile, decryptFromPasswordFile:decryptFromPasswordFile,
    isSecureObject:isSecureObject, generateDeviceKey:generateDeviceKey, getDeviceKey:getDeviceKey,
    arrayBufferToBase64:bufToB64, base64ToArrayBuffer:b64ToBuf
  };

  function _toast(msg, ms){
    try{
      var t=document.createElement('div'); t.textContent=msg;
      t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f5132;color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;z-index:2147483647;box-shadow:0 4px 16px rgba(0,0,0,.35);max-width:90vw;text-align:center;line-height:1.5;';
      (document.body||document.documentElement).appendChild(t);
      setTimeout(function(){ try{ t.remove(); }catch(e){} }, ms||2600);
    }catch(e){}
  }
  window._tenarToast=_toast;

  /* 보안 저장 활성/비활성 상태 */
  window.__tenarSecureActive=null;   // null=미확정, true=암호화 켜짐, false=평문(비활성)
  var _inactiveNotified=false;
  function _notifyInactive(){
    window.__tenarSecureActive=false;
    if(_inactiveNotified) return; _inactiveNotified=true;
    function show(){ _toast('🔓 보안 저장 비활성 — 이 브라우저에서는 자동 암호화가 지원되지 않아 평문으로 저장됩니다.', 5000); }
    if(document.body){ setTimeout(show,900); } else { document.addEventListener('DOMContentLoaded', function(){ setTimeout(show,900); }); }
  }
  window._tenarSecureActive=function(){ return window.__tenarSecureActive===true; };

  window.TenarSecureStore={
    init:function(appName, exactKeys, prefixes){
      if(!CRYPTO_OK){ _notifyInactive(); return; }
      var LS=window.localStorage;
      /* WebKit(iOS 사파리)는 인스턴스 메서드 오버라이드(localStorage.getItem=fn)를 저장쓰기로 처리해
         제대로 동작하지 않음 → Storage.prototype 메서드를 교체하고 this===localStorage 가드로 분기(모든 브라우저 안전) */
      var SP=Object.getPrototypeOf(LS)||window.Storage.prototype;
      var _origGet=SP.getItem, _origSet=SP.setItem, _origRemove=SP.removeItem;
      var _get=function(k){ return _origGet.call(LS,k); };
      var _set=function(k,v){ return _origSet.call(LS,k,v); };
      var _remove=function(k){ return _origRemove.call(LS,k); };
      var exact={}; (exactKeys||[]).forEach(function(k){ exact[k]=true; });
      var pfx=prefixes||[];
      function isManaged(k){
        if(k===DEVICE_KEY_NAME) return false;
        if(exact[k]) return true;
        for(var i=0;i<pfx.length;i++){ if(String(k).indexOf(pfx[i])===0) return true; }
        return false;
      }
      var _plain={}, _dirty={}, _flushScheduled=false, _ready=false;
      var _pendingDecrypt=[], _legacy=[], _decryptFailed=[];

      try{
        for(var i=0;i<LS.length;i++){
          var k=LS.key(i);
          if(!isManaged(k)) continue;
          var raw=_get(k), obj=null;
          try{ obj=JSON.parse(raw); }catch(e){}
          if(obj && obj.tenarSecure===true && obj.secureType==='device-cache'){ _pendingDecrypt.push(k); }
          else { _plain[k]=raw; _legacy.push(k); }
        }
      }catch(e){}

      function scheduleFlush(k){ _dirty[k]=true; if(_flushScheduled) return; _flushScheduled=true; Promise.resolve().then(flushNow); }
      async function flushNow(){
        _flushScheduled=false;
        var keys=Object.keys(_dirty); _dirty={};
        for(var i=0;i<keys.length;i++){
          var k=keys[i];
          if(!(k in _plain)) continue;
          try{
            var secure=await encryptForDeviceCache(_plain[k], appName);
            _set(k, JSON.stringify(secure));
          }catch(e){
            /* 암호화 실패(구형/특수 브라우저)해도 데이터는 반드시 보존 — 평문으로라도 저장(유실 방지) */
            try{ _set(k, _plain[k]); }catch(_e){}
          }
        }
      }

      /* 오버라이드 설치 + 자기검증: 일부 브라우저(iOS Safari·인앱 웹뷰 등)는 localStorage
         메서드 오버라이드를 막거나 일부만 적용해 읽기/쓰기가 어긋날 수 있음 → 저장이 안 되는 것처럼 보임.
         설치 직후 프로브로 검증하고, 실패 시 네이티브로 완전 복구하여 앱을 평문으로 100% 정상 동작시킴. */
      var _installOk=false;
      try{
        SP.getItem=function(k){ if(isManaged(k)) return (k in _plain)? _plain[k] : null; return _origGet.call(this,k); };
        SP.setItem=function(k,v){ if(isManaged(k)){ _plain[k]=String(v); scheduleFlush(k); return; } return _origSet.call(this,k,v); };
        SP.removeItem=function(k){ if(isManaged(k)){ delete _plain[k]; try{ _origRemove.call(this,k); }catch(e){} return; } return _origRemove.call(this,k); };
        var _pk='__tenar_probe__'; exact[_pk]=true;
        window.localStorage.setItem(_pk,'PROBE');
        _installOk=(window.localStorage.getItem(_pk)==='PROBE' && _origGet.call(LS,_pk)!=='PROBE');
        window.localStorage.removeItem(_pk); delete exact[_pk];
        try{ _origRemove.call(LS,_pk); }catch(_e){}
      }catch(e){ _installOk=false; }
      if(!_installOk){
        try{ SP.getItem=_origGet; SP.setItem=_origSet; SP.removeItem=_origRemove; }catch(_e){}
        try{ _origRemove.call(LS,'__tenar_probe__'); }catch(_e){}
        window.__tenarSecureReady=true;
        _notifyInactive();
        return;   /* 보안 저장 비활성 — 앱은 기존 평문 방식으로 정상 동작 */
      }

      getDeviceKey().then(function(){
        return Promise.all(_pendingDecrypt.map(function(k){
          var obj=null; try{ obj=JSON.parse(_get(k)); }catch(e){}
          if(!obj){ _decryptFailed.push(k); return; }

  /* [v5-7] 결과(면적·둘레) 접기/펴기 — 기본 닫힘 */
  #resultToggle {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px; padding: 5px 6px; border-radius: 7px; background: #eef1ec;
    font-size: 10.5px; font-weight: 800; color: #27500A; cursor: pointer; user-select: none;
  }
  #resultBox.collapsed { display: none; }
  .tool-btn.active { background: #27500A; border-color: #27500A; color: #fff; }
  .tool-btn.wide { grid-column: 1 / -1; }
  /* [v16-5] 이모지가 커서 글자가 아래로 밀리던 문제 — 이모지만 작게 해서 한 줄로 */
  .tool-btn .em { font-size: 8.5px; margin-right: 1px; vertical-align: 1px; }
  .tool-btn.one-line { white-space: nowrap; font-size: 9.5px; letter-spacing: -.4px; }
  /* [v16-5] 가·나 등 A/B포구 버튼은 조금 더 작게 */
  #fpBtns .tool-btn { white-space: nowrap; min-height: 26px; padding: 2px 1px; font-size: 9.5px; }
  #fpBtns .tool-btn.fp-half { font-size: 10px; }
  .tool-btn.danger { border-color: #e8b4b4; color: #b32020; }
  #resultBox { margin-top: 5px; padding: 6px; border-radius: 7px; background: #f5f6f4; font-size: 10.5px; line-height: 1.5; color: #333; }
  #resultBox .res-title { font-size: 9.5px; font-weight: 800; color: #27500A; }
  #resultBox .res-main { font-size: 12.5px; font-weight: 800; color: #1b1b1b; margin: 1px 0 3px; }
  #resultBox .res-sub { color: #555; }
  #resultBox .res-empty { color: #888; }
  #resultBox hr { border: 0; border-top: 1px solid #e0e0e0; margin: 7px 0; }

  /* 중앙 십자선 */
  #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 9; display: none; pointer-events: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(20,20,20,.75); box-shadow: 0 0 0 1px rgba(255,255,255,.85); }
  #crosshair::before { left: -14px; top: -.5px; width: 28px; height: 1.5px; }
  #crosshair::after { top: -14px; left: -.5px; height: 28px; width: 1.5px; }

  /* [v10-15] 회전각 + i 아이콘을 flex 한 줄로 — 회전각이 -180.0° 처럼 길어져도 i가 안 가림 */
  #bottomInfoRow {
    position: absolute;
    left: calc(env(safe-area-inset-left, 0px) + 12px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    z-index: 10; display: flex; align-items: center; gap: 6px;
  }
  /* [v12-2] 회전각 + 지도 레벨을 작게 표시 */
  #bearingBox {
    background: rgba(255,255,255,.85); border-radius: 10px; padding: 5px 9px;
    font-size: 11px; font-weight: 700; color: #222; box-shadow: 0 2px 8px rgba(0,0,0,.2);
    pointer-events: none; white-space: nowrap;
  }
  #zoomLevel { margin-left: 7px; color: #27500A; font-weight: 800; }
  #mapInfoBtn {
    width: 28px; height: 28px; border-radius: 14px; border: 0; flex-shrink: 0;
    background: rgba(255,255,255,.92); color: #333; font-size: 13px; font-weight: 800;
    box-shadow: 0 2px 8px rgba(0,0,0,.2); cursor: pointer; -webkit-appearance: none;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  #mapInfoBtn::after { content: ''; position: absolute; inset: -8px; }   /* 터치영역 44px */

  /* [v10-1·2] 토지이용 범례 — 주소검색창 아래, 가로형 · 드래그 이동 · 접기 */
  #landLegend {
    position: absolute; z-index: 13; display: none;
    background: rgba(255,255,255,.95); border-radius: 10px;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
    max-width: calc(100% - 24px); overflow: hidden; touch-action: auto;
  }
  #landLegend.show { display: block; }
  #llHead {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    min-height: 36px; padding: 0 10px; cursor: grab; user-select: none; touch-action: none;
    font-size: 11.5px; font-weight: 800; color: #27500A;
  }
  #llHead:active { cursor: grabbing; }
  #llToggle {
    min-width: 36px; min-height: 36px; border: 0; background: transparent;
    color: #27500A; font-size: 12px; cursor: pointer; -webkit-appearance: none;
    display: flex; align-items: center; justify-content: center;
  }
  #llBody {
    display: flex; gap: 4px 10px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding: 0 10px 8px; max-width: 100%;
  }
  #llBody.collapsed { display: none; }
  .ll-item { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .ll-sw { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,.15); flex-shrink: 0; }
  .ll-nm { font-size: 10.5px; color: #444; white-space: nowrap; }

  /* [v10-6] 토지정보 시트 행 배치 */
  .li-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 10px; }
  .li-row .li-grow { flex: 1; min-width: 0; }
  .li-row .li-right { flex-shrink: 0; text-align: right; }
  .li-coord { font-size: 12px; color: #666; margin-top: 10px; white-space: nowrap; }
  .li-more-btn {
    width: 100%; margin-top: 12px; min-height: 42px;
    border: 1.5px solid #dcdce4; border-radius: 10px; background: #f7f8f6;
    color: #27500A; font-size: 13px; font-weight: 800; cursor: pointer; -webkit-appearance: none; font-family: inherit;
  }
  .li-status { font-size: 12px; color: #888; margin-top: 8px; }

  #toast {
    position: absolute; left: 50%; bottom: calc(env(safe-area-inset-bottom,0px) + 60px);
    transform: translateX(-50%); z-index: 2147483000; max-width: 86vw;
    background: rgba(200,30,30,.92); color: #fff; border-radius: 10px; padding: 10px 14px;
    font-size: 13px; line-height: 1.45; box-shadow: 0 3px 12px rgba(0,0,0,.3);
    display: none; white-space: pre-line;
  }
  #toast.toast-error { background: rgba(200,30,30,.92); }
  #toast.toast-success { background: rgba(25,130,65,.93); }
  #toast.toast-info { background: rgba(45,90,175,.92); }

  /* [v5-8] 핀 방향 수정 —— 기존에는 마커 요소에 transform:rotate(-45deg)를 걸었는데
     MapLibre Marker가 같은 요소의 transform(위치이동)을 직접 덮어써서 회전이 사라지고
     핀이 왼쪽으로 틀어져 보였다. → CSS 회전을 버리고 SVG 물방울 모양으로 교체.
     SVG 꼭짓점이 viewBox 하단 중앙에 있으므로 anchor:'bottom'이면 좌표에 정확히 꽂힌다. */
  /* [v12-1] ★ 핀 위치 어긋남 원인 수정 ★
     MapLibre 마커 요소는 반드시 position:absolute 여야 한다.
     이전 버전에서 .pin 에 position:relative 를 주는 바람에 마커가 문서 흐름에도
     자리를 차지하면서(세로로 쌓임) 그 위치에서 transform 이 더해져 좌표가 틀어졌다.
     축소할수록 흐름 쌓임이 지배해 핀들이 일자로 늘어서 보였다. */
  .pin { position: absolute; width: 24px; height: 30px; cursor: pointer; z-index: 1; }
  /* [v13] 저장핀을 측정점으로 쓰면 같은 자리에 핀과 측정점 번호가 겹친다.
           번호·라벨이 저장핀에 가려지지 않도록 위로 올린다.
           (측정 경계선·측정선은 지도 캔버스에 그려져 항상 마커 아래) */
  .vtx-num, .seg-label, .total-label, .area-label { z-index: 3; }
  .pin svg { display: block; }
  /* [v11-8] 핀 안 작물 이모지 대신, 물방울 위쪽에 작물명을 표시 */
  .pin .pin-crop {
    position: absolute; left: 50%; bottom: 32px; transform: translateX(-50%);
    padding: 1px 5px; border-radius: 6px; background: rgba(255,255,255,.92);
    color: #14612f; font-size: 10px; font-weight: 800; line-height: 1.4;
    white-space: nowrap; pointer-events: none; box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  /* [v11-3] 축소하면 핀을 작게 → 실제 좌표(핀 끝)와의 시각 오차를 줄임 */
  .pin.pin-sm { width: 14px; height: 17px; }
  .pin.pin-sm svg { width: 14px; height: 17px; }
  .pin.pin-dot { width: 10px; height: 10px; }
  .pin.pin-dot svg { display: none; }
  /* [v12-3] 작물명은 축소해도 계속 표시 (겹쳐도 됨) — 작은 핀/점일 때 위치만 조정 */
  .pin.pin-sm .pin-crop { bottom: 19px; font-size: 9.5px; }
  .pin.pin-dot .pin-crop { bottom: 9px; font-size: 9.5px; }
  .pin.pin-dot::before {
    /* 원의 중심이 실제 좌표(요소 하단)에 오도록 아래로 5px 내림 */
    content: ''; position: absolute; left: 0; top: auto; bottom: -5px; width: 10px; height: 10px;
    border-radius: 5px; background: var(--pin-color, #e5342a); border: 2px solid #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.5);
  }
  .seg-label {
    padding: 2px 6px; border-radius: 6px; background: rgba(20,70,160,.92); color: #fff;
    font-size: 11px; font-weight: 800; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.35); pointer-events: none;
  }
  /* [v6-4] 길게 누르기 Quick Action 메뉴 */
  #quickMenu {
    position: absolute; z-index: 30; display: none;
    background: rgba(255,255,255,.97); border-radius: 14px;
    box-shadow: 0 6px 22px rgba(0,0,0,.35);
    padding: 6px; touch-action: auto;
  }
  #quickMenu.show { display: flex; gap: 4px; }
  .qa-btn {
    width: 54px; min-height: 54px; border: 0; border-radius: 10px; background: #fff;
    color: #27500A; font-size: 11px; font-weight: 800; line-height: 1.25;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; -webkit-appearance: none; -webkit-tap-highlight-color: transparent; font-family: inherit;
  }
  .qa-btn:active { background: #eef1ec; }
  .qa-btn .qa-ico { font-size: 16px; line-height: 1; }
  /* 길게 누른 지점 표시 */
  #pressDot {
    position: absolute; z-index: 29; display: none;
    width: 18px; height: 18px; margin: -9px 0 0 -9px; border-radius: 9px;
    /* [v11-11] 길게 누른 지점 표시: 초록 → 파랑 */
    background: rgba(21,101,192,.25); border: 2px solid #1565C0; pointer-events: none;
  }

  /* [v6-5] 측정 꼭짓점 번호 라벨 */
  /* [v15-9] 번호를 점 위가 아니라 점 "안"에 작게 표시 */
  .vtx-num {
    padding: 0; width: 12px; height: 12px; border-radius: 6px;
    background: transparent; color: #14612f;
    font-size: 7.5px; font-weight: 900; line-height: 12px; text-align: center;
    pointer-events: none; text-shadow: 0 0 2px #fff, 0 0 2px #fff;
  }
  .vtx-num.vtx-last { color: #e5342a; }   /* 마지막 점은 항상 다른 색 */

  /* ===== [v15] A/B포구 선정 ===== */
  /* [v17-9] 주소검색창 아래 : 작물·기준·1번/2번 비율을 표로 보여주고 골라 쓴다 */
  #fpBanner {
    display: none; position: absolute; left: 8px; right: 8px;
    top: calc(env(safe-area-inset-top, 0px) + 70px); z-index: 30;   /* [v22-6] 검색창과 간격 */
    flex-direction: column; gap: 5px; padding: 7px 9px; border-radius: 10px;
    background: rgba(21, 101, 192, .95); color: #fff; font-size: 11px; line-height: 1.3;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  #fpBanner .fp-head { font-size: 11.5px; font-weight: 800; }
  #fpBanner .fp-rtable { display: flex; gap: 5px; }
  #fpBanner .fp-rcol {
    flex: 1; display: flex; align-items: center; gap: 5px; padding: 4px 6px;
    border-radius: 8px; border: 1.5px solid rgba(255,255,255,.45); background: rgba(255,255,255,.08);
    cursor: pointer;
  }
  #fpBanner .fp-rcol.active { background: #fff; color: #1565C0; border-color: #fff; }
  #fpBanner .fp-rname { font-size: 10.5px; font-weight: 900; flex: 0 0 auto; }
  #fpBanner .fp-rvals { font-size: 10px; font-weight: 700; white-space: nowrap; }
  #fpBtns { display: none; grid-template-columns: repeat(2, 1fr); gap: 4px; margin-top: 6px; }

  #fpPanel { display: none; margin-top: 6px; padding: 7px 8px; border-radius: 8px; background: #f4f7fb; }
  #fpPanel .fp-line { font-size: 11px; line-height: 1.6; color: #16324f; }
  #fpPanel .fp-sub { color: #6b7c93; font-size: 10px; font-weight: 600; }
  #fpAngleRow { display: flex; align-items: center; gap: 6px; margin-top: 5px; font-size: 10.5px; color: #16324f; }
  #fpAngleVal { flex: 1; font-weight: 800; }

  /* [v17-4] 현장에서 위치추적과 겹쳐도 지점이 정확히 보이도록 35% 정도 줄였다 */
  /* [v17-11] 면적 라벨 안의 작물명 */
  .area-label .area-crop { font-size: 10px; font-weight: 900; color: #ffe98a; }

  /* [v18-2] 가·나는 확실히 보이도록 크게 */
  .fp-gana {
    position: absolute; width: 26px; height: 26px; border-radius: 13px;
    background: #111827; color: #fff; font-size: 15px; font-weight: 900;
    line-height: 26px; text-align: center;
    border: 2.5px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,.5);
    z-index: 6;
  }
  .fp-base { position: absolute; width: 0; height: 0; }
  .fp-base .fp-dot {
    position: absolute; left: -3.5px; top: -3.5px; width: 7px; height: 7px; border-radius: 4px;
    background: #fff; border: 2px solid #111827;
  }
  /* [v15-6] 가로기점은 점 "아래"에 A / B 표시 */
  /* [v17-4] 기점값 : 흰 배경 + 색 테두리 + 색 글씨 (A 파랑 / B 빨강) */
  /* [v18-6] 가로기점 값 — 글자 키움 */
  .fp-base .fp-tag {
    position: absolute; left: 50%; top: 7px; transform: translateX(-50%);
    white-space: nowrap; padding: 2px 5px; border-radius: 6px;
    font-size: 11px; font-weight: 900; background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .fp-base .fp-tag-a { border: 1.6px solid #1565C0; color: #1565C0; }
  .fp-base .fp-tag-b { border: 1.6px solid #d0342c; color: #d0342c; }
  /* [v15-6] 세로 포구지점은 점 "안"에 A(파랑) · B(빨강) */
  .fp-po-wrap { position: absolute; width: 0; height: 0; }
  .fp-po {
    position: absolute; left: -6px; top: -6px; width: 12px; height: 12px; border-radius: 6px;
    color: #fff; font-size: 7.5px; font-weight: 900; line-height: 12px; text-align: center;
    border: 1.5px solid #fff; box-shadow: 0 1px 3px rgba(0,0,0,.45);
  }
  .fp-po-a { background: #1565C0; }
  .fp-po-b { background: #d0342c; }
  /* [v15-5] 데이터값은 지도에 작게 */
  /* [v16-3] 「나」 아래 전체 가-나 길이 */
  /* [v17-4] 가-나 총길이는 「나」 오른쪽 바깥쪽에 */
  /* [v18-6] 가-나 총길이 — 「나」 오른쪽 바깥, 글자 키움 */
  .fp-gana-len {
    position: absolute; left: 25px; top: 2px;   /* [v19-2] 나 동그라미(반지름 15px)와 안 겹치게 */
    white-space: nowrap; padding: 2px 6px; border-radius: 6px;
    background: #111827; color: #fff; font-size: 11px; font-weight: 800;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  /* [v16-3] 세로선 끝의 전체 세로길이 */
  /* [v17-4] 세로총길이는 세로선 "안쪽 중간"에 */
  .fp-end-wrap { position: absolute; width: 0; height: 0; }
  /* [v18-4][v18-6] 세로 총길이 — 세로선 "끝 바깥"에, 글자 키움 */
  .fp-endtip {
    position: absolute; left: 50%; top: -9px; transform: translateX(-50%);
    white-space: nowrap; padding: 2px 6px; border-radius: 6px;
    font-size: 11px; font-weight: 800; color: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .fp-endtip-a { background: #1565C0; }
  .fp-endtip-b { background: #d0342c; }
  /* [v16-4] 각도 조절 손잡이 */
  .fp-po-wrap.fp-drag { cursor: grab; }
  .fp-po-wrap.fp-drag .fp-po { box-shadow: 0 0 0 3px rgba(255,193,7,.85), 0 1px 4px rgba(0,0,0,.45); }
  .fp-grip {
    position: absolute; left: -7px; top: -20px; width: 14px; height: 13px;
    border-radius: 5px; background: #ffc107; color: #3b2f00;
    font-size: 8px; font-weight: 900; line-height: 13px; text-align: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .fp-po-wrap.fp-drag .fp-po { box-shadow: 0 0 0 2px rgba(255,193,7,.9), 0 1px 3px rgba(0,0,0,.45); }
  /* [v17-4] 점은 작게 보이지만 실제로 잡는 영역은 36px — 손가락으로도 정확히 끌린다 */
  .fp-hit {
    position: absolute; left: -18px; top: -18px; width: 36px; height: 36px;
    border-radius: 18px; background: transparent;
  }
  /* [v18-6] A/B포구 세로기점 값 — 글자만 있어 안 보이던 것을 네모박스 안에 넣었다 */
  .fp-po-txt {
    position: absolute; left: 11px; top: -8px; white-space: nowrap;
    padding: 2px 5px; border-radius: 6px;
    font-size: 11px; font-weight: 900; background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .fp-po-txt-a { border: 1.6px solid #1565C0; color: #1565C0; }
  .fp-po-txt-b { border: 1.6px solid #d0342c; color: #d0342c; }
  /* [v6-6] 전체거리 라벨 — 구간 라벨보다 크고 굵게 */
  .total-label {
    padding: 3px 8px; border-radius: 7px; background: #0b3d91; color: #fff;
    font-size: 12.5px; font-weight: 900; white-space: nowrap;
    box-shadow: 0 2px 7px rgba(0,0,0,.45); pointer-events: none;
    border: 1.5px solid #fff;
  }
  /* [v6-6] 3구간 이후 구간 라벨은 다른 색 */
  .seg-label.seg-late { background: rgba(124,58,237,.92); }

  /* [v5-7] 면적 중앙 라벨 (㎡ / 평 두 줄) */
  .area-label {
    padding: 3px 7px; border-radius: 7px; background: rgba(20,97,47,.92); color: #fff;
    font-size: 11px; font-weight: 800; line-height: 1.35; text-align: center; white-space: nowrap;
    box-shadow: 0 1px 5px rgba(0,0,0,.4); pointer-events: none;
  }
  /* 지적도 지번(본번-부번) 라벨 */
  /* [v8-14] 지번 라벨 —— 흰색 배경 제거, 흰 글씨 + 검정 halo(가독성).
     지도를 축소해도 항공사진을 가리지 않는다. 크기는 JS에서 줌에 따라 조절. */
  .cad-label {
    padding: 0; background: transparent; color: #ffffff;
    font-weight: 800; white-space: nowrap; pointer-events: none;
    text-shadow:
      -1.5px -1.5px 0 #000, 1.5px -1.5px 0 #000,
      -1.5px  1.5px 0 #000, 1.5px  1.5px 0 #000,
       0 0 2px #000;
  }
  .maplibregl-popup-content { font-size: 12.5px; line-height: 1.6; padding: 10px 12px; border-radius: 8px; max-width: 240px; }

  /* ===== 공통 바텀시트 ===== */
  /* [v11-1] 시트가 열려 있어도 지도를 손가락으로 이동·확대·회전할 수 있도록
     오버레이는 '보이기만' 하고 터치는 통과시킨다(pointer-events: none).
     닫기는 헤더의 ✕ 또는 아래로 쓸어내림으로 한다. */
  #sheetOverlay {
    position: fixed; inset: 0; z-index: 900; background: rgba(0,0,0,.18);
    display: none; pointer-events: none;
  }
  #sheetOverlay.show { display: block; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 901;
    height: 58%; max-height: 92%;
    background: #fff; border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.3);
    display: none; flex-direction: column; touch-action: auto;
    transition: height .18s ease, transform .22s ease;
    transform: translateY(100%);
  }
  #sheet.show { display: flex; transform: translateY(0); }
  /* [v6-1] 드래그 손잡이 영역을 헤더 전체(약 56px)로 확대 — 가로바·제목·빈공간 모두 잡힘 */
  #sheetGrip { padding: 10px 0 5px; cursor: grab; flex-shrink: 0; touch-action: none; }
  #sheetGrip .bar { width: 52px; height: 6px; border-radius: 3px; background: #c8c8d2; margin: 0 auto; }
  #sheetHead {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 16px 12px; border-bottom: 1px solid #eee; flex-shrink: 0;
    cursor: grab; touch-action: none;   /* 제목줄도 드래그 손잡이 */
    user-select: none;
  }
  #sheetGrip:active, #sheetHead:active { cursor: grabbing; }
  #sheetTitle { font-size: 15.5px; font-weight: 800; color: #1b1b1b; }
  #sheetClose, #sheetMin {
    position: relative;
    width: 32px; height: 32px; border: 0; border-radius: 16px; background: #f0f0f4;
    color: #555; font-size: 15px; cursor: pointer; -webkit-appearance: none;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  /* 터치영역 44px 확보 */
  #sheetClose::after, #sheetMin::after { content: ''; position: absolute; inset: -6px; }
  #sheetMin { font-size: 17px; line-height: 1; padding-bottom: 6px; }
  /* [v8-16] 시트 헤더 액션 버튼(예: 화면복귀) */
  #sheetAction {
    border: 1.5px solid #d7dcd4; border-radius: 9px; background: #f2f5f0; color: #27500A;
    font-size: 12.5px; font-weight: 800; padding: 6px 11px; min-height: 32px;
    cursor: pointer; -webkit-appearance: none; font-family: inherit;
  }
  #sheetAction:active { background: #e6ebe2; }
  #sheetBody {
    padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
    overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1;
    /* [v11-1] flex 자식 기본 min-height:auto 때문에 내용보다 작게 줄어들지 않아
       최소화(제목줄만 남기기)가 동작하지 않던 문제 해결 */
    min-height: 0;
  }

  .sheet-btn {
    min-height: 42px; padding: 8px 12px; border: 1.5px solid #dcdce4; border-radius: 10px;
    background: #fff; color: #333; font-size: 13.5px; font-weight: 700; cursor: pointer;
    -webkit-appearance: none; font-family: inherit;
  }
  .sheet-btn.primary { background: #27500A; border-color: #27500A; color: #fff; }
  /* [v7-7] 길찾기·조사표 = 현재핀 저장과 같은 초록 계열, 조금 더 연한 색 */
  .sheet-btn.green-soft { background: #5a8f3c; border-color: #5a8f3c; color: #fff; }
  .sheet-btn.green-soft:active { background: #4d7c33; }
  .sheet-btn.danger { border-color: #e8b4b4; color: #b32020; }
  .sheet-btn.active { background: #27500A; border-color: #27500A; color: #fff; }
  .btn-row { display: flex; gap: 7px; margin-bottom: 8px; }
  .btn-row .sheet-btn { flex: 1; }

  .addr-main { font-size: 19px; font-weight: 800; color: #14612f; line-height: 1.4; word-break: keep-all; }
  .addr-label { font-size: 11px; font-weight: 800; color: #888; margin-top: 10px; }
  .addr-value { font-size: 14px; color: #333; }
  /* [v8-9] 복사 버튼 축소 (약 25%) + 넓은 터치영역 유지 */
  .copy-btn {
    position: relative;
    border: 1.5px solid #cfd8cf; border-radius: 7px; background: #f3f7f3; color: #27500A;
    font-size: 11px; font-weight: 800; padding: 3px 8px; min-height: 26px; cursor: pointer; -webkit-appearance: none;
  }
  .copy-btn::after { content: ''; position: absolute; inset: -9px; }   /* 터치영역 44px 확보 */

  /* [v8-19] 즐겨찾기 보안 상태 배너 */
  .sec-banner {
    display: flex; align-items: center; gap: 7px; margin: 2px 0 12px;
    padding: 8px 11px; border-radius: 10px; font-size: 12px; font-weight: 700; line-height: 1.4;
  }
  .sec-banner.enc { background: #eef6ef; color: #1c6b34; border: 1px solid #cfe6d4; }
  .sec-banner.plain { background: #fff5e8; color: #9a5b00; border: 1px solid #f0d9b3; }

  /* [v16-7] 수정·공유·잠금·휴지통을 오른쪽 세로가 아니라 각 항목 "아래"에 가로로 정렬 */
  .fav-card {
    border: 1px solid #e6e6ec; border-radius: 12px; padding: 10px; margin-bottom: 8px;
    display: flex; flex-wrap: wrap; gap: 9px; align-items: flex-start; background: #fffdf5;
  }
  .fav-card.locked { background: #eef4ff; border-color: #cdddf7; }             /* [v8-18] 잠금: 연한 파랑 */
  .fav-num {
    width: 28px; height: 28px; border-radius: 14px; flex-shrink: 0; color: #fff;
    font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center;
  }
  .fav-body { flex: 1; min-width: 0; cursor: pointer; }
  .fav-name { font-size: 14px; font-weight: 800; color: #1b1b1b; margin-bottom: 2px; }
  /* [v12-4] 작물은 이모지 대신 한글 배지로 (이모지가 중복돼 구분이 안 되던 문제) */
  .crop-tag {
    display: inline-block; margin-right: 5px; padding: 1px 6px; border-radius: 6px;
    background: #eaf3ea; color: #14612f; font-size: 11.5px; font-weight: 800;
    vertical-align: middle;
  }
  .fav-addr { font-size: 12px; color: #555; line-height: 1.45; word-break: keep-all; }
  .fav-coord { font-size: 11px; color: #999; margin-top: 2px; }
  /* [v16-7] 가로 정렬 : 수정 → 공유 → 잠금 → 휴지통 */
  .fav-acts {
    display: flex; flex-direction: row; gap: 6px; width: 100%;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #ececf2;
  }
  .fav-acts .icon-btn { flex: 1; width: auto; height: 32px; }
  .icon-btn {
    width: 36px; height: 36px; border: 1.5px solid #e0e0e6; border-radius: 9px; background: #fff;
    font-size: 15px; cursor: pointer; -webkit-appearance: none; line-height: 1;
  }
  /* [v8-17] 잠금/삭제 버튼 상태별 색상 통일 (첨부 이미지 기준) */
  .icon-btn.lock-on   { background: #eaf1ff; border-color: #3b82f6; color: #2563eb; }   /* 잠금: 파란 */
  .icon-btn.lock-off  { background: #f5f5f7; border-color: #d0d0d6; color: #888; }       /* 해제: 회색 */
  .icon-btn.del-on    { background: #fdf1f1; border-color: #e2554e; color: #d0342c; }    /* 삭제 활성: 빨강 */
  .icon-btn.del-off   { background: #f2f2f4; border-color: #e2e2e6; color: #b8b8be; }    /* 삭제 비활성: 회색 */

  .color-row { display: flex; gap: 8px; margin: 6px 0 4px; }
  .color-dot {
    width: 40px; height: 40px; border-radius: 20px; border: 3px solid #fff;
    box-shadow: 0 0 0 1.5px #ddd; cursor: pointer;
  }
  .color-dot.sel { box-shadow: 0 0 0 3px #27500A; transform: scale(1.06); }

  .fld { margin-bottom: 10px; }
  .fld label { display: block; font-size: 11px; font-weight: 800; color: #888; margin-bottom: 4px; }
  .fld input, .fld select, .fld textarea {
    width: 100%; box-sizing: border-box; border: 1.5px solid #dcdce4; border-radius: 9px;
    padding: 10px; font-size: 16px; font-family: inherit; color: #222; background: #fff; -webkit-appearance: none;
  }
  .fld textarea { min-height: 40px; height: 40px; resize: vertical; }   /* [v11-10] 메모 입력란 축소 */

  .lyr-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 2px; border-bottom: 1px solid #f0f0f4;
  }
  .lyr-name { font-size: 14px; font-weight: 700; color: #333; }
  .lyr-desc { font-size: 11px; color: #999; margin-top: 1px; }
  .switch { width: 50px; height: 30px; border-radius: 15px; background: #d8d8e0; position: relative; cursor: pointer; flex-shrink: 0; transition: background .15s; }
  .switch.on { background: #27500A; }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 12px; background: #fff; transition: left .15s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .switch.on .knob { left: 23px; }
  .sec-title { font-size: 11.5px; font-weight: 800; color: #27500A; margin: 14px 0 4px; }
  input[type=range] { width: 100%; }
</style>
</head>

<body>
  <div id="topUI">
    <div id="searchBar">
      <button id="backBtn" type="button" title="뒤로가기" aria-label="뒤로가기">‹</button>
      <input id="searchInput" type="search" inputmode="text" autocomplete="off"
             autocorrect="off" autocapitalize="off" spellcheck="false"
             enterkeyhint="search" placeholder="주소 또는 지번을 입력하세요">
      <button id="clearBtn" type="button" aria-label="입력 지우기">✕</button>
      <button id="searchBtn" type="button">검색</button>
    </div>
    <div id="modeBadge"></div>
<!-- [v7-2] 「두 손가락 회전 · 확대 가능」 안내문 삭제 -->
  </div>

  <!-- [v7-4] 레이어 아이콘: 마름모꼴이 겹친 레이어 SVG -->
  <div id="sideBtns">
    <button class="side-btn ico" id="btnLayer" type="button" title="레이어" aria-label="레이어">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M12 3.2 2.6 8.1l9.4 4.9 9.4-4.9L12 3.2Z" fill="currentColor"/>
        <path d="M4.9 11.4 2.6 12.6l9.4 4.9 9.4-4.9-2.3-1.2-7.1 3.7-7.1-3.7Z" fill="currentColor"/>
        <path d="M4.9 15.9 2.6 17.1 12 22l9.4-4.9-2.3-1.2-7.1 3.7-7.1-3.7Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <!-- [v5-4] 나머지 5개는 오른쪽 최하단 (바텀시트가 열리면 시트 위로 이동) -->
  <div id="bottomBtns">
    <button class="side-btn" id="btnPins"    type="button" title="저장핀·작물">🌱</button>
    <!-- [v17-1] 포구도구 : 동그라미 안 깃발 -->
    <button class="side-btn ico" id="btnFpTool" type="button" title="포구도구 (A/B포구 선정)" aria-label="포구도구">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="12" cy="12" r="9.4" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8.9 5.8v12.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8.9 6.4h6.6l-1.7 2.5 1.7 2.5H8.9Z" fill="currentColor"/>
      </svg>
    </button>
    <button class="side-btn" id="btnMeasure" type="button" title="측정도구 (면적·길이)">📐</button>
    <!-- [v7-4] 위치추적 아이콘: 조준(타겟) SVG -->
    <button class="side-btn ico" id="btnTrack" type="button" title="실시간 위치추적" aria-label="실시간 위치추적">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <circle cx="12" cy="12" r="7.1" fill="none" stroke="currentColor" stroke-width="1.9"/>
        <circle cx="12" cy="12" r="2.9" fill="currentColor"/>
        <path d="M12 1.4v3.6M12 19v3.6M1.4 12h3.6M19 12h3.6" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="side-btn" id="btnFav"     type="button" title="즐겨찾기">⭐</button>
    <button class="side-btn" id="btnHere"    type="button" title="현재 위치">📍</button>
  </div>

  <!-- 실측 도구 (헤더 바를 잡고 이동) -->
  <!-- [v15-3] A/B포구 선정 모드 상단 배너 (선택된 비율 표시) -->
  <!-- [v17-9] 주소검색창 아래 : 작물 · 기준 · 1번/2번 비율(가·나·다)을 보여주고 골라 쓴다 -->
  <div id="fpBanner">
    <div class="fp-head" id="fpBannerText"></div>
    <div class="fp-rtable">
      <div class="fp-rcol" id="fpR1"><span class="fp-rname">1번</span><span class="fp-rvals" id="fpR1Vals">—</span></div>
      <div class="fp-rcol" id="fpR2"><span class="fp-rname">2번</span><span class="fp-rvals" id="fpR2Vals">—</span></div>
    </div>
  </div>

  <!-- ══ [v17] 포구도구 — A/B포구 선정 전용 ══ -->
  <div id="fpToolPanel">
    <div id="fpToolHeader"><span>🚩 포구도구</span><button id="fpToolToggle" type="button" aria-label="포구도구 접기/펴기">▼</button></div>
    <div id="fpToolBody">
      <button class="tool-btn danger" type="button" id="fpTReset" style="width:100%">🗑 초기화</button>

      <!-- [v18-7] 계산기를 거치지 않고 지도에서 바로 작물·기준·비율을 넣을 수 있다 -->
      <div class="tp-sec">⓪ 조사 설정</div>
      <button class="tool-btn one-line" type="button" id="fpTSetup" style="width:100%">작물·기준·비율</button>

      <div class="tp-sec">① 조사구역 선택</div>
      <div class="tp-grid">
        <button class="tool-btn one-line" type="button" id="fpTParcel">필지선택</button>
        <button class="tool-btn one-line" type="button" id="fpTCrop">재배구역</button>
      </div>
      <!-- [v22-4] 선택한 필지·그린 재배구역만 취소 -->
      <button class="tool-btn one-line danger" type="button" id="fpTCancelArea" style="width:100%;margin-top:4px;">✕ 선택 취소</button>
      <div class="tp-editbox">
        <div class="tp-cap">편집</div>
        <div class="tp-grid">
          <button class="tool-btn one-line" type="button" id="fpTUndo">↶UNDO</button>
          <button class="tool-btn one-line" type="button" id="fpTRedo">↷REDO</button>
          <button class="tool-btn one-line" type="button" id="fpTEdit">수정</button>
          <button class="tool-btn one-line" type="button" id="fpTCenter">센터추가</button>
        </div>
      </div>

      <div class="tp-sec">② 가 / 나 선택</div>
      <div class="tp-grid">
        <button class="tool-btn one-line" type="button" id="fpGa">가</button>
        <button class="tool-btn one-line" type="button" id="fpNa">나</button>
      </div>

      <div class="tp-sec">③ 각도조절</div>
      <button class="tool-btn one-line" type="button" id="fpAngleBtn" style="width:100%">각도조절</button>
      <div class="tp-grid" style="margin-top:4px;">
        <button class="tool-btn one-line" type="button" id="fpAngleSep">각도따로</button>
        <button class="tool-btn one-line" type="button" id="fpAngleOrtho">직각복원</button>
      </div>

      <div class="tp-sec">④ 완료</div>
      <button class="tool-btn one-line" type="button" id="fpTFinish" style="width:100%">✓ 완료</button>

      <div class="tp-sec">⑤ 저장 / 목록</div>
      <div class="tp-grid">
        <button class="tool-btn one-line" type="button" id="fpSaveBtn"><span class="em">💾</span>저장</button>
        <button class="tool-btn one-line" type="button" id="fpListBtn"><span class="em">📋</span>목록</button>
      </div>

      <div class="tp-sec">⑥ 조사표 전송</div>
      <button class="tool-btn one-line" type="button" id="fpSendBtn" style="width:100%"><span class="em">📤</span>조사표 전송</button>

      <div id="fpPanel">
        <div id="fpInfo"></div>
        <div id="fpAngleRow"><span id="fpAngleVal">각도 A 0° · B 0°</span></div>
      </div>
    </div>
  </div>

  <div id="toolPanel">
    <div id="toolHeader"><span>📐 측정 도구</span><button id="toolToggle" type="button" aria-label="측정 도구 접기/펴기">▼</button></div>
    <div id="toolBody">
      <button class="tool-btn danger" type="button" id="btnReset" style="width:100%">🗑 초기화</button>
      <div class="tp-sec">① 측정 종류</div>
      <div id="toolBtns">
        <button class="tool-btn" type="button" id="btnField">▱ 면적</button>
        <button class="tool-btn" type="button" id="btnDistance">↔ 길이</button>
        <!-- [v17] 필지선택·재배구역은 포구도구로 옮겼지만, 기존 기능을 지우지 않고
             측정도구에서도 그대로 쓸 수 있게 남겨 둔다 -->
        <button class="tool-btn" type="button" id="btnParcelPick">▣ 필지선택</button>
        <button class="tool-btn" type="button" id="btnCrop">🌾 재배구역</button>
      </div>
      <div class="tp-editbox">
        <div class="tp-cap">편집</div>
        <div class="tp-grid">
          <button class="tool-btn one-line" type="button" id="btnUndo">↶UNDO</button>
          <button class="tool-btn one-line" type="button" id="btnRedo">↷REDO</button>
          <button class="tool-btn one-line" type="button" id="btnEdit">수정</button>
          <button class="tool-btn one-line" type="button" id="btnCenterAdd">센터추가</button>
        </div>
      </div>
      <div class="tp-sec">② 계속 측정</div>
      <div class="tp-grid">
        <button class="tool-btn one-line" type="button" id="btnFinish">✓ 완료</button>
        <button class="tool-btn one-line" type="button" id="btnNew">＋ 새 면적</button>
      </div>
      <div class="tp-sec">③ 저장 / 목록</div>
      <div class="tp-grid">
        <button class="tool-btn one-line" type="button" id="btnSaveMeas"><span class="em">💾</span>저장</button>
        <button class="tool-btn one-line" type="button" id="btnMeasList"><span class="em">📋</span>목록</button>
      </div>
      <div class="tp-sec">④ 조사표 전송</div>
      <button class="tool-btn one-line" type="button" id="btnSendArea" style="width:100%"><span class="em">📤</span>조사표 전송</button>
      <div id="resultToggle"><span>측정 결과</span><span id="resultArrow">▶</span></div>
      <div id="resultBox" class="collapsed"><span class="res-empty">측정 결과가 없습니다.</span></div>
    </div>
  </div>

    else toastEl.classList.add('toast-error');
  }

    setToastType(type);
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    if (ms !== 0) toastTimer = setTimeout(function () { toastEl.style.display = 'none'; }, ms || 5000);

  /* ================= 지도 상태 저장/복원 ================= */
  function loadJSON(key, dflt) {

    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { console.warn('저장 실패', key, e); }
