  /* ===================================================================
     실측 측정 (v3 검증 코드 유지 · v4b에서 바텀시트/ cm 표시로 확장)
     =================================================================== */
  var surveyMeasureState = {
    mode: 'none', fieldPoints: [], fieldPolygon: null,
    fieldAreaM2: 0, fieldPerimeterM: 0,
    distancePoints: [], segmentDistances: [], totalDistanceM: 0,
    isFieldComplete: false, isEditing: false, dragging: null
  };
  var segmentLabelMarkers = [];
  var crosshairEl = document.getElementById('crosshair');
  var modeBadge = document.getElementById('modeBadge');

  function emptyFC() { return { type: 'FeatureCollection', features: [] }; }

  function initializeSurveyMeasurement() {
    map.addSource('survey-field-source', { type: 'geojson', data: emptyFC() });
    map.addSource('survey-distance-source', { type: 'geojson', data: emptyFC() });

    map.addLayer({
      id: 'survey-field-fill', type: 'fill', source: 'survey-field-source',
      filter: ['==', ['get', 'type'], 'field'],
      paint: { 'fill-color': '#1f8a4c', 'fill-opacity': 0.2 }
    });
    map.addLayer({
      id: 'survey-field-outline', type: 'line', source: 'survey-field-source',
      filter: ['in', ['get', 'type'], ['literal', ['field', 'field-line']]],
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-color': '#14612f', 'line-width': 3 }
    });
    /* [v6-6] 구간별로 선을 나눠 1~2구간과 3구간 이후 색을 구분한다 */
    map.addLayer({
      id: 'survey-distance-line', type: 'line', source: 'survey-distance-source',
      filter: ['==', ['get', 'type'], 'distance-line'],
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: {
        'line-color': ['case', ['<', ['coalesce', ['get', 'segIndex'], 0], 2], '#1a5fd0', '#7c3aed'],
        'line-width': ['case', ['<', ['coalesce', ['get', 'segIndex'], 0], 2], 4, 5]
      }
    });
    /* [v6-5] 측정 중: 마지막 꼭짓점 빨강 · 나머지 파랑 / 완료 후: 전부 일반색(초록) */
    map.addLayer({
      id: 'survey-field-vertices', type: 'circle', source: 'survey-field-source',
      filter: ['==', ['get', 'type'], 'field-vertex'],
      paint: {
        'circle-radius': ['case', ['get', 'last'], 7, 6],
        'circle-color': '#ffffff',
        'circle-stroke-color': ['case',
          ['get', 'done'], '#14612f',
          ['get', 'last'], '#e5342a',
          '#1a5fd0'],
        'circle-stroke-width': 3
      }
    });
    map.addLayer({
      id: 'survey-distance-vertices', type: 'circle', source: 'survey-distance-source',
      filter: ['==', ['get', 'type'], 'distance-vertex'],
      paint: { 'circle-radius': 6, 'circle-color': '#ffffff', 'circle-stroke-color': '#1a5fd0', 'circle-stroke-width': 3 }
    });
  }

  function formatNumber(value, digits) {
    return Number(value).toLocaleString('ko-KR', { minimumFractionDigits: digits, maximumFractionDigits: digits });
  }
  /* [v5-7] 길이는 항상 미터 · 소수점 둘째 자리까지 */
  function formatMeasurementValue(meters) {
    return formatNumber(meters, 2) + 'm';
  }
  function closedRing(points) { var r = points.slice(); r.push(points[0]); return r; }

  function calculateFieldArea() {
    var s = surveyMeasureState;
    if (!hasTurf || !s.fieldPolygon) { s.fieldAreaM2 = 0; return 0; }
    s.fieldAreaM2 = turf.area(s.fieldPolygon);
    return s.fieldAreaM2;
  }
  function calculateFieldPerimeter() {
    var s = surveyMeasureState;
    if (!hasTurf || s.fieldPoints.length < 3) { s.fieldPerimeterM = 0; return 0; }
    s.fieldPerimeterM = turf.length(turf.lineString(closedRing(s.fieldPoints)), { units: 'kilometers' }) * 1000;
    return s.fieldPerimeterM;
  }
  function calculateSegmentDistances() {
    var s = surveyMeasureState;
    s.segmentDistances = []; s.totalDistanceM = 0;
    if (!hasTurf) return;
    for (var i = 0; i < s.distancePoints.length - 1; i++) {
      var m = turf.distance(turf.point(s.distancePoints[i]), turf.point(s.distancePoints[i + 1]), { units: 'kilometers' }) * 1000;
      s.segmentDistances.push(m);
      s.totalDistanceM += m;
    }
  }
  function updateFieldGeometry() {
    var s = surveyMeasureState, fc = emptyFC(), i;
    if (s.fieldPoints.length >= 3) {
      s.fieldPolygon = { type: 'Feature', properties: { type: 'field' }, geometry: { type: 'Polygon', coordinates: [closedRing(s.fieldPoints)] } };
      fc.features.push(s.fieldPolygon);
    } else {
      s.fieldPolygon = null;
      if (s.fieldPoints.length === 2) {
        fc.features.push({ type: 'Feature', properties: { type: 'field-line' }, geometry: { type: 'LineString', coordinates: s.fieldPoints.slice() } });
      }
    }
    for (i = 0; i < s.fieldPoints.length; i++) {
      fc.features.push({
        type: 'Feature',
        properties: {
          type: 'field-vertex', index: i,
          last: (!s.isFieldComplete && i === s.fieldPoints.length - 1),   /* [v6-5] 마지막 = 빨강 */
          done: !!s.isFieldComplete                                        /* 완료 = 전부 일반색 */
        },
        geometry: { type: 'Point', coordinates: s.fieldPoints[i] }
      });
    }
    map.getSource('survey-field-source').setData(fc);
    calculateFieldArea(); calculateFieldPerimeter();
    updateAreaLabel();
    updateVertexNumbers();
    updateMeasurementResultPanel();
    syncSurveyMapData();
  }

  /* [v6-5] 꼭짓점 번호(1,2,3…) 라벨 — 터치를 막지 않도록 pointer-events:none */
  var vtxNumMarkers = [];
  function clearVertexNumbers() { vtxNumMarkers.forEach(function (m) { m.remove(); }); vtxNumMarkers = []; }
  function updateVertexNumbers() {
    clearVertexNumbers();
    var s = surveyMeasureState;
    for (var i = 0; i < s.fieldPoints.length; i++) {
      var e2 = document.createElement('div');
      e2.className = 'vtx-num';
      e2.textContent = String(i + 1);
      vtxNumMarkers.push(
        new maplibregl.Marker({ element: e2, offset: [0, -13] }).setLngLat(s.fieldPoints[i]).addTo(map)
      );
    }
  }

  /* [v5-7] 점 3개 이상이면 필지 중앙에 면적을 ㎡·평 두 줄로 표시 */
  var areaLabelMarker = null;
  function clearAreaLabel() { if (areaLabelMarker) { areaLabelMarker.remove(); areaLabelMarker = null; } }
  function updateAreaLabel() {
    clearAreaLabel();
    var s = surveyMeasureState;
    if (!hasTurf || !s.fieldPolygon || s.fieldPoints.length < 3) return;
    var c = null;
    try { c = turf.centerOfMass(s.fieldPolygon).geometry.coordinates; } catch (e) { return; }
    if (!c || !isFinite(c[0]) || !isFinite(c[1])) return;
    var e2 = document.createElement('div');
    e2.className = 'area-label';
    e2.innerHTML = formatNumber(s.fieldAreaM2, 1) + '㎡<br>' + formatNumber(s.fieldAreaM2 / 3.305785, 1) + '평';
    areaLabelMarker = new maplibregl.Marker({ element: e2 }).setLngLat(c).addTo(map);
  }
  function clearSegmentLabels() { segmentLabelMarkers.forEach(function (m) { m.remove(); }); segmentLabelMarkers = []; }
  function updateDistanceGeometry() {
    var s = surveyMeasureState, fc = emptyFC(), i;
    /* [v6-6] 구간마다 별도 LineString → 1~2구간(파랑)과 3구간 이후(보라) 색 구분 */
    for (i = 0; i < s.distancePoints.length - 1; i++) {
      fc.features.push({
        type: 'Feature', properties: { type: 'distance-line', segIndex: i },
        geometry: { type: 'LineString', coordinates: [s.distancePoints[i], s.distancePoints[i + 1]] }
      });
    }
    for (i = 0; i < s.distancePoints.length; i++) {
      fc.features.push({ type: 'Feature', properties: { type: 'distance-vertex', index: i }, geometry: { type: 'Point', coordinates: s.distancePoints[i] } });
    }
    map.getSource('survey-distance-source').setData(fc);
    calculateSegmentDistances();
    clearSegmentLabels();
    /* 구간 라벨: 1~2구간 파랑 / 3구간 이후 보라 */
    for (i = 0; i < s.segmentDistances.length; i++) {
      var a = s.distancePoints[i], b = s.distancePoints[i + 1];
      var mid = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
      var e = document.createElement('div');
      e.className = 'seg-label' + (i >= 2 ? ' seg-late' : '');
      e.textContent = (i + 1) + '구간 ' + formatMeasurementValue(s.segmentDistances[i]);
      segmentLabelMarkers.push(new maplibregl.Marker({ element: e }).setLngLat(mid).addTo(map));
    }
    /* [v6-6] 전체거리 라벨 — 구간 라벨보다 크고 굵게, 마지막 점 위에 표시 */
    if (s.segmentDistances.length > 0) {
      var last = s.distancePoints[s.distancePoints.length - 1];
      var te = document.createElement('div');
      te.className = 'total-label';
      te.textContent = '전체 ' + formatMeasurementValue(s.totalDistanceM);
      segmentLabelMarkers.push(new maplibregl.Marker({ element: te, offset: [0, -22] }).setLngLat(last).addTo(map));
    }
    updateMeasurementResultPanel();
    syncSurveyMapData();
  }
  function updateMeasurementSources() { updateFieldGeometry(); updateDistanceGeometry(); }

  var resultBox = document.getElementById('resultBox');
  function updateMeasurementResultPanel() {
    var s = surveyMeasureState, html = '';
    if (s.fieldPolygon) {
      var m2 = s.fieldAreaM2;
      html += '<div class="res-title">필지 면적</div>';
      html += '<div class="res-main">' + formatNumber(m2, 1) + '㎡</div>';
      html += '<div class="res-sub">' + formatNumber(m2 / 3.305785, 1) + '평<br>' + formatNumber(m2 / 100, 2) + 'a<br>' + formatNumber(m2 / 10000, 3) + 'ha</div>';
      html += '<div class="res-title" style="margin-top:6px;">필지 둘레</div>';
      html += '<div class="res-sub">' + formatMeasurementValue(s.fieldPerimeterM) + '</div>';
    }
    if (s.segmentDistances.length > 0) {
      if (html) html += '<hr>';
      html += '<div class="res-title">거리 측정</div>';
      html += '<div class="res-sub">구간 수: ' + s.segmentDistances.length + '</div>';
      html += '<div class="res-title" style="margin-top:4px;">총 거리</div>';
      html += '<div class="res-main">' + formatMeasurementValue(s.totalDistanceM) + '</div>';
    }
    if (!html) html = '<span class="res-empty">측정 결과가 없습니다.</span>';
    resultBox.innerHTML = html;
  }

  function setSurveyMode(mode) {
    var s = surveyMeasureState;
    s.mode = mode;
    s.isEditing = (mode === 'edit');
    document.getElementById('btnField').classList.toggle('active', mode === 'polygon');
    document.getElementById('btnDistance').classList.toggle('active', mode === 'distance');
    document.getElementById('btnEdit').classList.toggle('active', mode === 'edit');
    crosshairEl.style.display = (mode === 'polygon' || mode === 'distance') ? 'block' : 'none';
    map.getCanvas().style.cursor = (mode === 'none') ? '' : 'crosshair';

    modeBadge.className = '';
    if (mode === 'polygon') { modeBadge.textContent = '면적측정 모드'; modeBadge.classList.add('m-area'); modeBadge.style.display = 'block'; }
    else if (mode === 'distance') { modeBadge.textContent = '길이측정 모드'; modeBadge.classList.add('m-dist'); modeBadge.style.display = 'block'; }
    else if (mode === 'edit') { modeBadge.textContent = '수정 모드'; modeBadge.classList.add('m-edit'); modeBadge.style.display = 'block'; }
    else modeBadge.style.display = 'none';
  }
  /* [v6-7] 측정 모드 전환 제한 —— 점을 하나라도 찍은 뒤에는 다른 모드로 못 바꾼다.
     완료(✓) 또는 초기화(🗑) 후에는 다시 자유롭게 변경 가능. */
  function canSwitchMode(to) {
    var s = surveyMeasureState;
    if (to === 'polygon' && s.mode === 'distance' && s.distancePoints.length > 0) return false;
    if (to === 'distance' && s.mode === 'polygon' && s.fieldPoints.length > 0 && !s.isFieldComplete) return false;
    return true;
  }
  function startFieldDrawing() {
    if (!hasTurf) { showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0); return; }
    if (!canSwitchMode('polygon')) { showToast('현재 측정을 완료한 후 변경할 수 있습니다.', 3500, 'info'); return; }
    setSurveyMode('polygon');
    surveyMeasureState.isFieldComplete = false;
    showToast('필지 모서리를 순서대로 터치하세요.\n3개 이상의 점을 찍은 후 측정 완료를 눌러주세요.', 5000, 'info');
  }
  function startDistanceMeasurement() {
    if (!hasTurf) { showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0); return; }
    if (!canSwitchMode('distance')) { showToast('현재 측정을 완료한 후 변경할 수 있습니다.', 3500, 'info'); return; }
    setSurveyMode('distance');
    showToast('측정할 지점을 순서대로 터치하세요.\n두 점 이상 선택하면 거리가 계산됩니다.', 5000, 'info');
  }
  function startMeasurementEdit() {
    var s = surveyMeasureState;
    if (!s.fieldPoints.length && !s.distancePoints.length) { showToast('수정할 측정 지점이 없습니다.', 3000, 'info'); return; }
    setSurveyMode('edit');
    showToast('이동할 꼭짓점을 손가락으로 끌어 위치를 수정하세요.', 5000, 'info');
  }
  function finishMeasurementEdit() { setSurveyMode('none'); showToast('수정을 완료했습니다.', 2500, 'success'); }
  function addFieldPoint(lngLat) { surveyMeasureState.fieldPoints.push([lngLat.lng, lngLat.lat]); updateFieldGeometry(); }
  function addDistancePoint(lngLat) { surveyMeasureState.distancePoints.push([lngLat.lng, lngLat.lat]); updateDistanceGeometry(); }
  function finishFieldDrawing() {
    var s = surveyMeasureState;
    if (s.fieldPoints.length < 3) { showToast('필지 경계를 만들려면 최소 3개의 지점이 필요합니다.', 4000); return false; }
    s.isFieldComplete = true;
    setSurveyMode('none');
    updateFieldGeometry();
    showToast('필지 경계가 완성되었습니다.', 3000, 'success');
    return true;
  }
  function finishDistanceMeasurement() {
    var s = surveyMeasureState;
    if (s.distancePoints.length < 2) { showToast('거리를 측정하려면 최소 2개의 지점이 필요합니다.', 4000); return false; }
    setSurveyMode('none');
    updateDistanceGeometry();
    showToast('거리 측정을 완료했습니다.\n총 거리 ' + formatMeasurementValue(s.totalDistanceM), 3500, 'success');
    return true;
  }
  function finishCurrentMeasurement() {
    var s = surveyMeasureState;
    if (s.mode === 'polygon') return finishFieldDrawing();
    if (s.mode === 'distance') return finishDistanceMeasurement();
    if (s.mode === 'edit') return finishMeasurementEdit();
    showToast('진행 중인 측정이 없습니다.', 2500, 'info');
    return false;
  }
  function undoLastMeasurementPoint() {
    var s = surveyMeasureState;
    if (s.mode === 'polygon' && s.fieldPoints.length) { s.fieldPoints.pop(); updateFieldGeometry(); showToast('마지막 필지 꼭짓점을 삭제했습니다.', 2000, 'info'); return; }
    if (s.mode === 'distance' && s.distancePoints.length) { s.distancePoints.pop(); updateDistanceGeometry(); showToast('마지막 거리 측정점을 삭제했습니다.', 2000, 'info'); return; }
    if (s.mode !== 'polygon' && s.mode !== 'distance') {
      if (s.distancePoints.length) { s.distancePoints.pop(); updateDistanceGeometry(); showToast('마지막 거리 측정점을 삭제했습니다.', 2000, 'info'); return; }
      if (s.fieldPoints.length) { s.fieldPoints.pop(); s.isFieldComplete = false; updateFieldGeometry(); showToast('마지막 필지 꼭짓점을 삭제했습니다.', 2000, 'info'); return; }
    }
    showToast('취소할 측정 지점이 없습니다.', 2500, 'info');
  }
  function resetAllMeasurements() {
    if (!window.confirm('현재 측정한 면적·길이 데이터가 모두 초기화됩니다.\n초기화하시겠습니까?')) return;
    var s = surveyMeasureState;
    s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
    s.distancePoints = []; s.segmentDistances = []; s.totalDistanceM = 0;
    s.isFieldComplete = false; s.dragging = null;
    setSurveyMode('none');
    updateMeasurementSources();
    showToast('모든 측정값이 초기화되었습니다.', 3000, 'success');
  }

  map.on('click', function (e) {
    var mode = surveyMeasureState.mode;
    if (mode === 'polygon') { addFieldPoint(e.lngLat); return; }
    if (mode === 'distance') { addDistancePoint(e.lngLat); return; }

    /* 측정 중이 아닐 때 지적도를 누르면 지번 정보 표시 */
    if (settings.overlays.cadastral && map.getLayer('ov-cadastral-fill')) {
      var hits = map.queryRenderedFeatures(e.point, { layers: ['ov-cadastral-fill'] });
      if (hits.length) {
        var p = hits[0].properties || {};
        var html = '<div style="font-weight:800;margin-bottom:3px;">' + escapeHtml(p.addr || p.jibun || '지적 정보') + '</div>' +
          (p.jibun ? '<div>지번 ' + escapeHtml(p.jibun) + '</div>' : '') +
          (p.bonbun ? '<div>본번 ' + escapeHtml(p.bonbun) + (p.bubun && p.bubun !== '0' ? ' · 부번 ' + escapeHtml(p.bubun) : '') + '</div>' : '') +
          (p.pnu ? '<div style="color:#888;">PNU ' + escapeHtml(p.pnu) + '</div>' : '');
        new maplibregl.Popup({ offset: 6 }).setLngLat(e.lngLat).setHTML(html).addTo(map);
      }
    }
  });
  function addCenterPoint() {
    var s = surveyMeasureState;
    if (s.mode === 'polygon') addFieldPoint(map.getCenter());
    else if (s.mode === 'distance') addDistancePoint(map.getCenter());
    else showToast('먼저 면적 측정 또는 길이 측정을 선택해주세요.', 3000, 'info');
  }

  var HIT_PAD = 22;
  function findVertexAt(point) {
    var bbox = [[point.x - HIT_PAD, point.y - HIT_PAD], [point.x + HIT_PAD, point.y + HIT_PAD]];
    var layers = [];
    if (map.getLayer('survey-field-vertices')) layers.push('survey-field-vertices');
    if (map.getLayer('survey-distance-vertices')) layers.push('survey-distance-vertices');
    if (!layers.length) return null;
    var hits = map.queryRenderedFeatures(bbox, { layers: layers });
    if (!hits.length) return null;
    var f = hits[0];
    return { kind: f.properties.type === 'field-vertex' ? 'field' : 'distance', index: f.properties.index };
  }
  function updateDraggedVertex(lngLat) {
    var s = surveyMeasureState;
    if (!s.dragging) return;
    var coord = [lngLat.lng, lngLat.lat];
    if (s.dragging.kind === 'field') { s.fieldPoints[s.dragging.index] = coord; updateFieldGeometry(); }
    else { s.distancePoints[s.dragging.index] = coord; updateDistanceGeometry(); }
  }
  function onDragStart(e) {
    if (surveyMeasureState.mode !== 'edit') return;
    var hit = findVertexAt(e.point);
    if (!hit) return;
    surveyMeasureState.dragging = hit;
    map.dragPan.disable();
    if (e.preventDefault) e.preventDefault();
  }
  function onDragMove(e) {
    if (!surveyMeasureState.dragging) return;
    updateDraggedVertex(e.lngLat);
    if (e.preventDefault) e.preventDefault();
  }
  function onDragEnd() {
    if (!surveyMeasureState.dragging) return;
    surveyMeasureState.dragging = null;
    map.dragPan.enable();
  }
  map.on('mousedown', onDragStart);
  map.on('touchstart', onDragStart);
  map.on('mousemove', onDragMove);
  map.on('touchmove', onDragMove);
  map.on('mouseup', onDragEnd);
  map.on('touchend', onDragEnd);
  map.on('touchcancel', onDragEnd);

  /* ===================================================================
     [v6-4] 길게 누르기(0.5초) Quick Action —— 도착 / 측정 / 주소 / 공유 / 저장
     · 측정 모드일 때는 점 찍기와 충돌하므로 동작하지 않는다(mode === 'none' 에서만).
     =================================================================== */
  var quickMenuEl = document.getElementById('quickMenu');
  var pressDotEl = document.getElementById('pressDot');
  var qaLngLat = null;
  var tempMarker = null;

  function clearTempMarker() { if (tempMarker) { tempMarker.remove(); tempMarker = null; } }

  function hideQuickMenu() {
    quickMenuEl.classList.remove('show');
    pressDotEl.style.display = 'none';
  }
  function showQuickMenu(point, lngLat) {
    qaLngLat = lngLat;
    pressDotEl.style.left = point.x + 'px';
    pressDotEl.style.top = point.y + 'px';
    pressDotEl.style.display = 'block';

    quickMenuEl.classList.add('show');
    /* 화면 밖으로 나가지 않도록 위치 보정 */
    var w = quickMenuEl.offsetWidth, h = quickMenuEl.offsetHeight;
    var x = Math.min(Math.max(8, point.x - w / 2), window.innerWidth - w - 8);
    var yy = point.y - h - 18;
    if (yy < 8) yy = point.y + 18;
    quickMenuEl.style.left = x + 'px';
    quickMenuEl.style.top = yy + 'px';
  }

  (function () {
    var timer = null, startPt = null, fired = false;
    function begin(e) {
      if (surveyMeasureState.mode !== 'none') return;   /* 측정 중에는 비활성 */
      if (e.originalEvent && e.originalEvent.touches && e.originalEvent.touches.length > 1) return;
      cancel();
      startPt = e.point;
      fired = false;
      timer = setTimeout(function () {
        fired = true;
        showQuickMenu(e.point, e.lngLat);
      }, 500);
    }
    function cancel() { if (timer) { clearTimeout(timer); timer = null; } }
    function moved(e) {
      if (!timer || !startPt) return;
      var dx = e.point.x - startPt.x, dy = e.point.y - startPt.y;
      if (Math.sqrt(dx * dx + dy * dy) > 8) cancel();   /* 지도를 끌면 취소 */
    }
    map.on('mousedown', begin);
    map.on('touchstart', begin);
    map.on('mousemove', moved);
    map.on('touchmove', moved);
    map.on('mouseup', cancel);
    map.on('touchend', cancel);
    map.on('dragstart', cancel);
    map.on('zoomstart', cancel);
    map.on('movestart', function () { cancel(); hideQuickMenu(); });
    /* 롱프레스로 메뉴가 뜬 직후의 click 은 무시(점이 찍히지 않도록) */
    map.on('click', function () { if (fired) { fired = false; return; } hideQuickMenu(); });
    /* PC 우클릭도 동일 메뉴 */
    map.on('contextmenu', function (e) {
      if (surveyMeasureState.mode !== 'none') return;
      showQuickMenu(e.point, e.lngLat);
      if (e.preventDefault) e.preventDefault();
    });
  })();

  /* 좌표 → 주소 (실패해도 좌표만으로 진행) */
  function qaInfo(lngLat) {
    return requestVWorldReverse(lngLat.lng, lngLat.lat)
      .then(function (a) {
        return { lat: lngLat.lat, lng: lngLat.lng, jibunAddress: a.jibunAddress, roadAddress: a.roadAddress, postalCode: a.postalCode };
      })
      .catch(function () {
        return { lat: lngLat.lat, lng: lngLat.lng, jibunAddress: '', roadAddress: '', postalCode: '' };
      });
  }

  /* 지적도가 켜져 있으면 누른 지점의 필지에서 지목·면적을 얻는다 (공유 내용에 사용) */
  function qaParcelInfo(point) {
    var out = { jimok: '', areaM2: 0, jibun: '' };
    if (!map.getLayer('ov-cadastral-fill')) return out;
    try {
      var hits = map.queryRenderedFeatures(point, { layers: ['ov-cadastral-fill'] });
      if (!hits.length) return out;
      var p = hits[0].properties || {};
      out.jibun = p.jibun || '';
      var m = String(p.jibun || '').match(/([가-힣]+)\s*$/);   /* "693 대" → 대 */
      if (m) out.jimok = m[1];
      if (hasTurf) { try { out.areaM2 = turf.area(hits[0]); } catch (e) {} }
    } catch (e) {}
    return out;
  }

  function qaAddrText(info) {
    var t = [];
    if (info.jibunAddress) t.push('지번: ' + info.jibunAddress);
    if (info.roadAddress) t.push('도로명: ' + info.roadAddress);
    if (info.postalCode) t.push('우편번호: ' + info.postalCode);
    t.push('위도: ' + info.lat.toFixed(6));
    t.push('경도: ' + info.lng.toFixed(6));
    return t.join('\n');
  }

  /* 4-3 주소: 임시핀 + 조회 전용 시트 (저장하지 않음) */
  function qaOpenAddrSheet(info) {
    clearTempMarker();
    tempMarker = new maplibregl.Marker({ element: makePinElement('#f59e0b', ''), anchor: 'bottom' })
      .setLngLat([info.lng, info.lat]).addTo(map);
    var box = el('div');
    box.appendChild(el('div', null,
      '<div class="addr-main">📍 ' + escapeHtml(info.jibunAddress || '주소를 찾을 수 없습니다') + '</div>' +
      (info.roadAddress ? '<div class="addr-label">도로명주소</div><div class="addr-value">' + escapeHtml(info.roadAddress) + '</div>' : '') +
      (info.postalCode ? '<div class="addr-label">우편번호</div><div class="addr-value">' + escapeHtml(info.postalCode) + '</div>' : '') +
      '<div class="addr-label">위도</div><div class="addr-value">' + info.lat.toFixed(6) + '</div>' +
      '<div class="addr-label">경도</div><div class="addr-value">' + info.lng.toFixed(6) + '</div>' +
      '<div class="lyr-desc" style="margin-top:10px;">조회 전용입니다. 저장하려면 아래 「저장」을 누르세요.</div>'));
    var row = el('div', 'btn-row');
    row.style.marginTop = '12px';
    var bCopy = el('button', 'sheet-btn', '📋 복사');
    bCopy.addEventListener('click', function () { copyText(qaAddrText(info)); });
    var bSave = el('button', 'sheet-btn primary', '⭐ 저장');
    bSave.addEventListener('click', function () { openPinSaveSheet(info); });
    row.appendChild(bCopy); row.appendChild(bSave);
    box.appendChild(row);
    openSheet('주소 조회', box, 50);
  }

  /* 4-4 공유 */
  function qaShare(info, parcel) {
    var url = location.origin + location.pathname + '#map=' + info.lat.toFixed(6) + ',' + info.lng.toFixed(6) + ',' + map.getZoom().toFixed(1);
    var lines = [qaAddrText(info)];
    if (parcel && parcel.jimok) lines.push('지목: ' + parcel.jimok);
    if (parcel && parcel.areaM2) lines.push('면적: ' + formatNumber(parcel.areaM2, 1) + '㎡ (' + formatNumber(parcel.areaM2 / 3.305785, 1) + '평)');
    lines.push('지도: ' + url);
    var text = lines.join('\n');
    if (navigator.share) {
      navigator.share({ title: '텐아르 위치 공유', text: text }).catch(function (e) {
        if (e && e.name === 'AbortError') return;
        copyText(text);
      });
    } else {
      copyText(text);
      showToast('공유를 지원하지 않아 클립보드에 복사했습니다.', 3500, 'info');
    }
  }

  /* 4-2 측정: 누른 좌표를 첫 번째 측정 핀으로 지정 */
  function qaStartMeasure(lngLat) {
    var box = el('div');
    box.appendChild(el('div', null, '<div class="lyr-desc" style="margin-bottom:10px;">누른 지점을 첫 번째 측정 지점으로 시작합니다.</div>'));
    [['▱ 면적 측정 시작', 'polygon'], ['↔ 길이 측정 시작', 'distance']].forEach(function (x) {
      var b = el('button', 'sheet-btn', x[0]);
      b.style.cssText += 'width:100%;margin-bottom:8px;';
      b.addEventListener('click', function () {
        closeSheet();
        toolPanelEl.classList.add('show');
        document.getElementById('btnMeasure').classList.add('active');
        if (x[1] === 'polygon') { startFieldDrawing(); addFieldPoint(lngLat); }
        else { startDistanceMeasurement(); addDistancePoint(lngLat); }
      });
      box.appendChild(b);
    });
    var c = el('button', 'sheet-btn danger', '취소');
    c.style.cssText += 'width:100%;';
    c.addEventListener('click', closeSheet);
    box.appendChild(c);
    openSheet('📐 측정 시작', box, 30);
  }

  quickMenuEl.addEventListener('click', function (ev) {
    var btn = ev.target.closest ? ev.target.closest('.qa-btn') : null;
    if (!btn || !qaLngLat) return;
    var kind = btn.getAttribute('data-qa');
    var ll = qaLngLat;
    var parcel = qaParcelInfo(map.project([ll.lng, ll.lat]));
    hideQuickMenu();

    if (kind === 'measure') { qaStartMeasure(ll); return; }

    showToast('주소를 확인하고 있습니다.', 0, 'info');
    qaInfo(ll).then(function (info) {
      toastEl.style.display = 'none';
      if (kind === 'nav') openNavSheet(info);
      else if (kind === 'addr') qaOpenAddrSheet(info);
      else if (kind === 'share') qaShare(info, parcel);
      else if (kind === 'save') openPinSaveSheet(info);
    });
  });

  /* ================= 통합시스템 연결용 공통 데이터 ================= */
  window.tenarSurveyMapData = {
    selectedFavoriteId: null, selectedMeasurementId: null,
    latitude: null, longitude: null,
    jibunAddress: '', roadAddress: '', postalCode: '',
    fieldPolygon: null, fieldAreaM2: 0, fieldAreaPyeong: 0,
    totalDistanceM: 0, totalDistanceCm: 0,
    mapCenter: null, mapZoom: 0, mapBearing: 0,
    crop: '', color: ''
  };
  function syncSurveyMapData() {
    var s = surveyMeasureState, d = window.tenarSurveyMapData;
    d.fieldPolygon = s.fieldPolygon;
    d.fieldAreaM2 = s.fieldAreaM2;
    d.fieldAreaPyeong = s.fieldAreaM2 / 3.305785;
    d.totalDistanceM = s.totalDistanceM;
    d.totalDistanceCm = s.totalDistanceM * 100;
    d.mapCenter = map.getCenter().toArray();
    d.mapZoom = map.getZoom();
    d.mapBearing = map.getBearing();
    if (currentLoc) {
      d.latitude = currentLoc.lat; d.longitude = currentLoc.lng;
      d.jibunAddress = currentLoc.jibunAddress || '';
      d.roadAddress = currentLoc.roadAddress || '';
      d.postalCode = currentLoc.postalCode || '';
    }
  }
  window.dispatchTenarMapResult = function () {
    syncSurveyMapData();
    window.dispatchEvent(new CustomEvent('tenar-map-result', { detail: window.tenarSurveyMapData }));
    return window.tenarSurveyMapData;
  };

  /* ================= UI 이벤트 ================= */
  var uiEvents = ['touchstart', 'touchmove', 'touchend', 'mousedown', 'mousemove', 'wheel', 'dblclick', 'click', 'contextmenu'];
  function blockMapPropagation(e) {
    uiEvents.forEach(function (evt) { e.addEventListener(evt, function (ev) { ev.stopPropagation(); }, { passive: true }); });
  }
  blockMapPropagation(document.getElementById('topUI'));
  blockMapPropagation(document.getElementById('sideBtns'));
  blockMapPropagation(document.getElementById('toolPanel'));
  blockMapPropagation(document.getElementById('sheet'));
  blockMapPropagation(sheetOverlay);
  blockMapPropagation(toastEl);
  blockMapPropagation(quickMenuEl);   /* [v6-4] 퀵메뉴를 눌러도 지도에 점이 찍히지 않도록 */

  document.getElementById('searchBtn').addEventListener('click', searchAddress);
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.keyCode === 13) { e.preventDefault(); searchInput.blur(); searchAddress(); }
  });
  searchInput.addEventListener('input', function () { clearBtn.style.display = searchInput.value ? 'block' : 'none'; });
  clearBtn.addEventListener('click', function () {
    searchInput.value = ''; clearBtn.style.display = 'none'; clearSearchMarker(); searchInput.focus();
  });

  document.getElementById('btnLayer').addEventListener('click', openLayerSheet);
  document.getElementById('btnPins').addEventListener('click', openPinsSheet);
  document.getElementById('btnFav').addEventListener('click', openFavSheet);
  document.getElementById('btnHere').addEventListener('click', goHere);
  document.getElementById('btnTrack').addEventListener('click', toggleTracking);
  /* [v5-5] 측정 버튼 = 열기/닫기 토글.
     닫을 때 측정 중이거나 측정값이 남아 있으면 삭제 여부를 먼저 확인한다. */
  function hasMeasureData() {
    var s = surveyMeasureState;
    return (s.fieldPoints.length > 0 || s.distancePoints.length > 0);
  }
  function closeMeasurePanel(clearData) {
    if (clearData) {
      var s = surveyMeasureState;
      s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
      s.distancePoints = []; s.segmentDistances = []; s.totalDistanceM = 0;
      s.isFieldComplete = false; s.dragging = null;
      updateMeasurementSources();
    }
    setSurveyMode('none');   /* 면적/길이/수정 모드 해제 */
    toolPanelEl.classList.remove('show');
    document.getElementById('btnMeasure').classList.remove('active');
  }
  document.getElementById('btnMeasure').addEventListener('click', function () {
    var isOpen = toolPanelEl.classList.contains('show');
    if (!isOpen) {
      toolPanelEl.classList.add('show');
      this.classList.add('active');
      return;
    }
    if (hasMeasureData()) {
      askMeasureClose().then(function (choice) {
        if (choice === 'close') closeMeasurePanel(true);
      });
      return;
    }
    closeMeasurePanel(false);
  });

  /* 측정 닫기 확인창 — [취소] [삭제(닫기)] */
  function askMeasureClose() {
    return new Promise(function (resolve) {
      var ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;z-index:2147483645;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:22px;';
      var box = document.createElement('div');
      box.style.cssText = 'background:#fff;border-radius:16px;max-width:340px;width:100%;padding:20px 18px;box-shadow:0 8px 30px rgba(0,0,0,.35);text-align:center;';
      box.innerHTML =
        '<div style="font-size:16px;font-weight:800;color:#222;margin-bottom:8px;">측정을 닫으시겠습니까?</div>' +
        '<div style="font-size:13px;color:#555;line-height:1.55;margin-bottom:16px;">' +
        '닫으면 측정한 자료가 삭제됩니다.<br>저장하려면 「측정저장」을 먼저 해주세요.</div>';
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:8px;';
      function mk(label, bg, val) {
        var b = document.createElement('button');
        b.textContent = label;
        b.style.cssText = 'flex:1;border:none;border-radius:11px;padding:12px 4px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;color:#fff;background:' + bg + ';-webkit-tap-highlight-color:transparent;';
        b.onclick = function () { try { ov.remove(); } catch (e) {} resolve(val); };
        return b;
      }
      row.appendChild(mk('취소', '#8a8a8a', 'cancel'));
      row.appendChild(mk('삭제(닫기)', '#c62828', 'close'));
      box.appendChild(row); ov.appendChild(box);
      ov.addEventListener('click', function (e) { if (e.target === ov) { try { ov.remove(); } catch (_) {} resolve('cancel'); } });
      document.body.appendChild(ov);
    });
  }

  /* [v5-6] 실측 도구: 헤더 바를 잡고 이동 (짧게 누르면 접기/펴기) */
  var toolBody = document.getElementById('toolBody');
  var toolToggle = document.getElementById('toolToggle');
  var toolPanelEl = document.getElementById('toolPanel');
  (function () {
    var head = document.getElementById('toolHeader');
    var dragging = false, moved = false, sx = 0, sy = 0, ox = 0, oy = 0;
    function pt(e) { return e.touches ? e.touches[0] : e; }
    function down(e) {
      var p = pt(e);
      var r = toolPanelEl.getBoundingClientRect();
      dragging = true; moved = false;
      sx = p.clientX; sy = p.clientY; ox = r.left; oy = r.top;
      toolPanelEl.style.right = 'auto';
    }
    function move(e) {
      if (!dragging) return;
      var p = pt(e);
      var dx = p.clientX - sx, dy = p.clientY - sy;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
      var w = toolPanelEl.offsetWidth, h = toolPanelEl.offsetHeight;
      /* 화면 밖으로 나가지 않도록 제한 */
      var nx = Math.min(Math.max(0, ox + dx), window.innerWidth - w);
      var ny = Math.min(Math.max(0, oy + dy), window.innerHeight - Math.min(h, 80));
      toolPanelEl.style.left = nx + 'px';
      toolPanelEl.style.top = ny + 'px';
      if (e.cancelable) e.preventDefault();
    }
    function up() {
      if (!dragging) return;
      dragging = false;
      if (!moved) {   /* 이동이 아니면 접기/펴기 */
        var collapsed = toolBody.classList.toggle('collapsed');
        toolToggle.textContent = collapsed ? '▲' : '▼';
      }
    }
    head.addEventListener('touchstart', down, { passive: true });
    head.addEventListener('touchmove', move, { passive: false });
    head.addEventListener('touchend', up);
    head.addEventListener('mousedown', down);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  })();

  /* [v5-7] 측정 결과 접기/펴기 (기본 닫힘) */
  var resultArrow = document.getElementById('resultArrow');
  document.getElementById('resultToggle').addEventListener('click', function () {
    var closed = resultBox.classList.toggle('collapsed');
    resultArrow.textContent = closed ? '▶' : '▼';
  });
  document.getElementById('btnField').addEventListener('click', startFieldDrawing);
  document.getElementById('btnDistance').addEventListener('click', startDistanceMeasurement);
  document.getElementById('btnEdit').addEventListener('click', startMeasurementEdit);
  document.getElementById('btnUndo').addEventListener('click', undoLastMeasurementPoint);
  document.getElementById('btnCenterAdd').addEventListener('click', addCenterPoint);
  document.getElementById('btnFinish').addEventListener('click', finishCurrentMeasurement);
  document.getElementById('btnReset').addEventListener('click', resetAllMeasurements);

  /* ================= 지도 로딩 · 상태 복원 ================= */
  var mapLoaded = false;

  /* 지도 로딩과 보안저장 복호화가 모두 끝나야 저장상태를 복원한다 */
  function restoreWhenBothReady() {
    if (!mapLoaded || !secureReady) return;

    /* settings 객체는 '교체'하지 않고 제자리에서 갱신한다.
       (교체하면 다른 곳이 잡고 있던 참조가 옛 값을 계속 가리킨다 — 실측 확인) */
    var savedSettings = loadJSON(SETTINGS_KEY, null);
    if (savedSettings && typeof savedSettings === 'object') {
      if (savedSettings.baseType) settings.baseType = savedSettings.baseType;
      if (savedSettings.overlays) Object.assign(settings.overlays, savedSettings.overlays);
      if (isFinite(savedSettings.cadastralOpacity)) settings.cadastralOpacity = savedSettings.cadastralOpacity;
      if (typeof savedSettings.showFavPins === 'boolean') settings.showFavPins = savedSettings.showFavPins;
      if (typeof savedSettings.cropFilter === 'string') settings.cropFilter = savedSettings.cropFilter;
    }
    if (hasApiKey()) applySettingsToMap();

    lastView = loadJSON(VIEW_KEY, null);
    if (lastView && lastView.center) {
      map.jumpTo({
        center: lastView.center,
        zoom: isFinite(lastView.zoom) ? lastView.zoom : 12,
        bearing: isFinite(lastView.bearing) ? lastView.bearing : 0,
        pitch: isFinite(lastView.pitch) ? lastView.pitch : 0
      });
      updateBearing();
    }
    refreshFavPins();
    restored = true;   /* 이 시점부터 저장 허용 */
    console.log('저장상태 복원 완료 (즐겨찾기 ' + getFavs().length + '개, 지적도 ' +
                (settings.overlays.cadastral ? 'ON' : 'OFF') + ', 확대 ' + map.getZoom().toFixed(1) + ')');
  }

  whenSecureReady(function () {
    secureReady = true;
    console.log('보안 저장 준비 완료 (암호화 ' + (window.__tenarSecureActive === true ? 'ON' : 'OFF') + ')');
    restoreWhenBothReady();
  });

  map.on('load', function () {
    console.log('MapLibre 지도 로딩 완료');
    updateBearing();
    map.resize();

    if (!hasApiKey()) {
      showToast('브이월드 API 키를 입력해주세요.', 0);
    } else {
      addVWorldLayers();
      applySettingsToMap();
      console.log('브이월드 레이어 등록 완료');
    }
    initializeSurveyMeasurement();
    updateMeasurementResultPanel();
    console.log('실측 측정 레이어 등록 완료');

    mapLoaded = true;
    restoreWhenBothReady();
  });

  function resizeMap() { map.resize(); }
  window.addEventListener('resize', resizeMap);
  window.addEventListener('orientationchange', function () { setTimeout(resizeMap, 300); });
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeMap);
  setTimeout(resizeMap, 0);

  map.on('error', function (event) { console.error('지도 오류:', event.error); });

  /* 디버그/연동용 */
  window._map = map;
  window._survey = surveyMeasureState;
  window._tenarMap = {
    getFavs: getFavs, setFavs: setFavs, refreshFavPins: refreshFavPins,
    openFavSheet: openFavSheet, openLayerSheet: openLayerSheet, openHereSheet: openHereSheet,
    openPinSaveSheet: openPinSaveSheet, openSheet: openSheet, closeSheet: closeSheet,
    settings: settings, reverse: requestVWorldReverse, colorHex: colorHex,
    FAV_COLORS: FAV_COLORS, CROPS: CROPS, normalizeFav: normalizeFav,
    setMapType: setMapType, setOverlay: setOverlay, setCadastralOpacity: setCadastralOpacity,
    keys: { FAV_KEY: FAV_KEY, MEAS_KEY: MEAS_KEY, VIEW_KEY: VIEW_KEY, SETTINGS_KEY: SETTINGS_KEY, PENDING_KEY: PENDING_KEY }
  };
})();
</script>
</body>
</html>
