  var parcelCache = {};   /* pnu → { ts, road, zip, prices[], uname, areaM2, ... } */
  var PARCEL_CACHE_MS = 10 * 60 * 1000;

  function parseJimok(jibun) {
    var m = String(jibun || '').match(/([가-힣]+)\s*$/);
    return m ? m[1] : '';
  }
  /* 용도지역명 축약: "계획관리지역" → "계획관리" (item 1) */
  function shortUseName(u) {
    return String(u || '').replace(/지역$/, '');
  }

  /* 좌표로 필지 1건 조회 (지목·PNU·공시지가·geometry) */
  function requestParcelAt(lng, lat) {
    var cb = '__vwParcel' + (++dataFetchSeq);
    var url = 'https://api.vworld.kr/req/data?service=data&request=GetFeature&version=2.0' +
      '&data=LP_PA_CBND_BUBUN&key=' + encodeURIComponent(VWORLD_API_KEY) + '&domain=' + VWORLD_DOMAIN +
      '&geomFilter=' + encodeURIComponent('POINT(' + lng + ' ' + lat + ')') +
      '&crs=EPSG:4326&format=json&size=1&geometry=true&attribute=true&callback=' + cb;
    return vworldJsonp(url, cb).then(function (d) {
      var r = d && d.response;
      if (!r || r.status !== 'OK') return null;
      var fs = (r.result && r.result.featureCollection && r.result.featureCollection.features) || [];
      return fs.length ? fs[0] : null;
    });
  }
  /* 좌표로 용도지역명 조회 */
  function requestLanduseAt(lng, lat) {
    var cb = '__vwUse' + (++dataFetchSeq);
    var url = 'https://api.vworld.kr/req/data?service=data&request=GetFeature&version=2.0' +
      '&data=LT_C_UQ111&key=' + encodeURIComponent(VWORLD_API_KEY) + '&domain=' + VWORLD_DOMAIN +
      '&geomFilter=' + encodeURIComponent('POINT(' + lng + ' ' + lat + ')') +
      '&crs=EPSG:4326&format=json&size=3&geometry=false&attribute=true&callback=' + cb;
    return vworldJsonp(url, cb).then(function (d) {
      var r = d && d.response;
      if (!r || r.status !== 'OK') return [];
      var fs = (r.result && r.result.featureCollection && r.result.featureCollection.features) || [];
      return fs.map(function (f) { return (f.properties || {}).uname; }).filter(Boolean);
    });
  }

  /* [v10-7] 공시지가 연도 처리 —— 받아온 항목 중 최신/전년을 자동 선택.
     ※ 브이월드 필지 데이터는 현재 1개 연도만 제공하므로 대개 최신 1건만 표시된다.
       (여러 연도가 오는 구조로 바뀌어도 그대로 동작하도록 일반화) */
  function pickPriceYears(priceItems) {
    var items = (priceItems || []).filter(function (x) { return x && isFinite(Number(x.year)) && x.price; });
    items.sort(function (a, b) { return Number(b.year) - Number(a.year); });
    return { latest: items[0] || null, previous: items[1] || null };
  }

  /* ---- 선택 필지 강조 (item 4·23) ---- */
  var selectedParcelGeom = null;
  function highlightSelectedParcel(geometry) {
    if (!map.getSource('selected-parcel-source')) return;
    selectedParcelGeom = geometry || null;
    if (!geometry) { map.getSource('selected-parcel-source').setData(emptyFC()); return; }
    map.getSource('selected-parcel-source').setData({
      type: 'FeatureCollection',
      features: [{ type: 'Feature', properties: {}, geometry: geometry }]
    });
  }
  function clearSelectedParcelHighlight() { highlightSelectedParcel(null); }

  /* [v10-5] 선택 필지가 바텀시트에 가리지 않도록 지도 이동
     (세로 기준 약 38% 지점에 오도록 padding 계산) */
  function moveParcelAboveSheet(geometry, fallbackLngLat) {
    var center = null;
    if (geometry && hasTurf) {
      try { center = turf.centerOfMass({ type: 'Feature', properties: {}, geometry: geometry }).geometry.coordinates; } catch (e) {}
    }
    if (!center && fallbackLngLat) center = [fallbackLngLat.lng, fallbackLngLat.lat];
    if (!center) return;
    var sheetH = sheetOpen ? sheetEl.getBoundingClientRect().height : 0;
    map.easeTo({
      center: center,
      padding: { top: 90, bottom: Math.round(sheetH) + 40, left: 20, right: 20 },
      duration: 500
    });
  }

  /* ---- [v10-21·22] 공통 조회: 주소 → 필지 → 용도지역 (단계별) ---- */
  function fetchLandInfoAt(lng, lat, onStage) {
    var data = {
      lng: lng, lat: lat,
      jibunAddress: '', roadAddress: '', postalCode: '',
      pnu: '', jibun: '', jimok: '', areaM2: 0,
      prices: [], zoning: '', agriculturalZone: '', landUseStatus: '',
      parcelGeometry: null
    };
    function stage(msg) { if (onStage) onStage(msg, data); }

    stage('주소 조회 중');
    var pAddr = requestVWorldReverse(lng, lat).then(function (a) {
      data.jibunAddress = a.jibunAddress || '';
      data.roadAddress = a.roadAddress || '';
      data.postalCode = a.postalCode || '';
      stage('주소 조회 완료');
      return a;
    }).catch(function () { stage('주소 조회 실패'); return null; });

    var pParcel = requestParcelAt(lng, lat).then(function (f) {
      if (!f) { stage('필지 경계 없음'); return null; }
      var p = f.properties || {};
      data.pnu = p.pnu || '';
      data.jibun = p.jibun || '';
      data.jimok = parseJimok(p.jibun);
      if (!data.jibunAddress && p.addr) data.jibunAddress = p.addr;
      else if (p.addr) data.parcelAddr = p.addr;
      data.parcelGeometry = f.geometry || null;
      if (f.geometry && hasTurf) { try { data.areaM2 = turf.area(f); } catch (e) {} }
      if (p.jiga) data.prices.push({ year: p.gosi_year || '', price: Number(p.jiga) });
      stage('필지 경계 조회 완료');
      return f;
    }).catch(function () { stage('필지 조회 실패'); return null; });

    var pUse = requestLanduseAt(lng, lat).then(function (arr) {
      data.zoning = arr[0] || '';
      stage('토지이용정보 조회 완료');
      return arr;
    }).catch(function () { stage('토지이용정보 조회 실패'); return []; });

    return Promise.all([pAddr, pParcel, pUse]).then(function () {
      if (data.pnu) parcelCache[data.pnu] = { ts: Date.now(), data: data };
      return data;
    });
  }

  /* ---- [v10-19] 바텀시트 화면 스택 (저장 위치 ↔ 토지정보 왕복) ---- */
  var sheetHistory = [];
  function pushSheetHistory(entry) { if (entry) sheetHistory.push(entry); }
  function popSheetHistory() { return sheetHistory.pop() || null; }
  function restoreSheet(entry) {
    if (!entry) return false;
    if (entry.type === 'savedLocation') { openSavedLocationSheet(entry.data, true); return true; }
    if (entry.type === 'currentLocation') { openHereSheet(entry.data, true); return true; }
    return false;
  }

  var lastParcel = null;   /* 조사표/공유용 최근 조회 결과 */

  /* ===================================================================
     [v10-6·9·10] 토지정보 시트
       1줄: 전체 지번            [복사]
       2줄: 도로명주소            우편번호
       3줄: 면적                 공시지가(최신/전년)
       4줄: 위도 · 경도
       추가정보 ▼ : PNU / 용도지역 / 농업진흥지역 / 토지이용상황
       하단: ⭐현재 핀 저장  🚗길찾기  📋조사표로 전달
     =================================================================== */
  function openLandInfoSheet(data, options) {
    options = options || {};
    lastParcel = data;

    var box = el('div');

    /* ① 전체 지번 + 복사 (PNU 아님 — 지번주소 복사) */
    var addrRow = el('div', 'li-row');
    addrRow.style.marginTop = '0';
    var jibunText = (data.jibunAddress || data.parcelAddr || '주소 없음') + (data.jimok ? ' (' + data.jimok + ')' : '');
    var addrLeft = el('div', 'li-grow',
      '<div class="addr-label" style="margin-top:0;">전체 지번</div>' +
      '<div class="addr-main" style="font-size:16.5px;" id="liJibun">' + escapeHtml(jibunText) + '</div>');
    var bCopy = el('button', 'copy-btn', '복사');
    bCopy.style.cssText += 'flex-shrink:0;min-height:36px;';
    bCopy.addEventListener('click', function () {
      copyText(data.jibunAddress || data.parcelAddr || '');
    });
    addrRow.appendChild(addrLeft); addrRow.appendChild(bCopy);
    box.appendChild(addrRow);

    /* ② 도로명주소 + 우편번호 (같은 행) */
    var roadRow = el('div', 'li-row');
    roadRow.appendChild(el('div', 'li-grow',
      '<div class="addr-label" style="margin-top:0;">도로명주소</div>' +
      '<div class="addr-value" id="liRoad">' + escapeHtml(data.roadAddress || '조회 중…') + '</div>'));
    roadRow.appendChild(el('div', 'li-right',
      '<div class="addr-label" style="margin-top:0;">우편번호</div>' +
      '<div class="addr-value" id="liZip">' + escapeHtml(data.postalCode || '-') + '</div>'));
    box.appendChild(roadRow);

    /* ③ 면적 + 공시지가 (같은 행) */
    var areaRow = el('div', 'li-row');
    areaRow.appendChild(el('div', 'li-grow',
      '<div class="addr-label" style="margin-top:0;">면적</div>' +
      '<div class="addr-value" id="liArea">조회 중…</div>'));
    areaRow.appendChild(el('div', 'li-right',
      '<div class="addr-label" style="margin-top:0;">공시지가</div>' +
      '<div class="addr-value" id="liPrice" style="font-size:13px;">조회 중…</div>'));
    box.appendChild(areaRow);

    /* ④ 좌표 한 줄 */
    box.appendChild(el('div', 'li-coord',
      '위도 ' + data.lat.toFixed(6) + ' · 경도 ' + data.lng.toFixed(6)));

    /* 진행 상태 */
    var statusEl = el('div', 'li-status', '토지정보를 확인하고 있습니다.');
    statusEl.id = 'liStatus';
    box.appendChild(statusEl);

    /* [v10-9] 추가정보 (PNU 포함) */
    var moreBtn = el('button', 'li-more-btn', '추가정보 ▼');
    var moreBox = el('div');
    moreBox.style.display = 'none';
    moreBtn.addEventListener('click', function () {
      var open = moreBox.style.display === 'none';
      moreBox.style.display = open ? 'block' : 'none';
      moreBtn.textContent = open ? '추가정보 ▲' : '추가정보 ▼';
    });
    box.appendChild(moreBtn); box.appendChild(moreBox);

    function renderMore() {
      var rows = [];
      rows.push(['PNU', data.pnu || '정보 없음']);
      rows.push(['용도지역', data.zoning ? shortUseName(data.zoning) : '정보 없음']);
      rows.push(['농업진흥지역', data.agriculturalZone || '정보 없음']);
      rows.push(['토지이용상황', data.landUseStatus || '정보 없음']);
      moreBox.innerHTML = rows.map(function (r) {
        return '<div class="addr-label">' + escapeHtml(r[0]) + '</div><div class="addr-value" style="word-break:break-all;">' + escapeHtml(r[1]) + '</div>';
      }).join('');
      /* 공식 토지이용계획(토지이음) — 임의 해석 대신 공식값 확인 */
      var official = el('button', 'sheet-btn', '🔗 공식 토지이용계획 확인');
      official.style.cssText += 'width:100%;margin-top:10px;';
      official.addEventListener('click', function () {
        if (!data.pnu) { showToast('PNU가 없어 공식 조회를 열 수 없습니다.', 3000, 'info'); return; }
        window.open('https://www.eum.go.kr/web/ar/lu/luLandDet.jsp?pnu=' + encodeURIComponent(data.pnu), '_blank', 'noopener');
      });
      moreBox.appendChild(official);
    }
    renderMore();

    /* [v10-10] 하단 버튼 3개 — 현재 위치 팝업과 같은 컴포넌트(.btn-row/.sheet-btn) */
    var row = el('div', 'btn-row');
    row.style.marginTop = '16px';
    var bSave = el('button', 'sheet-btn primary', '⭐ 현재 핀 저장');
    bSave.addEventListener('click', function () {
      /* [v10-11] 저장 기준은 좌표, 표시 주소는 전체 지번 */
      openPinSaveSheet({
        lat: data.lat, lng: data.lng,
        jibunAddress: data.jibunAddress || data.parcelAddr || '',
        roadAddress: data.roadAddress || '', postalCode: data.postalCode || '',
        pnu: data.pnu || ''
      });
    });
    var bNav = el('button', 'sheet-btn green-soft', '🚗 길찾기');
    bNav.addEventListener('click', function () {
      /* [v10-12] 주소보다 좌표 우선 */
      openNavSheet({
        lat: data.lat, lng: data.lng,
        jibunAddress: data.jibunAddress || data.parcelAddr || '', roadAddress: data.roadAddress || ''
      });
    });
    var bSurvey = el('button', 'sheet-btn green-soft', '📋 조사표로 전달');
    bSurvey.addEventListener('click', function () { openSurveySheet(buildSurveyInfo(data)); });
    row.appendChild(bSave); row.appendChild(bNav); row.appendChild(bSurvey);
    box.appendChild(row);

    /* 시트 열기 (되돌아갈 화면이 있으면 헤더에 뒤로가기) */
    openSheet('토지정보', box, 'auto');
    if (options.returnSheet) {
      setSheetAction('‹ 뒤로', function () {
        clearSelectedParcelHighlight();
        restoreSheet(options.returnSheet);
      });
      sheetLandInfoReturn = options.returnSheet;
    } else {
      sheetLandInfoReturn = null;
    }
    sheetIsLandInfo = true;

    /* 선택 필지 강조 + 시트 위로 지도 이동 */
    if (data.parcelGeometry) {
      highlightSelectedParcel(data.parcelGeometry);
      requestAnimationFrame(function () { moveParcelAboveSheet(data.parcelGeometry, { lng: data.lng, lat: data.lat }); });
    } else {
      requestAnimationFrame(function () { moveParcelAboveSheet(null, { lng: data.lng, lat: data.lat }); });
    }

    /* 이미 채워진 값 반영 */
    updateLandInfoFields(data);
    return box;
  }

  /* 비동기로 값이 채워질 때 화면만 갱신 (item 22) */
  function updateLandInfoFields(data) {
    var r = document.getElementById('liRoad');
    var z = document.getElementById('liZip');
    var a = document.getElementById('liArea');
    var pr = document.getElementById('liPrice');
    var jb = document.getElementById('liJibun');
    if (jb && (data.jibunAddress || data.parcelAddr)) {
      jb.textContent = (data.jibunAddress || data.parcelAddr) + (data.jimok ? ' (' + data.jimok + ')' : '');
    }
    if (r) r.textContent = data.roadAddress || '도로명주소 없음';
    if (z) z.textContent = data.postalCode || '확인되지 않음';
    if (a) a.textContent = data.areaM2 ? (formatNumber(data.areaM2, 0) + '㎡ / 약 ' + formatNumber(data.areaM2 / 3.305785, 1) + '평') : '확인되지 않음';
    if (pr) {
      var yy = pickPriceYears(data.prices);
      if (!yy.latest) pr.innerHTML = '<span style="color:#999;">정보 없음</span>';
      else {
        var t = (yy.latest.year ? yy.latest.year + '년 ' : '') + formatNumber(yy.latest.price, 0) + '원';
        if (yy.previous) t += '<br>' + (yy.previous.year ? yy.previous.year + '년 ' : '') + formatNumber(yy.previous.price, 0) + '원';
        pr.innerHTML = t;
      }
    }
  }

  /* 조사표 전달용 정보 (item 13) */
  function buildSurveyInfo(data) {
    var yy = pickPriceYears(data.prices);
    return {
      lat: data.lat, lng: data.lng,
      jibunAddress: data.jibunAddress || data.parcelAddr || '',
      roadAddress: data.roadAddress || '', postalCode: data.postalCode || '',
      pnu: data.pnu || '', jimok: data.jimok || '',
      areaM2: data.areaM2 || 0,
      officialPriceLatest: yy.latest ? yy.latest : null,
      officialPricePrevious: yy.previous ? yy.previous : null,
      zoning: data.zoning || '', agriculturalZone: data.agriculturalZone || '',
      landUseStatus: data.landUseStatus || '', parcelGeometry: data.parcelGeometry || null
    };
  }

  /* [v10-16·21] 좌표 하나로 토지정보 시트를 여는 공통 진입점.
     주소가 오기 전에 화면을 먼저 띄우고, 값이 오면 갱신한다. */
  function openLandInfoAt(lng, lat, options) {
    options = options || {};
    var partial = {
      lng: lng, lat: lat, jibunAddress: '', roadAddress: '', postalCode: '',
      pnu: '', jibun: '', jimok: '', areaM2: 0, prices: [], zoning: '',
      agriculturalZone: '', landUseStatus: '', parcelGeometry: null
    };
    openLandInfoSheet(partial, options);

    fetchLandInfoAt(lng, lat, function (msg, d) {
      var st = document.getElementById('liStatus');
      if (st) st.textContent = msg;
      updateLandInfoFields(d);
    }).then(function (full) {
      lastParcel = full;
      var st = document.getElementById('liStatus');
      if (st) st.style.display = 'none';
      updateLandInfoFields(full);
      /* 추가정보·버튼이 최신 데이터를 쓰도록 시트를 갱신 */
      if (sheetIsLandInfo && sheetOpen) {
        var scrollTop = sheetBody.scrollTop;
        openLandInfoSheet(full, options);
        sheetBody.scrollTop = scrollTop;
      }
    }).catch(function (e) {
      console.warn('토지정보 조회 실패', e);
      var st = document.getElementById('liStatus');
      if (st) st.textContent = '일부 정보를 불러오지 못했습니다.';
    });
  }
  var sheetIsLandInfo = false;
  var sheetLandInfoReturn = null;
  function openSurveySheet(info) {
    var box = el('div');
    box.appendChild(el('div', null, '<div style="font-size:13px;color:#555;margin-bottom:10px;">' +
      escapeHtml(info.jibunAddress || '') + (info.pnu ? '<br>PNU ' + escapeHtml(info.pnu) : '') + '<br>좌표를 조사표로 전달합니다.</div>'));
    [['실측조사표', 'tonghab'], ['청취조사표', 'chungchi']].forEach(function (s) {
      var b = el('button', 'sheet-btn', s[0]);
      b.style.cssText += 'width:100%;margin-bottom:8px;';
      b.addEventListener('click', function () {
        /* [v10-13] PNU 우선 식별 + 면적·공시지가(최신/전년)·용도지역·필지경계 전달 */
        var payload = {
          latitude: info.lat, longitude: info.lng,
          jibunAddress: info.jibunAddress || '', roadAddress: info.roadAddress || '',
          postalCode: info.postalCode || '',
          favoriteId: info.favoriteId || null,
          color: info.color || '', crop: info.crop || '',
          pnu: info.pnu || '', jimok: info.jimok || '',
          areaM2: info.areaM2 || 0,
          officialPriceLatest: info.officialPriceLatest || null,
          officialPricePrevious: info.officialPricePrevious || null,
          zoning: info.zoning || '',
          agriculturalZone: info.agriculturalZone || '',
          landUseStatus: info.landUseStatus || '',
          parcelGeometry: info.parcelGeometry || null,
          surveyType: s[1], savedAt: kstNowStr()
        };
        saveJSON(PENDING_KEY, payload);
        closeSheet();
        showToast(s[0] + '로 전달할 정보를 저장했습니다.' + (payload.pnu ? '\nPNU ' + payload.pnu : '') + '\n(조사표 자동 열기는 다음 버전)', 4000, 'success');
      });
      box.appendChild(b);
    });
    var c = el('button', 'sheet-btn danger', '취소');
    c.style.cssText += 'width:100%;';
    c.addEventListener('click', closeSheet);
    box.appendChild(c);
    openSheet('📋 조사표', box, 50);
  }

  /* ================= 레이어 시트 ================= */
  function openLayerSheet() {
    var box = el('div');
    box.appendChild(el('div', 'sec-title', '기본지도 (하나만 선택)'));
    var r = el('div', 'btn-row');
    var bBase = el('button', 'sheet-btn' + (settings.baseType === 'base' ? ' active' : ''), '일반지도');
    var bSat = el('button', 'sheet-btn' + (settings.baseType === 'satellite' ? ' active' : ''), '항공영상');
    bBase.addEventListener('click', function () { setMapType('base'); bBase.classList.add('active'); bSat.classList.remove('active'); });
    bSat.addEventListener('click', function () { setMapType('satellite'); bSat.classList.add('active'); bBase.classList.remove('active'); });
    r.appendChild(bBase); r.appendChild(bSat);
    box.appendChild(r);

    box.appendChild(el('div', 'sec-title', '중첩 레이어 (여러 개 선택)'));
    OVERLAY_DEFS.forEach(function (d) {
      var row = el('div', 'lyr-row');
      row.appendChild(el('div', null, '<div class="lyr-name">' + escapeHtml(d.ko) + '</div><div class="lyr-desc">' + escapeHtml(d.desc) + '</div>'));
      var sw = el('div', 'switch' + (settings.overlays[d.id] ? ' on' : ''), '<div class="knob"></div>');
      sw.addEventListener('click', function () {
        var on = !settings.overlays[d.id];
        setOverlay(d.id, on);
        sw.classList.toggle('on', on);
      });
      row.appendChild(sw);
      box.appendChild(row);
    });

    box.appendChild(el('div', 'sec-title', '지적도 투명도'));
    var val = el('div', null, '<div class="lyr-desc" id="cadVal">' + Math.round(settings.cadastralOpacity * 100) + '%</div>');
    var rng = el('input');
    rng.type = 'range'; rng.min = '0'; rng.max = '100'; rng.step = '5';
    rng.value = String(Math.round(settings.cadastralOpacity * 100));
    rng.addEventListener('input', function () {
      var v = Number(rng.value) / 100;
      setCadastralOpacity(v);
      var t = document.getElementById('cadVal');
      if (t) t.textContent = rng.value + '%';
    });
    box.appendChild(val); box.appendChild(rng);

    /* [v9] 토지이용계획 투명도 (20~70%) + 색상 범례 */
    box.appendChild(el('div', 'sec-title', '토지이용계획 투명도'));
    var luVal = el('div', null, '<div class="lyr-desc" id="luVal">' + Math.round(settings.landuseOpacity * 100) + '%</div>');
    var luRng = el('input');
    luRng.type = 'range'; luRng.min = '20'; luRng.max = '70'; luRng.step = '5';
    luRng.value = String(Math.round(settings.landuseOpacity * 100));
    luRng.addEventListener('input', function () {
      var v = Number(luRng.value) / 100;
      setLanduseOpacity(v);
      var t = document.getElementById('luVal');
      if (t) t.textContent = luRng.value + '%';
    });
    box.appendChild(luVal); box.appendChild(luRng);
    var legend = el('div', null, '');
    legend.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px 12px;margin-top:8px;';
    LANDUSE_LEGEND.forEach(function (x) {
      var item = el('div', null,
        '<span style="display:inline-block;width:13px;height:13px;border-radius:3px;background:' + x[1] +
        ';border:1px solid rgba(0,0,0,.15);vertical-align:middle;margin-right:4px;"></span>' +
        '<span style="font-size:11px;color:#555;vertical-align:middle;">' + escapeHtml(x[0]) + '</span>');
      legend.appendChild(item);
    });
    box.appendChild(legend);

    box.appendChild(el('div', null, '<div class="lyr-desc" style="margin-top:10px;">' +
      '지적도는 확대 16 이상, 지번 라벨은 확대 17 이상, 토지이용계획은 확대 13 이상에서 표시됩니다.<br>' +
      '지적 필지를 누르면 지번·지목·PNU와 추가정보(면적·공시지가·용도지역)를 확인할 수 있습니다.</div>'));
    openSheet('🗺 레이어', box, 50);
    /* [v11-2] 레이어 초기화 버튼 (✕ 왼쪽) — 기본값으로 되돌림 */
    setSheetAction('↺ 초기화', function () {
      if (!window.confirm('레이어 설정을 기본값으로 되돌리시겠습니까?\n(일반지도 · 중첩레이어 전체 해제 · 투명도 기본값)')) return;
      settings.baseType = DEFAULT_SETTINGS.baseType;
      Object.keys(settings.overlays).forEach(function (k) { settings.overlays[k] = false; });
      settings.cadastralOpacity = DEFAULT_SETTINGS.cadastralOpacity;
      settings.landuseOpacity = DEFAULT_SETTINGS.landuseOpacity;
      saveSettings();
      applySettingsToMap();
      closeSheet();
      openLayerSheet();
      showToast('레이어 설정을 초기화했습니다.', 2500, 'success');
    });
  }

  /* ================= 실시간 위치추적 ================= */
  var isTrackingLocation = false;   /* [v8-11] 추적 여부의 유일한 상태값 */
  var lastTrackedLoc = null;        /* 마지막 GPS 좌표 [lng,lat] */
  var trackNoticeShown = false;
  function setTrackBtn(on) {
    isTrackingLocation = on;
    document.getElementById('btnTrack').classList.toggle('active', on);
  }

  /* [v8-12/13] 추적 중 현재 위치가 화면 밖으로 벗어났을 때만 중앙으로 복귀.
     - 사용자가 확대/축소한 줌 값은 그대로 유지(easeTo에 zoom 미지정)
     - 화면 가장자리 여유(30px)만큼 안쪽에서 벗어나야 복귀 → 잦은 복귀 방지
     - 사용자의 수동 이동만으로는 추적을 해제하지 않는다 */
  function maybeRecenterTracked() {
    if (!isTrackingLocation || !lastTrackedLoc) return;
    var pt = map.project(lastTrackedLoc);
    var m = 30;   /* 가장자리 여유 */
    var inView = pt.x >= m && pt.y >= m && pt.x <= (map.getCanvas().clientWidth - m) && pt.y <= (map.getCanvas().clientHeight - m);
    if (inView) return;
    map.easeTo({ center: lastTrackedLoc, duration: 500 });   /* zoom 유지 */
  }
  /* [v7-5] GeolocateControl은 trigger() 시 자체적으로 확대 수준을 정한다(기본 15).
     버튼마다 원하는 확대가 다르므로 trigger 직전에 맞춰준다. */
  function setGeoZoom(z) {
    try {
      geolocateControl.options.fitBoundsOptions =
        Object.assign({}, geolocateControl.options.fitBoundsOptions || {}, { maxZoom: z });
    } catch (e) { console.warn('확대 수준 설정 실패', e); }
  }

  function toggleTracking() {
    if (!isTrackingLocation) {
      if (!trackNoticeShown) {
        showToast('실시간 위치추적은 배터리 사용량이 증가할 수 있습니다.', 4000, 'info');
        trackNoticeShown = true;
      }
      setGeoZoom(ZOOM_TRACK);       /* 시작 시 확대 = LOCATION_FOCUS_ZOOM */
      setTrackBtn(true);            /* [v8-11] 상태값 먼저 켜고 버튼 반전 유지 */
      geolocateControl.trigger();   /* ACTIVE_LOCK → 추적 시작 */
    } else {
      /* 해제: 컨트롤이 BACKGROUND 상태면 trigger 한 번으론 안 꺼질 수 있어 최대 2회 시도 */
      setTrackBtn(false);
      try {
        geolocateControl.trigger();
        if (geolocateControl._watchState && geolocateControl._watchState !== 'OFF') geolocateControl.trigger();
      } catch (e) {}
    }
  }

  /* ===================================================================
     실측 측정 (v3 검증 코드 유지 · v4b에서 바텀시트/ cm 표시로 확장)
     =================================================================== */
  /* [v7-9] 연속 측정 —— 완료한 면적/거리를 areas[] · lines[] 에 쌓아 여러 개를 동시에 표시.
     fieldPoints/distancePoints 는 "지금 작업 중인" 한 건이며 기존 구조를 그대로 유지한다
     (A/B포구 연동 등 기존 코드가 이 두 배열을 그대로 참조하기 때문). */
  var surveyMeasureState = {
    mode: 'none', fieldPoints: [], fieldPolygon: null,
    fieldAreaM2: 0, fieldPerimeterM: 0,
    distancePoints: [], segmentDistances: [], totalDistanceM: 0,
    isFieldComplete: false, isEditing: false, dragging: null,
    fieldKind: 'field',   /* [v14] 'field'=필지/면적, 'crop'=재배구역 (계산 로직은 동일, 색·문구만 다름) */
    areas: [],            /* [{id, points, areaM2, perimeterM}] 완료된 면적들 */
    lines: [],            /* [{id, points, segs, totalM}]       완료된 거리들 */
    editingSaveId: null   /* 저장본을 불러와 수정 중이면 그 ID */
  };
  var segmentLabelMarkers = [];
  var crosshairEl = document.getElementById('crosshair');
  var modeBadge = document.getElementById('modeBadge');

  function emptyFC() { return { type: 'FeatureCollection', features: [] }; }

  function initializeSurveyMeasurement() {
    /* [v10-4] 선택 필지 강조 (지적도 경계는 그대로 두고 선택분만 파랑으로 별도 표시).
       측정 도형보다 아래, 지적도보다 위에 오도록 여기서 먼저 추가한다. */
    map.addSource('selected-parcel-source', { type: 'geojson', data: emptyFC() });
    map.addLayer({
      id: 'selected-parcel-fill', type: 'fill', source: 'selected-parcel-source',
      /* [v11-4] 안쪽 채움 없음(투명) — 지도가 어두워지지 않도록 테두리만 파란색 */
      paint: { 'fill-color': '#2196F3', 'fill-opacity': 0 }
    });
    map.addLayer({
      id: 'selected-parcel-outline', type: 'line', source: 'selected-parcel-source',
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-color': '#1565C0', 'line-width': 4 }
    });

    map.addSource('survey-field-source', { type: 'geojson', data: emptyFC() });
    map.addSource('survey-distance-source', { type: 'geojson', data: emptyFC() });

    map.addLayer({
      id: 'survey-field-fill', type: 'fill', source: 'survey-field-source',
      filter: ['==', ['get', 'type'], 'field'],
      /* [v14] 재배구역은 주황, 필지/면적은 초록 */
      paint: { 'fill-color': ['case', ['==', ['coalesce', ['get', 'kind'], 'field'], 'crop'], '#d97706', '#1f8a4c'], 'fill-opacity': 0.2 }
    });
    map.addLayer({
      id: 'survey-field-outline', type: 'line', source: 'survey-field-source',
      filter: ['in', ['get', 'type'], ['literal', ['field', 'field-line']]],
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: { 'line-color': ['case', ['==', ['coalesce', ['get', 'kind'], 'field'], 'crop'], '#b45309', '#14612f'], 'line-width': 3 }
    });
    /* [v6-6] 구간별로 선을 나눠 1~2구간과 3구간 이후 색을 구분한다 */
    map.addLayer({
      id: 'survey-distance-line', type: 'line', source: 'survey-distance-source',
      filter: ['==', ['get', 'type'], 'distance-line'],
      layout: { 'line-cap': 'round', 'line-join': 'round' },
      paint: {
        'line-color': ['case', ['<', ['coalesce', ['get', 'segIndex'], 0], 2], '#1a5fd0', '#7c3aed'],
        'line-width': ['case', ['<', ['coalesce', ['get', 'segIndex'], 0], 2], 4, 5]
      }
    });
    /* [v6-5] 측정 중: 마지막 꼭짓점 빨강 · 나머지 파랑 / 완료 후: 전부 일반색(초록) */
    map.addLayer({
      id: 'survey-field-vertices', type: 'circle', source: 'survey-field-source',
      filter: ['==', ['get', 'type'], 'field-vertex'],
      paint: {
        'circle-radius': ['case', ['get', 'last'], 7, 6],
        'circle-color': '#ffffff',
        'circle-stroke-color': ['case',
          ['get', 'lastAny'], '#e5342a',
          ['==', ['coalesce', ['get', 'kind'], 'field'], 'crop'], '#b45309',
          ['get', 'done'], '#14612f',
          '#1a5fd0'],
        'circle-stroke-width': 3
      }
    });
    map.addLayer({
      id: 'survey-distance-vertices', type: 'circle', source: 'survey-distance-source',
      filter: ['==', ['get', 'type'], 'distance-vertex'],
      paint: { 'circle-radius': 6, 'circle-color': '#ffffff', 'circle-stroke-color': '#1a5fd0', 'circle-stroke-width': 3 }
    });
  }

  function formatNumber(value, digits) {
    return Number(value).toLocaleString('ko-KR', { minimumFractionDigits: digits, maximumFractionDigits: digits });
  }
  /* [v5-7] 길이는 항상 미터 · 소수점 둘째 자리까지 */
  function formatMeasurementValue(meters) {
    return formatNumber(meters, 2) + 'm';
  }
  function closedRing(points) { var r = points.slice(); r.push(points[0]); return r; }

  function calculateFieldArea() {
    var s = surveyMeasureState;
    if (!hasTurf || !s.fieldPolygon) { s.fieldAreaM2 = 0; return 0; }
    s.fieldAreaM2 = turf.area(s.fieldPolygon);
    return s.fieldAreaM2;
  }
  function calculateFieldPerimeter() {
    var s = surveyMeasureState;
    if (!hasTurf || s.fieldPoints.length < 3) { s.fieldPerimeterM = 0; return 0; }
    s.fieldPerimeterM = turf.length(turf.lineString(closedRing(s.fieldPoints)), { units: 'kilometers' }) * 1000;
    return s.fieldPerimeterM;
  }
  function calculateSegmentDistances() {
    var s = surveyMeasureState;
    s.segmentDistances = []; s.totalDistanceM = 0;
    if (!hasTurf) return;
    for (var i = 0; i < s.distancePoints.length - 1; i++) {
      var m = turf.distance(turf.point(s.distancePoints[i]), turf.point(s.distancePoints[i + 1]), { units: 'kilometers' }) * 1000;
      s.segmentDistances.push(m);
      s.totalDistanceM += m;
    }
  }
  function updateFieldGeometry() {
    var s = surveyMeasureState, fc = emptyFC(), i;
    if (typeof fpSyncButtons === 'function') setTimeout(fpSyncButtons, 0);   /* [v15] 완료 시 가·나 버튼 표시 */
    if (typeof geoPush === 'function') setTimeout(geoPush, 0);               /* [v17] UNDO/REDO 이력 */

    /* [v7-9] 완료된 면적들(연속 측정)을 먼저 그린다 */
    s.areas.forEach(function (ar) {
      fc.features.push({
        type: 'Feature', properties: { type: 'field', done: true, kind: (ar.kind || 'field') },
        geometry: { type: 'Polygon', coordinates: [closedRing(ar.points)] }
      });
      ar.points.forEach(function (p, k) {
        fc.features.push({
          type: 'Feature', properties: { type: 'field-vertex', index: k, last: false, done: true, areaId: ar.id, kind: (ar.kind || 'field') },
          geometry: { type: 'Point', coordinates: p }
        });
      });
    });

    if (s.fieldPoints.length >= 3) {
      s.fieldPolygon = { type: 'Feature', properties: { type: 'field', kind: s.fieldKind }, geometry: { type: 'Polygon', coordinates: [closedRing(s.fieldPoints)] } };
      fc.features.push(s.fieldPolygon);
    } else {
      s.fieldPolygon = null;
      if (s.fieldPoints.length === 2) {
        fc.features.push({ type: 'Feature', properties: { type: 'field-line', kind: s.fieldKind }, geometry: { type: 'LineString', coordinates: s.fieldPoints.slice() } });
      }
    }
    for (i = 0; i < s.fieldPoints.length; i++) {
      fc.features.push({
        type: 'Feature',
        properties: {
          type: 'field-vertex', index: i, kind: s.fieldKind,
          last: (!s.isFieldComplete && i === s.fieldPoints.length - 1),
          lastAny: (i === s.fieldPoints.length - 1),   /* [v15-9] 완료 후에도 마지막 점은 다른 색 */
          done: !!s.isFieldComplete                                        /* 완료 = 전부 일반색 */
        },
        geometry: { type: 'Point', coordinates: s.fieldPoints[i] }
      });
    }
    map.getSource('survey-field-source').setData(fc);
    calculateFieldArea(); calculateFieldPerimeter();
    updateAreaLabel();
    updateVertexNumbers();
    updateMeasurementResultPanel();
    syncSurveyMapData();
  }

  /* [v6-5] 꼭짓점 번호(1,2,3…) 라벨 — 터치를 막지 않도록 pointer-events:none */
  var vtxNumMarkers = [];
  function clearVertexNumbers() { vtxNumMarkers.forEach(function (m) { m.remove(); }); vtxNumMarkers = []; }
  function updateVertexNumbers() {
    clearVertexNumbers();
    var s = surveyMeasureState;
    for (var i = 0; i < s.fieldPoints.length; i++) {
      var e2 = document.createElement('div');
      /* [v15-9] 마지막 점은 항상 다른 색 (그리는 중·완료 무관) */
      e2.className = 'vtx-num' + (i === s.fieldPoints.length - 1 ? ' vtx-last' : '');
      e2.textContent = String(i + 1);
      vtxNumMarkers.push(
        new maplibregl.Marker({ element: e2 }).setLngLat(s.fieldPoints[i]).addTo(map)   /* offset 없음 = 점 안 */
      );
    }
  }

  /* [v5-7] 점 3개 이상이면 필지 중앙에 면적을 ㎡·평 두 줄로 표시 */
  var areaLabelMarkers = [];
  function clearAreaLabel() { areaLabelMarkers.forEach(function (m) { m.remove(); }); areaLabelMarkers = []; }
  /* [v17-11] 작물명 + 면적 + 평 을 다각형 중심보다 "조금 위"에 표시.
     핀·주소 라벨과 겹치지 않도록 위로 살짝 띄운다. */
  function addAreaLabel(polygon, areaM2) {
    if (!hasTurf || !polygon) return;
    var c = null;
    try { c = turf.centerOfMass(polygon).geometry.coordinates; } catch (e) { return; }
    if (!c || !isFinite(c[0]) || !isFinite(c[1])) return;
    /* [v19-4] 지도가 회전해 있어도 "테두리 밖 아래"가 되도록 화면 좌표로 계산한다.
       (경위도 bbox 만 쓰면 회전 시 선 위에 걸쳐 면적 글씨가 선과 겹쳤다) */
    try {
      var ring = polygon.geometry.coordinates[0];
      var lowest = null;                     /* 화면에서 y 가 가장 큰(가장 아래) 점 */
      for (var qi = 0; qi < ring.length; qi++) {
        var sp = map.project(ring[qi]);
        if (!lowest || sp.y > lowest.y) lowest = sp;
      }
      if (lowest) {
        var cs = map.project(c);
        var ll = map.unproject([cs.x, lowest.y]);
        c = [ll.lng, ll.lat];
      }
    } catch (e) {}
    var e2 = document.createElement('div');
    e2.className = 'area-label';
    /* 작물명은 포구도구로 넘어온 작물을 우선 사용한다 */
    var crop = (fp.ctx && fp.ctx.crop) ? String(fp.ctx.crop) : '';
    e2.innerHTML = (crop ? '<span class="area-crop">' + escapeHtml(crop) + '</span><br>' : '') +
                   formatNumber(areaM2, 1) + '㎡<br>' + formatNumber(areaM2 / 3.305785, 1) + '평';
    /* [v18-5] A/B포구 세로선·점이 가장 중요하므로 면적 라벨은 아래로 내려 겹치지 않게 한다 */
    /* 세로 총길이 라벨보다 더 아래에 놓는다 */
    areaLabelMarkers.push(new maplibregl.Marker({ element: e2, offset: [0, 62] }).setLngLat(c).addTo(map));
  }
  function updateAreaLabel() {
    clearAreaLabel();
    var s = surveyMeasureState;
    /* [v7-9] 완료된 면적들 + 현재 작업 중인 면적 각각에 라벨 */
    s.areas.forEach(function (ar) {
      addAreaLabel({ type: 'Feature', properties: {}, geometry: { type: 'Polygon', coordinates: [closedRing(ar.points)] } }, ar.areaM2);
    });
    if (s.fieldPolygon && s.fieldPoints.length >= 3) addAreaLabel(s.fieldPolygon, s.fieldAreaM2);
  }
  function clearSegmentLabels() { segmentLabelMarkers.forEach(function (m) { m.remove(); }); segmentLabelMarkers = []; }
  function updateDistanceGeometry() {
    if (typeof geoPush === 'function') setTimeout(geoPush, 0);   /* [v17] UNDO/REDO 이력 */
    var s = surveyMeasureState, fc = emptyFC(), i;

    /* [v7-9] 완료된 거리들(연속 측정)을 먼저 그린다 */
    s.lines.forEach(function (ln) {
      for (var k = 0; k < ln.points.length - 1; k++) {
        fc.features.push({
          type: 'Feature', properties: { type: 'distance-line', segIndex: k },
          geometry: { type: 'LineString', coordinates: [ln.points[k], ln.points[k + 1]] }
        });
      }
      ln.points.forEach(function (p, k2) {
        fc.features.push({
          type: 'Feature', properties: { type: 'distance-vertex', index: k2, lineId: ln.id },
          geometry: { type: 'Point', coordinates: p }
        });
      });
    });

    /* [v6-6] 구간마다 별도 LineString → 1~2구간(파랑)과 3구간 이후(보라) 색 구분 */
    for (i = 0; i < s.distancePoints.length - 1; i++) {
      fc.features.push({
        type: 'Feature', properties: { type: 'distance-line', segIndex: i },
        geometry: { type: 'LineString', coordinates: [s.distancePoints[i], s.distancePoints[i + 1]] }
      });
    }
    for (i = 0; i < s.distancePoints.length; i++) {
      fc.features.push({ type: 'Feature', properties: { type: 'distance-vertex', index: i }, geometry: { type: 'Point', coordinates: s.distancePoints[i] } });
    }
    map.getSource('survey-distance-source').setData(fc);
    calculateSegmentDistances();
    clearSegmentLabels();

    /* [v7-9] 완료된 거리들의 전체거리 라벨 */
    s.lines.forEach(function (ln) {
      if (!ln.points.length) return;
      var te2 = document.createElement('div');
      te2.className = 'total-label';
      te2.textContent = '전체 ' + formatMeasurementValue(ln.totalM);
      segmentLabelMarkers.push(
        new maplibregl.Marker({ element: te2, offset: [0, -22] }).setLngLat(ln.points[ln.points.length - 1]).addTo(map)
      );
    });

    /* 구간 라벨: 1~2구간 파랑 / 3구간 이후 보라 */
    for (i = 0; i < s.segmentDistances.length; i++) {
      var a = s.distancePoints[i], b = s.distancePoints[i + 1];
      var mid = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
      var e = document.createElement('div');
      e.className = 'seg-label' + (i >= 2 ? ' seg-late' : '');
      e.textContent = (i + 1) + '구간 ' + formatMeasurementValue(s.segmentDistances[i]);
      segmentLabelMarkers.push(new maplibregl.Marker({ element: e }).setLngLat(mid).addTo(map));
    }
    /* [v6-6] 전체거리 라벨 — 구간 라벨보다 크고 굵게, 마지막 점 위에 표시 */
    if (s.segmentDistances.length > 0) {
      var last = s.distancePoints[s.distancePoints.length - 1];
      var te = document.createElement('div');
      te.className = 'total-label';
      te.textContent = '전체 ' + formatMeasurementValue(s.totalDistanceM);
      segmentLabelMarkers.push(new maplibregl.Marker({ element: te, offset: [0, -22] }).setLngLat(last).addTo(map));
    }
    updateMeasurementResultPanel();
    syncSurveyMapData();
  }
  function updateMeasurementSources() { updateFieldGeometry(); updateDistanceGeometry(); }

  var resultBox = document.getElementById('resultBox');
  function updateMeasurementResultPanel() {
    var s = surveyMeasureState, html = '';
    updateNewMeasureBtn();

    /* [v7-9] 연속 측정: 완료된 면적·거리 합계를 먼저 보여준다 */
    if (s.areas.length || s.lines.length) {
      var sumA = s.areas.reduce(function (a, x) { return a + (x.areaM2 || 0); }, 0);
      var sumL = s.lines.reduce(function (a, x) { return a + (x.totalM || 0); }, 0);
      html += '<div class="res-title">완료된 측정</div>';
      if (s.areas.length) html += '<div class="res-sub">면적 ' + s.areas.length + '건<br>' + formatNumber(sumA, 1) + '㎡ / ' + formatNumber(sumA / 3.305785, 1) + '평</div>';
      if (s.lines.length) html += '<div class="res-sub">거리 ' + s.lines.length + '건<br>' + formatMeasurementValue(sumL) + '</div>';
      html += '<hr>';
    }

    if (s.fieldPolygon) {
      var m2 = s.fieldAreaM2;
      html += '<div class="res-title">' + (s.fieldKind === 'crop' ? '재배구역 면적' : '필지 면적') + '</div>';
      html += '<div class="res-main">' + formatNumber(m2, 1) + '㎡</div>';
      html += '<div class="res-sub">' + formatNumber(m2 / 3.305785, 1) + '평<br>' + formatNumber(m2 / 100, 2) + 'a<br>' + formatNumber(m2 / 10000, 3) + 'ha</div>';
      html += '<div class="res-title" style="margin-top:6px;">' + (s.fieldKind === 'crop' ? '재배구역 둘레' : '필지 둘레') + '</div>';
      html += '<div class="res-sub">' + formatMeasurementValue(s.fieldPerimeterM) + '</div>';
    }
    if (s.segmentDistances.length > 0) {
      if (html) html += '<hr>';
      html += '<div class="res-title">거리 측정</div>';
      html += '<div class="res-sub">구간 수: ' + s.segmentDistances.length + '</div>';
      html += '<div class="res-title" style="margin-top:4px;">총 거리</div>';
      html += '<div class="res-main">' + formatMeasurementValue(s.totalDistanceM) + '</div>';
    }
    if (!html) html = '<span class="res-empty">측정 결과가 없습니다.</span>';
    resultBox.innerHTML = html;
  }

  function setSurveyMode(mode) {
    var s = surveyMeasureState;
    s.mode = mode;
    s.isEditing = (mode === 'edit');
    document.getElementById('btnField').classList.toggle('active', mode === 'polygon');
    document.getElementById('btnDistance').classList.toggle('active', mode === 'distance');
    document.getElementById('btnEdit').classList.toggle('active', mode === 'edit');
    /* [v14] 새 모드 버튼 활성 표시 */
    var _bp = document.getElementById('btnParcelPick'), _bc = document.getElementById('btnCrop');
    if (_bp) { _bp.classList.toggle('active', mode === 'parcelPick'); _bp.textContent = (mode === 'parcelPick') ? '▣ 필지선택 ON' : '▣ 필지선택'; }
    if (_bc) { _bc.classList.toggle('active', mode === 'cropBoundary'); _bc.textContent = (mode === 'cropBoundary') ? '🌾 재배구역 ON' : '🌾 재배구역'; }
    if (typeof fpSyncButtons === 'function') setTimeout(fpSyncButtons, 0);
    crosshairEl.style.display = (mode === 'polygon' || mode === 'distance' || mode === 'cropBoundary') ? 'block' : 'none';
    map.getCanvas().style.cursor = (mode === 'none') ? '' : 'crosshair';

    modeBadge.className = '';
    if (mode === 'polygon') { modeBadge.textContent = '면적측정 모드'; modeBadge.classList.add('m-area'); modeBadge.style.display = 'block'; }
    else if (mode === 'distance') { modeBadge.textContent = '길이측정 모드'; modeBadge.classList.add('m-dist'); modeBadge.style.display = 'block'; }
    else if (mode === 'edit') { modeBadge.textContent = '수정 모드'; modeBadge.classList.add('m-edit'); modeBadge.style.display = 'block'; }
    else if (mode === 'parcelPick') { modeBadge.textContent = '필지선택 모드'; modeBadge.classList.add('m-parcel'); modeBadge.style.display = 'block'; }
    else if (mode === 'cropBoundary') { modeBadge.textContent = '재배구역 그리기'; modeBadge.classList.add('m-crop'); modeBadge.style.display = 'block'; }
    else if (mode === 'fieldplot') { modeBadge.textContent = (fp.picking === 'na' ? '나' : '가') + ' 지점 선택'; modeBadge.classList.add('m-parcel'); modeBadge.style.display = 'block'; }
    else modeBadge.style.display = 'none';
  }
  /* [v6-7] 측정 모드 전환 제한 —— 점을 하나라도 찍은 뒤에는 다른 모드로 못 바꾼다.
     완료(✓) 또는 초기화(🗑) 후에는 다시 자유롭게 변경 가능. */
  function canSwitchMode(to) {
    var s = surveyMeasureState;
    var drawing = (s.mode === 'polygon' || s.mode === 'cropBoundary');
    if (to === 'distance' && drawing && s.fieldPoints.length > 0 && !s.isFieldComplete) return false;
    if ((to === 'polygon' || to === 'cropBoundary') && s.mode === 'distance' && s.distancePoints.length > 0) return false;
    /* [v14] 면적 ↔ 재배구역 은 그리는 중이면 서로 바꾸지 않는다(도형이 섞이지 않게) */
    if (to === 'polygon' && s.mode === 'cropBoundary' && s.fieldPoints.length > 0) return false;
    if (to === 'cropBoundary' && s.mode === 'polygon' && s.fieldPoints.length > 0) return false;
    return true;
  }
  /* ===================================================================
     [v14] 재배구역 직접 그리기
       면적측정과 계산 로직은 완전히 동일하고(fieldPoints 재사용),
       도형 색상과 안내 문구만 '재배구역'으로 구분한다.
     =================================================================== */
  function startCropBoundary() {
    if (!hasTurf) { showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0); return; }
    if (!canSwitchMode('cropBoundary')) { showToast('현재 측정을 완료한 후 변경할 수 있습니다.', 3500, 'info'); return; }
    surveyMeasureState.fieldKind = 'crop';
    setSurveyMode('cropBoundary');
    surveyMeasureState.isFieldComplete = false;
    showToast('실제 재배구역의 모서리를 순서대로 터치하세요.\n저장핀을 눌러도 경계점으로 추가됩니다.', 5000, 'info');
  }

  /* ===================================================================
     [v14] 필지 선택 —— 지적 필지를 누르면 파란 테두리로 강조하고,
       그 필지의 꺾이는 지점(꼭짓점)을 면적측정처럼 번호 핀으로 찍어 준다.
       이후 「수정」으로 꼭짓점을 옮기거나 「완료」로 확정할 수 있다.
     =================================================================== */
  var PARCEL_VERTEX_MAX = 40;   /* 꼭짓점이 너무 많으면 단순화 */
  function startParcelPick() {
    if (!hasTurf) { showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0); return; }
    if (surveyMeasureState.fieldPoints.length > 0 || surveyMeasureState.distancePoints.length > 0) {
      showToast('현재 측정을 완료하거나 초기화한 후 선택할 수 있습니다.', 3500, 'info'); return;
    }
    setSurveyMode('parcelPick');
    showToast('측정할 필지를 지도에서 누르세요.\n필지 경계가 파란색으로 표시되고 꼭짓점이 자동으로 찍힙니다.', 5000, 'info');
  }

  /* 폴리곤 좌표를 측정 꼭짓점 배열로 (닫는 점 제거 + 너무 많으면 단순화) */
  function parcelRingToPoints(geometry) {
    if (!geometry) return [];
    var ring = null;
    if (geometry.type === 'Polygon') ring = geometry.coordinates[0];
    else if (geometry.type === 'MultiPolygon') {
      /* 여러 조각이면 가장 넓은 조각을 사용 */
      var best = null, bestA = -1;
      geometry.coordinates.forEach(function (poly) {
        try {
          var a = turf.area({ type: 'Feature', properties: {}, geometry: { type: 'Polygon', coordinates: poly } });
          if (a > bestA) { bestA = a; best = poly; }
        } catch (e) {}
      });
      ring = best ? best[0] : null;
    }
    if (!ring || ring.length < 4) return [];

    var pts = ring.slice();
    /* 마지막 = 첫 점(닫는 점) 제거 */
    if (pts.length > 1 &&
        Math.abs(pts[0][0] - pts[pts.length - 1][0]) < 1e-12 &&
        Math.abs(pts[0][1] - pts[pts.length - 1][1]) < 1e-12) pts.pop();

    if (pts.length > PARCEL_VERTEX_MAX && hasTurf) {
      /* 꼭짓점이 많으면 형태를 유지한 채 단순화 */
      for (var tol = 0.000005; tol <= 0.0002; tol *= 2) {
        try {
          var sim = turf.simplify({ type: 'Feature', properties: {},
            geometry: { type: 'Polygon', coordinates: [ring] } }, { tolerance: tol, highQuality: true });
          var r2 = sim.geometry.coordinates[0].slice();
          if (r2.length > 1 &&
              Math.abs(r2[0][0] - r2[r2.length - 1][0]) < 1e-12 &&
              Math.abs(r2[0][1] - r2[r2.length - 1][1]) < 1e-12) r2.pop();
          if (r2.length >= 3 && r2.length <= PARCEL_VERTEX_MAX) { pts = r2; break; }
        } catch (e) { break; }
      }
    }
    return pts;
  }

  /* 좌표 위치의 필지를 선택 → 파란 강조 + 꼭짓점 자동 찍기 */
  function pickParcelAt(lng, lat) {
    showToast('필지 경계를 불러오는 중입니다.', 0, 'info');
    requestParcelAt(lng, lat).then(function (f) {
      if (!f || !f.geometry) { showToast('이 위치에서 필지를 찾지 못했습니다.', 3500, 'info'); return; }
      var pts = parcelRingToPoints(f.geometry);
      if (pts.length < 3) { showToast('필지 경계를 사용할 수 없습니다.', 3500, 'info'); return; }

      highlightSelectedParcel(f.geometry);          /* 파란 테두리 강조 (기존 함수 재사용) */

      var s = surveyMeasureState;
      s.fieldKind = 'field';
      s.fieldPoints = pts.slice();
      s.isFieldComplete = true;                     /* 경계가 이미 닫힌 상태 */
      updateFieldGeometry();                        /* 면적·둘레·번호핀 자동 계산 */
      setSurveyMode('none');
      updateNewMeasureBtn();

      var p = f.properties || {};
      /* [v20-1] 선택한 필지의 주소를 조사표 전송용으로 보관 */
      var padr = p.addr || p.jibun || p.ADDR || p.JIBUN || '';
      if (padr) { fp.jibunAddress = String(padr); }
      else { fpLookupAddress(lng, lat); }
      showToast('필지를 선택했습니다. ' + (p.addr || p.jibun || '') +
                '\n꼭짓점 ' + pts.length + '개 · ' + formatNumber(s.fieldAreaM2, 1) + '㎡ (' +
                formatNumber(s.fieldAreaM2 / 3.305785, 1) + '평)', 5000, 'success');
    }).catch(function (e) {
      console.warn('필지 조회 실패', e);
      showToast('필지정보를 불러오지 못했습니다.', 3500);
    });
  }

  function startFieldDrawing() {
    if (!hasTurf) { showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0); return; }
    if (!canSwitchMode('polygon')) { showToast('현재 측정을 완료한 후 변경할 수 있습니다.', 3500, 'info'); return; }
    surveyMeasureState.fieldKind = 'field';
    setSurveyMode('polygon');
    surveyMeasureState.isFieldComplete = false;
    showToast('필지 모서리를 순서대로 터치하세요.\n3개 이상의 점을 찍은 후 측정 완료를 눌러주세요.', 5000, 'info');
  }
  function startDistanceMeasurement() {
    if (!hasTurf) { showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0); return; }
    if (!canSwitchMode('distance')) { showToast('현재 측정을 완료한 후 변경할 수 있습니다.', 3500, 'info'); return; }
    setSurveyMode('distance');
    showToast('측정할 지점을 순서대로 터치하세요.\n두 점 이상 선택하면 거리가 계산됩니다.', 5000, 'info');
  }
  function startMeasurementEdit() {
    var s = surveyMeasureState;
    if (!s.fieldPoints.length && !s.distancePoints.length) { showToast('수정할 측정 지점이 없습니다.', 3000, 'info'); return; }
    setSurveyMode('edit');
    showToast('이동할 꼭짓점을 손가락으로 끌어 위치를 수정하세요.', 5000, 'info');
  }
  function finishMeasurementEdit() { setSurveyMode('none'); showToast('수정을 완료했습니다.', 2500, 'success'); }
  function addFieldPoint(lngLat) { surveyMeasureState.fieldPoints.push([lngLat.lng, lngLat.lat]); updateFieldGeometry(); }
  function addDistancePoint(lngLat) { surveyMeasureState.distancePoints.push([lngLat.lng, lngLat.lat]); updateDistanceGeometry(); }
  function finishFieldDrawing() {
    var s = surveyMeasureState;
    if (s.fieldPoints.length < 3) { showToast('필지 경계를 만들려면 최소 3개의 지점이 필요합니다.', 4000); return false; }
    s.isFieldComplete = true;
    setSurveyMode('none');
    updateFieldGeometry();
    showToast((s.fieldKind === 'crop' ? '재배구역' : '필지') + ' 경계가 완성되었습니다.\n「새 면적」을 누르면 계속 측정할 수 있습니다.', 3500, 'success');
    updateNewMeasureBtn();
    return true;
  }
  function finishDistanceMeasurement() {
    var s = surveyMeasureState;
    if (s.distancePoints.length < 2) { showToast('거리를 측정하려면 최소 2개의 지점이 필요합니다.', 4000); return false; }
    setSurveyMode('none');
    updateDistanceGeometry();
    showToast('거리 측정을 완료했습니다. 총 ' + formatMeasurementValue(s.totalDistanceM) +
              '\n「새 거리」를 누르면 계속 측정할 수 있습니다.', 3500, 'success');
    updateNewMeasureBtn();
    return true;
  }

  /* [v7-9] 연속 측정 —— 완료한 측정을 목록에 넣고 새 측정을 시작한다.
     (자동 종료하지 않고, 여러 개의 면적·거리를 계속 만들 수 있다) */
  function commitCurrentArea() {
    var s = surveyMeasureState;
    if (s.fieldPoints.length < 3) return false;
    s.areas.push({
      id: 'a' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      points: s.fieldPoints.slice(),
      areaM2: s.fieldAreaM2,
      perimeterM: s.fieldPerimeterM,
      kind: s.fieldKind          /* [v14] 필지/재배구역 구분 보존 */
    });
    s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
    s.isFieldComplete = false;
    return true;
  }
  function commitCurrentLine() {
    var s = surveyMeasureState;
    if (s.distancePoints.length < 2) return false;
    s.lines.push({
      id: 'l' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      points: s.distancePoints.slice(),
      segs: s.segmentDistances.slice(),
      totalM: s.totalDistanceM
    });
    s.distancePoints = []; s.segmentDistances = []; s.totalDistanceM = 0;
    return true;
  }
  function startNewMeasurement() {
    var s = surveyMeasureState;
    /* 면적이 완성돼 있으면 새 면적, 거리가 있으면 새 거리로 이어간다 */
    if (s.fieldPoints.length >= 3) {
      commitCurrentArea();
      updateMeasurementSources();
      startFieldDrawing();
      showToast('새 면적 측정을 시작합니다.\n이전 면적은 지도에 그대로 남아 있습니다.', 3500, 'info');
    } else if (s.distancePoints.length >= 2) {
      commitCurrentLine();
      updateMeasurementSources();
      startDistanceMeasurement();
      showToast('새 거리 측정을 시작합니다.\n이전 거리는 지도에 그대로 남아 있습니다.', 3500, 'info');
    } else {
      showToast('먼저 측정을 완료한 후 눌러주세요.', 3000, 'info');
    }
    updateNewMeasureBtn();
  }
  /* 완료된 측정이 있을 때만 「새 면적/새 거리」 버튼을 활성화 */
  function updateNewMeasureBtn() {
    var s = surveyMeasureState;
    var b = document.getElementById('btnNew');
    if (!b) return;
    var canArea = (s.fieldPoints.length >= 3);
    var canLine = (s.distancePoints.length >= 2);
    b.textContent = canLine && !canArea ? '＋ 새 거리' : '＋ 새 면적';
    b.disabled = !(canArea || canLine);
    b.style.opacity = b.disabled ? '.45' : '1';
  }
  function finishCurrentMeasurement() {
    var s = surveyMeasureState;
    if (s.mode === 'polygon' || s.mode === 'cropBoundary') return finishFieldDrawing();   /* [v14] */
    if (s.mode === 'distance') return finishDistanceMeasurement();
    if (s.mode === 'edit') return finishMeasurementEdit();
    if (s.mode === 'parcelPick') { setSurveyMode('none'); showToast('필지선택을 종료했습니다.', 2000, 'info'); return true; }
    showToast('진행 중인 측정이 없습니다.', 2500, 'info');
    return false;
  }
  /* ===================================================================
     [v17] UNDO / REDO — 도형 상태를 통째로 쌓아 두고 앞뒤로 이동한다.
     · 포구도구·측정도구가 같은 이력을 쓴다(도형이 하나이기 때문).
     =================================================================== */
  var geoHist = { stack: [], idx: -1, busy: false, suspend: false };
  function geoSnapshot() {
    var s = surveyMeasureState;
    return JSON.stringify({
      fieldPoints: s.fieldPoints, distancePoints: s.distancePoints,
      areas: s.areas, lines: s.lines,
      isFieldComplete: s.isFieldComplete, fieldKind: s.fieldKind,
      ga: fp.ga, na: fp.na
    });
  }
  /* [v19-6] 되돌리기 이력을 완전히 비운다 (초기화할 때 이전 값이 되살아나던 문제) */
  function geoClearHistory() {
    geoHist.stack = []; geoHist.idx = -1;
    updateUndoRedoButtons();
    setTimeout(geoPush, 0);   /* 지금 상태를 새 출발점으로 */
  }
  function geoPush() {
    if (geoHist.busy || geoHist.suspend) return;   /* [v22-5] 끄는 중에는 쌓지 않는다 */
    var snap = geoSnapshot();
    if (geoHist.idx >= 0 && geoHist.stack[geoHist.idx] === snap) return;   /* 변화 없으면 안 쌓음 */
    geoHist.stack = geoHist.stack.slice(0, geoHist.idx + 1);
    geoHist.stack.push(snap);
    if (geoHist.stack.length > 60) geoHist.stack.shift();
    geoHist.idx = geoHist.stack.length - 1;
    updateUndoRedoButtons();
  }
  function geoApply(snap) {
    var o = null;
    try { o = JSON.parse(snap); } catch (e) { return; }
    var s = surveyMeasureState;
    geoHist.busy = true;
    s.fieldPoints = o.fieldPoints || []; s.distancePoints = o.distancePoints || [];
    s.areas = o.areas || []; s.lines = o.lines || [];
    s.isFieldComplete = !!o.isFieldComplete; s.fieldKind = o.fieldKind || 'field';
    fp.ga = o.ga || null; fp.na = o.na || null;
    updateMeasurementSources();
    updateNewMeasureBtn();
    if (fp.ga && fp.na && fpHasShape()) { fpCompute(); }
    else fpClearDerived();   /* [v19-6] 가·나 중 하나라도 없으면 선·값을 모두 지운다 */
    fpRender(); fpSyncButtons();
    geoHist.busy = false;
    updateUndoRedoButtons();
  }
  function geoUndo() {
    if (geoHist.idx <= 0) { showToast('되돌릴 작업이 없습니다.', 2200, 'info'); return; }
    geoHist.idx--; geoApply(geoHist.stack[geoHist.idx]);
    showToast('한 단계 되돌렸습니다.', 1600, 'info');
  }
  function geoRedo() {
    if (geoHist.idx >= geoHist.stack.length - 1) { showToast('다시 실행할 작업이 없습니다.', 2200, 'info'); return; }
    geoHist.idx++; geoApply(geoHist.stack[geoHist.idx]);
    showToast('한 단계 다시 실행했습니다.', 1600, 'info');
  }
  function updateUndoRedoButtons() {
    var canU = geoHist.idx > 0, canR = geoHist.idx < geoHist.stack.length - 1;
    ['btnUndo', 'fpTUndo'].forEach(function (id) { var b = document.getElementById(id); if (b && !fp.finished) b.disabled = !canU; });
    ['btnRedo', 'fpTRedo'].forEach(function (id) { var b = document.getElementById(id); if (b && !fp.finished) b.disabled = !canR; });
  }

  function undoLastMeasurementPoint() {
    var s = surveyMeasureState;
    if ((s.mode === 'polygon' || s.mode === 'cropBoundary') && s.fieldPoints.length) {
      s.fieldPoints.pop(); updateFieldGeometry();
      showToast('마지막 ' + (s.fieldKind === 'crop' ? '재배구역 경계점' : '필지 꼭짓점') + '을 삭제했습니다.', 2000, 'info'); return;
    }
    if (s.mode === 'distance' && s.distancePoints.length) { s.distancePoints.pop(); updateDistanceGeometry(); showToast('마지막 거리 측정점을 삭제했습니다.', 2000, 'info'); return; }
    if (s.mode !== 'polygon' && s.mode !== 'cropBoundary' && s.mode !== 'distance') {
      if (s.distancePoints.length) { s.distancePoints.pop(); updateDistanceGeometry(); showToast('마지막 거리 측정점을 삭제했습니다.', 2000, 'info'); return; }
      if (s.fieldPoints.length) { s.fieldPoints.pop(); s.isFieldComplete = false; updateFieldGeometry(); showToast('마지막 필지 꼭짓점을 삭제했습니다.', 2000, 'info'); return; }
    }
    showToast('취소할 측정 지점이 없습니다.', 2500, 'info');
  }
  function resetAllMeasurements() {
    if (!window.confirm('현재 측정한 면적·길이 데이터가 모두 초기화됩니다.\n초기화하시겠습니까?')) return;
    var s = surveyMeasureState;
    s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
    s.distancePoints = []; s.segmentDistances = []; s.totalDistanceM = 0;
    s.isFieldComplete = false; s.dragging = null;
    s.areas = []; s.lines = []; s.editingSaveId = null;   /* [v7-9] 연속 측정분까지 모두 정리 */
    s.fieldKind = 'field';                                /* [v14] 기본(필지)으로 복귀 */
    if (typeof clearSelectedParcelHighlight === 'function') clearSelectedParcelHighlight();
    setSurveyMode('none');
    updateMeasurementSources();
    updateNewMeasureBtn();
    if (typeof geoClearHistory === 'function') geoClearHistory();   /* [v19-6] */
    showToast('모든 측정값이 초기화되었습니다.', 3000, 'success');
  }

  map.on('click', function (e) {
    /* [v13] 저장핀을 눌러 측정점을 넣은 직후의 지도 클릭은 무시 (점 두 개 방지) */
    if (suppressNextMapClick) { suppressNextMapClick = false; return; }
    var mode = surveyMeasureState.mode;
    if (mode === 'polygon' || mode === 'cropBoundary') { addFieldPoint(e.lngLat); return; }   /* [v14] 재배구역도 같은 파이프라인 */
    if (mode === 'distance') { addDistancePoint(e.lngLat); return; }
    if (mode === 'parcelPick') { pickParcelAt(e.lngLat.lng, e.lngLat.lat); return; }          /* [v14] 필지 선택 */
    if (mode === 'fieldplot') { fpSetPoint(e.lngLat.lng, e.lngLat.lat); return; }             /* [v15] 가·나 지점 지정 */

    /* [v16-1] 측정(실측) 중에는 토지정보 팝업을 열지 않는다.
       — 수정 모드, A/B포구 선정 모드(가·나를 다 찍어 mode 가 none 으로 돌아간 뒤 포함) 모두 해당 */
    if (mode !== 'none' || fp.active || toolPanelEl.classList.contains('show')) return;

    /* [v10-16] 측정 중이 아닐 때 지적 필지를 누르면 공통 토지정보 시트 */
    if (settings.overlays.cadastral && map.getLayer('ov-cadastral-fill')) {
      var hits = map.queryRenderedFeatures(e.point, { layers: ['ov-cadastral-fill'] });
      if (hits.length) {
        openLandInfoAt(e.lngLat.lng, e.lngLat.lat, { source: 'parcelSelect', returnSheet: null });
      }
    }
  });
  function addCenterPoint() {
    var s = surveyMeasureState;
    if (s.mode === 'parcelPick') { var c0 = map.getCenter(); pickParcelAt(c0.lng, c0.lat); return; }   /* [v14] 화면 중앙 필지 선택 */
    if (s.mode === 'polygon' || s.mode === 'cropBoundary') addFieldPoint(map.getCenter());
    else if (s.mode === 'distance') addDistancePoint(map.getCenter());
    else showToast('먼저 면적 측정 또는 길이 측정을 선택해주세요.', 3000, 'info');
  }

  var HIT_PAD = 22;
  function findVertexAt(point) {
    var bbox = [[point.x - HIT_PAD, point.y - HIT_PAD], [point.x + HIT_PAD, point.y + HIT_PAD]];
    var layers = [];
    if (map.getLayer('survey-field-vertices')) layers.push('survey-field-vertices');
    if (map.getLayer('survey-distance-vertices')) layers.push('survey-distance-vertices');
    if (!layers.length) return null;
    var hits = map.queryRenderedFeatures(bbox, { layers: layers });
    if (!hits.length) return null;
    var f = hits[0];
    /* [v7-9] 완료된 측정(areas[]/lines[])의 꼭짓점도 잡아서 옮길 수 있게 소속을 함께 넘긴다.
       (areaId/lineId 가 없으면 지금 작업 중인 측정의 점) */
    return {
      kind: f.properties.type === 'field-vertex' ? 'field' : 'distance',
      index: f.properties.index,
      areaId: f.properties.areaId || null,
      lineId: f.properties.lineId || null
    };
  }
  function updateDraggedVertex(lngLat) {
    var s = surveyMeasureState;
    if (!s.dragging) return;
    var coord = [lngLat.lng, lngLat.lat];
    var d = s.dragging, i;

    if (d.kind === 'field') {
      if (d.areaId) {                                  /* 완료된 면적의 꼭짓점 */
        for (i = 0; i < s.areas.length; i++) {
          if (s.areas[i].id !== d.areaId) continue;
          s.areas[i].points[d.index] = coord;
          var poly = { type: 'Feature', properties: {}, geometry: { type: 'Polygon', coordinates: [closedRing(s.areas[i].points)] } };
          if (hasTurf) {
            s.areas[i].areaM2 = turf.area(poly);        /* 즉시 재계산 */
            s.areas[i].perimeterM = turf.length(turf.lineString(closedRing(s.areas[i].points)), { units: 'kilometers' }) * 1000;
          }
          break;
        }
      } else {
        /* [v17-3] 옮기는 꼭짓점이 가 또는 나 지점으로 쓰이고 있으면 같이 옮긴다 */
        var old = s.fieldPoints[d.index];
        if (old && typeof fpSamePoint === 'function') {
          if (fpSamePoint(fp.ga, old)) fp.ga = coord.slice();
          if (fpSamePoint(fp.na, old)) fp.na = coord.slice();
        }
        s.fieldPoints[d.index] = coord;
      }
      updateFieldGeometry();
      /* 모든 계산을 즉시 다시 수행 */
      if (fp.ga && fp.na && typeof fpCompute === 'function' && fpHasShape()) { fpCompute(); fpRender(); }
    } else {
      if (d.lineId) {                                  /* 완료된 거리의 측정점 */
        for (i = 0; i < s.lines.length; i++) {
          if (s.lines[i].id !== d.lineId) continue;
          s.lines[i].points[d.index] = coord;
          if (hasTurf) {
            var segs = [], tot = 0;
            for (var k = 0; k < s.lines[i].points.length - 1; k++) {
              var mm = turf.distance(turf.point(s.lines[i].points[k]), turf.point(s.lines[i].points[k + 1]), { units: 'kilometers' }) * 1000;
              segs.push(mm); tot += mm;
            }
            s.lines[i].segs = segs; s.lines[i].totalM = tot;   /* 즉시 재계산 */
          }
          break;
        }
      } else {
        s.distancePoints[d.index] = coord;
      }
      updateDistanceGeometry();
    }
  }
  /* ===================================================================
     [v22-5] 수정 모드에서 점이 너무 쉽게 움직이던 문제
     · 손가락 두 개(확대/축소)일 때는 점을 잡지 않는다.
     · 손가락을 8px 이상 움직여야 비로소 점이 따라온다.
       (살짝 눌렀다 떼거나 지도만 옮기려 할 때 점이 밀리지 않는다)
     · 되돌리기 이력은 "끌기 한 번"에 하나만 쌓는다.
       (예전에는 1px 움직일 때마다 쌓여 UNDO 가 너무 잘게 동작했다)
     =================================================================== */
  var DRAG_START_PX = 8;      /* 이만큼 움직여야 점을 잡는다 */
  var DRAG_MIN_PX = 4;        /* 이보다 적게 움직였으면 이력에 남기지 않는다 */
  var dragCand = null;        /* { hit, x, y } — 아직 시작 전 후보 */

  function touchCount(e) {
    var oe = e && e.originalEvent;
    return (oe && oe.touches) ? oe.touches.length : 1;
  }
  function onDragStart(e) {
    if (surveyMeasureState.mode !== 'edit') return;
    if (touchCount(e) > 1) { dragCand = null; return; }   /* 확대/축소는 그대로 둔다 */
    var hit = findVertexAt(e.point);
    if (!hit) return;
    /* 아직 점을 잡지는 않는다. 충분히 움직이면 그때 잡는다. */
    dragCand = { hit: hit, x: e.point.x, y: e.point.y, moved: 0 };
  }
  function onDragMove(e) {
    var s = surveyMeasureState;
    if (!s.dragging) {
      if (!dragCand) return;
      if (touchCount(e) > 1) { dragCand = null; return; }
      var dx = e.point.x - dragCand.x, dy = e.point.y - dragCand.y;
      if (Math.sqrt(dx * dx + dy * dy) < DRAG_START_PX) return;   /* 아직 멀었다 */
      /* 여기서부터 진짜 끌기 시작 */
      s.dragging = dragCand.hit;
      geoHist.suspend = true;                 /* 끄는 동안 이력 쌓지 않음 */
      map.dragPan.disable();
    }
    if (dragCand) {
      var mx = e.point.x - dragCand.x, my = e.point.y - dragCand.y;
      dragCand.moved = Math.sqrt(mx * mx + my * my);
    }
    updateDraggedVertex(e.lngLat);
    if (e.preventDefault) e.preventDefault();
  }
  function onDragEnd() {
    var s = surveyMeasureState;
    var moved = dragCand ? dragCand.moved : 0;
    dragCand = null;
    if (!s.dragging) return;
    s.dragging = null;
    map.dragPan.enable();
    geoHist.suspend = false;
    /* 끌기 한 번을 되돌리기 한 단계로 남긴다 (아주 조금 움직였으면 남기지 않음) */
    if (moved >= DRAG_MIN_PX) geoPush();
  }
  map.on('mousedown', onDragStart);
  map.on('touchstart', onDragStart);
  map.on('mousemove', onDragMove);
  map.on('touchmove', onDragMove);
  map.on('mouseup', onDragEnd);
  map.on('touchend', onDragEnd);
  map.on('touchcancel', onDragEnd);

  /* ===================================================================
     [v7-9] 측정 저장 · 목록 · 재편집   (저장 키: tenar_measure_saves_v1)
     · 저장은 첫 번째 핀 좌표를 기준으로 주소를 자동 조회한다.
     · 목록에서 불러오면 핀이 다시 표시되고, 수정 모드로 드래그하면
       면적·거리가 즉시 재계산되며 「저장」으로 덮어쓸 수 있다.
     =================================================================== */
  function getMeasSaves() {
    var arr = loadJSON(MEAS_KEY, []);
    return Array.isArray(arr) ? arr : [];
  }
  function setMeasSaves(arr) {
    if (!secureReady) { showToast('저장 준비 중입니다.\n잠시 후 다시 시도해주세요.', 3000, 'info'); return false; }
    saveJSON(MEAS_KEY, arr);
    return true;
  }

  /* 현재 화면의 모든 측정(작업 중 + 완료된 것)을 하나의 저장 객체로 만든다 */
  function buildMeasureRecord(extra) {
    var s = surveyMeasureState;
    var areas = s.areas.slice();
    var lines = s.lines.slice();
    if (s.fieldPoints.length >= 3) areas.push({ id: 'cur', points: s.fieldPoints.slice(), areaM2: s.fieldAreaM2, perimeterM: s.fieldPerimeterM });
    if (s.distancePoints.length >= 2) lines.push({ id: 'cur', points: s.distancePoints.slice(), segs: s.segmentDistances.slice(), totalM: s.totalDistanceM });

    var totalArea = areas.reduce(function (a, x) { return a + (x.areaM2 || 0); }, 0);
    var totalDist = lines.reduce(function (a, x) { return a + (x.totalM || 0); }, 0);
    var firstPt = areas.length ? areas[0].points[0] : (lines.length ? lines[0].points[0] : null);

    return Object.assign({
      id: 'm' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
      type: (areas.length && lines.length) ? 'both' : (areas.length ? 'area' : 'distance'),
      name: '', jibunAddress: '', roadAddress: '', crop: '', memo: '',
      geometry: areas.length ? { type: 'Polygon', coordinates: [closedRing(areas[0].points)] } : null,
      /* 기존(v4a) 저장 구조와 호환되는 필드 */
      fieldPoints: areas.length ? areas[0].points.slice() : [],
      distancePoints: lines.length ? lines[0].points.slice() : [],
      areaM2: totalArea,
      areaPyeong: totalArea / 3.305785,
      totalDistanceM: totalDist,
      totalDistanceCm: totalDist * 100,
      segmentDistances: lines.length ? lines[0].segs.slice() : [],
      /* v7: 여러 개의 면적·거리를 모두 보관 */
      areas: areas.map(function (a) { return { points: a.points, areaM2: a.areaM2, perimeterM: a.perimeterM }; }),
      lines: lines.map(function (l) { return { points: l.points, segs: l.segs, totalM: l.totalM }; }),
      firstPoint: firstPt,
      mapCenter: map.getCenter().toArray(),
      zoom: map.getZoom(), bearing: map.getBearing(), pitch: map.getPitch(),
      createdAt: kstNowStr(), updatedAt: kstNowStr()
    }, extra || {});
  }

  function openMeasSaveSheet() {
    var s = surveyMeasureState;
    if (!s.areas.length && !s.lines.length && s.fieldPoints.length < 3 && s.distancePoints.length < 2) {
      showToast('저장할 측정 결과가 없습니다.', 3000, 'info');
      return;
    }
    var editing = s.editingSaveId ? getMeasSaves().filter(function (x) { return x.id === s.editingSaveId; })[0] : null;
    var rec = buildMeasureRecord();
    var firstPt = rec.firstPoint;

    var box = el('div');
    var f1 = el('div', 'fld', '<label>측정 이름</label>');
    var inName = el('input'); inName.type = 'text';
    inName.value = editing ? editing.name : '';
    f1.appendChild(inName);

    var addrBox = el('div', null, '<div class="addr-label">주소 (첫 측정 지점 기준)</div><div class="addr-value" id="measAddr">조회 중…</div>');

    var f2 = el('div', 'fld', '<label>작물</label>');
    var inCrop = el('select');
    inCrop.appendChild(new Option('선택 안 함', ''));
    CROPS.forEach(function (c) { inCrop.appendChild(new Option(c.name, c.name)); });   /* [v12-4] 한글만 */
    if (editing && editing.crop) inCrop.value = editing.crop;
    f2.appendChild(inCrop);

    var f3 = el('div', 'fld', '<label>메모</label>');
    var inMemo = el('textarea');
    if (editing && editing.memo) inMemo.value = editing.memo;
    f3.appendChild(inMemo);

    var sum = el('div', null,
      '<div class="addr-label">측정 내용</div><div class="addr-value">' +
      (rec.areas.length ? '면적 ' + rec.areas.length + '건 · ' + formatNumber(rec.areaM2, 1) + '㎡ (' + formatNumber(rec.areaPyeong, 1) + '평)<br>' : '') +
      (rec.lines.length ? '거리 ' + rec.lines.length + '건 · ' + formatMeasurementValue(rec.totalDistanceM) : '') +
      '</div>');

    var addr = { jibunAddress: '', roadAddress: '' };
    if (firstPt) {
      requestVWorldReverse(firstPt[0], firstPt[1]).then(function (a) {
        addr = a;
        var t = document.getElementById('measAddr');
        if (t) t.textContent = a.jibunAddress || '주소를 찾을 수 없습니다';
        if (!inName.value) inName.value = (a.jibunAddress || '측정') + (rec.areas.length ? ' 면적' : ' 거리');
      }).catch(function () {
        var t = document.getElementById('measAddr');
        if (t) t.textContent = '주소 조회 실패 (좌표로 저장됩니다)';
      });
    }

    var bSave = el('button', 'sheet-btn primary', editing ? '💾 덮어쓰기 저장' : '💾 저장');
    bSave.style.cssText += 'width:100%;margin-top:12px;';
    bSave.addEventListener('click', function () {
      var arr = getMeasSaves();
      rec.name = inName.value.trim() || (addr.jibunAddress || '측정');
      rec.jibunAddress = addr.jibunAddress || (editing ? editing.jibunAddress : '');
      rec.roadAddress = addr.roadAddress || (editing ? editing.roadAddress : '');
      rec.crop = inCrop.value;
      rec.memo = inMemo.value.trim();
      if (editing) {
        rec.id = editing.id;
        rec.createdAt = editing.createdAt;
        rec.locked = editing.locked;
        for (var i = 0; i < arr.length; i++) if (arr[i].id === editing.id) { arr[i] = rec; break; }
      } else {
        arr.unshift(rec);
      }
      if (!setMeasSaves(arr)) return;
      surveyMeasureState.editingSaveId = rec.id;
      closeSheet();
      showToast(editing ? '측정을 덮어썼습니다.' : '측정을 저장했습니다.', 2500, 'success');
    });

    box.appendChild(f1); box.appendChild(addrBox); box.appendChild(f2); box.appendChild(f3);
    box.appendChild(sum); box.appendChild(bSave);
    openSheet(editing ? '측정 수정 저장' : '💾 측정 저장', box, 90);
    sheetHasForm = true;   /* [v10-14] 입력 중 보호 */
    sheetIsLandInfo = false;
  }

  /* 저장된 측정을 지도에 복원 (핀 다시 표시) */
  function loadMeasure(rec, quiet) {
    var s = surveyMeasureState;
    s.areas = (rec.areas || []).map(function (a) {
      return { id: 'a' + Math.random().toString(36).slice(2, 7), points: a.points.slice(), areaM2: a.areaM2, perimeterM: a.perimeterM };
    });
    s.lines = (rec.lines || []).map(function (l) {
      return { id: 'l' + Math.random().toString(36).slice(2, 7), points: l.points.slice(), segs: (l.segs || []).slice(), totalM: l.totalM };
    });
    /* 마지막 한 건은 '작업 중'으로 올려 바로 수정할 수 있게 한다 */
    s.fieldPoints = []; s.fieldPolygon = null; s.distancePoints = []; s.segmentDistances = [];
    s.fieldAreaM2 = 0; s.fieldPerimeterM = 0; s.totalDistanceM = 0; s.isFieldComplete = false;
    if (s.areas.length) {
      var last = s.areas.pop();
      s.fieldPoints = last.points.slice();
      s.isFieldComplete = true;
    } else if (s.lines.length) {
      var lastL = s.lines.pop();
      s.distancePoints = lastL.points.slice();
    }
    s.editingSaveId = rec.id;
    setSurveyMode('none');
    updateMeasurementSources();
    updateNewMeasureBtn();
    toolPanelEl.classList.add('show');
    document.getElementById('btnMeasure').classList.add('active');

    if (rec.mapCenter) {
      map.flyTo({ center: rec.mapCenter, zoom: rec.zoom || map.getZoom(), bearing: rec.bearing || 0, pitch: rec.pitch || 0, essential: true });
    }
    if (!quiet) showToast('측정을 불러왔습니다.\n「수정」으로 꼭짓점을 옮기면 자동으로 다시 계산됩니다.', 4500, 'success');
  }

  function shareMeasure(rec) {
    var lines = [];
    lines.push('[텐아르 측정] ' + (rec.name || ''));
    if (rec.jibunAddress) lines.push('주소: ' + rec.jibunAddress);
    if (rec.crop) lines.push('작물: ' + rec.crop);
    if (rec.areaM2) lines.push('면적: ' + formatNumber(rec.areaM2, 1) + '㎡ (' + formatNumber(rec.areaPyeong, 1) + '평)');
    if (rec.totalDistanceM) lines.push('거리: ' + formatMeasurementValue(rec.totalDistanceM));
    if (rec.firstPoint) lines.push('좌표: ' + rec.firstPoint[1].toFixed(6) + ', ' + rec.firstPoint[0].toFixed(6));
    if (rec.memo) lines.push('메모: ' + rec.memo);
    lines.push('측정시각: ' + (rec.createdAt || '').slice(0, 16).replace('T', ' '));
    var text = lines.join('\n');
    if (navigator.share) {
      navigator.share({ title: '텐아르 측정 결과', text: text }).catch(function (e) {
        if (e && e.name === 'AbortError') return;
        copyText(text);
      });
    } else copyText(text);
  }

  /* ===================================================================
     [v17-10] 측정도구 → 청취조사표로 면적합계 전송
     · 면적 계산식은 손대지 않고, 이미 계산된 합계를 그대로 넘긴다.
     =================================================================== */
  var MEAS_AREA_RESULT_KEY = 'tenar_area_result';
  function measureTotals() {
    var s = surveyMeasureState;
    var areas = s.areas.slice();
    if (s.fieldPoints.length >= 3) areas.push({ points: s.fieldPoints.slice(), areaM2: s.fieldAreaM2 });
    var total = areas.reduce(function (a, x) { return a + (x.areaM2 || 0); }, 0);
    return {
      count: areas.length,
      currentM2: s.fieldAreaM2 || (areas.length ? areas[areas.length - 1].areaM2 : 0),
      totalM2: total,
      totalPyeong: total / 3.305785
    };
  }
  function sendAreaToSurvey() {
    var t = measureTotals();
    if (!(t.totalM2 > 0)) { showToast('전송할 면적이 없습니다.\n먼저 면적을 측정해주세요.', 3500, 'info'); return; }
    var msg = '청취조사표로 면적을 전송하시겠습니까?\n\n' +
              '측정 건수 ' + t.count + '건\n' +
              '전체 면적합계 ' + formatNumber(t.totalM2, 1) + '㎡ (' + formatNumber(t.totalPyeong, 1) + '평)';
    if (!window.confirm(msg)) return;
    var rec = {
      app: 'chungchi', type: 'area',
      count: t.count,
      currentM2: Math.round(t.currentM2 * 10) / 10,
      totalM2: Math.round(t.totalM2 * 10) / 10,
      totalPyeong: Math.round(t.totalPyeong * 10) / 10,
      crop: (fp.ctx && fp.ctx.crop) || '',
      savedAt: kstNowStr()
    };
    try { saveJSON(MEAS_AREA_RESULT_KEY, rec); } catch (e) { showToast('전송 저장에 실패했습니다.', 3500); return; }
    showToast('청취조사표로 면적합계를 전송했습니다.\n' +
              formatNumber(t.totalM2, 1) + '㎡ (' + formatNumber(t.totalPyeong, 1) + '평)', 4000, 'success');
  }

  /* ===================================================================
     [v16-6] 목록 공통 도구 — 공유 / 내보내기 / 불러오기 / 전체삭제
     · 내보내기는 기존 TenarCrypto 방식(암호 기본 2026)을 그대로 사용한다.
     · 불러오기는 「전체」와 「선택해서」 중 고를 수 있다.
     =================================================================== */
  function fpListTools(opts) {
    /* opts = { type, fileBase, label, get, set, render } */
    var row = el('div', 'btn-row');
    function add(txt, cls, fn) {
      var b = el('button', 'sheet-btn' + (cls ? ' ' + cls : ''), txt);
      b.addEventListener('click', fn);
      row.appendChild(b);
    }
    function payload(arr) {
      var o = { app: 'map', type: opts.type, savedAt: kstNowStr() };
      o[opts.type] = arr;
      return o;
    }
    add('공유', null, function () {
      var arr = opts.get();
      if (!arr.length) { showToast('저장된 ' + opts.label + '이(가) 없습니다.', 3000, 'info'); return; }
      window._tenarBuildExport(payload(arr), 'map').then(function (out) {
        if (!out) return;
        var file = new File([out.text], opts.fileBase + '_' + Date.now() + '.json', { type: 'application/json' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) return navigator.share({ files: [file], title: '텐아르 ' + opts.label });
        if (navigator.share) return navigator.share({ title: '텐아르 ' + opts.label, text: out.text });
        copyText(out.text);
      }).catch(function (e) { if (!(e && e.name === 'AbortError')) console.error(e); });
    });
    add('내보내기', null, function () {
      var arr = opts.get();
      if (!arr.length) { showToast('저장된 ' + opts.label + '이(가) 없습니다.', 3000, 'info'); return; }
      window._tenarBuildExport(payload(arr), 'map').then(function (out) {
        if (!out) return;
        var blob = new Blob([out.text], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = opts.fileBase + '_' + Date.now() + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 3000);
        showToast('내보내기 파일을 저장했습니다.' + (out.encrypted ? '\n(암호화됨)' : ''), 3500, 'success');
      });
    });
    add('불러오기', null, function () { fpListImport(opts); });
    add('전체삭제', 'danger', function () {
      var all = opts.get();
      var locked = all.filter(function (x) { return x.locked; }).length;
      var unlocked = all.length - locked;
      if (unlocked === 0) { showToast('삭제할 ' + opts.label + '이(가) 없습니다.\n(잠금된 것만 있습니다)', 3500, 'info'); return; }
      if (!window.confirm('잠금 해제된 ' + opts.label + ' ' + unlocked + '개를 삭제하시겠습니까?\n잠금된 ' + locked + '개는 유지됩니다.')) return;
      opts.set(all.filter(function (x) { return x.locked; }));
      opts.render();
      showToast(unlocked + '개를 삭제했습니다.', 3000, 'success');
    });
    return row;
  }

  function fpListImport(opts) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.addEventListener('change', function () {
      var file = inp.files && inp.files[0];
      if (!file) return;
      var rd = new FileReader();
      rd.onload = function () {
        var obj = null;
        try { obj = JSON.parse(rd.result); } catch (e) { showToast('JSON 파일을 읽을 수 없습니다.', 4000); return; }
        window._tenarParseImport(obj, 'map').then(function (data) {
          var incoming = (data && data[opts.type]) || (Array.isArray(data) ? data : null);
          if (!incoming || !incoming.length) { showToast('불러올 ' + opts.label + '이(가) 없습니다.', 4000); return; }
          /* [v16-6] 전체로 가져올지, 골라서 가져올지 먼저 묻는다 */
          return window._tenarChoice3({
            title: opts.label + ' 불러오기',
            message: '파일에 ' + incoming.length + '개가 들어 있습니다.\n\n「전체」는 모두 가져오고,\n「선택」은 목록에서 골라 가져옵니다.',
            addLabel: '전체', replaceLabel: '선택', cancelLabel: '취소'
          }).then(function (choice) {
            if (choice === 'cancel') return;
            if (choice === 'add') { fpListMerge(opts, incoming); return; }
            fpListPickSheet(opts, incoming);
          });
        }).catch(function (e) {
          if (e && e.code === 'CANCELLED') return;
          if (e && e.code === 'APP_MISMATCH') { showToast('다른 앱(' + window._tenarAppKo(e.app) + ')의 파일입니다.', 4500); return; }
          showToast('파일을 불러오지 못했습니다.', 4000);
        });
      };
      rd.readAsText(file);
    });
    inp.click();
  }
  function fpListMerge(opts, incoming) {
    var cur = opts.get();
    var have = {};
    cur.forEach(function (x) { have[x.id] = true; });
    var add = incoming.filter(function (x) { return x && x.id && !have[x.id]; });
    var dup = incoming.length - add.length;
    opts.set(add.concat(cur));
    opts.render();
    showToast(add.length + '개를 불러왔습니다.' + (dup ? '\n(이미 있는 ' + dup + '개는 건너뜀)' : ''), 3500, 'success');
  }
  /* 선택해서 불러오기 */
  function fpListPickSheet(opts, incoming) {
    var box = el('div');
    var picked = {};
    var head = el('div', null, '<div style="font-size:12.5px;color:#555;margin-bottom:8px;">가져올 항목을 고르세요.</div>');
    box.appendChild(head);
    incoming.forEach(function (rec, i) {
      var row = el('div', 'fav-card');
      row.style.cssText += 'cursor:pointer;';
      var cb = el('div', 'fav-num', '○');
      cb.style.background = '#9aa3ad';
      var body = el('div', 'fav-body',
        '<div class="fav-name">' + escapeHtml(rec.name || (opts.label + ' ' + (i + 1))) + '</div>' +
        '<div class="fav-addr">' + escapeHtml(rec.jibunAddress || rec.crop || '') + '</div>' +
        '<div class="fav-coord">' + escapeHtml((rec.createdAt || rec.savedAt || '').slice(0, 16).replace('T', ' ')) + '</div>');
      row.addEventListener('click', function () {
        picked[i] = !picked[i];
        cb.textContent = picked[i] ? '✓' : '○';
        cb.style.background = picked[i] ? '#1f8a4c' : '#9aa3ad';
      });
      row.appendChild(cb); row.appendChild(body);
      box.appendChild(row);
    });
    var bGo = el('button', 'sheet-btn primary', '선택한 항목 불러오기');
    bGo.style.cssText += 'width:100%;margin-top:10px;';
    bGo.addEventListener('click', function () {
      var sel = incoming.filter(function (x, i) { return picked[i]; });
      if (!sel.length) { showToast('선택된 항목이 없습니다.', 2500, 'info'); return; }
      closeSheet();
      fpListMerge(opts, sel);
    });
    box.appendChild(bGo);
    openSheet(opts.label + ' 선택 불러오기', box, 90);
  }

             get: getMeasSaves, set: setMeasSaves, render: renderMeasList };

  /* ===================================================================
     [v16-6] A/B포구 전용 저장 목록 (면적·길이와 분리)
     =================================================================== */
  function getFpSaves() { var a = loadJSON(FPS_KEY, []); return Array.isArray(a) ? a : []; }
  function setFpSaves(arr) {
    if (!secureReady) { showToast('저장 준비 중입니다.\n잠시 후 다시 시도해주세요.', 3000, 'info'); return false; }
    saveJSON(FPS_KEY, arr);
    return true;
  }
  function openFpListSheet() {
    var box = el('div');
    box.appendChild(fpListTools(fpSaveOpts()));
    var list = el('div'); list.id = 'fpList';
    box.appendChild(list);
    openSheet('📋 A/B포구 저장 목록', box, 90);
    renderFpList();
  }
  function renderFpList() {
    var list = document.getElementById('fpList');
    if (!list) return;
    var arr = getFpSaves();
    list.innerHTML = '';
    if (!arr.length) {
      list.appendChild(el('div', null, '<div style="color:#888;font-size:13px;padding:18px 2px;">저장된 A/B포구가 없습니다.</div>'));
