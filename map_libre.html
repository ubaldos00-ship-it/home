    }
    arr.forEach(function (rec, i) {
      var unit = (rec.mode === '이랑') ? '이랑' : 'cm';
      var card = el('div', 'fav-card' + (rec.locked ? ' locked' : ''));
      var num = el('div', 'fav-num', String(arr.length - i));
      num.style.background = '#7c3aed';
      var body = el('div', 'fav-body',
        '<div class="fav-name">' + escapeHtml(rec.name || 'A/B포구') + '</div>' +
        '<div class="fav-addr">' + escapeHtml(rec.crop || '작물 없음') + ' · ' + escapeHtml(rec.jibunAddress || '주소 없음') + '</div>' +
        '<div class="fav-addr" style="color:#888;">가-나 ' + formatNumber(rec.L || 0, 0) + unit +
          ' · A ' + formatNumber(rec.aSel || 0, 0) + unit + ' / B ' + formatNumber(rec.bSel || 0, 0) + unit + '</div>' +
        '<div class="fav-addr" style="color:#888;">세로 A ' + formatNumber(rec.heightA || 0, 0) + 'cm · B ' + formatNumber(rec.heightB || 0, 0) + 'cm</div>' +
        '<div class="fav-coord">' + escapeHtml((rec.createdAt || rec.savedAt || '').slice(0, 16).replace('T', ' ')) + '</div>');
      body.addEventListener('click', function () { closeSheet(); loadFpSave(rec); });

      var acts = el('div', 'fav-acts');
      var bEdit = el('button', 'icon-btn', '✏️'); bEdit.title = '수정';
      bEdit.addEventListener('click', function () { closeSheet(); loadFpSave(rec); showToast('불러왔습니다. 각도조절·가·나를 고친 뒤 「저장」으로 덮어쓰세요.', 4500, 'info'); });
      var bShare = el('button', 'icon-btn', '📤'); bShare.title = '공유';
      bShare.addEventListener('click', function () { shareFpSave(rec); });
      var bLock = el('button', 'icon-btn ' + (rec.locked ? 'lock-on' : 'lock-off'), rec.locked ? '🔒' : '🔓'); bLock.title = '잠금';
      bLock.addEventListener('click', function () {
        var a2 = getFpSaves();
        for (var k = 0; k < a2.length; k++) if (a2[k].id === rec.id) a2[k].locked = !a2[k].locked;
        setFpSaves(a2); renderFpList();
      });
      var bDel = el('button', 'icon-btn ' + (rec.locked ? 'del-off' : 'del-on'), '🗑'); bDel.title = '삭제';
      bDel.addEventListener('click', function () {
        if (rec.locked) { showToast('잠금된 항목입니다.\n잠금을 해제한 후 삭제해주세요.', 4000); return; }
        if (!window.confirm('이 A/B포구 저장을 삭제하시겠습니까?')) return;
        setFpSaves(getFpSaves().filter(function (x) { return x.id !== rec.id; }));
        renderFpList();
        showToast('삭제되었습니다.', 2000, 'success');
      });
      /* [v16-7] 수정 → 공유 → 잠금 → 휴지통 순 가로 정렬 */
      acts.appendChild(bEdit); acts.appendChild(bShare); acts.appendChild(bLock); acts.appendChild(bDel);
      card.appendChild(num); card.appendChild(body); card.appendChild(acts);
      list.appendChild(card);
    });
  }
  function shareFpSave(rec) {
    var unit = (rec.mode === '이랑') ? '이랑' : 'cm';
    var t = ['[텐아르 A/B포구] ' + (rec.name || ''),
             rec.jibunAddress ? '주소: ' + rec.jibunAddress : '',
             rec.crop ? '작물: ' + rec.crop : '',
             '비율 ' + rec.ratio + '번',
             '가-나: ' + formatNumber(rec.L || 0, 0) + unit,
             'A 가로기점: ' + formatNumber(rec.aSel || 0, 0) + unit + ' · B 가로기점: ' + formatNumber(rec.bSel || 0, 0) + unit,
             'A 세로총길이: ' + formatNumber(rec.heightA || 0, 0) + 'cm · B 세로총길이: ' + formatNumber(rec.heightB || 0, 0) + 'cm',
             'A포구: ' + formatNumber(rec.aPoLen || 0, 0) + 'cm · B포구: ' + formatNumber(rec.bPoLen || 0, 0) + 'cm',
             '저장시각: ' + (rec.createdAt || rec.savedAt || '').slice(0, 16).replace('T', ' ')
            ].filter(Boolean).join('\n');
    if (navigator.share) navigator.share({ title: '텐아르 A/B포구', text: t }).catch(function (e) { if (!(e && e.name === 'AbortError')) copyText(t); });
    else copyText(t);
  }
  /* 저장된 A/B포구를 지도에 되살린다 */
  function loadFpSave(rec) {
    if (!rec.polygon || !rec.polygon[0]) { showToast('도형 정보가 없는 저장입니다.', 3500); return; }
    var ring = rec.polygon[0].slice();
    if (ring.length > 1 &&
        Math.abs(ring[0][0] - ring[ring.length - 1][0]) < 1e-12 &&
        Math.abs(ring[0][1] - ring[ring.length - 1][1]) < 1e-12) ring.pop();
    surveyMeasureState.fieldPoints = ring;
    surveyMeasureState.fieldKind = rec.kind || 'field';
    surveyMeasureState.isFieldComplete = true;
    updateFieldGeometry();
    fp.editingId = rec.id;
    /* [v21-1] 작물·기준·총이랑수·비율까지 저장된 값으로 되살린다 */
    if (rec.ctx) {
      fp.ctx = {
        app: 'tonghab', ts: Date.now(),
        crop: rec.ctx.crop || '', mode: rec.ctx.mode || '길이',
        L: (rec.ctx.L === 0 || rec.ctx.L) ? rec.ctx.L : '',
        r1: rec.ctx.r1 || null, r2: rec.ctx.r2 || null,
        ratio: rec.ctx.ratio || rec.ratio || 1,
        surveyKey: rec.ctx.surveyKey || ''
      };
      try { saveJSON(FP_CTX_KEY, fp.ctx); } catch (e) {}
    } else if (rec.crop || rec.r1 || rec.r2) {
      /* v20 이전에 저장된 자료도 최대한 되살린다 */
      fp.ctx = {
        app: 'tonghab', ts: Date.now(),
        crop: rec.crop || '', mode: rec.mode || '길이',
        L: (rec.mode === '이랑') ? (rec.L || '') : '',
        r1: rec.r1 || null, r2: rec.r2 || null,
        ratio: rec.ratio || 1, surveyKey: rec.surveyKey || ''
      };
      try { saveJSON(FP_CTX_KEY, fp.ctx); } catch (e) {}
    }
    fp.ratio = rec.ratio || 1;
    fp.jibunAddress = rec.jibunAddress || '';
    fp.roadAddress = rec.roadAddress || '';
    fp.ga = rec.ga || null; fp.na = rec.na || null;
    fp.angleA = Number(rec.angleA != null ? rec.angleA : rec.angle) || 0;
    fp.angleB = Number(rec.angleB != null ? rec.angleB : rec.angle) || 0;
    fp.angleMode = false;
    fpSetRatio(fp.ratio);
    var _bn = document.getElementById('fpBanner');
    if (_bn) { _bn.style.display = 'flex'; }
    fpRenderBanner();                       /* [v21-1] 작물·기준·비율 표시 갱신 */
    if (fp.ga && fp.na) fpCompute();
    fpRender(); fpSyncButtons();
    fp.finished = !!rec.finished;
    fp.angleSep = !!rec.angleSep;
    /* [v17-7] 저장할 때의 지도 중심·확대·회전각·Pitch 를 그대로 되살린다 */
    if (rec.mapCenter) {
      map.flyTo({
        center: rec.mapCenter,
        zoom: (rec.zoom != null) ? rec.zoom : map.getZoom(),
        bearing: (rec.bearing != null) ? rec.bearing : 0,
        pitch: (rec.pitch != null) ? rec.pitch : 0,
        essential: true, duration: 700
      });
    } else {
      try {
        var b = new maplibregl.LngLatBounds();
        ring.forEach(function (p) { b.extend(p); });
        map.fitBounds(b, { padding: 90, duration: 600 });
      } catch (e) {}
    }
    openFpTool();
    fpSyncButtons();
    geoPush();
    showToast('A/B포구 저장을 불러왔습니다.' + (rec.bearing ? '\n(회전각 ' + formatNumber(rec.bearing, 1) + '° 포함)' : ''), 3400, 'success');
  }

      var kindKo = rec.type === 'both' ? '면적+거리' : (rec.type === 'distance' ? '거리' : '면적');
      var body = el('div', 'fav-body',

  /* ===================================================================
     [v6-4] 길게 누르기(0.5초) Quick Action —— 도착 / 측정 / 주소 / 공유 / 저장
     · 측정 모드일 때는 점 찍기와 충돌하므로 동작하지 않는다(mode === 'none' 에서만).
     =================================================================== */
  var quickMenuEl = document.getElementById('quickMenu');
  var pressDotEl = document.getElementById('pressDot');
  var qaLngLat = null;
  var tempMarker = null;

  function clearTempMarker() { if (tempMarker) { tempMarker.remove(); tempMarker = null; } }

  function hideQuickMenu() {
    quickMenuEl.classList.remove('show');
    pressDotEl.style.display = 'none';
  }
  function showQuickMenu(point, lngLat) {
    qaLngLat = lngLat;
    pressDotEl.style.left = point.x + 'px';
    pressDotEl.style.top = point.y + 'px';
    pressDotEl.style.display = 'block';

    quickMenuEl.classList.add('show');
    /* 화면 밖으로 나가지 않도록 위치 보정 */
    var w = quickMenuEl.offsetWidth, h = quickMenuEl.offsetHeight;
    var x = Math.min(Math.max(8, point.x - w / 2), window.innerWidth - w - 8);
    var yy = point.y - h - 18;
    if (yy < 8) yy = point.y + 18;
    quickMenuEl.style.left = x + 'px';
    quickMenuEl.style.top = yy + 'px';
  }

  (function () {
    var timer = null, startPt = null, fired = false;
    function begin(e) {
      if (surveyMeasureState.mode !== 'none') return;   /* 측정 중에는 비활성 */
      if (sheetHasForm) return;                          /* [v11-1] 입력 중에는 차단(내용 보호) */
      if (e.originalEvent && e.originalEvent.touches && e.originalEvent.touches.length > 1) return;
      cancel();
      startPt = e.point;
      fired = false;
      timer = setTimeout(function () {
        fired = true;
        /* [v11-1] 열려 있던 시트를 닫고 임시핀·선택강조 정리 후 퀵메뉴 */
        if (sheetOpen) closeSheet();
        clearTempMarker();
        if (typeof clearSelectedParcelHighlight === 'function') clearSelectedParcelHighlight();
        showQuickMenu(e.point, e.lngLat);
      }, 500);
    }
    function cancel() { if (timer) { clearTimeout(timer); timer = null; } }
    function moved(e) {
      if (!timer || !startPt) return;
      var dx = e.point.x - startPt.x, dy = e.point.y - startPt.y;
      if (Math.sqrt(dx * dx + dy * dy) > 8) cancel();   /* 지도를 끌면 취소 */
    }
    map.on('mousedown', begin);
    map.on('touchstart', begin);
    map.on('mousemove', moved);
    map.on('touchmove', moved);
    map.on('mouseup', cancel);
    map.on('touchend', cancel);
    map.on('dragstart', cancel);
    map.on('zoomstart', cancel);
    map.on('movestart', function () { cancel(); hideQuickMenu(); });
    /* 롱프레스로 메뉴가 뜬 직후의 click 은 무시(점이 찍히지 않도록) */
    map.on('click', function () { if (fired) { fired = false; return; } hideQuickMenu(); });
    /* PC 우클릭도 동일 메뉴 */
    map.on('contextmenu', function (e) {
      if (surveyMeasureState.mode !== 'none') return;
      showQuickMenu(e.point, e.lngLat);
      if (e.preventDefault) e.preventDefault();
    });
  })();

  /* 좌표 → 주소 (실패해도 좌표만으로 진행) */
  function qaInfo(lngLat) {
    return requestVWorldReverse(lngLat.lng, lngLat.lat)
      .then(function (a) {
        return { lat: lngLat.lat, lng: lngLat.lng, jibunAddress: a.jibunAddress, roadAddress: a.roadAddress, postalCode: a.postalCode };
      })
      .catch(function () {
        return { lat: lngLat.lat, lng: lngLat.lng, jibunAddress: '', roadAddress: '', postalCode: '' };
      });
  }

  /* 지적도가 켜져 있으면 누른 지점의 필지에서 지목·면적을 얻는다 (공유 내용에 사용) */
  function qaParcelInfo(point) {
    var out = { jimok: '', areaM2: 0, jibun: '' };
    if (!map.getLayer('ov-cadastral-fill')) return out;
    try {
      var hits = map.queryRenderedFeatures(point, { layers: ['ov-cadastral-fill'] });
      if (!hits.length) return out;
      var p = hits[0].properties || {};
      out.jibun = p.jibun || '';
      var m = String(p.jibun || '').match(/([가-힣]+)\s*$/);   /* "693 대" → 대 */
      if (m) out.jimok = m[1];
      if (hasTurf) { try { out.areaM2 = turf.area(hits[0]); } catch (e) {} }
    } catch (e) {}
    return out;
  }

  function qaAddrText(info) {
    var t = [];
    if (info.jibunAddress) t.push('지번: ' + info.jibunAddress);
    if (info.roadAddress) t.push('도로명: ' + info.roadAddress);
    if (info.postalCode) t.push('우편번호: ' + info.postalCode);
    t.push('위도: ' + info.lat.toFixed(6));
    t.push('경도: ' + info.lng.toFixed(6));
    return t.join('\n');
  }

  /* 4-4 공유 */
  function qaShare(info, parcel) {
    var url = location.origin + location.pathname + '#map=' + info.lat.toFixed(6) + ',' + info.lng.toFixed(6) + ',' + map.getZoom().toFixed(1);
    var lines = [qaAddrText(info)];
    if (parcel && parcel.jimok) lines.push('지목: ' + parcel.jimok);
    if (parcel && parcel.areaM2) lines.push('면적: ' + formatNumber(parcel.areaM2, 1) + '㎡ (' + formatNumber(parcel.areaM2 / 3.305785, 1) + '평)');
    lines.push('지도: ' + url);
    var text = lines.join('\n');

    /* [v12-5] 화면 전체 캡처 후 공유.
       html2canvas 로 지도 + 핀 + 작물명 + 라벨까지 담고,
       실패하면 지도 캔버스만이라도 담고, 그것도 안 되면 글자만 공유한다.
       ※ 라이브러리는 이 시점에 처음 내려받는다(지연 로딩). */
    hideQuickMenu();
    showToast('화면을 캡처해 공유를 준비합니다.', 0, 'info');

    function shareTextOnly() {
      toastEl.style.display = 'none';
      if (navigator.share) {
        navigator.share({ title: '텐아르 위치 공유', text: text }).catch(function (e) {
          if (e && e.name === 'AbortError') return;
          copyText(text);
        });
      } else {
        copyText(text);
        showToast('공유를 지원하지 않아 클립보드에 복사했습니다.', 3500, 'info');
      }
    }
    function shareBlob(blob) {
      toastEl.style.display = 'none';
      if (!blob) { shareTextOnly(); return; }
      var file = new File([blob], 'tenar_map_' + Date.now() + '.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: '텐아르 위치 공유', text: text }).catch(function (e) {
          if (e && e.name === 'AbortError') return;
          shareTextOnly();
        });
      } else shareTextOnly();
    }
    /* 지도 캔버스만 캡처 (html2canvas 실패 시 대비) */
    function captureMapCanvasOnly() {
      try {
        map.once('render', function () {
          setTimeout(function () {
            var cv = map.getCanvas();
            if (!cv || !cv.toBlob) { shareTextOnly(); return; }
            cv.toBlob(shareBlob, 'image/png');
          }, 60);
        });
        map.triggerRepaint();
      } catch (e) { shareTextOnly(); }
    }

    loadHtml2Canvas().then(function (ok) {
      if (!ok || typeof html2canvas === 'undefined') { captureMapCanvasOnly(); return; }
      map.once('render', function () {
        setTimeout(function () {
          html2canvas(document.body, {
            useCORS: true, allowTaint: true, backgroundColor: null,
            scale: Math.min(window.devicePixelRatio || 1, 2),
            /* 퀵메뉴·토스트·시트는 캡처에서 제외해 지도 화면만 담는다 */
            ignoreElements: function (el2) {
              var id = el2.id || '';
              return id === 'quickMenu' || id === 'toast' || id === 'sheet' ||
                     id === 'sheetOverlay' || id === 'pressDot';
            }
          }).then(function (cv) {
            if (!cv.toBlob) { captureMapCanvasOnly(); return; }
            cv.toBlob(shareBlob, 'image/png');
          }).catch(function (e) {
            console.warn('html2canvas 실패 → 지도 캔버스만 공유', e);
            captureMapCanvasOnly();
          });
        }, 80);
      });
      map.triggerRepaint();
    });
  }

  /* [v12-5] html2canvas 지연 로딩 (한 번만) */
  var _h2cPromise = null;
  function loadHtml2Canvas() {
    if (typeof html2canvas !== 'undefined') return Promise.resolve(true);
    if (_h2cPromise) return _h2cPromise;
    _h2cPromise = new Promise(function (resolve) {
      var sc = document.createElement('script');
      sc.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      sc.onload = function () { resolve(true); };
      sc.onerror = function () { console.warn('html2canvas 로딩 실패'); resolve(false); };
      document.head.appendChild(sc);
      setTimeout(function () { resolve(typeof html2canvas !== 'undefined'); }, 8000);
    });
    return _h2cPromise;
  }

  function fpPolygon() {

      return { type: 'Feature', properties: {}, geometry: { type: 'Polygon', coordinates: [closedRing(s.fieldPoints)] } };
    }

    var la, lb;
    try {
      la = turf.nearestPointOnLine(line, turf.point(fp.ga), { units: 'kilometers' }).properties.location;
      lb = turf.nearestPointOnLine(line, turf.point(fp.na), { units: 'kilometers' }).properties.location;
    } catch (e) { return null; }
    var fwd = lb - la; if (fwd < 0) fwd += totalKm;
    var bwd = totalKm - fwd;
    var coords = (fwd <= bwd) ? fpSliceRing(line, la, lb, totalKm)
                              : fpSliceRing(line, lb, la, totalKm).slice().reverse();
    if (!coords || coords.length < 2) coords = [fp.ga, fp.na];
    coords[0] = fp.ga; coords[coords.length - 1] = fp.na;   /* 양 끝은 찍은 지점으로 맞춤 */
    fp.path = coords;
    return coords;
  }
  function fpPathLine() { return (fp.path && fp.path.length >= 2) ? turf.lineString(fp.path) : null; }
  /* 경계선 경로를 따라 dist_cm 지점 */
  function fpAlongPath(dist_cm) {
    var pl = fpPathLine();
    if (!pl) return null;
    return turf.along(pl, dist_cm / 100000, { units: 'kilometers' }).geometry.coordinates;
  }
  /* 그 지점에서의 경계선 방향(진행 방위) — 직각을 여기서 잡아야 굽은 경계도 맞는다 */
  function fpPathBearingAt(dist_cm, totalCm) {
    var d = Math.max(0, Math.min(totalCm, dist_cm));
    var step = Math.max(50, totalCm * 0.005);
    var p1 = fpAlongPath(Math.max(0, d - step));
    var p2 = fpAlongPath(Math.min(totalCm, d + step));
    if (!p1 || !p2) return 0;
    return turf.bearing(turf.point(p1), turf.point(p2));
  }
  /* 기점에서 (경계선 직각 + 각도보정) 방향으로 안쪽 경계까지 — 끝점과 길이(cm) */
  /* [v18-3] prefer 가 주어지면 그 방향(A포구가 잡은 쪽)에 가까운 쪽을 먼저 쓴다.
     A와 B가 서로 반대편으로 갈라지지 않고 처음부터 같은 방향이 되도록. */
  function fpCastInward(basePt, poly, baseBearing, angle, prefer) {
    var cands = [baseBearing + 90 + angle, baseBearing - 90 + angle];
    if (prefer != null) {
      cands.sort(function (x, y) { return angDiff(x, prefer) - angDiff(y, prefer); });
    }
    var best = null;
    cands.forEach(function (brg) {
      var probe = turf.destination(turf.point(basePt), 0.0003, brg, { units: 'kilometers' });
      var inside = false;
      try { inside = turf.booleanPointInPolygon(probe, poly); } catch (e) {}
      if (!inside) return;
      var far = turf.destination(turf.point(basePt), 5, brg, { units: 'kilometers' }).geometry.coordinates;
      var ray = turf.lineString([basePt, far]);
      var hits = null;
      try { hits = turf.lineIntersect(ray, turf.polygonToLine(poly)); } catch (e) { return; }
      if (!hits || !hits.features.length) return;
      var nearest = null, nd = Infinity;
      hits.features.forEach(function (h) {
        var d = turf.distance(turf.point(basePt), h, { units: 'kilometers' });
        if (d > 0.0002 && d < nd) { nd = d; nearest = h.geometry.coordinates; }
      });
      /* prefer 가 있으면 "먼저 성공한 방향"을 그대로 쓴다(정렬해 두었으므로 A와 같은 쪽) */
      if (nearest) {
        if (prefer != null) { if (!best) best = { d: nd, end: nearest, brg: brg }; }
        else if (!best || nd < best.d) best = { d: nd, end: nearest, brg: brg };
      }
    });
    if (!best) return null;
    return { end: best.end, len_cm: best.d * 100000, bearing: best.brg };
  }
  /* [v19-7] 정해진 방위각 하나로만 쏘아 경계까지 재는 함수 */
  function fpCastAlong(basePt, poly, brg) {
    try {
      var probe = turf.destination(turf.point(basePt), 0.0003, brg, { units: 'kilometers' });
      if (!turf.booleanPointInPolygon(probe, poly)) return null;
      var far = turf.destination(turf.point(basePt), 5, brg, { units: 'kilometers' }).geometry.coordinates;
      var hits = turf.lineIntersect(turf.lineString([basePt, far]), turf.polygonToLine(poly));
      if (!hits || !hits.features.length) return null;
      var nearest = null, nd = Infinity;
      hits.features.forEach(function (h) {
        var d = turf.distance(turf.point(basePt), h, { units: 'kilometers' });
        if (d > 0.0002 && d < nd) { nd = d; nearest = h.geometry.coordinates; }
      });
      if (!nearest) return null;
      return { end: nearest, len_cm: nd * 100000, bearing: brg };
    } catch (e) { return null; }
  }
  /* 두 방위각 사이의 최소 각도차(0~180) */
  function angDiff(a, b) {
    var d = Math.abs(a - b) % 360;
    return d > 180 ? 360 - d : d;
  }

  /* A/B포구 전체 재계산 */
  function fpCompute() {
    if (!fp.ga || !fp.na || !hasTurf) { fpClearDerived(); return false; }
    var poly = fpPolygon();
    if (!poly) return false;
    var rv = fpRatioVals();
    if (!(rv.ga > 0)) { showToast('비율(가)이 없습니다. ⓪ 조사 설정에서 비율을 입력해주세요.', 4000); return false; }

    /* [v16-2] 가-나 길이 = 새 직선이 아니라 경계선을 따라간 길이 */
    var pl = fpBuildPath() ? fpPathLine() : null;
    if (!pl) return false;
    var Lmap_cm = turf.length(pl, { units: 'kilometers' }) * 100000;
    fp.L_cm = Lmap_cm;
    var L = fpIsRidgeMode() ? parseFloat((fp.ctx && fp.ctx.L) || 0) : Math.round(Lmap_cm);
    if (!(L > 0)) { showToast('가-나 값이 없습니다.\n이랑 작물은 총이랑수를 먼저 입력해주세요.', 4500); return false; }

    /* [v19-9] 계산기 규칙대로 비율을 자동으로 고른다 */
    fpAutoRatio(L);
    rv = fpRatioVals();

    /* [v19-10] 1이랑 : 2번 비율 고정 · 가-나 중간에 세로선 하나 ·
       A포구 = 세로총길이/2 × 나  ·  B포구 = 세로총길이/2 × 다 + 세로총길이/2
       (통합계산기 updateABDerived 의 one-ridge 식 그대로) */
    if (fpIsOneRidge()) {
      fp.aSel = 1; fp.bSel = 1;
      var midDist = Lmap_cm / 2;   /* 이랑 1개 → (1+1)등분의 1자리 = 가운데 */
      fp.aBase = fpAlongPath(midDist);
      fp.bBase = fp.aBase;
      var cm = fp.aBase ? fpCastInward(fp.aBase, poly, fpPathBearingAt(midDist, Lmap_cm), fp.angleA) : null;
      fp.aEnd = cm ? cm.end : null; fp.bEnd = fp.aEnd;
      fp.heightA = cm ? cm.len_cm : 0; fp.heightB = fp.heightA;
      fp.aBrg = cm ? cm.bearing : null; fp.bBrg = fp.aBrg;
      var H = fp.heightA;
      fp.aPoLen = (rv.na > 0) ? (H / 2) * rv.na : 0;
      fp.bPoLen = (rv.da > 0) ? (H / 2) * rv.da + (H / 2) : 0;
      fp.aPo = (cm && fp.aPoLen > 0) ? turf.destination(turf.point(fp.aBase), fp.aPoLen / 100000, cm.bearing, { units: 'kilometers' }).geometry.coordinates : null;
      fp.bPo = (cm && fp.bPoLen > 0) ? turf.destination(turf.point(fp.aBase), fp.bPoLen / 100000, cm.bearing, { units: 'kilometers' }).geometry.coordinates : null;
      return true;
    }

    /* 통합계산기와 동일한 식 (그대로 유지) */
    var a_ga = L * rv.ga;
    var aInt = Math.round(a_ga);
    var half = L / 2;
    var b_ga = fpIsRidgeMode() ? (Math.round(a_ga * 100) / 100 + half) : (aInt + half);
    var bInt = Math.round(b_ga);
    /* [v23-2] 통합계산기 규칙 — 1번 비율이 0이랑이면 2번 비율을 쓰고,
       2번 비율로도 0이랑이면 A포구는 무조건 「첫번째 1이랑」을 쓴다.
       B포구는 계산된 값을 그대로 쓴다. */
    fp.aForcedOne = false;
    if (fpIsRidgeMode() && aInt === 0) {
      aInt = 1;
      fp.aForcedOne = true;
    }
    fp.aSel = aInt; fp.bSel = bInt;

    /* [v23-3] 가로기점 좌표
       · 이랑 기준 : 이랑이 L개면 고랑은 L+1개이므로 가-나를 (L+1)등분해서
         i번째 이랑을 i/(L+1) 자리에 놓는다.
         예) 이랑 2개 → 1/3, 2/3 자리 (3등분)
             이랑 1개 → 1/2 자리 (가운데)
       · 길이(cm) 기준 : 실제 길이 비율 그대로 */
    var denom = fpIsRidgeMode() ? (L + 1) : L;
    var aRatio = Math.max(0, Math.min(1, aInt / denom));
    var bRatio = Math.max(0, Math.min(1, bInt / denom));
    var aDist = Lmap_cm * aRatio, bDist = Lmap_cm * bRatio;
    fp.aBase = fpAlongPath(aDist);
    fp.bBase = fpAlongPath(bDist);

    /* 세로: 그 지점 경계선에 직각(+각도보정) 방향으로 안쪽 경계까지 */
    var ca = fp.aBase ? fpCastInward(fp.aBase, poly, fpPathBearingAt(aDist, Lmap_cm), fp.angleA) : null;
    /* [v19-7] B의 세로 각도는 "그 자리의 직각"이 아니라 A와 똑같은 각도를 쓴다.
       (필요하면 사용자가 ③ 각도조절로 바꾼다) */
    var cb = null;
    if (fp.bBase) {
      if (ca) {
        /* A와 같은 방위각 + (각도따로일 때만) B의 추가 보정각 */
        var bBrg = ca.bearing + (fp.angleSep ? (fp.angleB - fp.angleA) : 0);
        cb = fpCastAlong(fp.bBase, poly, bBrg);
      }
      if (!cb) cb = fpCastInward(fp.bBase, poly, fpPathBearingAt(bDist, Lmap_cm), fp.angleB, ca ? ca.bearing : null);
    }
    fp.aEnd = ca ? ca.end : null; fp.heightA = ca ? ca.len_cm : 0;
    fp.bEnd = cb ? cb.end : null; fp.heightB = cb ? cb.len_cm : 0;

    /* A/B포구 지점 = 세로총길이 × (나·다)비율 */
    fp.aPoLen = (rv.na > 0) ? fp.heightA * rv.na : 0;
    fp.bPoLen = (rv.da > 0) ? fp.heightB * rv.da : 0;
    fp.aPo = (ca && fp.aPoLen > 0) ? turf.destination(turf.point(fp.aBase), fp.aPoLen / 100000, ca.bearing, { units: 'kilometers' }).geometry.coordinates : null;
    fp.bPo = (cb && fp.bPoLen > 0) ? turf.destination(turf.point(fp.bBase), fp.bPoLen / 100000, cb.bearing, { units: 'kilometers' }).geometry.coordinates : null;
    fp.aBrg = ca ? ca.bearing : null;
    fp.bBrg = cb ? cb.bearing : null;
    return true;
  }

  /* ---------- 표시 ---------- */
  function fpClearMarkers() { fpMarkers.forEach(function (m) { m.remove(); }); fpMarkers = []; }
  function fpMark(coord, html, cls) {
    var e = document.createElement('div');
    e.className = cls;
    e.innerHTML = html;
    fpMarkers.push(new maplibregl.Marker({ element: e }).setLngLat(coord).addTo(map));
  }
  function fpRender() {
    fpClearMarkers();
    var fc = { type: 'FeatureCollection', features: [] };
    var unit = fpIsRidgeMode() ? '이랑' : 'cm';

    if (fp.ga) fpMark(fp.ga, '가', 'fp-gana');
    /* [v16-3] 전체 가-나 가로길이는 「나」 아래에 표기 */
    if (fp.na) {
      var Ltxt = fp.L_cm ? ('가-나 ' + formatNumber(fpIsRidgeMode() ? ((fp.ctx && fp.ctx.L) || 0) : Math.round(fp.L_cm), 0) + unit) : '';
      fpMark(fp.na, '나' + (Ltxt ? '<span class="fp-gana-len">' + Ltxt + '</span>' : ''), 'fp-gana');
    }

    /* [v16-2] 가-나 선 = 기존 경계선 경로 그대로 (새 직선을 긋지 않음) */
    if (fp.path && fp.path.length >= 2) {
      fc.features.push({ type: 'Feature', properties: { t: 'gana' }, geometry: { type: 'LineString', coordinates: fp.path } });
    }
    /* 세로선 */
    if (fp.aBase && fp.aEnd) fc.features.push({ type: 'Feature', properties: { t: 'va' }, geometry: { type: 'LineString', coordinates: [fp.aBase, fp.aEnd] } });
    /* [v19-10] 1이랑은 세로선 하나만 그린다 */
    if (fp.bBase && fp.bEnd && !fpIsOneRidge()) fc.features.push({ type: 'Feature', properties: { t: 'vb' }, geometry: { type: 'LineString', coordinates: [fp.bBase, fp.bEnd] } });
    if (map.getSource('fp-source')) map.getSource('fp-source').setData(fc);

    /* [v19-10] 1이랑이면 가로기점이 하나(가-나 중간)뿐이다 */
    if (fpIsOneRidge()) {
      if (fp.aBase) fpMark(fp.aBase, '<span class="fp-dot fp-dot-a"></span><span class="fp-tag fp-tag-a">1 이랑</span>', 'fp-base');
    } else {
      /* [v15-6] 가로 기점 : 점 아래에 A / B */
      if (fp.aBase) fpMark(fp.aBase, '<span class="fp-dot fp-dot-a"></span><span class="fp-tag fp-tag-a">A ' + formatNumber(fp.aSel, 0) + unit + '</span>', 'fp-base');
      if (fp.bBase) fpMark(fp.bBase, '<span class="fp-dot fp-dot-b"></span><span class="fp-tag fp-tag-b">B ' + formatNumber(fp.bSel, 0) + unit + '</span>', 'fp-base');
    }

    /* [v18-4] 세로 "전체" 길이는 세로선 끝에서 조금 더 나간 "구역 밖"에 표시 */
    function outsideOf(base, end) {
      if (!base || !end || !hasTurf) return end || null;
      try {
        var brg = turf.bearing(turf.point(base), turf.point(end));
        var d = turf.distance(turf.point(base), turf.point(end), { units: 'kilometers' });
        /* [v22-7] 테두리에 너무 붙어 보기 어려워 조금 더 바깥으로 뺐다 */
        var out = Math.max(0.006, d * 0.045);
        return turf.destination(turf.point(end), out, brg, { units: 'kilometers' }).geometry.coordinates;
      } catch (e) { return end; }
    }
    var oA = outsideOf(fp.aBase, fp.aEnd), oB = outsideOf(fp.bBase, fp.bEnd);
    if (oA) fpMark(oA, '<span class="fp-endtip fp-endtip-a">세로 ' + formatNumber(fp.heightA, 0) + 'cm</span>', 'fp-end-wrap');
    /* 1이랑은 세로선이 하나이므로 B쪽 라벨을 겹쳐 그리지 않는다 */
    if (oB && !fpIsOneRidge()) fpMark(oB, '<span class="fp-endtip fp-endtip-b">세로 ' + formatNumber(fp.heightB, 0) + 'cm</span>', 'fp-end-wrap');

    /* [v15-6][v16-3] A/B포구 : 점 안에 A(파랑)·B(빨강), 옆에는 "가로기점 → 포구점" 계산값 */
    if (fp.aPo) fpMarkPo('a', fp.aPo, fp.aPoLen);
    if (fp.bPo) fpMarkPo('b', fp.bPo, fp.bPoLen);

    fpUpdatePanel();
    fpRenderBanner();   /* [v19-8] 가로길이·비율 표시 갱신 */
  }

  /* [v16-4] A/B포구 마커 — 각도조절이 켜져 있으면 끌 수 있고 손잡이(↔)가 보인다 */
  function fpMarkPo(which, coord, lenCm) {
    var e = document.createElement('div');
    e.className = 'fp-po-wrap' + (fp.angleMode ? ' fp-drag' : '');
    e.innerHTML =
      '<span class="fp-po fp-po-' + which + '">' + which.toUpperCase() + '</span>' +
      '<span class="fp-po-txt fp-po-txt-' + which + '">' + formatNumber(lenCm, 0) + 'cm</span>' +
      (fp.angleMode ? '<span class="fp-grip">↔</span><span class="fp-hit"></span>' : '');
    var mk = new maplibregl.Marker({ element: e, draggable: fp.angleMode }).setLngLat(coord).addTo(map);
    if (fp.angleMode) {
      mk.on('drag', function () { fpDragAngle(which, mk.getLngLat()); });
      mk.on('dragend', function () { fpRender(); fpSyncButtons(); });
    }
    fpMarkers.push(mk);
  }
  /* 끌린 위치로 각도만 바꾼다 — 가로 기점(A/B 지점)은 그대로 둔다 */
  function fpDragAngle(which, ll) {
    var base = (which === 'a') ? fp.aBase : fp.bBase;
    if (!base || !hasTurf) return;
    var Lcm = fp.L_cm || 1;
    var dist = (which === 'a') ? Lcm * Math.max(0, Math.min(1, fp.aSel / (fpIsRidgeMode() ? ((fp.ctx && fp.ctx.L) || 1) : Math.round(Lcm))))
                               : Lcm * Math.max(0, Math.min(1, fp.bSel / (fpIsRidgeMode() ? ((fp.ctx && fp.ctx.L) || 1) : Math.round(Lcm))));
    var pathBrg = fpPathBearingAt(dist, Lcm);
    var dragBrg = turf.bearing(turf.point(base), turf.point([ll.lng, ll.lat]));
    /* 기준(직각) 대비 좌우로 몇 도 틀어졌는지 */
    var refIn = (which === 'a') ? fp.aBrg : fp.bBrg;
    var ref0 = (refIn == null) ? pathBrg + 90 : refIn - ((which === 'a') ? fp.angleA : fp.angleB);
    var d = dragBrg - ref0;
    while (d > 180) d -= 360;
    while (d < -180) d += 360;
    d = Math.max(-75, Math.min(75, d));
    /* [v17-5] 기본은 A·B 연동. 「각도따로」를 켜면 잡은 쪽만 움직인다 */
    if (fp.angleSep) {
      if (which === 'a') fp.angleA = Math.round(d); else fp.angleB = Math.round(d);
    } else {
      fp.angleA = fp.angleB = Math.round(d);
    }
    fpCompute();
    fpUpdatePanel();
    fpUpdateAngleLabel();
    /* 끄는 중에는 선만 즉시 갱신 (마커 재생성은 dragend 에서) */
    var fc = { type: 'FeatureCollection', features: [] };
    if (fp.path && fp.path.length >= 2) fc.features.push({ type: 'Feature', properties: { t: 'gana' }, geometry: { type: 'LineString', coordinates: fp.path } });
    if (fp.aBase && fp.aEnd) fc.features.push({ type: 'Feature', properties: { t: 'va' }, geometry: { type: 'LineString', coordinates: [fp.aBase, fp.aEnd] } });
    if (fp.bBase && fp.bEnd) fc.features.push({ type: 'Feature', properties: { t: 'vb' }, geometry: { type: 'LineString', coordinates: [fp.bBase, fp.bEnd] } });
    if (map.getSource('fp-source')) map.getSource('fp-source').setData(fc);
  }

  /* ---------- 패널 ---------- */
  function fpUpdatePanel() {
    var box = document.getElementById('fpInfo');
    if (!box) return;
    var rv = fpRatioVals();
    var unit = fpIsRidgeMode() ? '이랑' : 'cm';
    var L = fpIsRidgeMode() ? ((fp.ctx && fp.ctx.L) || 0) : Math.round(fp.L_cm);
    var html = '';
    html += '<div class="fp-line"><b>가-나</b> ' + (L ? formatNumber(L, 0) + unit : '—') +
            (fpIsRidgeMode() ? ' <span class="fp-sub">(계산기 입력)</span>' : ' <span class="fp-sub">(지도 실측)</span>') + '</div>';
    if (fpIsOneRidge()) {
      html += '<div class="fp-line"><b>1이랑</b> 2번 비율 · 가-나 중간 세로선 1개</div>';
    } else {
      html += '<div class="fp-line"><b>가로기점</b> A ' + (fp.aSel ? formatNumber(fp.aSel, 0) + unit : '—') +
              ' · B ' + (fp.bSel ? formatNumber(fp.bSel, 0) + unit : '—') +
              (fp.aForcedOne ? ' <span class="fp-sub">(A는 0이랑 → 첫번째 1이랑)</span>' : '') + '</div>';
    }
    html += '<div class="fp-line"><b>세로총길이</b> A ' + (fp.heightA ? formatNumber(fp.heightA, 0) + 'cm' : '—') +
            ' · B ' + (fp.heightB ? formatNumber(fp.heightB, 0) + 'cm' : '—') + '</div>';
    html += '<div class="fp-line"><b>포구지점</b> A ' + (fp.aPoLen ? formatNumber(fp.aPoLen, 0) + 'cm' : '—') +
            ' · B ' + (fp.bPoLen ? formatNumber(fp.bPoLen, 0) + 'cm' : '—') + '</div>';
    html += '<div class="fp-line fp-sub">비율 ' + fp.ratio + '번 · 가 ' + (rv.ga || '—') + ' / 나 ' + (rv.na || '—') + ' / 다 ' + (rv.da || '—') + '</div>';
    box.innerHTML = html;
  }

  /* ---------- 조작 ---------- */
  function fpStartPick(which) {
    if (!fpHasShape()) { showToast('먼저 필지선택 또는 재배구역을 완료해주세요.', 3500, 'info'); return; }
    fp.picking = which;
    setSurveyMode('fieldplot');
    showToast((which === 'ga' ? '가' : '나') + ' 지점을 꼭짓점 또는 경계에서 선택하세요.\n저장핀을 눌러도 됩니다.', 4000, 'info');
  }
  /* 클릭 좌표를 폴리곤 꼭짓점/경계에 스냅 */
  /* [v18-1] 가·나는 "점"(꼭짓점)에만 찍을 수 있다. 경계선 위에는 찍히지 않는다.
     꼭짓점에서 멀면 null 을 돌려주고, 부르는 쪽에서 안내를 띄운다. */
  function fpSnap(lng, lat) {
    var poly = fpPolygon();
    if (!poly || !hasTurf) return null;
    var pts = poly.geometry.coordinates[0];
    var best = null, bd = Infinity;
    pts.forEach(function (p) {
      var d = turf.distance(turf.point([lng, lat]), turf.point(p), { units: 'kilometers' });
      if (d < bd) { bd = d; best = p; }
    });
    /* 꼭짓점에서 25m 안이면 그 꼭짓점에 붙인다 */
    if (best && bd < 0.025) return best;
    return null;   /* [v18-1] 선 위 스냅 없음 — 꼭짓점이 아니면 찍히지 않는다 */
  }
  function fpSetPoint(lng, lat) {
    var c = fpSnap(lng, lat);
    /* [v18-1] 꼭짓점이 아니면 지정하지 않는다 (규칙) */
    if (!c) {
      showToast('가·나는 꼭짓점(점)에만 찍을 수 있습니다.\n경계선이 아니라 번호가 붙은 점을 눌러주세요.', 4200, 'info');
      return;
    }
    if (fp.picking === 'ga') {
      fp.ga = c;
      /* [v19-1] 가를 찍으면 「나」 선택으로 바로 넘어간다 (버튼을 다시 누를 필요 없음) */
      if (!fp.na) {
        fp.picking = 'na';
        showToast('가 지점을 지정했습니다.\n이어서 「나」 지점을 찍으세요.', 2600, 'success');
        fpRender(); fpSyncButtons(); geoPush();
        return;
      }
      showToast('가 지점을 지정했습니다.', 2000, 'success');
    }
    else if (fp.picking === 'na') {
      fp.na = c;
      /* 나를 먼저 찍었고 가가 비어 있으면 이어서 가를 받는다 */
      if (!fp.ga) {
        fp.picking = 'ga';
        showToast('나 지점을 지정했습니다.\n이어서 「가」 지점을 찍으세요.', 2600, 'success');
        fpRender(); fpSyncButtons(); geoPush();
        return;
      }
      showToast('나 지점을 지정했습니다.', 2000, 'success');
    }
    fp.picking = null;
    if (fp.ga && fp.na) { fpCompute(); }
    if (!fp.jibunAddress && fp.ga) fpLookupAddress(fp.ga[0], fp.ga[1]);   /* [v20-1] */
    fpRender();
    fpSyncButtons();
    geoPush();   /* [v19-6] 가·나 지정도 되돌리기 이력에 남긴다 */
  }
  /* [v16-4] 각도 조절 켜기/끄기 — 켜면 A/B포구에 ↔ 손잡이가 보이고 끌 수 있다 */
  function fpUpdateAngleLabel() {
    var lbl = document.getElementById('fpAngleVal');
    if (lbl) lbl.textContent = '각도 A ' + (fp.angleA > 0 ? '+' : '') + fp.angleA + '° · B ' + (fp.angleB > 0 ? '+' : '') + fp.angleB + '°';
  }
  /* [v17-5] 각도따로 켜기/끄기 */
  function fpToggleAngleSep() {
    fp.angleSep = !fp.angleSep;
    if (!fp.angleSep) {
      /* 연동으로 돌아오면 A 각도에 B를 맞춘다 */
      fp.angleB = fp.angleA;
      if (fp.ga && fp.na) fpCompute();
      fpRender();
    }
    fpSyncButtons();
    showToast(fp.angleSep ? 'A·B 각도를 따로 조절합니다.' : 'A·B 각도를 함께 움직입니다.', 2600, 'info');
  }
  /* [v17-5] 직각복원 — 현재 경계 기준 90°로 되돌린다 */
  function fpRestoreOrtho() {
    if (!(fp.ga && fp.na)) { showToast('먼저 가·나 지점을 지정해주세요.', 3000, 'info'); return; }
    fp.angleA = fp.angleB = 0;
    fpCompute(); fpRender(); fpSyncButtons();
    showToast('경계선 기준 직각(90°)으로 되돌렸습니다.', 2600, 'success');
  }
  function fpToggleAngleMode() {
    if (!(fp.ga && fp.na)) { showToast('먼저 가·나 지점을 지정해주세요.', 3000, 'info'); return; }
    fp.angleMode = !fp.angleMode;
    fpRender(); fpSyncButtons();
    showToast(fp.angleMode
      ? '각도 조절을 켰습니다.\nA·B포구 점(↔)을 좌우로 끌어 각도를 맞추세요.\n가로 A·B 지점은 그대로 있습니다.'
      : '각도 조절을 껐습니다.', fp.angleMode ? 5000 : 2000, 'info');
  }
  function fpSetRatio(n) {
    fp.ratio = n;
    var b1 = document.getElementById('fpR1'), b2 = document.getElementById('fpR2');
    if (b1) b1.classList.toggle('active', n === 1);
    if (b2) b2.classList.toggle('active', n === 2);
    fpRenderBanner();
    if (fp.ga && fp.na) { fpCompute(); fpRender(); } else fpUpdatePanel();
    showToast(n + '번 비율로 계산합니다.', 2000, 'info');
  }
  /* [v17-6] 완료 — 가·나·각도·필지·재배구역·UNDO·REDO 잠그고 「수정」만 남긴다 */
  function fpFinish() {
    if (!fpCanSubmit()) { showToast('가·나 지점까지 지정한 뒤 완료해주세요.', 3200, 'info'); return; }
    fp.finished = true;
    fp.picking = null; fp.angleMode = false;
    setSurveyMode('none');
    fpRender(); fpSyncButtons();
    showToast('포구 선정을 완료했습니다.\n고칠 곳이 있으면 「수정」으로 꼭짓점을 옮기세요.', 4500, 'success');
  }
  function fpUnfinish() {
    fp.finished = false;
    fpSyncButtons();
    showToast('완료를 해제했습니다. 다시 고칠 수 있습니다.', 2600, 'info');
  }

  /* [v20-1] 좌표로 지번주소를 찾아 보관한다 (재배구역처럼 필지 정보가 없을 때) */
  function fpLookupAddress(lng, lat) {
    try {
      return requestVWorldReverse(lng, lat).then(function (a) {
        if (a && a.jibunAddress) fp.jibunAddress = a.jibunAddress;
        if (a && a.roadAddress) fp.roadAddress = a.roadAddress;
        return fp.jibunAddress;
      }).catch(function () { return fp.jibunAddress; });
    } catch (e) { return Promise.resolve(fp.jibunAddress); }
  }

  /* [v19-6] 가·나로 계산된 선·지점·값만 지운다 (가·나 자체와 도형은 그대로) */
  function fpClearDerived() {
    fp.path = null;
    fp.aBase = fp.bBase = fp.aEnd = fp.bEnd = fp.aPo = fp.bPo = null;
    fp.aBrg = fp.bBrg = null;
    fp.L_cm = 0; fp.aSel = fp.bSel = 0;
    fp.heightA = fp.heightB = 0; fp.aPoLen = fp.bPoLen = 0;
  }
  function fpReset() {
    fp.ga = fp.na = null; fp.aBase = fp.bBase = fp.aEnd = fp.bEnd = fp.aPo = fp.bPo = null;
    fp.aSel = fp.bSel = fp.heightA = fp.heightB = fp.aPoLen = fp.bPoLen = 0;
    fp.picking = null; fp.angleA = fp.angleB = 0; fp.angleMode = false; fp.path = null;
    fp.finished = false; fp.angleSep = false;
    fp.jibunAddress = ''; fp.roadAddress = '';   /* [v20-1] */
    fpUpdateAngleLabel();
    fpRender(); fpSyncButtons();
  }

  /* [v22-4] 선택한 필지 / 그린 재배구역만 취소한다 (작물·비율 설정은 그대로) */
  function fpCancelArea() {
    var s = surveyMeasureState;
    if (!s.fieldPoints.length && !s.areas.length) {
      showToast('취소할 필지·재배구역이 없습니다.', 2600, 'info'); return;
    }
    var what = (s.fieldKind === 'crop') ? '그린 재배구역' : '선택한 필지';
    if (!window.confirm(what + '을(를) 취소하시겠습니까?\n\n선택필지·그리기가 초기화됩니다.\n(작물·기준·비율 설정은 그대로 있습니다)')) return;
    s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
    s.isFieldComplete = false; s.dragging = null; s.areas = []; s.fieldKind = 'field';
    if (typeof clearSelectedParcelHighlight === 'function') clearSelectedParcelHighlight();
    setSurveyMode('none');
    updateMeasurementSources();
    updateNewMeasureBtn();
    fpReset();                 /* 가·나·각도·계산값도 함께 정리 */
    geoClearHistory();
    showToast(what + '을(를) 취소했습니다.', 2600, 'success');
  }

  /* [v17-3] 포구도구 초기화 — 조사구역·가·나·각도까지 모두 지운다 */
  function fpToolReset() {
    if (!window.confirm('포구도구의 조사구역·가·나·각도를 모두 초기화하시겠습니까?')) return;
    var s = surveyMeasureState;
    s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
    s.isFieldComplete = false; s.dragging = null; s.fieldKind = 'field';
    if (typeof clearSelectedParcelHighlight === 'function') clearSelectedParcelHighlight();
    fp.editingId = null;
    setSurveyMode('none');
    updateMeasurementSources();
    fpReset();
    /* [v21-1] 작물·기준·총이랑수·비율(조사설정)도 함께 비운다 */
    fp.ctx = null; fp.ratio = 1; fp._autoTo2 = false;
    try { localStorage.removeItem(FP_CTX_KEY); } catch (e) {}
    try { localStorage.removeItem(FP_PRELOAD_KEY); } catch (e) {}
    fpMarkRatioButtons();
    fpRenderBanner();
    geoClearHistory();   /* [v19-6] UNDO/REDO 이력까지 비움 */
    showToast('포구도구를 초기화했습니다.\n작물·기준·비율도 함께 비웠습니다.', 3600, 'success');
  }

  /* ---------- 저장 / 조사표 전송 ---------- */
  function fpBuildResult() {
    var s = surveyMeasureState;
    var poly = fpPolygon();
    return {
      app: 'tonghab',
      mode: (fp.ctx && fp.ctx.mode) || '길이',
      crop: (fp.ctx && fp.ctx.crop) || '',
      ratio: fp.ratio,
      L: fpIsRidgeMode() ? Number((fp.ctx && fp.ctx.L) || 0) : Math.round(fp.L_cm),
      aSel: fp.aSel, bSel: fp.bSel,
      heightA: Math.round(fp.heightA), heightB: Math.round(fp.heightB),
      polygon: poly ? poly.geometry.coordinates : null,
      kind: s.fieldKind,
      ga: fp.ga, na: fp.na, angle: fp.angleA, angleA: fp.angleA, angleB: fp.angleB,
      angleSep: fp.angleSep, finished: fp.finished,
      /* [v17-7] 목록에서 열면 보던 화면 그대로 돌아오도록 지도 상태까지 저장 */
      mapCenter: map.getCenter().toArray(), zoom: map.getZoom(),
      bearing: map.getBearing(), pitch: map.getPitch(),
      aEnd: fp.aEnd, bEnd: fp.bEnd, heightACm: Math.round(fp.heightA), heightBCm: Math.round(fp.heightB),
      path: fp.path, aPoLen: Math.round(fp.aPoLen || 0), bPoLen: Math.round(fp.bPoLen || 0),
      aBase: fp.aBase, bBase: fp.bBase, aPo: fp.aPo, bPo: fp.bPo,
      surveyKey: (fp.ctx && fp.ctx.surveyKey) || '',
      /* [v22-1] 조사표 ↔ 지도 저장자료를 잇는 고정 식별자.
         조사표에도 함께 저장되므로, 조사표를 불러오면 이 작업을 다시 찾을 수 있다. */
      linkId: fp.editingId || fp._linkId || (fp._linkId = 'lk' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6)),
      /* [v20-1] 조사표 「필지 주소」에 넣을 값 */
      jibunAddress: fp.jibunAddress || '',
      roadAddress: fp.roadAddress || '',
      /* [v20-2] 조사표가 비어 있을 때 채워 넣을 기준값들 */
      r1: (fp.ctx && fp.ctx.r1) || null,
      r2: (fp.ctx && fp.ctx.r2) || null,
      oneRidge: fpIsOneRidge(),
      /* [v21-1] 조사설정(작물·기준·총이랑수·비율)을 통째로 보관 →
         목록에서 불러오면 그대로 되살아난다 */
      ctx: fp.ctx ? {
        crop: fp.ctx.crop || '',
        mode: fp.ctx.mode || '길이',
        L: (fp.ctx.L === 0 || fp.ctx.L) ? fp.ctx.L : '',
        r1: fp.ctx.r1 || null,
        r2: fp.ctx.r2 || null,
        ratio: fp.ratio,
        surveyKey: fp.ctx.surveyKey || ''
      } : null,
      savedAt: kstNowStr()
    };
  }
  function fpCanSubmit() { return !!(fp.ga && fp.na && fp.aSel > 0 && fp.heightA > 0); }
  /* [v16-6] 저장은 A/B포구 전용 목록(tenar_fieldplot_saves_v1)에 들어간다.
     면적·길이 저장목록(tenar_measure_saves_v1)과 섞이지 않는다. */
  function fpSaveOnly(forceNew) {
    if (!fpCanSubmit()) { showToast('가·나 지점을 먼저 지정해주세요.', 3000, 'info'); return; }
    var rec = fpBuildResult();
    var arr = getFpSaves();
    var prev = (!forceNew && fp.editingId) ? arr.filter(function (x) { return x.id === fp.editingId; })[0] : null;
    rec.id = prev ? prev.id : ('f' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5));
    rec.createdAt = prev ? prev.createdAt : kstNowStr();
    rec.updatedAt = kstNowStr();
    rec.locked = prev ? prev.locked : false;
    rec.name = prev ? prev.name : ((rec.crop || 'A/B포구') + ' ' + kstNowStr().slice(5, 16).replace('T', ' '));
    rec.jibunAddress = prev ? prev.jibunAddress : '';
    if (prev) {
      for (var i = 0; i < arr.length; i++) if (arr[i].id === prev.id) { arr[i] = rec; break; }
    } else arr.unshift(rec);
    if (!setFpSaves(arr)) return;
    fp.editingId = rec.id;
    try { saveJSON(FP_PRELOAD_KEY, rec); } catch (e) {}
    showToast((prev ? 'A/B포구를 덮어썼습니다.' : 'A/B포구 목록에 저장했습니다.') +
              '\n(조사표로는 전송하지 않았습니다)', 3500, 'success');
    if (!rec.jibunAddress && rec.ga) {
      requestVWorldReverse(rec.ga[0], rec.ga[1]).then(function (a) {
        var a2 = getFpSaves();
        for (var k = 0; k < a2.length; k++) if (a2[k].id === rec.id) a2[k].jibunAddress = a.jibunAddress || '';
        setFpSaves(a2);
      }).catch(function () {});
    }
  }
  /* [v17-7] 저장 버튼 — 이미 저장된 것을 열어 놓았으면 새로저장/덮어쓰기를 묻는다 */
  function fpSavePrompt() {
    if (!fpCanSubmit()) { showToast('가·나 지점을 먼저 지정해주세요.', 3000, 'info'); return; }
    var prev = fp.editingId ? getFpSaves().filter(function (x) { return x.id === fp.editingId; })[0] : null;
    if (!prev) { fpSaveOnly(false); return; }
    window._tenarChoice3({
      title: 'A/B포구 저장',
      message: '「' + (prev.name || 'A/B포구') + '」을(를) 열어 둔 상태입니다.\n\n덮어쓸까요, 새로 저장할까요?',
      addLabel: '덮어쓰기', replaceLabel: '새로저장', cancelLabel: '취소'
    }).then(function (c) {
      if (c === 'cancel') return;
      fpSaveOnly(c === 'replace');
    });
  }

  function fpSubmit() {
    if (!fpCanSubmit()) { showToast('가·나 지점을 먼저 지정해주세요.', 3000, 'info'); return; }
    /* [v20-1] 주소를 아직 못 받았으면 최대 2초만 기다렸다 보낸다 */
    if (!fp.jibunAddress && fp.ga) {
      showToast('필지 주소를 확인하는 중입니다…', 0, 'info');
      var done = false;
      var go = function () { if (done) return; done = true; toastEl.style.display = 'none'; fpSubmitNow(); };
      fpLookupAddress(fp.ga[0], fp.ga[1]).then(go);
      setTimeout(go, 2000);
      return;
    }
    fpSubmitNow();
  }
  function fpSubmitNow() {
    var rec = fpBuildResult();
    var unit = fpIsRidgeMode() ? '이랑' : 'cm';
    var msg = '조사표의 가-나·세로총길이 값을 덮어쓰고 전송하시겠습니까?\n\n' +
              '가-나 ' + formatNumber(rec.L, 0) + unit + '\n' +
              'A 가로기점 ' + formatNumber(rec.aSel, 0) + unit + ' · B 가로기점 ' + formatNumber(rec.bSel, 0) + unit + '\n' +
              'A 세로총길이 ' + formatNumber(rec.heightA, 0) + 'cm · B 세로총길이 ' + formatNumber(rec.heightB, 0) + 'cm';
    if (!window.confirm(msg)) return;
    try {
      saveJSON(FP_RESULT_KEY, rec);     /* 계산기가 읽어 반영 */
      saveJSON(FP_PRELOAD_KEY, rec);    /* 다시 열 때 이어서 작업 */
      fpSaveOnly();                     /* [v16-6] 전송은 "전송 + 저장" — A/B포구 목록에도 남긴다 */
    } catch (e) { showToast('전송 저장에 실패했습니다.', 3500); return; }
    /* [v17-8] 지도에서 비율을 1번→2번 등으로 바꿨으면 조사표도 그 비율로 바꾸도록 알린다 */
    rec.ratioChanged = !!(fp.ctx && Number(fp.ctx.ratio) !== Number(fp.ratio));
    rec.keepScroll = true;
    try { saveJSON(FP_RESULT_KEY, rec); } catch (e) {}
    showToast('조사표로 전송했습니다. 계산기로 돌아갑니다.' +
              (rec.ratioChanged ? '\n(비율도 ' + fp.ratio + '번으로 바꿉니다)' : ''), 2800, 'success');
    setTimeout(function () {
      /* 계산기 화면으로 복귀 */
      /* [v18-8] 실측 통합조사표는 항상 같은 폴더의 tonghabbb.html 로 이동한다.
         (referrer 로 되돌아가면 지도 주소로 되돌아가 이동이 안 되는 경우가 있었다) */
      var back = 'tonghabbb.html';
      try {
        back = new URL('tonghabbb.html', location.href).href;
      } catch (e) { back = 'tonghabbb.html'; }
      window.location.href = back;   /* 뒤로가기 차단(pushState) 때문에 history.back() 대신 주소 이동 */
    }, 900);
  }

  /* ===================================================================
     [v18-7] 포구도구 조사 설정 — 작물 · 기준(길이/이랑) · 1번/2번 비율
     · 계산기에서 넘어온 값이 있으면 그 값을 채워 두고, 고치면 그대로 반영된다.
     · 계산기를 거치지 않고 지도에서 바로 시작해 조사표로 보낼 수도 있다.
     · 계산식은 손대지 않는다. 여기서 만든 값도 계산기와 같은 규약으로 넘긴다.
     =================================================================== */
  function openFpSetupSheet() {
    var c = fp.ctx || {};
    var box = el('div');

    var f1 = el('div', 'fld', '<label>작물</label>');
    var inCrop = el('select');
    inCrop.appendChild(new Option('선택 안 함', ''));
    CROPS.forEach(function (x) { inCrop.appendChild(new Option(x.name, x.name)); });
    if (c.crop) inCrop.value = c.crop;
    f1.appendChild(inCrop);

    /* [v19-8] 기준은 작물이 정한다 — 논벼는 길이, 그 밖은 이랑. 직접 못 고친다 */
    var f2 = el('div', 'fld', '<label>기준 (작물에 따라 자동)</label>');
    var inMode = el('select');
    inMode.appendChild(new Option('길이 (cm)', '길이'));
    inMode.appendChild(new Option('이랑 (수)', '이랑'));
    inMode.disabled = true;
    inMode.style.background = '#f2f2f5';
    f2.appendChild(inMode);

    var f3 = el('div', 'fld', '<label id="fpLLabel">가-나 총이랑수</label>');
    var inL = el('input'); inL.type = 'number'; inL.inputMode = 'numeric';
    inL.value = (c.L != null && c.L !== '') ? c.L : '';
    f3.appendChild(inL);

    function syncMode() {
      var isRice = (inCrop.value === '논벼');
      inMode.value = isRice ? '길이' : '이랑';
      var lab = document.getElementById('fpLLabel');
      if (lab) lab.textContent = isRice ? '가-나 가로길이 (지도에서 실측 — 입력 불필요)' : '가-나 총이랑수';
      f3.style.display = isRice ? 'none' : 'block';   /* 논벼는 지도에서 재므로 숨김 */
    }
    inCrop.addEventListener('change', syncMode);

    /* [v19-8] 비율 입력칸 — 「0.」 고정 표시, 두 자리 치면 다음 칸으로, 누르면 전체 선택 */
    var allRatioInputs = [];
    function ratioRow(title, r) {
      var wrap = el('div', 'fld', '<label>' + title + ' (가 / 나 / 다)</label>');
      var row = el('div'); row.style.cssText = 'display:flex;gap:6px;align-items:center;';
      var ins = ['ga', 'na', 'da'].map(function (k) {
        var cell = el('div');
        cell.style.cssText = 'flex:1;min-width:0;display:flex;align-items:center;gap:2px;' +
          'border:1.5px solid #dcdce4;border-radius:9px;padding:0 6px;background:#fff;';
        var pre = el('span', null, '0.');
        pre.style.cssText = 'font-size:16px;font-weight:800;color:#888;flex:0 0 auto;';
        var i = el('input');
        i.type = 'text'; i.inputMode = 'numeric'; i.maxLength = 2;
        i.placeholder = ({ ga: '가', na: '나', da: '다' })[k];
        /* 0.4 → "40", 0.35 → "35" 로 보여준다 (소수 둘째자리까지) */
        var v0 = (r && r[k] != null && r[k] !== '') ? Number(r[k]) : NaN;
        i.value = isFinite(v0) ? String(Math.round(v0 * 100)).padStart(2, '0') : '';
        i.style.cssText = 'flex:1;min-width:0;border:0;outline:none;padding:10px 0;font-size:16px;' +
          'font-family:inherit;font-weight:800;background:transparent;';
        i.dataset.key = k;
        /* 누르면 전체 선택 */
        i.addEventListener('focus', function () { var t = this; setTimeout(function () { try { t.select(); } catch (e) {} }, 0); });
        i.addEventListener('click', function () { try { this.select(); } catch (e) {} });
        /* 숫자만, 두 자리 채우면 다음 칸으로 */
        i.addEventListener('input', function () {
          this.value = this.value.replace(/[^0-9]/g, '').slice(0, 2);
          if (this.value.length === 2) {
            var idx = allRatioInputs.indexOf(this);
            if (idx >= 0 && idx < allRatioInputs.length - 1) {
              var nx = allRatioInputs[idx + 1];
              nx.focus(); try { nx.select(); } catch (e) {}
            } else { this.blur(); }
          }
        });
        cell.appendChild(pre); cell.appendChild(i);
        row.appendChild(cell);
        allRatioInputs.push(i);
        return i;
      });
      wrap.appendChild(row);
      return { wrap: wrap, ins: ins };
    }
    var R1 = ratioRow('1번 비율', c.r1);
    var R2 = ratioRow('2번 비율', c.r2);

    var note = el('div', null,
      '<div class="lyr-desc" style="margin:2px 0 10px;line-height:1.6;">' +
      '가 = 가로기점 비율, 나 = A포구 세로 비율, 다 = B포구 세로 비율<br>' +
      '두 자리만 누르면 됩니다. 예) <b>40</b> → 0.40, <b>35</b> → 0.35<br>' +
      '계산은 통합계산기와 똑같은 식을 그대로 씁니다.</div>');

    /* 값 읽기 : "40" → 0.4 */
    function readRatio(R) {
      function num(i) {
        var t = (i.value || '').replace(/[^0-9]/g, '');
        if (!t) return '';
        return Math.round(parseInt(t.padEnd(2, '0'), 10)) / 100;
      }
      return { ga: num(R.ins[0]), na: num(R.ins[1]), da: num(R.ins[2]) };
    }

    var btnRow = el('div', 'btn-row');
    var bClear = el('button', 'sheet-btn danger', '초기화');           /* [v19-8] */
    bClear.addEventListener('click', function () {
      if (!window.confirm('조사 설정을 모두 비우시겠습니까?')) return;
      inCrop.value = ''; inL.value = '';
      allRatioInputs.forEach(function (i) { i.value = ''; });
      syncMode();
      showToast('조사 설정을 비웠습니다.', 2200, 'info');
    });
    var bOk = el('button', 'sheet-btn primary', '설정 저장');
    bOk.addEventListener('click', function () {
      var r1 = readRatio(R1), r2 = readRatio(R2);
      var next = {
        app: 'tonghab', ts: Date.now(),
        crop: inCrop.value,
        mode: inMode.value,
        L: (inMode.value === '이랑') ? (parseFloat(inL.value) || '') : '',
        r1: r1, r2: r2,
        ratio: fp.ratio,
        surveyKey: (fp.ctx && fp.ctx.surveyKey) || ''
      };
      if (!(parseFloat(r1.ga) > 0) && !(parseFloat(r2.ga) > 0)) {
        showToast('1번 또는 2번 비율의 「가」 값을 넣어주세요.', 4000, 'info'); return;
      }
      if (next.mode === '이랑' && !(parseFloat(next.L) > 0)) {
        showToast('이랑 작물은 「가-나 총이랑수」가 있어야 계산됩니다.', 4200, 'info'); return;
      }
      fp.ctx = next;
      fp._autoTo2 = false;
      try { saveJSON(FP_CTX_KEY, next); } catch (e) {}
      if (!(parseFloat(next['r' + fp.ratio].ga) > 0)) fp.ratio = (fp.ratio === 1) ? 2 : 1;
      var banner = document.getElementById('fpBanner');
      if (banner) banner.style.display = 'flex';
      fpSetRatio(fp.ratio);
      if (fp.ga && fp.na) { fpCompute(); }
      fpRender(); fpSyncButtons();
      closeSheet();
      showToast('조사 설정을 저장했습니다.\n주소창 아래에서 비율을 고를 수 있습니다.', 3800, 'success');
    });
    btnRow.appendChild(bClear); btnRow.appendChild(bOk);

    box.appendChild(f1); box.appendChild(f2); box.appendChild(f3);
    box.appendChild(R1.wrap); box.appendChild(R2.wrap);
    box.appendChild(note); box.appendChild(btnRow);
    openSheet('⓪ 조사 설정 (작물·기준·비율)', box, 90);
    syncMode();
    sheetHasForm = true;
    sheetIsLandInfo = false;
  }

  /* [v17-9] 주소검색창 아래 안내 — 작물 / 기준 / 1번·2번 비율(가·나·다) */
  function fpRenderBanner() {
    var c = fp.ctx || {};
    var t = document.getElementById('fpBannerText');
    if (t && !c.crop && !(c.r1 && c.r1.ga)) {
      t.innerHTML = '⓪ 「작물·기준·비율」을 눌러 설정하세요';
    } else if (t) {
      /* [v19-8] 작물 · 기준 · 이랑수(또는 지도에서 잰 가로길이) */
      var extra = '';
      if (c.mode === '이랑' && c.L) extra = ' &nbsp;·&nbsp; 총이랑수 <b>' + escapeHtml(String(c.L)) + '</b>';
      else if (fp.L_cm > 0) extra = ' &nbsp;·&nbsp; 가로길이 <b>' + formatNumber(Math.round(fp.L_cm), 0) + 'cm</b>';
      t.innerHTML = '작물 <b>' + escapeHtml(c.crop || '—') + '</b> &nbsp;·&nbsp; 기준 <b>' +
                    ((c.mode === '이랑') ? '이랑' : '길이') + '</b>' + extra;
    }
    function vals(r) {
      r = r || {};
      var g = (r.ga != null && r.ga !== '') ? r.ga : '—';
      var n = (r.na != null && r.na !== '') ? r.na : '—';
      var d = (r.da != null && r.da !== '') ? r.da : '—';
      return '가 ' + g + ' / 나 ' + n + ' / 다 ' + d;
    }
    var v1 = document.getElementById('fpR1Vals'), v2 = document.getElementById('fpR2Vals');
    if (v1) v1.textContent = vals(c.r1);
    if (v2) v2.textContent = vals(c.r2);
  }

  /* ---------- 진입 / UI ---------- */
  function fpSyncButtons() {
    function set(id, fn) { var b = document.getElementById(id); if (b) fn(b); }
    /* [v17-6] 완료하면 가·나·각도·필지·재배구역·UNDO·REDO 를 잠근다. 「수정」만 살린다 */
    var lock = fp.finished;
    ['fpGa', 'fpNa', 'fpAngleBtn', 'fpAngleSep', 'fpAngleOrtho',
     'fpTParcel', 'fpTCrop', 'fpTUndo', 'fpTRedo', 'fpTCenter'].forEach(function (id) {
      set(id, function (b) { b.disabled = lock; });
    });
    if (!lock) updateUndoRedoButtons();

    set('fpGa', function (b) { b.classList.toggle('active', fp.picking === 'ga'); b.textContent = fp.ga ? '가 ✓' : '가'; });
    set('fpNa', function (b) { b.classList.toggle('active', fp.picking === 'na'); b.textContent = fp.na ? '나 ✓' : '나'; });
    /* [v19-5] 켜져 있으면 「필지선택 ON」 / 「재배구역 ON」 으로 표시 */
    set('fpTParcel', function (b) {
      var on = (surveyMeasureState.mode === 'parcelPick');
      b.classList.toggle('active', on); b.textContent = on ? '필지선택 ON' : '필지선택';
    });
    set('fpTCrop', function (b) {
      var on = (surveyMeasureState.mode === 'cropBoundary');
      b.classList.toggle('active', on); b.textContent = on ? '재배구역 ON' : '재배구역';
    });
    set('fpTEdit', function (b) { b.classList.toggle('active', surveyMeasureState.mode === 'edit'); b.textContent = (surveyMeasureState.mode === 'edit') ? '수정 ON' : '수정'; });
    set('fpAngleBtn', function (b) { b.classList.toggle('active', fp.angleMode); b.textContent = fp.angleMode ? '각도 ON' : '각도조절'; });
    set('fpAngleSep', function (b) { b.classList.toggle('active', fp.angleSep); b.textContent = fp.angleSep ? '따로 ON' : '각도따로'; });
    set('fpTFinish', function (b) { b.classList.toggle('active', fp.finished); b.textContent = fp.finished ? '완료됨 ↺' : '✓ 완료'; });
    fpUpdateAngleLabel();
    var box = document.getElementById('fpPanel');
    if (box) box.style.display = (fp.ga && fp.na) ? 'block' : 'none';
  }

  /* [v17-1] 포구도구 열기/닫기 — 측정도구와 동시에 열리지 않게 한다 */
  function openFpTool() {
    fpToolPanelEl.classList.add('show');
    document.getElementById('btnFpTool').classList.add('active');
    fp.toolOpen = true;
    toolPanelEl.classList.remove('show');
    document.getElementById('btnMeasure').classList.remove('active');
    /* [v18-7] 계산기를 거치지 않고 열어도 설정을 넣을 수 있게 배너를 띄운다 */
    var b = document.getElementById('fpBanner');
    if (b) { b.style.display = 'flex'; fpRenderBanner(); }
    if (!fp.ctx || !(parseFloat(((fp.ctx.r1 || {}).ga)) > 0 || parseFloat(((fp.ctx.r2 || {}).ga)) > 0)) {
      showToast('먼저 ⓪ 「작물·기준·비율」을 눌러 설정해주세요.', 4200, 'info');
    }
    fpSyncButtons();
    geoPush();
  }
  /* [v18-9] 포구도구에 지울 만한 작업이 있는가 */
  function fpHasWork() {
    var s = surveyMeasureState;
    return !!(fp.ga || fp.na || s.fieldPoints.length || s.areas.length);
  }
  function closeFpTool(clearData) {
    if (clearData) {
      var s = surveyMeasureState;
      s.fieldPoints = []; s.fieldPolygon = null; s.fieldAreaM2 = 0; s.fieldPerimeterM = 0;
      s.isFieldComplete = false; s.dragging = null; s.fieldKind = 'field';
      s.areas = []; s.editingSaveId = null;
      if (typeof clearSelectedParcelHighlight === 'function') clearSelectedParcelHighlight();
      fp.editingId = null;
      fpReset();
      updateMeasurementSources();
      updateNewMeasureBtn();
    }
    fpToolPanelEl.classList.remove('show');
    document.getElementById('btnFpTool').classList.remove('active');
    fp.toolOpen = false;
    fp.picking = null; fp.angleMode = false;
    if (surveyMeasureState.mode !== 'none') setSurveyMode('none');
    fpRender(); fpSyncButtons();
  }

  /* [v17-3] 수정 토글 — 지도 상단에 「핀 수정 모드」를 띄운다 */
  function fpToggleEdit() {
    if (surveyMeasureState.mode === 'edit') { setSurveyMode('none'); }
    else {
      if (!fpHasShape()) { showToast('먼저 필지선택 또는 재배구역을 완료해주세요.', 3500, 'info'); return; }
      startMeasurementEdit();
      showToast('핀 수정 모드입니다.\n꼭짓점을 끌어 옮기면 계산이 바로 다시 됩니다.\n지도 중앙 십자에 「센터추가」도 쓸 수 있습니다.', 5200, 'info');
    }
    fpSyncButtons();
  }

  function fpInit() {
    /* 지도 레이어 (가-나 선 · 세로선) */
    if (!map.getSource('fp-source')) {
      map.addSource('fp-source', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({
        id: 'fp-gana-line', type: 'line', source: 'fp-source',
        filter: ['==', ['get', 't'], 'gana'],
        layout: { 'line-cap': 'round' },
        paint: { 'line-color': '#111827', 'line-width': 3, 'line-dasharray': [2, 1.2] }
      });
      map.addLayer({
        id: 'fp-vert-line', type: 'line', source: 'fp-source',
        filter: ['in', ['get', 't'], ['literal', ['va', 'vb']]],
        layout: { 'line-cap': 'round' },
        paint: {
          'line-color': ['case', ['==', ['get', 't'], 'va'], '#1565C0', '#d0342c'],
          'line-width': 3
        }
      });
    }

    /* 계산기에서 넘어온 값 읽기 */
    var qs = new URLSearchParams(location.search);
    fp.active = (qs.get('fieldplot') === '1');
    try { fp.ctx = JSON.parse(localStorage.getItem(FP_CTX_KEY) || 'null'); } catch (e) { fp.ctx = null; }
    if (fp.ctx && fp.ctx.ratio) fp.ratio = Number(fp.ctx.ratio) || 1;

    if (!fp.active) return;   /* 일반 진입이면 A/B포구 UI 를 띄우지 않음 */

    /* [v15-3] 상단에 비율 배너 표시 */
    var banner = document.getElementById('fpBanner');
    if (banner) { banner.style.display = 'flex'; fpRenderBanner(); }
    /* [v17-2] 계산기에서 들어오면 「포구도구」가 자동으로 열린다 */
    openFpTool();
    fpSetRatio(fp.ratio);
    fpSyncButtons();

    /* [v15-1] 주소(q)가 있으면 그 위치로, 없으면 현재 위치로 */
    var q = qs.get('q');
    /* [v22-2][v22-3] 이전 작업(좌표·회전각)이 있으면 주소로 옮기지 않는다.
       조사표에 짧은 주소가 적혀 있어도 엉뚱한 곳으로 가지 않는다. */
    setTimeout(function () {
      if (fp._skipAddressMove) return;
      if (q) {
        var si = document.getElementById('searchInput');
        if (si) si.value = q;
        searchAddress();
      } else {
        goHere();
      }
    }, 700);
    showToast('포구도구가 열렸습니다.\n① 조사구역(필지선택·재배구역) → ② 가·나 → ③ 각도 → ④ 완료 순서로 진행하세요.', 6500, 'info');

    /* 이전 작업 이어서 열기 */
    try {
      var pre = JSON.parse(localStorage.getItem(FP_PRELOAD_KEY) || 'null');
      if (pre && pre.polygon && pre.polygon[0] && pre.polygon[0].length >= 4) {
        var ring = pre.polygon[0].slice();
        if (ring.length > 1 &&
            Math.abs(ring[0][0] - ring[ring.length - 1][0]) < 1e-12 &&
            Math.abs(ring[0][1] - ring[ring.length - 1][1]) < 1e-12) ring.pop();
        surveyMeasureState.fieldPoints = ring;
        surveyMeasureState.fieldKind = pre.kind || 'field';
        surveyMeasureState.isFieldComplete = true;
        updateFieldGeometry();
        if (pre.ga && pre.na) {
          fp.ga = pre.ga; fp.na = pre.na;
          fp.angleA = Number(pre.angleA != null ? pre.angleA : pre.angle) || 0;
          fp.angleB = Number(pre.angleB != null ? pre.angleB : pre.angle) || 0;
          fp.angleSep = !!pre.angleSep;
          fpCompute(); fpRender();
        }
        fp.jibunAddress = pre.jibunAddress || '';
        fp.roadAddress = pre.roadAddress || '';
        fp.editingId = pre.linkId || fp.editingId;
        fpSyncButtons();
        /* [v22-3] 저장할 때의 회전각·중심·확대·Pitch 그대로 연다.
           (조사표에서 「다시 선정」으로 들어와도 회전을 다시 안 해도 되도록) */
        var hasView = pre.mapCenter && isFinite(pre.mapCenter[0]) && isFinite(pre.mapCenter[1]);
        fp._skipAddressMove = hasView;
        setTimeout(function () {
          try {
            if (hasView) {
              map.jumpTo({
                center: pre.mapCenter,
                zoom: (pre.zoom != null) ? pre.zoom : map.getZoom(),
                bearing: (pre.bearing != null) ? pre.bearing : 0,
                pitch: (pre.pitch != null) ? pre.pitch : 0
              });
            } else {
              var b = new maplibregl.LngLatBounds();
              ring.forEach(function (p) { b.extend(p); });
              map.fitBounds(b, { padding: 90, duration: 600 });
            }
          } catch (e) {}
        }, 600);
        showToast('이전 A/B포구 작업을 불러왔습니다.' +
                  (hasView && pre.bearing ? '\n(저장된 회전각 ' + formatNumber(pre.bearing, 1) + '° 로 열었습니다)' : ''),
                  3600, 'success');
      }
    } catch (e) {}
  }

  /* [v17] 포구도구 · 측정도구 버튼 바인딩 */
  (function () {
    function on(id, fn) { var el = document.getElementById(id); if (el) el.addEventListener('click', fn); }
    on('btnFpTool', function () {
      if (!fpToolPanelEl.classList.contains('show')) { openFpTool(); return; }
      /* [v18-9] 작업 중인 자료가 있으면 측정도구와 똑같은 확인창을 띄운다 */
      if (fpHasWork()) {
        askMeasureClose().then(function (choice) {
          if (choice === 'close') closeFpTool(true);
        });
        return;
      }
      closeFpTool(false);
    });
    /* ① 조사구역 */
    /* [v19-5] 다시 누르면 해제 — 켜짐/꺼짐을 눈으로 알 수 있게 */
    on('fpTParcel', function () {
      if (surveyMeasureState.mode === 'parcelPick') { setSurveyMode('none'); showToast('필지선택을 껐습니다.', 1800, 'info'); }
      else startParcelPick();
      fpSyncButtons();
    });
    on('fpTCrop', function () {
      if (surveyMeasureState.mode === 'cropBoundary') { setSurveyMode('none'); showToast('재배구역을 껐습니다.', 1800, 'info'); }
      else startCropBoundary();
      fpSyncButtons();
    });
    on('fpTUndo', smartUndo);
    on('fpTRedo', geoRedo);
    on('fpTEdit', fpToggleEdit);
    on('fpTCenter', addCenterPoint);
    on('fpTReset', fpToolReset);
    on('fpTCancelArea', fpCancelArea);   /* [v22-4] */
    on('fpTSetup', openFpSetupSheet);   /* [v18-7] */
    /* ② 가 / 나 */
    on('fpGa', function () { fpStartPick('ga'); fpSyncButtons(); });
    on('fpNa', function () { fpStartPick('na'); fpSyncButtons(); });
    /* ③ 각도 */
    on('fpAngleBtn', fpToggleAngleMode);
    on('fpAngleSep', fpToggleAngleSep);
    on('fpAngleOrtho', fpRestoreOrtho);
    /* ④ 완료 */
    on('fpTFinish', function () { if (fp.finished) fpUnfinish(); else fpFinish(); });
    /* ⑤ 저장 / 목록 */
    on('fpSaveBtn', fpSavePrompt);
    on('fpListBtn', openFpListSheet);
    /* ⑥ 조사표 전송 */
    on('fpSendBtn', fpSubmit);
    /* [v17-9] 비율 선택 */
    on('fpR1', function () { fpSetRatio(1); });
    on('fpR2', function () { fpSetRatio(2); });
  })();

  map.on('load', function () {
    console.log('MapLibre 지도 로딩 완료');
    updateBearing();
    map.resize();

    if (!hasApiKey()) {
      showToast('브이월드 API 키를 입력해주세요.', 0);
    } else {
      addVWorldLayers();
      applySettingsToMap();
      console.log('브이월드 레이어 등록 완료');
    }
    initializeSurveyMeasurement();
    updateMeasurementResultPanel();
    console.log('실측 측정 레이어 등록 완료');

    mapLoaded = true;
    restoreWhenBothReady();
    try { fpInit(); } catch (e) { console.error('[v15] fieldplot init 오류:', e); }   /* [v15] */
  });

  /* [v19-4] 면적 라벨은 "화면에서 도형 아래"에 놓이므로 회전하면 다시 계산한다.
     (회전 후에도 선 위로 올라오지 않게) */
  (function () {
    var t = null;
    function redraw() {
      clearTimeout(t);
      t = setTimeout(function () { try { updateAreaLabel(); } catch (e) {} }, 120);
    }
    map.on('rotateend', redraw);
    map.on('pitchend', redraw);
    map.on('zoomend', redraw);
  })();

  function resizeMap() { map.resize(); }
  window.addEventListener('resize', resizeMap);
  window.addEventListener('orientationchange', function () { setTimeout(resizeMap, 300); });
  if (window.visualViewport) window.visualViewport.addEventListener('resize', resizeMap);
  setTimeout(resizeMap, 0);

  map.on('error', function (event) { console.error('지도 오류:', event.error); });

  /* 디버그/연동용 */
  window._map = map;
  window._survey = surveyMeasureState;
  window._tenarMap = {
    getFavs: getFavs, setFavs: setFavs, refreshFavPins: refreshFavPins,
    openFavSheet: openFavSheet, openLayerSheet: openLayerSheet, openHereSheet: openHereSheet,
    openPinSaveSheet: openPinSaveSheet, openSheet: openSheet, closeSheet: closeSheet,
    settings: settings, reverse: requestVWorldReverse, colorHex: colorHex,
    FAV_COLORS: FAV_COLORS, CROPS: CROPS, normalizeFav: normalizeFav,
    setMapType: setMapType, setOverlay: setOverlay, setCadastralOpacity: setCadastralOpacity,
    keys: { FAV_KEY: FAV_KEY, MEAS_KEY: MEAS_KEY, VIEW_KEY: VIEW_KEY, SETTINGS_KEY: SETTINGS_KEY, PENDING_KEY: PENDING_KEY }
  };
})();
</script>
</body>
</html>
