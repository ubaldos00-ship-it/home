<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- ═══════════ TenarCrypto 보안 저장 계층 (보안 테스트) ═══════════
     · 브라우저 캐시(localStorage): 기기키로 자동 암호화/복호화 (비밀번호 불필요)
     · JSON 파일: PBKDF2 비밀번호 기반 암호화 (기본 2026)
     · 지도 표시/핀/확대 로직은 건드리지 않고 저장 전후에만 암복호화가 투명하게 동작 -->
<script>
(function(){
  'use strict';
  if(window.TenarCrypto) return;
  var CRYPTO_OK = !!(window.crypto && window.crypto.subtle && window.TextEncoder);

  function bufToB64(buf){ var b=new Uint8Array(buf),s=''; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
  function b64ToBuf(b64){ var bin=atob(b64),b=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b.buffer; }
  var enc = CRYPTO_OK ? new TextEncoder() : null;
  var dec = CRYPTO_OK ? new TextDecoder() : null;
  function kstNow(){ return new Date(Date.now()+9*3600000).toISOString().replace('Z','+09:00'); }

  var DEVICE_KEY_NAME='__tenar_secure_device_key_v1';
  var _rawGet=localStorage.getItem.bind(localStorage);
  var _rawSet=localStorage.setItem.bind(localStorage);

  function generateDeviceKey(){ return bufToB64(crypto.getRandomValues(new Uint8Array(32)).buffer); }
  var _deviceKeyPromise=null;
  function getDeviceKey(){
    if(_deviceKeyPromise) return _deviceKeyPromise;
    _deviceKeyPromise=(async function(){
      var b64=null; try{ b64=_rawGet(DEVICE_KEY_NAME); }catch(e){}
      if(!b64){ b64=generateDeviceKey(); try{ _rawSet(DEVICE_KEY_NAME,b64); }catch(e){} }
      return crypto.subtle.importKey('raw', b64ToBuf(b64), {name:'AES-GCM'}, false, ['encrypt','decrypt']);
    })();
    return _deviceKeyPromise;
  }

  async function encryptForDeviceCache(plainStr, appName){
    var key=await getDeviceKey();
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, enc.encode(String(plainStr)));
    return { tenarSecure:true, secureType:'device-cache', version:1, app:appName,
             encryptedAt:kstNow(), algorithm:'AES-GCM', iv:bufToB64(iv.buffer), ciphertext:bufToB64(ct) };
  }
  async function decryptFromDeviceCache(obj){
    var key=await getDeviceKey();
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b64ToBuf(obj.iv))}, key, b64ToBuf(obj.ciphertext));
    return dec.decode(pt);
  }
  async function _deriveKey(password, saltBuf, iterations){
    var baseKey=await crypto.subtle.importKey('raw', enc.encode(String(password)), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt:new Uint8Array(saltBuf), iterations:iterations, hash:'SHA-256'},
                                   baseKey, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
  }
  async function encryptForPasswordFile(dataObj, password, appName){
    var salt=crypto.getRandomValues(new Uint8Array(16));
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var iterations=210000;
    var key=await _deriveKey(password, salt.buffer, iterations);
    var ct=await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, enc.encode(JSON.stringify(dataObj)));
    return { tenarSecure:true, secureType:'password-file', version:1, app:appName, encryptedAt:kstNow(),
             algorithm:'AES-GCM', kdf:'PBKDF2', iterations:iterations,
             salt:bufToB64(salt.buffer), iv:bufToB64(iv.buffer), ciphertext:bufToB64(ct) };
  }
  async function decryptFromPasswordFile(obj, password){
    var key=await _deriveKey(password, b64ToBuf(obj.salt), obj.iterations||210000);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(b64ToBuf(obj.iv))}, key, b64ToBuf(obj.ciphertext));
    return JSON.parse(dec.decode(pt));
  }
  function isSecureObject(v){ return !!(v && typeof v==='object' && v.tenarSecure===true); }

  window.TenarCrypto={
    ok:CRYPTO_OK,
    encryptForDeviceCache:encryptForDeviceCache, decryptFromDeviceCache:decryptFromDeviceCache,
    encryptForPasswordFile:encryptForPasswordFile, decryptFromPasswordFile:decryptFromPasswordFile,
    isSecureObject:isSecureObject, generateDeviceKey:generateDeviceKey, getDeviceKey:getDeviceKey,
    arrayBufferToBase64:bufToB64, base64ToArrayBuffer:b64ToBuf
  };

  function _toast(msg, ms){
    try{
      var t=document.createElement('div'); t.textContent=msg;
      t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f5132;color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;z-index:2147483647;box-shadow:0 4px 16px rgba(0,0,0,.35);max-width:90vw;text-align:center;line-height:1.5;';
      (document.body||document.documentElement).appendChild(t);
      setTimeout(function(){ try{ t.remove(); }catch(e){} }, ms||2600);
    }catch(e){}
  }
  window._tenarToast=_toast;

  /* 보안 저장 활성/비활성 상태 */
  window.__tenarSecureActive=null;   // null=미확정, true=암호화 켜짐, false=평문(비활성)
  var _inactiveNotified=false;
  function _notifyInactive(){
    window.__tenarSecureActive=false;
    if(_inactiveNotified) return; _inactiveNotified=true;
    function show(){ _toast('🔓 보안 저장 비활성 — 이 브라우저에서는 자동 암호화가 지원되지 않아 평문으로 저장됩니다.', 5000); }
    if(document.body){ setTimeout(show,900); } else { document.addEventListener('DOMContentLoaded', function(){ setTimeout(show,900); }); }
  }
  window._tenarSecureActive=function(){ return window.__tenarSecureActive===true; };

  window.TenarSecureStore={
    init:function(appName, exactKeys, prefixes){
      if(!CRYPTO_OK){ _notifyInactive(); return; }
      var LS=window.localStorage;
      /* WebKit(iOS 사파리)는 인스턴스 메서드 오버라이드(localStorage.getItem=fn)를 저장쓰기로 처리해
         제대로 동작하지 않음 → Storage.prototype 메서드를 교체하고 this===localStorage 가드로 분기(모든 브라우저 안전) */
      var SP=Object.getPrototypeOf(LS)||window.Storage.prototype;
      var _origGet=SP.getItem, _origSet=SP.setItem, _origRemove=SP.removeItem;
      var _get=function(k){ return _origGet.call(LS,k); };
      var _set=function(k,v){ return _origSet.call(LS,k,v); };
      var _remove=function(k){ return _origRemove.call(LS,k); };
      var exact={}; (exactKeys||[]).forEach(function(k){ exact[k]=true; });
      var pfx=prefixes||[];
      function isManaged(k){
        if(k===DEVICE_KEY_NAME) return false;
        if(exact[k]) return true;
        for(var i=0;i<pfx.length;i++){ if(String(k).indexOf(pfx[i])===0) return true; }
        return false;
      }
      var _plain={}, _dirty={}, _flushScheduled=false, _ready=false;
      var _pendingDecrypt=[], _legacy=[], _decryptFailed=[];

      try{
        for(var i=0;i<LS.length;i++){
          var k=LS.key(i);
          if(!isManaged(k)) continue;
          var raw=_get(k), obj=null;
          try{ obj=JSON.parse(raw); }catch(e){}
          if(obj && obj.tenarSecure===true && obj.secureType==='device-cache'){ _pendingDecrypt.push(k); }
          else { _plain[k]=raw; _legacy.push(k); }
        }
      }catch(e){}

      function scheduleFlush(k){ _dirty[k]=true; if(_flushScheduled) return; _flushScheduled=true; Promise.resolve().then(flushNow); }
      async function flushNow(){
        _flushScheduled=false;
        var keys=Object.keys(_dirty); _dirty={};
        for(var i=0;i<keys.length;i++){
          var k=keys[i];
          if(!(k in _plain)) continue;
          try{
            var secure=await encryptForDeviceCache(_plain[k], appName);
            _set(k, JSON.stringify(secure));
          }catch(e){
            /* 암호화 실패(구형/특수 브라우저)해도 데이터는 반드시 보존 — 평문으로라도 저장(유실 방지) */
            try{ _set(k, _plain[k]); }catch(_e){}
          }
        }
      }

      /* 오버라이드 설치 + 자기검증: 일부 브라우저(iOS Safari·인앱 웹뷰 등)는 localStorage
         메서드 오버라이드를 막거나 일부만 적용해 읽기/쓰기가 어긋날 수 있음 → 저장이 안 되는 것처럼 보임.
         설치 직후 프로브로 검증하고, 실패 시 네이티브로 완전 복구하여 앱을 평문으로 100% 정상 동작시킴. */
      var _installOk=false;
      try{
        SP.getItem=function(k){ if(isManaged(k)) return (k in _plain)? _plain[k] : null; return _origGet.call(this,k); };
        SP.setItem=function(k,v){ if(isManaged(k)){ _plain[k]=String(v); scheduleFlush(k); return; } return _origSet.call(this,k,v); };
        SP.removeItem=function(k){ if(isManaged(k)){ delete _plain[k]; try{ _origRemove.call(this,k); }catch(e){} return; } return _origRemove.call(this,k); };
        var _pk='__tenar_probe__'; exact[_pk]=true;
        window.localStorage.setItem(_pk,'PROBE');
        _installOk=(window.localStorage.getItem(_pk)==='PROBE' && _origGet.call(LS,_pk)!=='PROBE');
        window.localStorage.removeItem(_pk); delete exact[_pk];
        try{ _origRemove.call(LS,_pk); }catch(_e){}
      }catch(e){ _installOk=false; }
      if(!_installOk){
        try{ SP.getItem=_origGet; SP.setItem=_origSet; SP.removeItem=_origRemove; }catch(_e){}
        try{ _origRemove.call(LS,'__tenar_probe__'); }catch(_e){}
        window.__tenarSecureReady=true;
        _notifyInactive();
        return;   /* 보안 저장 비활성 — 앱은 기존 평문 방식으로 정상 동작 */
      }

      getDeviceKey().then(function(){
        return Promise.all(_pendingDecrypt.map(function(k){
          var obj=null; try{ obj=JSON.parse(_get(k)); }catch(e){}
          if(!obj){ _decryptFailed.push(k); return; }
          return decryptFromDeviceCache(obj).then(function(plain){ _plain[k]=plain; }).catch(function(){ _decryptFailed.push(k); });
        }));
      }).then(function(){
        _ready=true;
        _legacy.forEach(function(k){ scheduleFlush(k); });
        if(_legacy.length){
          try{ if(!_rawGet('__tenar_secure_migrated_'+appName)){ _rawSet('__tenar_secure_migrated_'+appName,'1');
            setTimeout(function(){ _toast('기존 저장자료를 보안 저장 방식으로 전환했습니다.'); }, 1200); } }catch(e){}
        }
        if(_decryptFailed.length){
          setTimeout(function(){ _toast('이 기기의 보안키가 없어 일부 저장자료를 복호화할 수 없습니다.\n브라우저 데이터가 삭제되었거나 다른 기기의 캐시일 수 있습니다.\nJSON 백업파일이 있다면 가져오기를 이용해 주세요.', 5500); }, 1400);
        }
        window.__tenarSecureReady=true;
        window.__tenarSecureActive=true;
      }).catch(function(){ _ready=true; window.__tenarSecureReady=true; window.__tenarSecureActive=true; });
    }
  };

  /* JSON 비밀번호 입력 — 내보내기(암호화): 기본값 2026 미리채움 / 가져오기(복호화): 기본값 미리채움 없음
     retryNote=true 이면 "암호 틀림, 다시 입력" 안내를 앞에 붙임(여러 번 재시도 지원) */
  window._tenarAskPassword=function(mode, retryNote){
    var isImport=(mode==='import');
    var base=isImport
      ? 'JSON 파일 가져오기\n\n저장할 때 사용한 암호를 입력하세요.'
      : 'JSON 파일 내보내기\n\n이 파일은 외부로 공유될 수 있어 암호가 필요합니다.\n기본 암호는 2026입니다. 원하시면 다른 암호로 변경할 수 있습니다.\n암호를 잊으면 파일을 복구할 수 없습니다.';
    var head=(retryNote? '❌ 암호가 맞지 않습니다. 다시 입력해 주세요.\n(취소하면 불러오기를 중단합니다)\n\n' : '') + base;
    var def = isImport ? '' : '2026';   /* 복호화(가져오기)는 기본 암호를 미리 넣지 않음 */
    var pw;
    try{ pw=window.prompt(head, def); }
    catch(e){ pw=def; }                  /* 일부 인앱 브라우저는 prompt 미지원 */
    if(pw===null) return null;           /* 사용자 취소 */
    if(pw===undefined) pw=def;
    pw=String(pw);
    if(!isImport && pw.trim()==='') pw='2026';   /* 내보내기만 빈칸→기본 2026 */
    return pw;
  };

  window._tenarBuildExport=function(dataObj, appName){
    if(window.TenarCrypto && TenarCrypto.ok){
      var pw=window._tenarAskPassword('export');
      if(pw===null) return Promise.resolve(null);
      return TenarCrypto.encryptForPasswordFile(dataObj, pw, appName)
        .then(function(secure){ return {text:JSON.stringify(secure,null,2), encrypted:true}; });
    }
    return Promise.resolve({text:JSON.stringify(dataObj,null,2), encrypted:false});
  };
  window._tenarParseImport=function(obj, appName){
    if(window.TenarCrypto && TenarCrypto.isSecureObject(obj) && obj.secureType==='password-file'){
      if(obj.app && obj.app!==appName) return Promise.reject({code:'APP_MISMATCH', app:obj.app});
      if(!(window.TenarCrypto && TenarCrypto.ok)) return Promise.reject({code:'NO_CRYPTO'});
      /* 암호 틀리면 입력창을 다시 띄워 여러 번 재시도 가능 (취소하면 중단) */
      return new Promise(function(resolve, reject){
        var attempt=0;
        function ask(){
          var pw=window._tenarAskPassword('import', attempt>0);
          if(pw===null){ reject({code:'CANCELLED'}); return; }
          TenarCrypto.decryptFromPasswordFile(obj, pw).then(resolve).catch(function(){ attempt++; ask(); });
        }
        ask();
      });
    }
    return Promise.resolve(obj);
  };
  /* 네이티브 원본 저장값 읽기 */
  window._tenarRawGet=function(k){ try{ return _rawGet(k); }catch(e){ return null; } };
  /* 3버튼 선택창 → Promise<'add'|'replace'|'cancel'> */
  window._tenarChoice3=function(opts){
    opts=opts||{};
    return new Promise(function(resolve){
      try{
        var ov=document.createElement('div');
        ov.style.cssText='position:fixed;inset:0;z-index:2147483646;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:22px;';
        var box=document.createElement('div');
        box.style.cssText='background:#fff;border-radius:16px;max-width:340px;width:100%;padding:20px 18px;box-shadow:0 8px 30px rgba(0,0,0,.35);font-family:inherit;text-align:center;';
        var t=document.createElement('div'); t.style.cssText='font-size:16px;font-weight:800;color:#222;margin-bottom:8px;'; t.textContent=opts.title||'불러오기';
        var m=document.createElement('div'); m.style.cssText='font-size:13px;color:#555;line-height:1.55;margin-bottom:16px;white-space:pre-line;'; m.textContent=opts.message||'';
        var row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;';
        function mk(label,bg,val){ var b=document.createElement('button'); b.textContent=label; b.style.cssText='flex:1;border:none;border-radius:11px;padding:12px 4px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;color:#fff;background:'+bg+';-webkit-tap-highlight-color:transparent;'; b.onclick=function(){ try{ov.remove();}catch(e){} resolve(val); }; return b; }
        row.appendChild(mk(opts.addLabel||'추가','#2e7a4e','add'));
        row.appendChild(mk(opts.replaceLabel||'교체','#d97706','replace'));
        row.appendChild(mk(opts.cancelLabel||'취소','#8a8a8a','cancel'));
        box.appendChild(t); box.appendChild(m); box.appendChild(row); ov.appendChild(box);
        ov.addEventListener('click', function(e){ if(e.target===ov){ try{ov.remove();}catch(_){} resolve('cancel'); } });
        (document.body||document.documentElement).appendChild(ov);
      }catch(e){ resolve('cancel'); }
    });
  };
  window._tenarAppKo=function(app){ return app==='tonghab'?'통합계산기':(app==='chungchi'?'청취계산기':(app==='map'?'지도':app)); };
})();
TenarSecureStore.init('map',
  ['tenar_map_favs_v1','tenar_map_bulk','tenar_pending_survey_coord','tenar_meas_ctx','tenar_meas_result','tenar_measure_saves_v1','tenar_map_last_view_v1','tenar_map_settings_v1'],
  ['tonghabSave_','chungchiSave_']);
</script>

<title>텐아르 지도 · MapLibre · VWorld</title>

<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css">

<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
  }
  body { position: fixed; inset: 0; touch-action: none; }
  #map { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* ===== 상단 검색 ===== */
  #topUI {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 10px);
    left: calc(env(safe-area-inset-left, 0px) + 10px);
    right: calc(env(safe-area-inset-right, 0px) + 72px);
    z-index: 15; display: flex; flex-direction: column; gap: 6px; touch-action: auto;
  }
  #searchBar {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.96); border-radius: 12px; padding: 5px 6px 5px 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.25);
  }
  #searchInput {
    flex: 1; min-width: 0; height: 36px; border: 0; outline: none; background: transparent;
    font-size: 16px; color: #222; -webkit-appearance: none;
  }
  #searchInput::placeholder { color: #999; }
  #clearBtn, #searchBtn { flex-shrink: 0; border: 0; border-radius: 8px; font-weight: 700; cursor: pointer; -webkit-appearance: none; }
  #clearBtn { width: 32px; height: 32px; background: #e9e9ee; color: #666; font-size: 16px; line-height: 1; display: none; }
  #searchBtn { min-height: 40px; padding: 0 14px; background: #27500A; color: #fff; font-size: 14px; }
  #searchBtn:active { background: #1b3806; }

  /* 측정 모드 배지 */
  #modeBadge {
    align-self: flex-start; display: none;
    border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 800; color: #fff;
    box-shadow: 0 1px 6px rgba(0,0,0,.25);
  }
  #modeBadge.m-area { background: #1f8a4c; }
  #modeBadge.m-dist { background: #1a5fd0; }
  #modeBadge.m-edit { background: #7c3aed; }

  #hint {
    align-self: flex-start; background: rgba(255,255,255,.8); border-radius: 8px;
    padding: 3px 8px; font-size: 11px; font-weight: 600; color: #444; pointer-events: none;
  }

  /* ===== 원형 버튼 (v5: 레이어=오른쪽 위 / 나머지 5개=오른쪽 아래) ===== */
  #sideBtns {
    position: absolute;
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    top: calc(env(safe-area-inset-top, 0px) + 10px);
    z-index: 14; display: flex; flex-direction: column; gap: 8px; touch-action: auto;
  }
  /* [v5-4] 저장핀·측정·추적·즐겨찾기·현재위치는 오른쪽 최하단으로 이동.
     바텀시트가 올라오면 JS(updateBottomBtnsPos)가 시트 위로 밀어 올린다. */
  #bottomBtns {
    position: absolute;
    right: calc(env(safe-area-inset-right, 0px) + 10px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    z-index: 14; display: flex; flex-direction: column; gap: 8px; touch-action: auto;
    transition: bottom .18s ease;
  }
  .side-btn {
    width: 44px; height: 44px; border-radius: 22px; border: 0;
    background: #fff; color: #27500A;
    font-size: 15px;            /* [v5-1] 이모지 21px → 15px (약 30% 축소) */
    line-height: 1;
    box-shadow: 0 2px 8px rgba(0,0,0,.3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-appearance: none; -webkit-tap-highlight-color: transparent;
  }
  .side-btn.active { background: #27500A; color: #fff; }
  .side-btn:active { transform: scale(.94); }

  /* [v5-3] MapLibre 기본 컨트롤(확대·축소·나침반 정위치)을 왼쪽 최하단(회전각 위)으로 이동 + 축소 */
  .maplibregl-ctrl-bottom-left {
    left: calc(env(safe-area-inset-left, 0px) + 12px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 52px);   /* 회전각 박스 위 */
    margin: 0;
  }
  .maplibregl-ctrl-bottom-left .maplibregl-ctrl-group { margin: 0; }
  .maplibregl-ctrl-group button { width: 30px; height: 30px; }
  .maplibregl-ctrl-group button .maplibregl-ctrl-icon { transform: scale(.8); }
  /* [v5-3] 기본 위치추적 버튼은 오른쪽 🎯/📍 버튼과 중복 → 화면에서만 숨김.
     (컨트롤 자체는 살아 있어야 정확도 원·진행방향 표시가 동작한다.
      다시 보이게 하려면 아래 한 줄을 지우거나 SHOW_NATIVE_GEOLOCATE=true 로 바꾼다) */
  .maplibregl-ctrl-geolocate.tenar-hidden { display: none !important; }
  /* [v6-3] MapLibre·VWorld 저작권 표기가 오른쪽 최하단 버튼(📍)에 가려지던 문제 →
     왼쪽 아래 회전각 박스 바로 오른쪽으로 이동. 오른쪽 버튼열(약 64px)과 겹치지 않도록 폭 제한. */
  .maplibregl-ctrl-bottom-right {
    right: auto;
    left: calc(env(safe-area-inset-left, 0px) + 106px);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
    margin: 0;
    max-width: calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - 190px);
    z-index: 8;
  }
  .maplibregl-ctrl-attrib { font-size: 10px; border-radius: 6px; }
  .maplibregl-ctrl-attrib.maplibregl-compact { min-height: 22px; }

  /* ===== 실측 도구(좌측 패널 · v4b에서 바텀시트로 이전 예정) ===== */
  /* [v5-6] 가로 절반(186→96px) · 헤더 바를 잡고 이동 가능 */
  #toolPanel {
    position: absolute;
    left: calc(env(safe-area-inset-left, 0px) + 10px);
    top: calc(env(safe-area-inset-top, 0px) + 110px);
    z-index: 13; width: 96px; display: none; flex-direction: column;
    max-height: calc(100% - env(safe-area-inset-top,0px) - env(safe-area-inset-bottom,0px) - 190px);
    background: rgba(255,255,255,.96); border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.28); overflow: hidden; touch-action: auto;
  }
  #toolPanel.show { display: flex; }
  #toolHeader {
    display: flex; align-items: center; justify-content: space-between; gap: 2px;
    min-height: 34px; padding: 0 6px; background: #27500A; color: #fff;
    font-size: 11.5px; font-weight: 800; user-select: none; flex-shrink: 0;
    cursor: grab; touch-action: none;   /* 헤더 바 = 이동 손잡이 */
  }
  #toolHeader:active { cursor: grabbing; }
  #toolBody { padding: 6px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #toolBody.collapsed { display: none; }
  #toolBtns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .tool-btn {
    min-height: 34px; padding: 3px 1px; border: 1.5px solid #d8d8e0; border-radius: 7px;
    background: #fff; color: #333; font-size: 10.5px; font-weight: 700; line-height: 1.2;
    cursor: pointer; -webkit-appearance: none;
  }
  /* [v5-7] 결과(면적·둘레) 접기/펴기 — 기본 닫힘 */
  #resultToggle {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px; padding: 5px 6px; border-radius: 7px; background: #eef1ec;
    font-size: 10.5px; font-weight: 800; color: #27500A; cursor: pointer; user-select: none;
  }
  #resultBox.collapsed { display: none; }
  .tool-btn.active { background: #27500A; border-color: #27500A; color: #fff; }
  .tool-btn.wide { grid-column: 1 / -1; }
  .tool-btn.danger { border-color: #e8b4b4; color: #b32020; }
  #resultBox { margin-top: 5px; padding: 6px; border-radius: 7px; background: #f5f6f4; font-size: 10.5px; line-height: 1.5; color: #333; }
  #resultBox .res-title { font-size: 9.5px; font-weight: 800; color: #27500A; }
  #resultBox .res-main { font-size: 12.5px; font-weight: 800; color: #1b1b1b; margin: 1px 0 3px; }
  #resultBox .res-sub { color: #555; }
  #resultBox .res-empty { color: #888; }
  #resultBox hr { border: 0; border-top: 1px solid #e0e0e0; margin: 7px 0; }

  /* 중앙 십자선 */
  #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 9; display: none; pointer-events: none; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(20,20,20,.75); box-shadow: 0 0 0 1px rgba(255,255,255,.85); }
  #crosshair::before { left: -14px; top: -.5px; width: 28px; height: 1.5px; }
  #crosshair::after { top: -14px; left: -.5px; height: 28px; width: 1.5px; }

  #bearingBox {
    position: absolute; left: calc(env(safe-area-inset-left,0px) + 12px);
    bottom: calc(env(safe-area-inset-bottom,0px) + 12px); z-index: 10;
    background: rgba(255,255,255,.85); border-radius: 10px; padding: 7px 11px;
    font-size: 13px; font-weight: 700; color: #222; box-shadow: 0 2px 8px rgba(0,0,0,.2); pointer-events: none;
  }

  #toast {
    position: absolute; left: 50%; bottom: calc(env(safe-area-inset-bottom,0px) + 60px);
    transform: translateX(-50%); z-index: 2147483000; max-width: 86vw;
    background: rgba(200,30,30,.92); color: #fff; border-radius: 10px; padding: 10px 14px;
    font-size: 13px; line-height: 1.45; box-shadow: 0 3px 12px rgba(0,0,0,.3);
    display: none; white-space: pre-line;
  }
  #toast.toast-error { background: rgba(200,30,30,.92); }
  #toast.toast-success { background: rgba(25,130,65,.93); }
  #toast.toast-info { background: rgba(45,90,175,.92); }

  /* [v5-8] 핀 방향 수정 —— 기존에는 마커 요소에 transform:rotate(-45deg)를 걸었는데
     MapLibre Marker가 같은 요소의 transform(위치이동)을 직접 덮어써서 회전이 사라지고
     핀이 왼쪽으로 틀어져 보였다. → CSS 회전을 버리고 SVG 물방울 모양으로 교체.
     SVG 꼭짓점이 viewBox 하단 중앙에 있으므로 anchor:'bottom'이면 좌표에 정확히 꽂힌다. */
  .pin { position: relative; width: 24px; height: 30px; cursor: pointer; }
  .pin svg { display: block; }
  .pin .pin-emoji {
    position: absolute; left: 0; right: 0; top: 4px;
    text-align: center; font-size: 10px; line-height: 1; pointer-events: none;
  }
  .seg-label {
    padding: 2px 6px; border-radius: 6px; background: rgba(20,70,160,.92); color: #fff;
    font-size: 11px; font-weight: 800; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.35); pointer-events: none;
  }
  /* [v6-4] 길게 누르기 Quick Action 메뉴 */
  #quickMenu {
    position: absolute; z-index: 30; display: none;
    background: rgba(255,255,255,.97); border-radius: 14px;
    box-shadow: 0 6px 22px rgba(0,0,0,.35);
    padding: 6px; touch-action: auto;
  }
  #quickMenu.show { display: flex; gap: 4px; }
  .qa-btn {
    width: 54px; min-height: 54px; border: 0; border-radius: 10px; background: #fff;
    color: #27500A; font-size: 11px; font-weight: 800; line-height: 1.25;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    cursor: pointer; -webkit-appearance: none; -webkit-tap-highlight-color: transparent; font-family: inherit;
  }
  .qa-btn:active { background: #eef1ec; }
  .qa-btn .qa-ico { font-size: 16px; line-height: 1; }
  /* 길게 누른 지점 표시 */
  #pressDot {
    position: absolute; z-index: 29; display: none;
    width: 18px; height: 18px; margin: -9px 0 0 -9px; border-radius: 9px;
    background: rgba(39,80,10,.25); border: 2px solid #27500A; pointer-events: none;
  }

  /* [v6-5] 측정 꼭짓점 번호 라벨 */
  .vtx-num {
    padding: 0 3px; min-width: 13px; height: 13px; border-radius: 7px;
    background: rgba(255,255,255,.95); color: #222;
    font-size: 9px; font-weight: 800; line-height: 13px; text-align: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.4); pointer-events: none;
  }
  /* [v6-6] 전체거리 라벨 — 구간 라벨보다 크고 굵게 */
  .total-label {
    padding: 3px 8px; border-radius: 7px; background: #0b3d91; color: #fff;
    font-size: 12.5px; font-weight: 900; white-space: nowrap;
    box-shadow: 0 2px 7px rgba(0,0,0,.45); pointer-events: none;
    border: 1.5px solid #fff;
  }
  /* [v6-6] 3구간 이후 구간 라벨은 다른 색 */
  .seg-label.seg-late { background: rgba(124,58,237,.92); }

  /* [v5-7] 면적 중앙 라벨 (㎡ / 평 두 줄) */
  .area-label {
    padding: 3px 7px; border-radius: 7px; background: rgba(20,97,47,.92); color: #fff;
    font-size: 11px; font-weight: 800; line-height: 1.35; text-align: center; white-space: nowrap;
    box-shadow: 0 1px 5px rgba(0,0,0,.4); pointer-events: none;
  }
  /* 지적도 지번(본번-부번) 라벨 */
  .cad-label {
    padding: 1px 4px; border-radius: 4px; background: rgba(255,255,255,.82); color: #a11;
    font-size: 10px; font-weight: 800; white-space: nowrap; pointer-events: none;
    text-shadow: 0 0 2px #fff;
  }
  .maplibregl-popup-content { font-size: 12.5px; line-height: 1.6; padding: 10px 12px; border-radius: 8px; max-width: 240px; }

  /* ===== 공통 바텀시트 ===== */
  #sheetOverlay {
    position: fixed; inset: 0; z-index: 900; background: rgba(0,0,0,.42);
    display: none; touch-action: none;
  }
  #sheetOverlay.show { display: block; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 901;
    height: 58%; max-height: 92%;
    background: #fff; border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.3);
    display: none; flex-direction: column; touch-action: auto;
    transition: height .18s ease, transform .22s ease;
    transform: translateY(100%);
  }
  #sheet.show { display: flex; transform: translateY(0); }
  /* [v6-1] 드래그 손잡이 영역을 헤더 전체(약 56px)로 확대 — 가로바·제목·빈공간 모두 잡힘 */
  #sheetGrip { padding: 10px 0 5px; cursor: grab; flex-shrink: 0; touch-action: none; }
  #sheetGrip .bar { width: 52px; height: 6px; border-radius: 3px; background: #c8c8d2; margin: 0 auto; }
  #sheetHead {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 16px 12px; border-bottom: 1px solid #eee; flex-shrink: 0;
    cursor: grab; touch-action: none;   /* 제목줄도 드래그 손잡이 */
    user-select: none;
  }
  #sheetGrip:active, #sheetHead:active { cursor: grabbing; }
  #sheetTitle { font-size: 15.5px; font-weight: 800; color: #1b1b1b; }
  #sheetClose {
    width: 32px; height: 32px; border: 0; border-radius: 16px; background: #f0f0f4;
    color: #555; font-size: 15px; cursor: pointer; -webkit-appearance: none;
  }
  #sheetBody {
    padding: 12px 16px calc(env(safe-area-inset-bottom, 0px) + 16px);
    overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1;
  }

  .sheet-btn {
    min-height: 42px; padding: 8px 12px; border: 1.5px solid #dcdce4; border-radius: 10px;
    background: #fff; color: #333; font-size: 13.5px; font-weight: 700; cursor: pointer;
    -webkit-appearance: none; font-family: inherit;
  }
  .sheet-btn.primary { background: #27500A; border-color: #27500A; color: #fff; }
  .sheet-btn.danger { border-color: #e8b4b4; color: #b32020; }
  .sheet-btn.active { background: #27500A; border-color: #27500A; color: #fff; }
  .btn-row { display: flex; gap: 7px; margin-bottom: 8px; }
  .btn-row .sheet-btn { flex: 1; }

  .addr-main { font-size: 19px; font-weight: 800; color: #14612f; line-height: 1.4; word-break: keep-all; }
  .addr-label { font-size: 11px; font-weight: 800; color: #888; margin-top: 10px; }
  .addr-value { font-size: 14px; color: #333; }
  .copy-btn {
    border: 1.5px solid #cfd8cf; border-radius: 8px; background: #f3f7f3; color: #27500A;
    font-size: 12px; font-weight: 800; padding: 6px 10px; min-height: 34px; cursor: pointer; -webkit-appearance: none;
  }

  .fav-card {
    border: 1px solid #e6e6ec; border-radius: 12px; padding: 10px; margin-bottom: 8px;
    display: flex; gap: 9px; align-items: flex-start; background: #fff;
  }
  .fav-num {
    width: 28px; height: 28px; border-radius: 14px; flex-shrink: 0; color: #fff;
    font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center;
  }
  .fav-body { flex: 1; min-width: 0; cursor: pointer; }
  .fav-name { font-size: 14px; font-weight: 800; color: #1b1b1b; margin-bottom: 2px; }
  .fav-addr { font-size: 12px; color: #555; line-height: 1.45; word-break: keep-all; }
  .fav-coord { font-size: 11px; color: #999; margin-top: 2px; }
  .fav-acts { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .icon-btn {
    width: 34px; height: 34px; border: 1px solid #e0e0e6; border-radius: 8px; background: #fff;
    font-size: 14px; cursor: pointer; -webkit-appearance: none; line-height: 1;
  }
  .icon-btn.locked { background: #eaf1ff; border-color: #b9cdf5; }

  .color-row { display: flex; gap: 8px; margin: 6px 0 4px; }
  .color-dot {
    width: 40px; height: 40px; border-radius: 20px; border: 3px solid #fff;
    box-shadow: 0 0 0 1.5px #ddd; cursor: pointer;
  }
  .color-dot.sel { box-shadow: 0 0 0 3px #27500A; transform: scale(1.06); }

  .fld { margin-bottom: 10px; }
  .fld label { display: block; font-size: 11px; font-weight: 800; color: #888; margin-bottom: 4px; }
  .fld input, .fld select, .fld textarea {
    width: 100%; box-sizing: border-box; border: 1.5px solid #dcdce4; border-radius: 9px;
    padding: 10px; font-size: 16px; font-family: inherit; color: #222; background: #fff; -webkit-appearance: none;
  }
  .fld textarea { min-height: 62px; resize: vertical; }

  .lyr-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 2px; border-bottom: 1px solid #f0f0f4;
  }
  .lyr-name { font-size: 14px; font-weight: 700; color: #333; }
  .lyr-desc { font-size: 11px; color: #999; margin-top: 1px; }
  .switch { width: 50px; height: 30px; border-radius: 15px; background: #d8d8e0; position: relative; cursor: pointer; flex-shrink: 0; transition: background .15s; }
  .switch.on { background: #27500A; }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 24px; height: 24px; border-radius: 12px; background: #fff; transition: left .15s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .switch.on .knob { left: 23px; }
  .sec-title { font-size: 11.5px; font-weight: 800; color: #27500A; margin: 14px 0 4px; }
  input[type=range] { width: 100%; }
</style>
</head>

<body>
  <div id="topUI">
    <div id="searchBar">
      <input id="searchInput" type="search" inputmode="text" autocomplete="off"
             autocorrect="off" autocapitalize="off" spellcheck="false"
             enterkeyhint="search" placeholder="주소 또는 지번을 입력하세요">
      <button id="clearBtn" type="button" aria-label="입력 지우기">✕</button>
      <button id="searchBtn" type="button">검색</button>
    </div>
    <div id="modeBadge"></div>
    <div id="hint">두 손가락 회전 · 확대 가능</div>
  </div>

  <!-- [v5-2/4] 레이어만 오른쪽 위 (이모지 최신 🗺️) -->
  <div id="sideBtns">
    <button class="side-btn" id="btnLayer" type="button" title="레이어">🗺️</button>
  </div>

  <!-- [v5-4] 나머지 5개는 오른쪽 최하단 (바텀시트가 열리면 시트 위로 이동) -->
  <div id="bottomBtns">

  <div id="toolPanel">

    <button class="qa-btn" type="button" data-qa="measure"><span class="qa-ico">📐</span>측정</button>

  <div id="sheetOverlay"></div>

    <div id="sheetGrip"><div class="bar"></div></div>
    <div id="sheetHead">

<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
<script>
(function () {
  'use strict';

  /* ===================================================================
     브이월드 API 키 · 허용 도메인
     -------------------------------------------------------------------
     · 키는 아래 한 곳에만 입력합니다(타일·주소검색·역지오코딩·WMS 공통).
     · 브이월드 개발자센터(https://www.vworld.kr/dev/v4api.do)에서 키 발급 시
       「WMTS/TMS API」「Geocoder API」「WMS/WFS API」를 모두 체크해야 합니다.
     · VWORLD_DOMAIN 은 데이터 API(지적도·토지이용·경계) 요청에 함께 보냅니다.
       ★ 반드시 "호스트만" 적습니다. 'https://' 같은 스킴을 붙이면 브라우저에서
         INCORRECT_KEY 로 거부됩니다(실측 확인). 인코딩도 하지 않습니다.
           O  ubaldos00-ship-it.github.io
           X  https://ubaldos00-ship-it.github.io
     · 키 신청서의 「사용 도메인」에 아래 주소를 등록하세요.
         https://ubaldos00-ship-it.github.io
     · 키는 HTML에 노출되므로 반드시 허용 도메인을 위 주소로 제한하세요.
       제한해 두면 타인이 키를 복사해도 다른 사이트에서는 쓸 수 없습니다.
     =================================================================== */
  var VWORLD_API_KEY = '00EB5BC0-22B4-3B7E-89D1-341699F7CE05';
  var VWORLD_DOMAIN  = 'ubaldos00-ship-it.github.io';   /* 호스트만 · 스킴 금지 */

  var VWORLD_TILE_BASE = 'https://api.vworld.kr/req/wmts/1.0.0/';
  var VWORLD_MAX_DATA_ZOOM = 19;

  /* 저장 키 (TenarSecureStore 관리 대상) */
  var FAV_KEY      = 'tenar_map_favs_v1';
  var MEAS_KEY     = 'tenar_measure_saves_v1';
  var VIEW_KEY     = 'tenar_map_last_view_v1';
  var SETTINGS_KEY = 'tenar_map_settings_v1';
  var PENDING_KEY  = 'tenar_pending_survey_coord';

  /* 핀 색상 — 저장은 기존 map.html과 동일한 key('red'…'purple')로 하여 호환 유지 */
  var FAV_COLORS = [
    { key: 'red',    hex: '#EF4444', ko: '빨강' },
    { key: 'orange', hex: '#F97316', ko: '주황' },
    { key: 'yellow', hex: '#FBBF24', ko: '노랑' },
    { key: 'green',  hex: '#22C55E', ko: '초록' },
    { key: 'blue',   hex: '#2563EB', ko: '파랑' },
    { key: 'purple', hex: '#8B5CF6', ko: '보라' }
  ];
  function colorHex(key) {
    for (var i = 0; i < FAV_COLORS.length; i++) if (FAV_COLORS[i].key === key) return FAV_COLORS[i].hex;
    return FAV_COLORS[3].hex;
  }

  var CROPS = [
    { name: '논벼', icon: '🌾' }, { name: '마늘', icon: '🧄' }, { name: '양파', icon: '🧅' },
    { name: '감자', icon: '🥔' }, { name: '배추', icon: '🥬' }, { name: '무', icon: '🥕' },
    { name: '총각무', icon: '🥕' }, { name: '콩', icon: '🫘' }, { name: '밀', icon: '🌾' },
    { name: '겉보리', icon: '🌾' }, { name: '쌀보리', icon: '🌾' }, { name: '호밀', icon: '🌾' },
    { name: '기타', icon: '🌱' }, { name: '미지정', icon: '📍' }
  ];
  function cropIconOf(name) {
    for (var i = 0; i < CROPS.length; i++) if (CROPS[i].name === name) return CROPS[i].icon;
    return '📍';
  }

  function tileUrl(layer, ext) {
    return VWORLD_TILE_BASE + VWORLD_API_KEY + '/' + layer + '/{z}/{y}/{x}.' + ext;
  }
  /* ※ 지적도·경계 레이어를 WMS(api.vworld.kr/req/wms)로 붙이지 않은 이유 —— 실측 확인 결과:
       · WMTS 타일 응답에는 'Access-Control-Allow-Origin: *' 가 있으나
         WMS 응답에는 CORS 헤더가 전혀 없다.
       · MapLibre는 raster 타일을 fetch로 받으므로 WMS는 'AJAXError: Failed to fetch (0)' 로 전부 실패한다.
       · 따라서 지적도/토지이용/경계는 CORS 대신 JSONP를 지원하는
         「데이터 API(api.vworld.kr/req/data)」로 GeoJSON을 받아 벡터로 그린다.
         이 방식은 지번(본번·부번) 속성까지 받을 수 있어 라벨 표시에도 유리하다. */
  function hasApiKey() {
    return !!VWORLD_API_KEY && VWORLD_API_KEY.indexOf('여기에') === -1;
  }

  /* ================= 토스트 (기존 호출 방식 호환) ================= */
  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function setToastType(type) {
    toastEl.className = '';
    if (type === 'success') toastEl.classList.add('toast-success');
    else if (type === 'info') toastEl.classList.add('toast-info');
    else toastEl.classList.add('toast-error');
  }
  function showToast(msg, ms, type) {
    setToastType(type);
    toastEl.textContent = msg;
    toastEl.style.display = 'block';
    if (toastTimer) clearTimeout(toastTimer);
    if (ms !== 0) toastTimer = setTimeout(function () { toastEl.style.display = 'none'; }, ms || 5000);
  }
  window._tenarToastHook = showToast;

  if (typeof maplibregl === 'undefined') {
    console.error('MapLibre GL JS 로딩 실패');
    showToast('지도 라이브러리를 불러오지 못했습니다.\n네트워크 상태를 확인해주세요.', 0);
    return;
  }
  var hasTurf = (typeof turf !== 'undefined');
  if (!hasTurf) {
    console.error('Turf.js 로딩 실패');
    showToast('측정 라이브러리를 불러오지 못했습니다.\n인터넷 연결을 확인해주세요.', 0);
  }

  window.addEventListener('error', function (e) { console.error('전역 오류:', e.message, e.filename, e.lineno); });
  window.addEventListener('unhandledrejection', function (e) { console.error('처리되지 않은 Promise 오류:', e.reason); });

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function uid() { return 'f' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function kstNowStr() { return new Date(Date.now() + 9 * 3600000).toISOString().replace('Z', '+09:00'); }

  /* ================= 지도 상태 저장/복원 ================= */
  function loadJSON(key, dflt) {
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : dflt; } catch (e) { return dflt; }
  }
  function saveJSON(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { console.warn('저장 실패', key, e); }
  }

  /* ===================================================================
     ★ TenarSecureStore 준비 대기 (중요)
     -------------------------------------------------------------------
     보안 저장 계층은 기기키로 복호화를 마친 뒤에야 localStorage.getItem이
     실제 값을 돌려준다(비동기). 준비 전에 읽으면 즐겨찾기가 "빈 값"으로
     보이고, 그 상태에서 저장하면 기존 데이터를 지워버린다.
     → 준비 완료(window.__tenarSecureReady) 전에는 읽기·쓰기를 하지 않는다.
     =================================================================== */
  var secureReady = false;
  /* 복원이 끝나기 전에는 절대 저장하지 않는다.
     (복원 전에 moveend/설정변경이 먼저 저장되면 저장해 둔 상태를 기본값으로 덮어써 버린다 — 실측 확인) */
  var restored = false;
  function whenSecureReady(cb) {
    if (window.__tenarSecureReady) { cb(); return; }
    var tries = 0;
    var t = setInterval(function () {
      tries++;
      if (window.__tenarSecureReady || tries > 150) {   /* 최대 6초 안전장치 */
        clearInterval(t);
        cb();
      }
    }, 40);
  }

  var DEFAULT_SETTINGS = {
    baseType: 'base',
    overlays: { hybrid: false, cadastral: false, uq111: false, adsido: false, adsigg: false, ademd: false, adri: false },
    cadastralOpacity: 0.65,
    showFavPins: true,
    cropFilter: ''
  };
  var lastView = null;
  var settings = JSON.parse(JSON.stringify(DEFAULT_SETTINGS));

  /* ================= 지도 생성 ================= */
  var map;
  try {
    map = new maplibregl.Map({
      container: 'map',
      style: { version: 8, sources: {}, layers: [] },
      center: [128.75, 35.84],   /* 저장된 시점은 보안저장 준비 후 restoreView()에서 복원 */
      zoom: 12,
      bearing: 0,
      pitch: 0,
      maxZoom: 20,
      attributionControl: true,
      preserveDrawingBuffer: true   /* v4b 이미지 저장 대비 */
    });
  } catch (err) {
    console.error('지도 생성 오류:', err);
    showToast('지도를 초기화하지 못했습니다.', 0);
    return;
  }

  /* 아이폰 두 손가락 회전 — 절대 제거하지 말 것 */
  map.touchZoomRotate.enable({ around: 'center' });
  map.touchZoomRotate.enableRotation();
  map.dragRotate.enable();
  map.touchPitch.enable();

  /* [v5-3] 확대·축소·나침반(각도 정위치)은 왼쪽 최하단(회전각 위)으로 이동 */
  map.addControl(new maplibregl.NavigationControl({ showCompass: true, showZoom: true, visualizePitch: true }), 'bottom-left');

  var geolocateControl = new maplibregl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true, timeout: 10000 },
    trackUserLocation: true,
    showUserHeading: true,
    showAccuracyCircle: true
  });
  /* [v5-3] 기본 위치추적 버튼은 오른쪽 🎯·📍 버튼과 중복이라 화면에서 숨긴다.
     컨트롤 자체는 지도에 붙여 두어야 정확도 원·진행방향 표시가 계속 동작한다.
     ★ 다시 보이게 하려면 아래 값을 true 로만 바꾸면 된다. */
  var SHOW_NATIVE_GEOLOCATE = false;
  map.addControl(geolocateControl, 'bottom-left');
  if (!SHOW_NATIVE_GEOLOCATE) {
    setTimeout(function () {
      var b = document.querySelector('.maplibregl-ctrl-geolocate');
      if (b) {
        b.classList.add('tenar-hidden');
        var grp = b.parentNode;   /* 버튼만 있는 빈 그룹 상자도 함께 숨김 */
        if (grp && grp.children.length === 1) grp.style.display = 'none';
      }
    }, 0);
  }

  geolocateControl.on('error', function (e) {
    console.error('위치 오류:', e);
    var msg = '현재 위치를 확인할 수 없습니다.';
    if (e && e.code === 1) msg = '현재 위치 권한이 없습니다.\n아이폰 설정에서 Safari 위치 권한을 허용해주세요.';
    else if (e && e.code === 2) msg = '위치 정보를 사용할 수 없습니다.\n실외에서 다시 시도해주세요.';
    else if (e && e.code === 3) msg = '위치 확인 시간이 초과되었습니다.\n다시 시도해주세요.';
    showToast(msg, 6000);
    setTrackBtn(false);
  });
  geolocateControl.on('trackuserlocationstart', function () { setTrackBtn(true); });
  geolocateControl.on('trackuserlocationend', function () { setTrackBtn(false); });

  if (!('geolocation' in navigator)) console.warn('이 브라우저는 위치 기능을 지원하지 않습니다.');
  else if (window.isSecureContext === false) showToast('HTTPS가 아니면 현재 위치 기능이 동작하지 않습니다.', 6000);

  var bearingValue = document.getElementById('bearingValue');
  function updateBearing() { bearingValue.textContent = map.getBearing().toFixed(1); }
  map.on('rotate', updateBearing);
  map.on('rotatestart', updateBearing);
  map.on('rotateend', updateBearing);
  map.on('move', updateBearing);

  /* 지도 상태 저장 */
  var viewSaveTimer = null;
  map.on('moveend', function () {
    if (!secureReady || !restored) return;   /* 준비·복원 전 저장 금지 */
    if (viewSaveTimer) clearTimeout(viewSaveTimer);
    viewSaveTimer = setTimeout(function () {
      saveJSON(VIEW_KEY, {
        center: map.getCenter().toArray(),
        zoom: map.getZoom(),
        bearing: map.getBearing(),
        pitch: map.getPitch(),
        savedAt: kstNowStr()
      });
    }, 500);
  });
  function saveSettings() { if (secureReady && restored) saveJSON(SETTINGS_KEY, settings); }

  /* ================= 베이스·중첩 레이어 ================= */
  /* 레이어 순서: 일반/항공 → 하이브리드 → 경계/토지이용 → 지적도 → 측정도형 → 라벨/핀(DOM) */
  /* 하이브리드만 WMTS 래스터, 나머지는 데이터 API(JSONP) 벡터 */
  var OVERLAY_DEFS = [
    { id: 'hybrid',    ko: '하이브리드',    desc: '지명·도로 겹치기 (WMTS)',        kind: 'wmts', layer: 'Hybrid', ext: 'png' },
    { id: 'cadastral', ko: '지적도',        desc: '연속지적 · 지번 표시 (확대 16↑)', kind: 'data', data: 'LP_PA_CBND_BUBUN', color: '#d92c2c', width: 1.4, minzoom: 16, labels: true },
    { id: 'uq111',     ko: '토지이용',      desc: '용도지역 · LT_C_UQ111 (확대 13↑)', kind: 'data', data: 'LT_C_UQ111', color: '#7c3aed', width: 1.2, minzoom: 13 },
    { id: 'adri',      ko: '리 경계',       desc: 'LT_C_ADRI_INFO (확대 12↑)',      kind: 'data', data: 'LT_C_ADRI_INFO', color: '#065f46', width: 1.6, minzoom: 12 },
    { id: 'ademd',     ko: '읍면동 경계',   desc: 'LT_C_ADEMD_INFO (확대 10↑)',     kind: 'data', data: 'LT_C_ADEMD_INFO', color: '#0f766e', width: 1.8, minzoom: 10 },
    { id: 'adsigg',    ko: '시군구 경계',   desc: 'LT_C_ADSIGG_INFO (확대 8↑)',     kind: 'data', data: 'LT_C_ADSIGG_INFO', color: '#b45309', width: 2, minzoom: 8 },
    { id: 'adsido',    ko: '행정경계(시도)', desc: 'LT_C_ADSIDO_INFO (확대 6↑)',     kind: 'data', data: 'LT_C_ADSIDO_INFO', color: '#334155', width: 2.2, minzoom: 6 }
  ];
  /* ※ 건물(LT_C_SPBD)·도로(LT_L_SPRD)는 이번 버전 목록에서 제외했습니다.
       필요하면 위 배열에 kind:'data'로 한 줄 추가하면 그대로 동작합니다. */

  function defOf(id) { for (var i = 0; i < OVERLAY_DEFS.length; i++) if (OVERLAY_DEFS[i].id === id) return OVERLAY_DEFS[i]; return null; }
  function emptyFC0() { return { type: 'FeatureCollection', features: [] }; }

  function addVWorldLayers() {
    if (map.getSource('vworld-base-source')) return;

    map.addSource('vworld-base-source', {
      type: 'raster', tiles: [tileUrl('Base', 'png')], tileSize: 256,
      minzoom: 0, maxzoom: VWORLD_MAX_DATA_ZOOM,
      attribution: '© <a href="https://www.vworld.kr" target="_blank" rel="noopener">VWorld</a>'
    });
    map.addLayer({ id: 'vworld-base-layer', type: 'raster', source: 'vworld-base-source', layout: { visibility: 'visible' } });

    map.addSource('vworld-satellite-source', {
      type: 'raster', tiles: [tileUrl('Satellite', 'jpeg')], tileSize: 256,
      minzoom: 0, maxzoom: VWORLD_MAX_DATA_ZOOM,
      attribution: '© <a href="https://www.vworld.kr" target="_blank" rel="noopener">VWorld</a>'
    });
    map.addLayer({ id: 'vworld-satellite-layer', type: 'raster', source: 'vworld-satellite-source', layout: { visibility: 'none' } });

    OVERLAY_DEFS.forEach(function (d) {
      var srcId = 'ov-' + d.id + '-source';
      if (d.kind === 'wmts') {
        map.addSource(srcId, { type: 'raster', tiles: [tileUrl(d.layer, d.ext)], tileSize: 256, minzoom: 0, maxzoom: VWORLD_MAX_DATA_ZOOM });
        map.addLayer({ id: 'ov-' + d.id + '-layer', type: 'raster', source: srcId, layout: { visibility: 'none' } });
      } else {
        map.addSource(srcId, { type: 'geojson', data: emptyFC0() });
        /* 지적도는 탭하면 지번을 보여주기 위해 투명 채움을 함께 둔다 */
        if (d.id === 'cadastral') {
          map.addLayer({
            id: 'ov-cadastral-fill', type: 'fill', source: srcId,
            layout: { visibility: 'none' },
            paint: { 'fill-color': '#d92c2c', 'fill-opacity': 0.05 }
          });
        }
        map.addLayer({
          id: 'ov-' + d.id + '-layer', type: 'line', source: srcId,
          layout: { visibility: 'none', 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': d.color,
            'line-width': d.width,
            'line-opacity': (d.id === 'cadastral') ? settings.cadastralOpacity : 0.9
          }
        });
      }
    });
  }

  function setMapType(type) {
    if (!map.getLayer('vworld-base-layer')) return;
    var isSat = (type === 'satellite');
    map.setLayoutProperty('vworld-base-layer', 'visibility', isSat ? 'none' : 'visible');
    map.setLayoutProperty('vworld-satellite-layer', 'visibility', isSat ? 'visible' : 'none');
    settings.baseType = isSat ? 'satellite' : 'base';
    saveSettings();
  }

  /* ---- 데이터 API(JSONP)로 GeoJSON 받아오기 ---- */
  var dataFetchSeq = 0;
  function fetchVWorldData(def) {
    var b = map.getBounds();
    var box = 'BOX(' + b.getWest().toFixed(6) + ',' + b.getSouth().toFixed(6) + ',' +
                       b.getEast().toFixed(6) + ',' + b.getNorth().toFixed(6) + ')';
    var cb = '__vwData' + (++dataFetchSeq);
    var url = 'https://api.vworld.kr/req/data?service=data&request=GetFeature&version=2.0' +
      '&data=' + def.data + '&key=' + encodeURIComponent(VWORLD_API_KEY) +
      '&domain=' + VWORLD_DOMAIN +          /* 인코딩하지 않음 (스킴 없는 호스트) */
      '&geomFilter=' + encodeURIComponent(box) +
      '&crs=EPSG:4326&format=json&size=1000&geometry=true&attribute=true&callback=' + cb;
    return vworldJsonp(url, cb).then(function (d) {
      var r = d && d.response;
      if (!r) return emptyFC0();
      if (r.status === 'NOT_FOUND') return emptyFC0();   /* 이 범위에 자료 없음 */
      if (r.status !== 'OK') {
        console.warn('데이터 API 오류(' + def.data + '):', r.status, r.error || '');
        return emptyFC0();
      }
      return (r.result && r.result.featureCollection) || emptyFC0();
    });
  }

  var cadLabelMarkers = [];
  function clearCadLabels() { cadLabelMarkers.forEach(function (m) { m.remove(); }); cadLabelMarkers = []; }
  var CAD_LABEL_MAX = 150;   /* 라벨은 성능을 위해 개수 제한 */

  function renderCadLabels(fc) {
    clearCadLabels();
    if (!hasTurf) return;
    if (map.getZoom() < 17) return;   /* 너무 축소하면 라벨이 뒤엉키므로 생략 */
    var n = Math.min(fc.features.length, CAD_LABEL_MAX);
    for (var i = 0; i < n; i++) {
      var f = fc.features[i];
      var p = f.properties || {};
      var txt = (p.bonbun || '') + (p.bubun && p.bubun !== '0' ? '-' + p.bubun : '');
      if (!txt) continue;
      var c = null;
      try { c = turf.centerOfMass(f).geometry.coordinates; } catch (e) { continue; }
      var el2 = document.createElement('div');
      el2.className = 'cad-label';
      el2.textContent = txt;
      cadLabelMarkers.push(new maplibregl.Marker({ element: el2 }).setLngLat(c).addTo(map));
    }
  }

  var dataReloadTimer = null;
  var dataLoading = {};
  function reloadDataOverlays(force) {
    OVERLAY_DEFS.forEach(function (d) {
      if (d.kind !== 'data') return;
      var srcId = 'ov-' + d.id + '-source';
      var src = map.getSource(srcId);
      if (!src) return;
      if (!settings.overlays[d.id]) { src.setData(emptyFC0()); if (d.labels) clearCadLabels(); return; }
      if (map.getZoom() < d.minzoom) {
        src.setData(emptyFC0());
        if (d.labels) clearCadLabels();
        return;
      }
      if (dataLoading[d.id] && !force) return;
      dataLoading[d.id] = true;
      fetchVWorldData(d).then(function (fc) {
        dataLoading[d.id] = false;
        if (!settings.overlays[d.id]) return;
        src.setData(fc);
        if (d.labels) renderCadLabels(fc);
      }).catch(function (e) {
        dataLoading[d.id] = false;
        console.warn('데이터 로딩 실패(' + d.data + ')', e);
      });
    });
  }
  map.on('moveend', function () {
    if (dataReloadTimer) clearTimeout(dataReloadTimer);
    dataReloadTimer = setTimeout(function () { reloadDataOverlays(false); }, 450);
  });

  function setOverlay(id, on) {
    var d = defOf(id);
    if (!d) return;
    var lyrId = 'ov-' + id + '-layer';
    if (!map.getLayer(lyrId)) return;
    map.setLayoutProperty(lyrId, 'visibility', on ? 'visible' : 'none');
    if (id === 'cadastral' && map.getLayer('ov-cadastral-fill')) {
      map.setLayoutProperty('ov-cadastral-fill', 'visibility', on ? 'visible' : 'none');
    }
    settings.overlays[id] = !!on;
    saveSettings();
    if (d.kind === 'data') {
      if (on && map.getZoom() < d.minzoom) {
        showToast(d.ko + '는 확대 ' + d.minzoom + ' 이상에서 표시됩니다.\n지도를 더 확대해주세요.', 3500, 'info');
      }
      reloadDataOverlays(true);
    }
  }
  function setCadastralOpacity(v) {
    settings.cadastralOpacity = v;
    if (map.getLayer('ov-cadastral-layer')) map.setPaintProperty('ov-cadastral-layer', 'line-opacity', v);
    if (map.getLayer('ov-cadastral-fill')) map.setPaintProperty('ov-cadastral-fill', 'fill-opacity', v * 0.08);
    saveSettings();
  }
  function applySettingsToMap() {
    setMapType(settings.baseType);
    OVERLAY_DEFS.forEach(function (d) {
      var lyrId = 'ov-' + d.id + '-layer';
      if (!map.getLayer(lyrId)) return;
      var on = !!settings.overlays[d.id];
      map.setLayoutProperty(lyrId, 'visibility', on ? 'visible' : 'none');
      if (d.id === 'cadastral' && map.getLayer('ov-cadastral-fill')) {
        map.setLayoutProperty('ov-cadastral-fill', 'visibility', on ? 'visible' : 'none');
      }
    });
    setCadastralOpacity(settings.cadastralOpacity);
    reloadDataOverlays(true);
  }

  /* ================= 공통 바텀시트 ================= */
  var sheetEl = document.getElementById('sheet');
  var sheetOverlay = document.getElementById('sheetOverlay');
  var sheetBody = document.getElementById('sheetBody');
  var sheetTitle = document.getElementById('sheetTitle');
  var SNAPS = [30, 50, 90];   /* [v6-1] 3단계 스냅 */
  var sheetSnap = 50;
  var sheetOpen = false;

  /* [v5-4] 바텀시트가 올라오면 오른쪽 아래 버튼들을 시트 위로 밀어 올린다 */
  var bottomBtnsEl = document.getElementById('bottomBtns');
  function updateBottomBtnsPos() {
    if (sheetOpen) {
      var h = sheetEl.getBoundingClientRect().height;
      bottomBtnsEl.style.bottom = (h + 12) + 'px';
    } else {
      bottomBtnsEl.style.bottom = '';   /* CSS 기본값(safe-area + 12px)으로 복귀 */
    }
  }

  /* 높이 애니메이션이 끝나는 시점에도 버튼 위치를 다시 맞춘다(타이머 의존 제거) */
  sheetEl.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'height' || e.propertyName === 'transform') updateBottomBtnsPos();
  });

  function openSheet(title, node, snap) {
    sheetTitle.textContent = title;
    sheetBody.innerHTML = '';
    if (typeof node === 'string') sheetBody.innerHTML = node;
    else sheetBody.appendChild(node);
    sheetSnap = snap || 50;
    sheetEl.style.height = sheetSnap + '%';
    sheetOverlay.classList.add('show');
    sheetEl.classList.add('show');
    sheetOpen = true;
    requestAnimationFrame(updateBottomBtnsPos);
  }
  function closeSheet() {
    sheetEl.classList.remove('show');
    sheetOverlay.classList.remove('show');
    sheetOpen = false;
    updateBottomBtnsPos();
    clearTempMarker();   /* [v6-4] 주소 조회용 임시핀은 시트를 닫으면 사라진다(저장 아님) */
  }
  document.getElementById('sheetClose').addEventListener('click', closeSheet);
  sheetOverlay.addEventListener('click', closeSheet);

  /* [v6-1] 시트 높이 조절 —— 30% / 50% / 90% 스냅 · 아래로 충분히 내리면 닫힘
     · 손잡이: 가로바 + 제목줄(헤더 전체)  → 잡기 쉬움
     · 잡아서 끌기(드래그)뿐 아니라 위/아래 스와이프(빠르게 튕기기)도 지원
     · 닫기 버튼(✕)은 드래그로 먹히지 않도록 예외 처리 */
  (function () {
    var grip = document.getElementById('sheetGrip');
    var head = document.getElementById('sheetHead');
    var closeBtn = document.getElementById('sheetClose');
    var startY = 0, startH = 0, startT = 0, lastY = 0, lastT = 0, dragging = false, startIdx = 1;

    function y(e) { return e.touches ? e.touches[0].clientY : e.clientY; }
    function nearestIdx(pct) {
      var idx = 0, bd = 1e9;
      SNAPS.forEach(function (s, i) { var d = Math.abs(s - pct); if (d < bd) { bd = d; idx = i; } });
      return idx;
    }
    function down(e) {
      if (e.target === closeBtn || closeBtn.contains(e.target)) return;   /* ✕는 그대로 클릭 */
      dragging = true;
      startY = lastY = y(e);
      startT = lastT = Date.now();
      startH = sheetEl.getBoundingClientRect().height;
      startIdx = nearestIdx(startH / window.innerHeight * 100);   /* 스와이프는 '시작 단계' 기준 한 칸 이동 */
      sheetEl.style.transition = 'none';
    }
    function move(e) {
      if (!dragging) return;
      var cy = y(e);
      var h = Math.max(60, startH - (cy - startY));
      sheetEl.style.height = Math.min(h, window.innerHeight * 0.9) + 'px';
      updateBottomBtnsPos();          /* 시트를 끌면 버튼도 같이 따라 움직임 */
      lastY = cy; lastT = Date.now();
      if (e.cancelable) e.preventDefault();
    }
    function up() {
      if (!dragging) return;
      dragging = false;
      sheetEl.style.transition = '';

      var pct = sheetEl.getBoundingClientRect().height / window.innerHeight * 100;
      if (pct < 18) { closeSheet(); sheetEl.style.height = sheetSnap + '%'; return; }   /* 많이 내리면 닫기 */

      /* 스와이프 속도(px/ms): 아래로 빠르게 = 양수, 위로 빠르게 = 음수 */
      var v = (lastY - startY) / Math.max(1, Date.now() - startT);
      var FLICK = 0.5;   /* 이 속도 이상이면 스와이프(플릭)로 간주 */
      var idx;

      if (v < -FLICK) {
        idx = Math.min(startIdx + 1, SNAPS.length - 1);   /* 위로 스와이프 → 시작 단계에서 한 칸 확장 */
      } else if (v > FLICK) {                             /* 아래로 스와이프 → 한 칸 축소, 최하단이면 닫기 */
        if (startIdx === 0) { closeSheet(); sheetEl.style.height = SNAPS[0] + '%'; sheetSnap = SNAPS[0]; return; }
        idx = startIdx - 1;
      } else {
        idx = nearestIdx(pct);                            /* 천천히 끌었으면 가장 가까운 단계로 */
      }

      sheetSnap = SNAPS[idx];
      sheetEl.style.height = sheetSnap + '%';
      setTimeout(updateBottomBtnsPos, 190);   /* 스냅 애니메이션 후 위치 재계산 */
    }

    [grip, head].forEach(function (el2) {
      el2.addEventListener('touchstart', down, { passive: true });
      el2.addEventListener('touchmove', move, { passive: false });
      el2.addEventListener('touchend', up);
      el2.addEventListener('mousedown', down);
    });
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  })();

  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  /* ================= 검색 마커 ================= */
  /* [v5-8] SVG 물방울 핀 — 꼭짓점이 viewBox 하단 중앙(12,29.4)에 있어
     anchor:'bottom' 이면 좌표에 정확히 수직으로 꽂힌다. */
  function makePinElement(hex, emoji) {
    var e = document.createElement('div');
    e.className = 'pin';
    e.innerHTML =
      '<svg width="24" height="30" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M12 29.4C12 29.4 21.6 17.6 21.6 11.1A9.6 9.6 0 1 0 2.4 11.1C2.4 17.6 12 29.4 12 29.4Z" ' +
      'fill="' + hex + '" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>' +
      '</svg>' +
      (emoji ? '<span class="pin-emoji">' + emoji + '</span>' : '');
    return e;
  }

  var searchMarker = null;
  function clearSearchMarker() { if (searchMarker) { searchMarker.remove(); searchMarker = null; } }
  function showSearchMarker(result) {
    clearSearchMarker();
    var e = makePinElement('#e5342a', '');
    var rows = '<div><b>검색어</b><br>' + escapeHtml(result.query) + '</div>';
    if (result.parcel) rows += '<div style="margin-top:5px;"><b>지번주소</b><br>' + escapeHtml(result.parcel) + '</div>';
    if (result.road) rows += '<div style="margin-top:5px;"><b>도로명주소</b><br>' + escapeHtml(result.road) + '</div>';
    rows += '<div style="margin-top:5px;color:#555;">경도 ' + result.lng.toFixed(6) + '<br>위도 ' + result.lat.toFixed(6) + '</div>';
    searchMarker = new maplibregl.Marker({ element: e, anchor: 'bottom' })
      .setLngLat([result.lng, result.lat])
      .setPopup(new maplibregl.Popup({ offset: 18 }).setHTML(rows))
      .addTo(map);
  }

  /* ================= 브이월드 지오코더 (JSONP) ================= */
  var jsonpSeq = 0;
  function vworldJsonp(url, cbName) {
    return new Promise(function (resolve, reject) {
      var script = document.createElement('script');
      var timer = null;
      function cleanup() {
        if (timer) clearTimeout(timer);
        try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      window[cbName] = function (data) { cleanup(); resolve(data); };
      script.onerror = function () { cleanup(); reject(new Error('network')); };
      timer = setTimeout(function () { cleanup(); reject(new Error('timeout')); }, 10000);
      script.src = url;
      document.head.appendChild(script);
    });
  }
  function requestVWorldGeocode(query, type) {
    var cb = '__vwGeo' + (++jsonpSeq);
    var url = 'https://api.vworld.kr/req/address?service=address&request=getCoord&version=2.0' +
      '&crs=EPSG:4326&type=' + type + '&address=' + encodeURIComponent(query) +
      '&format=json&errorformat=json&refine=true&simple=false&callback=' + cb +
      '&key=' + encodeURIComponent(VWORLD_API_KEY);
    return vworldJsonp(url, cb);
  }
  /* 역지오코딩: 좌표 → 지번/도로명/우편번호 */
  function requestVWorldReverse(lng, lat) {
    var cb = '__vwRev' + (++jsonpSeq);
    var url = 'https://api.vworld.kr/req/address?service=address&request=GetAddress&version=2.0' +
      '&crs=EPSG:4326&point=' + lng + ',' + lat + '&type=BOTH&zipcode=true&simple=false' +
      '&format=json&errorformat=json&callback=' + cb +
      '&key=' + encodeURIComponent(VWORLD_API_KEY);
    return vworldJsonp(url, cb).then(function (data) {
      var out = { jibunAddress: '', roadAddress: '', postalCode: '' };
      if (!data || !data.response || data.response.status !== 'OK') return out;
      var list = data.response.result || [];
      list.forEach(function (r) {
        var t = String(r.type || '').toLowerCase();
        if (t === 'parcel' && !out.jibunAddress) out.jibunAddress = r.text || '';
        if (t === 'road' && !out.roadAddress) out.roadAddress = r.text || '';
        if (!out.postalCode && r.zipcode) out.postalCode = r.zipcode;
      });
      return out;
    });
  }
  function parseGeocode(data, type) {
    if (!data || !data.response || data.response.status !== 'OK') return null;
    var res = data.response.result;
    if (!res || !res.point) return null;
    var lng = parseFloat(res.point.x), lat = parseFloat(res.point.y);
    if (!isFinite(lng) || !isFinite(lat)) return null;
    var text = (data.response.refined || {}).text || '';
    return { lng: lng, lat: lat, parcel: type === 'PARCEL' ? text : '', road: type === 'ROAD' ? text : '' };
  }
  function isKeyError(data) {
    if (!data || !data.response) return false;
    var err = data.response.error;
    if (data.response.status !== 'ERROR' || !err) return false;
    return /KEY|key|DOMAIN|domain|INVALID|권한|인증/.test((err.text || '') + ' ' + (err.code || ''));
  }

  /* ================= 주소·지번 검색 ================= */
  var searchInput = document.getElementById('searchInput');
  var clearBtn = document.getElementById('clearBtn');
  var searching = false;

  function searchAddress() {
    var query = searchInput.value.trim();
    if (!query) { showToast('주소 또는 지번을 입력해주세요.', 3000, 'info'); return; }
    if (!hasApiKey()) { showToast('브이월드 API 키를 입력해주세요.', 0); return; }
    if (searching) return;
    searching = true;
    showToast('주소를 검색하고 있습니다.', 0, 'info');

    requestVWorldGeocode(query, 'PARCEL')
      .then(function (data) {
        var hit = parseGeocode(data, 'PARCEL');
        if (hit) return hit;
        if (isKeyError(data)) throw new Error('apikey');
        return requestVWorldGeocode(query, 'ROAD').then(function (d2) {
          if (isKeyError(d2)) throw new Error('apikey');
          return parseGeocode(d2, 'ROAD');
        });
      })
      .then(function (hit) {
        searching = false;
        if (!hit) { showToast('검색 결과를 찾을 수 없습니다.\n주소 또는 지번을 다시 확인해주세요.', 5000); return; }
        hit.query = query;
        map.flyTo({ center: [hit.lng, hit.lat], zoom: 18, essential: true }); /* 회전각 유지 */
        showSearchMarker(hit);
        showToast('검색 위치로 이동했습니다.', 3000, 'success');
      })
      .catch(function (err) {
        searching = false;
        console.error('주소 검색 오류:', err);
        if (err && err.message === 'apikey') showToast('브이월드 API 키 또는 등록 도메인을 확인해주세요.', 6000);
        else showToast('검색 서버에 연결할 수 없습니다.\n인터넷 연결을 확인해주세요.', 6000);
      });
  }

  /* ===================================================================
     즐겨찾기(저장핀)
     -------------------------------------------------------------------
     · 기존 map.html 형식 { label, lat, lng, addr, color:'green', locked,
       manualPos, surveyKey, surveyApp, crop } 을 그대로 보존하면서
       요청받은 신규 필드(id/name/jibunAddress/latitude/…)를 함께 저장한다
       (superset). 이렇게 해야 기존 지도와 새 지도가 같은 데이터를 함께 읽는다.
     =================================================================== */
  function normalizeFav(r) {
    r = r || {};
    var lat = isFinite(r.latitude) ? Number(r.latitude) : Number(r.lat);
    var lng = isFinite(r.longitude) ? Number(r.longitude) : Number(r.lng);
    var jibun = r.jibunAddress || r.addr || '';
    var name = r.name || r.label || jibun || '저장 위치';
    var colorKey = r.color || 'green';
    if (/^#/.test(colorKey)) { /* 혹시 HEX로 저장된 값이 있으면 key로 되돌림 */
      var f = FAV_COLORS.filter(function (c) { return c.hex.toLowerCase() === String(colorKey).toLowerCase(); })[0];
      colorKey = f ? f.key : 'green';
    }
    return {
      /* 신규 구조 */
      id: r.id || uid(),
      name: name,
      jibunAddress: jibun,
      roadAddress: r.roadAddress || '',
      postalCode: r.postalCode || '',
      latitude: lat, longitude: lng,
      color: colorKey,
      crop: r.crop || '',
      cropIcon: r.cropIcon || cropIconOf(r.crop || ''),
      memo: r.memo || '',
      locked: !!r.locked,
      surveyType: r.surveyType || r.surveyApp || '',
      surveyId: r.surveyId || r.surveyKey || '',
      linkedRecordId: r.linkedRecordId || '',
      createdAt: r.createdAt || kstNowStr(),
      updatedAt: r.updatedAt || r.createdAt || kstNowStr(),
      /* 기존 map.html 호환 필드 (삭제 금지) */
      label: name.slice(0, 40),
      lat: lat, lng: lng, addr: jibun,
      manualPos: !!r.manualPos,
      surveyKey: r.surveyId || r.surveyKey || '',
      surveyApp: r.surveyType || r.surveyApp || ''
    };
  }
  function getFavs() {
    var arr = loadJSON(FAV_KEY, []);
    if (!Array.isArray(arr)) arr = [];
    return arr.map(normalizeFav).filter(function (r) { return isFinite(r.latitude) && isFinite(r.longitude); });
  }

  function copyText(txt) {
    function ok() { showToast('주소가 복사되었습니다.', 2500, 'success'); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(ok).catch(function () { legacyCopy(txt, ok); });
    } else legacyCopy(txt, ok);
  }
  function legacyCopy(txt, ok) {
    try {
      var ta = document.createElement('textarea');
      ta.value = txt; ta.style.cssText = 'position:fixed;top:-1000px;';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); ok();
    } catch (e) { showToast('복사에 실패했습니다.', 3000); }
  }
  function copyAddr(kind) {
    var i = currentLoc; if (!i) return;
    var t = i.jibunAddress || '';
    if (kind === 'road') t = i.roadAddress || i.jibunAddress || '';
    else if (kind === 'coord') t = i.lat.toFixed(6) + ', ' + i.lng.toFixed(6);
    else if (kind === 'all') {
      t = [i.jibunAddress, i.roadAddress, i.postalCode ? '우편번호 ' + i.postalCode : '',
           '위도 ' + i.lat.toFixed(6), '경도 ' + i.lng.toFixed(6)].filter(Boolean).join('\n');
    }
    if (!t) { showToast('복사할 주소가 없습니다.', 2500, 'info'); return; }
    copyText(t);
  }

  function goHere() {
    if (!navigator.geolocation) { showToast('이 브라우저는 위치 기능을 지원하지 않습니다.', 4000); return; }
    showToast('현재 위치를 확인하고 있습니다.', 0, 'info');
    navigator.geolocation.getCurrentPosition(function (pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      geolocateControl.trigger();  /* 정확도 원·진행방향 표시 */
      map.flyTo({ center: [lng, lat], zoom: 18, essential: true });
      requestVWorldReverse(lng, lat).then(function (a) {
        showToast('현재 위치를 확인했습니다.', 2000, 'success');
        openHereSheet({ lat: lat, lng: lng, jibunAddress: a.jibunAddress, roadAddress: a.roadAddress, postalCode: a.postalCode });
      }).catch(function () {
        openHereSheet({ lat: lat, lng: lng, jibunAddress: '', roadAddress: '', postalCode: '' });
      });
    }, function (err) {
      var msg = '현재 위치를 확인할 수 없습니다.';
      if (err && err.code === 1) msg = '현재 위치 권한이 없습니다.\n아이폰 설정에서 Safari 위치 권한을 허용해주세요.';
      else if (err && err.code === 3) msg = '위치 확인 시간이 초과되었습니다.\n다시 시도해주세요.';
      showToast(msg, 6000);
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
  }

      list.appendChild(el('div', null, '<div style="color:#888;font-size:13px;padding:18px 2px;">저장된 즐겨찾기 위치가 없습니다.</div>'));

  function favFitBounds() {
    var favs = getFavs();
    if (!favs.length) { showToast('저장된 즐겨찾기 위치가 없습니다.', 3000, 'info'); return; }
    closeSheet();
    if (favs.length === 1) {
      map.flyTo({ center: [favs[0].longitude, favs[0].latitude], zoom: 18, essential: true });
      return;
    }
    var b = new maplibregl.LngLatBounds();
    favs.forEach(function (f) { b.extend([f.longitude, f.latitude]); });
    map.fitBounds(b, { padding: 70, maxZoom: 17, duration: 700 });
  }

  function favShare() {
    var favs = getFavs();
    if (!favs.length) { showToast('저장된 즐겨찾기 위치가 없습니다.', 3000, 'info'); return; }
    window._tenarBuildExport({ app: 'map', type: 'favorites', savedAt: kstNowStr(), favorites: favs }, 'map')
      .then(function (out) {
        if (!out) return;
        var file = new File([out.text], 'tenar_map_favs_' + Date.now() + '.json', { type: 'application/json' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          return navigator.share({ files: [file], title: '텐아르 즐겨찾기' });
        }
        if (navigator.share) return navigator.share({ title: '텐아르 즐겨찾기', text: out.text });
        copyText(out.text);
      })
      .catch(function (e) { console.error('공유 실패', e); });
  }
  function favExport() {
    var favs = getFavs();
    if (!favs.length) { showToast('저장된 즐겨찾기 위치가 없습니다.', 3000, 'info'); return; }
    window._tenarBuildExport({ app: 'map', type: 'favorites', savedAt: kstNowStr(), favorites: favs }, 'map')
      .then(function (out) {
        if (!out) return;
        var blob = new Blob([out.text], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'tenar_map_favs_' + Date.now() + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 3000);
        showToast('내보내기 파일을 저장했습니다.' + (out.encrypted ? '\n(암호화됨)' : ''), 3500, 'success');
      });
  }
  function favImport() {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.addEventListener('change', function () {
      var file = inp.files && inp.files[0];
      if (!file) return;
      var rd = new FileReader();
      rd.onload = function () {
        var obj = null;
        try { obj = JSON.parse(rd.result); } catch (e) { showToast('JSON 파일을 읽을 수 없습니다.', 4000); return; }
        window._tenarParseImport(obj, 'map').then(function (data) {
          var incoming = (data && data.favorites) || (Array.isArray(data) ? data : null);
          if (!incoming || !incoming.length) { showToast('불러올 즐겨찾기가 없습니다.', 4000); return; }
          return window._tenarChoice3({
            title: '즐겨찾기 불러오기',
            message: '불러올 위치 ' + incoming.length + '개\n\n기존 목록에 추가하거나 교체할 수 있습니다.',
            addLabel: '추가', replaceLabel: '교체', cancelLabel: '취소'
          }).then(function (choice) {
            if (choice === 'cancel') return;
            var cur = getFavs();
            var next = (choice === 'replace') ? incoming.map(normalizeFav)
                                              : incoming.map(normalizeFav).concat(cur);
            setFavs(next);
            renderFavList();
            showToast('즐겨찾기 ' + incoming.length + '개를 불러왔습니다.', 3000, 'success');
          });
        }).catch(function (e) {
          if (e && e.code === 'CANCELLED') return;
          if (e && e.code === 'APP_MISMATCH') { showToast('다른 앱(' + window._tenarAppKo(e.app) + ')의 파일입니다.', 4500); return; }
          showToast('파일을 불러오지 못했습니다.', 4000);
        });
      };
      rd.readAsText(file);
    });
    inp.click();
  }
  function favDeleteAll() {
    if (!window.confirm('잠금되지 않은 즐겨찾기 위치를 모두 삭제하시겠습니까?\n잠금된 위치는 유지됩니다.')) return;
    var kept = getFavs().filter(function (f) { return f.locked; });
    setFavs(kept);

  /* ================= 실시간 위치추적 ================= */
  var tracking = false;
  var trackNoticeShown = false;
  function setTrackBtn(on) {
