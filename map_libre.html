  var bearingValue = document.getElementById('bearingValue');
  var zoomLevelEl = document.getElementById('zoomLevel');
  function updateBearing() {
    bearingValue.textContent = map.getBearing().toFixed(1);
    if (zoomLevelEl) zoomLevelEl.textContent = '레벨 ' + map.getZoom().toFixed(1);   /* [v12-2] */
  }
  map.on('rotate', updateBearing);
  map.on('rotatestart', updateBearing);
  map.on('rotateend', updateBearing);
  map.on('move', updateBearing);

  /* 지도 상태 저장 */
  var viewSaveTimer = null;
  map.on('moveend', function () {
    if (!secureReady || !restored) return;   /* 준비·복원 전 저장 금지 */
    if (viewSaveTimer) clearTimeout(viewSaveTimer);
    viewSaveTimer = setTimeout(function () {
      saveJSON(VIEW_KEY, {
        center: map.getCenter().toArray(),
        zoom: map.getZoom(),
        bearing: map.getBearing(),
        pitch: map.getPitch(),
        savedAt: kstNowStr()
      });
    }, 500);
  });
  function saveSettings() { if (secureReady && restored) saveJSON(SETTINGS_KEY, settings); }

  /* ================= 베이스·중첩 레이어 ================= */
  /* 레이어 순서: 일반/항공 → 하이브리드 → 경계/토지이용 → 지적도 → 측정도형 → 라벨/핀(DOM) */
  /* 하이브리드만 WMTS 래스터, 나머지는 데이터 API(JSONP) 벡터 */
  var OVERLAY_DEFS = [
    { id: 'hybrid',    ko: '하이브리드',    desc: '지명·도로 겹치기 (WMTS)',        kind: 'wmts', layer: 'Hybrid', ext: 'png' },
    /* [v9] 토지이용계획을 지적도보다 먼저(아래) 그려 지적경계·지번을 가리지 않게 한다 */
    { id: 'landuse',   ko: '토지이용계획',  desc: '용도지역 색상 표시 (확대 13↑)',    kind: 'data', data: 'LT_C_UQ111', color: '#7c3aed', width: 0.8, minzoom: 13, fillByUse: true },
    { id: 'cadastral', ko: '지적도',        desc: '연속지적 · 지번 표시 (확대 16↑)', kind: 'data', data: 'LP_PA_CBND_BUBUN', color: '#d92c2c', width: 1.4, minzoom: 16, labels: true },
    { id: 'adri',      ko: '리 경계',       desc: 'LT_C_ADRI_INFO (확대 12↑)',      kind: 'data', data: 'LT_C_ADRI_INFO', color: '#065f46', width: 1.6, minzoom: 12 },
    { id: 'ademd',     ko: '읍면동 경계',   desc: 'LT_C_ADEMD_INFO (확대 10↑)',     kind: 'data', data: 'LT_C_ADEMD_INFO', color: '#0f766e', width: 1.8, minzoom: 10 },
    { id: 'adsigg',    ko: '시군구 경계',   desc: 'LT_C_ADSIGG_INFO (확대 8↑)',     kind: 'data', data: 'LT_C_ADSIGG_INFO', color: '#b45309', width: 2, minzoom: 8 },
    { id: 'adsido',    ko: '행정경계(시도)', desc: 'LT_C_ADSIDO_INFO (확대 6↑)',     kind: 'data', data: 'LT_C_ADSIDO_INFO', color: '#334155', width: 2.2, minzoom: 6 }
  ];
  /* ※ 건물(LT_C_SPBD)·도로(LT_L_SPRD)는 이번 버전 목록에서 제외했습니다.
       필요하면 위 배열에 kind:'data'로 한 줄 추가하면 그대로 동작합니다. */

  function defOf(id) { for (var i = 0; i < OVERLAY_DEFS.length; i++) if (OVERLAY_DEFS[i].id === id) return OVERLAY_DEFS[i]; return null; }
  function emptyFC0() { return { type: 'FeatureCollection', features: [] }; }

  function addVWorldLayers() {
    if (map.getSource('vworld-base-source')) return;

    map.addSource('vworld-base-source', {
      type: 'raster', tiles: [tileUrl('Base', 'png')], tileSize: 256,
      minzoom: 0, maxzoom: VWORLD_MAX_DATA_ZOOM,
      attribution: '© <a href="https://www.vworld.kr" target="_blank" rel="noopener">VWorld</a>'
    });
    map.addLayer({ id: 'vworld-base-layer', type: 'raster', source: 'vworld-base-source', layout: { visibility: 'visible' } });

    map.addSource('vworld-satellite-source', {
      type: 'raster', tiles: [tileUrl('Satellite', 'jpeg')], tileSize: 256,
      minzoom: 0, maxzoom: VWORLD_MAX_DATA_ZOOM,
      attribution: '© <a href="https://www.vworld.kr" target="_blank" rel="noopener">VWorld</a>'
    });
    map.addLayer({ id: 'vworld-satellite-layer', type: 'raster', source: 'vworld-satellite-source', layout: { visibility: 'none' } });

    OVERLAY_DEFS.forEach(function (d) {
      var srcId = 'ov-' + d.id + '-source';
      if (d.kind === 'wmts') {
        map.addSource(srcId, { type: 'raster', tiles: [tileUrl(d.layer, d.ext)], tileSize: 256, minzoom: 0, maxzoom: VWORLD_MAX_DATA_ZOOM });
        map.addLayer({ id: 'ov-' + d.id + '-layer', type: 'raster', source: srcId, layout: { visibility: 'none' } });
      } else {
        map.addSource(srcId, { type: 'geojson', data: emptyFC0() });
        /* 지적도는 탭하면 지번을 보여주기 위해 투명 채움을 함께 둔다 */
        if (d.id === 'cadastral') {
          map.addLayer({
            id: 'ov-cadastral-fill', type: 'fill', source: srcId,
            layout: { visibility: 'none' },
            paint: { 'fill-color': '#d92c2c', 'fill-opacity': 0.05 }
          });
        }
        /* [v9] 토지이용계획: 용도지역 색상으로 채움 (각 feature의 _fillColor 사용) */
        if (d.fillByUse) {
          map.addLayer({
            id: 'ov-' + d.id + '-fill', type: 'fill', source: srcId,
            layout: { visibility: 'none' },
            paint: { 'fill-color': ['coalesce', ['get', '_fillColor'], '#999999'], 'fill-opacity': settings.landuseOpacity }
          });
        }
        map.addLayer({
          id: 'ov-' + d.id + '-layer', type: 'line', source: srcId,
          layout: { visibility: 'none', 'line-cap': 'round', 'line-join': 'round' },
          paint: {
            'line-color': d.fillByUse ? ['coalesce', ['get', '_fillColor'], d.color] : d.color,
            'line-width': d.width,
            'line-opacity': (d.id === 'cadastral') ? settings.cadastralOpacity : 0.7
          }
        });
      }
    });
  }

  function setMapType(type) {
    if (!map.getLayer('vworld-base-layer')) return;
    var isSat = (type === 'satellite');
    map.setLayoutProperty('vworld-base-layer', 'visibility', isSat ? 'none' : 'visible');
    map.setLayoutProperty('vworld-satellite-layer', 'visibility', isSat ? 'visible' : 'none');
    settings.baseType = isSat ? 'satellite' : 'base';
    saveSettings();
  }

  /* ---- 데이터 API(JSONP)로 GeoJSON 받아오기 ---- */
  var dataFetchSeq = 0;
  function fetchVWorldData(def) {
    var b = map.getBounds();
    var box = 'BOX(' + b.getWest().toFixed(6) + ',' + b.getSouth().toFixed(6) + ',' +
                       b.getEast().toFixed(6) + ',' + b.getNorth().toFixed(6) + ')';
    var cb = '__vwData' + (++dataFetchSeq);
    var url = 'https://api.vworld.kr/req/data?service=data&request=GetFeature&version=2.0' +
      '&data=' + def.data + '&key=' + encodeURIComponent(VWORLD_API_KEY) +
      '&domain=' + VWORLD_DOMAIN +          /* 인코딩하지 않음 (스킴 없는 호스트) */
      '&geomFilter=' + encodeURIComponent(box) +
      '&crs=EPSG:4326&format=json&size=1000&geometry=true&attribute=true&callback=' + cb;
    return vworldJsonp(url, cb).then(function (d) {
      var r = d && d.response;
      if (!r) return emptyFC0();
      if (r.status === 'NOT_FOUND') return emptyFC0();   /* 이 범위에 자료 없음 */
      if (r.status !== 'OK') {
        console.warn('데이터 API 오류(' + def.data + '):', r.status, r.error || '');
        return emptyFC0();
      }
      return (r.result && r.result.featureCollection) || emptyFC0();
    });
  }

  var cadLabelMarkers = [];
  function clearCadLabels() { cadLabelMarkers.forEach(function (m) { m.remove(); }); cadLabelMarkers = []; }
  var CAD_LABEL_MAX = 150;   /* 라벨은 성능을 위해 개수 제한 */

  /* [v8-15] 줌에 따라 글씨 크기 보간 (zoom15→10px, 17→13px, 19→16px) */
  function cadLabelSize() {
    var z = map.getZoom();
    if (z <= 15) return 10;
    if (z >= 19) return 16;
    if (z <= 17) return 10 + (z - 15) * (13 - 10) / 2;   /* 15~17: 10→13 */
    return 13 + (z - 17) * (16 - 13) / 2;                /* 17~19: 13→16 */
  }
  function renderCadLabels(fc) {
    clearCadLabels();
    if (!hasTurf) return;
    if (map.getZoom() < 17) return;   /* [v8-15] 낮은 줌: 지번 숨김 (겹침·가림 방지) */
    var size = cadLabelSize();
    var seen = {};                    /* 같은 지번 중복 표시 방지 */
    var count = 0;
    for (var i = 0; i < fc.features.length && count < CAD_LABEL_MAX; i++) {
      var f = fc.features[i];
      var p = f.properties || {};
      /* [v8-14] 본번-부번 한 번만 표시 (820-8 형태) */
      var txt = (p.bonbun || '') + (p.bubun && p.bubun !== '0' && p.bubun !== '' ? '-' + p.bubun : '');
      if (!txt) continue;
      var c = null;
      try { c = turf.centerOfMass(f).geometry.coordinates; } catch (e) { continue; }
      var key = txt + '@' + c[0].toFixed(5) + ',' + c[1].toFixed(5);
      if (seen[key]) continue;
      seen[key] = true;
      var el2 = document.createElement('div');
      el2.className = 'cad-label';
      el2.style.fontSize = size + 'px';
      el2.textContent = txt;
      cadLabelMarkers.push(new maplibregl.Marker({ element: el2 }).setLngLat(c).addTo(map));
      count++;
    }
  }

  var dataReloadTimer = null;
  var dataLoading = {};
  function reloadDataOverlays(force) {
    OVERLAY_DEFS.forEach(function (d) {
      if (d.kind !== 'data') return;
      var srcId = 'ov-' + d.id + '-source';
      var src = map.getSource(srcId);
      if (!src) return;
      if (!settings.overlays[d.id]) { src.setData(emptyFC0()); if (d.labels) clearCadLabels(); return; }
      if (map.getZoom() < d.minzoom) {
        src.setData(emptyFC0());
        if (d.labels) clearCadLabels();
        return;
      }
      if (dataLoading[d.id] && !force) return;
      dataLoading[d.id] = true;
      fetchVWorldData(d).then(function (fc) {
        dataLoading[d.id] = false;
        if (!settings.overlays[d.id]) return;
        /* [v9] 토지이용계획: 각 필지에 용도지역 색상을 미리 계산해 넣는다 */
        if (d.fillByUse && fc.features) {
          fc.features.forEach(function (ft) {
            ft.properties = ft.properties || {};
            ft.properties._fillColor = landuseColor(ft.properties.uname);
          });
        }
        src.setData(fc);
        if (d.labels) renderCadLabels(fc);
      }).catch(function (e) {
        dataLoading[d.id] = false;
        console.warn('데이터 로딩 실패(' + d.data + ')', e);
      });
    });
  }
  map.on('moveend', function () {
    if (dataReloadTimer) clearTimeout(dataReloadTimer);
    dataReloadTimer = setTimeout(function () { reloadDataOverlays(false); }, 450);
  });

  function setOverlay(id, on) {
    var d = defOf(id);
    if (!d) return;
    var lyrId = 'ov-' + id + '-layer';
    if (!map.getLayer(lyrId)) return;
    map.setLayoutProperty(lyrId, 'visibility', on ? 'visible' : 'none');
    if (id === 'cadastral' && map.getLayer('ov-cadastral-fill')) {
      map.setLayoutProperty('ov-cadastral-fill', 'visibility', on ? 'visible' : 'none');
    }
    if (d.fillByUse && map.getLayer('ov-' + id + '-fill')) {
      map.setLayoutProperty('ov-' + id + '-fill', 'visibility', on ? 'visible' : 'none');
    }
    settings.overlays[id] = !!on;
    saveSettings();
    if (d.kind === 'data') {
      if (on && map.getZoom() < d.minzoom) {
        showToast(d.ko + '는 확대 ' + d.minzoom + ' 이상에서 표시됩니다.\n지도를 더 확대해주세요.', 3500, 'info');
      }
      reloadDataOverlays(true);
    }
    if (id === 'landuse') updateLegendVisibility();   /* [v10-1] 범례 표시 갱신 */
  }
  function setCadastralOpacity(v) {
    settings.cadastralOpacity = v;
    if (map.getLayer('ov-cadastral-layer')) map.setPaintProperty('ov-cadastral-layer', 'line-opacity', v);
    if (map.getLayer('ov-cadastral-fill')) map.setPaintProperty('ov-cadastral-fill', 'fill-opacity', v * 0.08);
    saveSettings();
  }
  /* [v9] 토지이용계획 투명도 (20~70%) */
  function setLanduseOpacity(v) {
    settings.landuseOpacity = v;
    if (map.getLayer('ov-landuse-fill')) map.setPaintProperty('ov-landuse-fill', 'fill-opacity', v);
    saveSettings();
  }
  function applySettingsToMap() {
    setMapType(settings.baseType);
    OVERLAY_DEFS.forEach(function (d) {
      var lyrId = 'ov-' + d.id + '-layer';
      if (!map.getLayer(lyrId)) return;
      var on = !!settings.overlays[d.id];
      map.setLayoutProperty(lyrId, 'visibility', on ? 'visible' : 'none');
      if (d.id === 'cadastral' && map.getLayer('ov-cadastral-fill')) {
        map.setLayoutProperty('ov-cadastral-fill', 'visibility', on ? 'visible' : 'none');
      }
      if (d.fillByUse && map.getLayer('ov-' + d.id + '-fill')) {
        map.setLayoutProperty('ov-' + d.id + '-fill', 'visibility', on ? 'visible' : 'none');
      }
    });
    setCadastralOpacity(settings.cadastralOpacity);
    setLanduseOpacity(settings.landuseOpacity);
    reloadDataOverlays(true);
    applyLegendState();          /* [v10-2] 저장된 범례 위치·접힘 복원 */
    updateLegendVisibility();
  }

  /* ===================================================================
     [v10-1·2·24] 토지이용 범례 (독립 패널)
     · 토지이용계획 레이어가 실제로 보이는 확대 수준일 때만 표시
     · 주소검색창 아래 ~ 실측도구 위 사이에 가로형으로 배치
     · 제목을 잡고 이동, 오른쪽 화살표로 접기/펴기, 위치·접힘 상태 저장
     =================================================================== */
  var llEl = document.getElementById('landLegend');
  var llHead = document.getElementById('llHead');
  var llBody = document.getElementById('llBody');
  var llToggle = document.getElementById('llToggle');

  function buildLegendBody() {
    llBody.innerHTML = '';
    LANDUSE_LEGEND.forEach(function (x) {
      var it = el('div', 'll-item',
        '<span class="ll-sw" style="background:' + x[1] + ';"></span>' +
        '<span class="ll-nm">' + escapeHtml(shortUseName(x[0])) + '</span>');
      llBody.appendChild(it);
    });
  }
  function applyLegendState() {
    var st = settings.landLegend || {};
    /* 기본 위치: 주소검색창 아래(왼쪽 10px, top 은 검색창 높이 + 여유) */
    var defTop = (document.getElementById('topUI') ? document.getElementById('topUI').getBoundingClientRect().bottom : 60) + 6;
    llEl.style.left = (isFinite(st.left) && st.left !== null ? st.left : 10) + 'px';
    llEl.style.top = (isFinite(st.top) && st.top !== null ? st.top : Math.round(defTop)) + 'px';
    llBody.classList.toggle('collapsed', !!st.collapsed);
    llToggle.textContent = st.collapsed ? '▼' : '▲';
  }
  /* 토지이용계획이 켜져 있고 확대 수준이 표시 조건을 만족할 때만 보이기 */
  function updateLegendVisibility() {
    var d = defOf('landuse');
    var on = !!(settings.overlays && settings.overlays.landuse) && d && map.getZoom() >= d.minzoom;
    llEl.classList.toggle('show', !!on);
    if (on && !llBody.children.length) buildLegendBody();
  }
  llToggle.addEventListener('click', function (e) {
    e.stopPropagation(); e.preventDefault();
    settings.landLegend = settings.landLegend || {};
    settings.landLegend.collapsed = !settings.landLegend.collapsed;
    applyLegendState();
    saveSettings();
  });
  (function () {   /* 제목 드래그로 이동 (화면 밖으로 안 나가게 제한) */
    var dragging = false, moved = false, sx = 0, sy = 0, ox = 0, oy = 0;
    function pt(e) { return e.touches ? e.touches[0] : e; }
    function down(e) {
      if (e.target === llToggle || llToggle.contains(e.target)) return;
      var p = pt(e), r = llEl.getBoundingClientRect();
      dragging = true; moved = false;
      sx = p.clientX; sy = p.clientY; ox = r.left; oy = r.top;
    }
    function move(e) {
      if (!dragging) return;
      var p = pt(e), dx = p.clientX - sx, dy = p.clientY - sy;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;
      var w = llEl.offsetWidth, h = llEl.offsetHeight;
      var nx = Math.min(Math.max(0, ox + dx), Math.max(0, window.innerWidth - w));
      var ny = Math.min(Math.max(0, oy + dy), Math.max(0, window.innerHeight - Math.min(h, 40)));
      llEl.style.left = nx + 'px';
      llEl.style.top = ny + 'px';
      if (e.cancelable) e.preventDefault();
    }
    function up() {
      if (!dragging) return;
      dragging = false;
      if (moved) {
        settings.landLegend = settings.landLegend || {};
        settings.landLegend.left = Math.round(parseFloat(llEl.style.left) || 0);
        settings.landLegend.top = Math.round(parseFloat(llEl.style.top) || 0);
        saveSettings();
      }
    }
    llHead.addEventListener('touchstart', down, { passive: true });
    llHead.addEventListener('touchmove', move, { passive: false });
    llHead.addEventListener('touchend', up);
    llHead.addEventListener('mousedown', down);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  })();
  map.on('zoomend', updateLegendVisibility);
  map.on('moveend', updateLegendVisibility);

  /* ================= 공통 바텀시트 ================= */
  var sheetEl = document.getElementById('sheet');
  var sheetOverlay = document.getElementById('sheetOverlay');
  var sheetBody = document.getElementById('sheetBody');
  var sheetTitle = document.getElementById('sheetTitle');
  var SNAPS = [30, 50, 90];   /* [v6-1] 3단계 스냅 */
  var sheetSnap = 50;
  var sheetOpen = false;

  /* [v5-4] 바텀시트가 올라오면 오른쪽 아래 버튼들을 시트 위로 밀어 올린다 */
  var bottomBtnsEl = document.getElementById('bottomBtns');
  function updateBottomBtnsPos() {
    if (sheetOpen) {
      var h = sheetEl.getBoundingClientRect().height;
      bottomBtnsEl.style.bottom = (h + 12) + 'px';
    } else {
      bottomBtnsEl.style.bottom = '';   /* CSS 기본값(safe-area + 12px)으로 복귀 */
    }
  }

  /* 높이 애니메이션이 끝나는 시점에도 버튼 위치를 다시 맞춘다(타이머 의존 제거) */
  sheetEl.addEventListener('transitionend', function (e) {
    if (e.propertyName === 'height' || e.propertyName === 'transform') updateBottomBtnsPos();
  });

  /* [v8-16] 시트 헤더 액션 버튼 설정 (label 없으면 숨김) */
  var sheetActionEl = document.getElementById('sheetAction');
  function setSheetAction(label, handler) {
    if (!label) { sheetActionEl.style.display = 'none'; sheetActionEl.onclick = null; return; }
    sheetActionEl.textContent = label;
    sheetActionEl.style.display = '';
    sheetActionEl.onclick = handler;
  }

  function openSheet(title, node, snap) {
    setSheetAction(null);                 /* 기본은 액션 버튼 없음 */
    var _mb = document.getElementById('sheetMin');
    if (_mb) _mb.textContent = '▁';       /* [v11-1] 최소화 버튼 상태 초기화 */
    if (window._sheetResetMinFlag) window._sheetResetMinFlag();
    sheetTitle.textContent = title;
    sheetBody.innerHTML = '';
    if (typeof node === 'string') sheetBody.innerHTML = node;
    else sheetBody.appendChild(node);
    sheetOverlay.classList.add('show');
    sheetEl.classList.add('show');
    sheetOpen = true;

    if (snap === 'auto') {
      /* [v8-8] 내용 높이에 맞춰 열기(불필요한 빈 공간 제거).
         마지막 버튼 아래 여백은 CSS의 padding-bottom(safe-area+16px)만 사용.
         내용이 많으면 최대 90%에서 내부 스크롤. */
      sheetEl.style.height = 'auto';
      requestAnimationFrame(function () {
        var h = sheetEl.scrollHeight;
        var maxH = window.innerHeight * 0.9;
        var finalH = Math.min(h, maxH);
        sheetEl.style.height = finalH + 'px';
        sheetSnap = Math.round(finalH / window.innerHeight * 100);
        updateBottomBtnsPos();
      });
    } else {
      sheetSnap = snap || 50;
      sheetEl.style.height = sheetSnap + '%';
      requestAnimationFrame(updateBottomBtnsPos);
    }
  }
  function closeSheet() {
    sheetEl.classList.remove('show');
    sheetOverlay.classList.remove('show');
    sheetOpen = false;
    sheetHasForm = false;
    updateBottomBtnsPos();
    clearTempMarker();   /* [v6-4] 주소 조회용 임시핀은 시트를 닫으면 사라진다(저장 아님) */
    /* [v10-23] 시트를 완전히 닫으면 선택 필지 강조도 해제 */
    if (typeof clearSelectedParcelHighlight === 'function') clearSelectedParcelHighlight();
    sheetIsLandInfo = false;
    sheetHistory = [];
  }
  document.getElementById('sheetClose').addEventListener('click', closeSheet);
  sheetOverlay.addEventListener('click', closeSheet);

  /* [v11-1] 오버레이가 터치를 통과시키므로(pointer-events:none) 지도 길게 누르기·이동이
     시트가 열린 상태에서도 그대로 동작한다. (v10의 오버레이 롱프레스 우회는 불필요해져 제거)
     입력폼(핀 저장·측정 저장)이 열려 있는 동안에는 지도 길게 누르기를 막는다. */
  var sheetHasForm = false;

  /* [v6-1] 시트 높이 조절 —— 30% / 50% / 90% 스냅 · 아래로 충분히 내리면 닫힘
     · 손잡이: 가로바 + 제목줄(헤더 전체)  → 잡기 쉬움
     · 잡아서 끌기(드래그)뿐 아니라 위/아래 스와이프(빠르게 튕기기)도 지원
     · 닫기 버튼(✕)은 드래그로 먹히지 않도록 예외 처리 */
  (function () {
    var grip = document.getElementById('sheetGrip');
    var head = document.getElementById('sheetHead');
    var closeBtn = document.getElementById('sheetClose');
    var minBtn = document.getElementById('sheetMin');
    var startY = 0, startH = 0, startT = 0, lastY = 0, lastT = 0, dragging = false, startIdx = 1;

    function y(e) { return e.touches ? e.touches[0].clientY : e.clientY; }
    function nearestIdx(pct) {
      var idx = 0, bd = 1e9;
      snapList().forEach(function (s, i) { var d = Math.abs(s - pct); if (d < bd) { bd = d; idx = i; } });
      return idx;
    }
    /* [v11-1] 최소화 단계 —— 제목줄(가로바+제목+버튼)만 남는 높이 */
    function minPx() { return (grip.offsetHeight || 20) + (head.offsetHeight || 48); }
    function minPct() { return Math.max(4, minPx() / window.innerHeight * 100); }
    function snapList() { return [minPct()].concat(SNAPS); }
    window._sheetSnapList = snapList;

    function down(e) {
      if (e.target === closeBtn || closeBtn.contains(e.target)) return;   /* ✕는 그대로 클릭 */
      if (minBtn && (e.target === minBtn || minBtn.contains(e.target))) return;   /* 최소화 버튼도 예외 */
      dragging = true;
      startY = lastY = y(e);
      startT = lastT = Date.now();
      startH = sheetEl.getBoundingClientRect().height;
      startIdx = nearestIdx(startH / window.innerHeight * 100);   /* 스와이프는 '시작 단계' 기준 한 칸 이동 */
      sheetEl.style.transition = 'none';
    }
    function move(e) {
      if (!dragging) return;
      var cy = y(e);
      /* [v11-1] 제목줄만 남는 높이까지 내려갈 수 있게 하한을 최소화 높이로 */
      var minH = window.innerHeight * minPct() / 100;
      var h = Math.max(minH * 0.7, startH - (cy - startY));
      sheetEl.style.height = Math.min(h, window.innerHeight * 0.9) + 'px';
      updateBottomBtnsPos();          /* 시트를 끌면 버튼도 같이 따라 움직임 */
      lastY = cy; lastT = Date.now();
      if (e.cancelable) e.preventDefault();
    }
    function up() {
      if (!dragging) return;
      dragging = false;
      sheetEl.style.transition = '';

      var list = snapList();
      var pct = sheetEl.getBoundingClientRect().height / window.innerHeight * 100;
      /* 최소화 높이보다 더 많이 내리면 닫기 */
      if (pct < minPct() * 0.8) { closeSheet(); sheetEl.style.height = sheetSnap + '%'; return; }

      /* 스와이프 속도(px/ms): 아래로 빠르게 = 양수, 위로 빠르게 = 음수 */
      var v = (lastY - startY) / Math.max(1, Date.now() - startT);
      var FLICK = 0.5;   /* 이 속도 이상이면 스와이프(플릭)로 간주 */
      var idx;

      if (v < -FLICK) {
        idx = Math.min(startIdx + 1, list.length - 1);    /* 위로 스와이프 → 한 칸 확장 */
      } else if (v > FLICK) {                             /* 아래로 스와이프 → 한 칸 축소 */
        if (startIdx === 0) { closeSheet(); sheetEl.style.height = SNAPS[0] + '%'; sheetSnap = SNAPS[0]; return; }
        idx = startIdx - 1;
      } else {
        idx = nearestIdx(pct);                            /* 천천히 끌었으면 가장 가까운 단계로 */
      }

      sheetSnap = list[idx];
      sheetEl.style.height = sheetSnap + '%';
      if (window._sheetResetMinFlag) window._sheetResetMinFlag();
      setTimeout(updateBottomBtnsPos, 190);   /* 스냅 애니메이션 후 위치 재계산 */
    }

    [grip, head].forEach(function (el2) {
      el2.addEventListener('touchstart', down, { passive: true });
      el2.addEventListener('touchmove', move, { passive: false });
      el2.addEventListener('touchend', up);
      el2.addEventListener('mousedown', down);
    });
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);

    /* [v11-1] 최소화 버튼: 제목줄만 남기기 ↔ 이전 높이로 복귀 (click 하나만 사용) */
    /* 상태 플래그에 의존하지 않고 '현재 높이'로 최소화/복귀를 판단한다
       (다른 코드가 플래그를 초기화해도 항상 올바르게 동작) */
    var lastExpandedPx = 0;
    minBtn.addEventListener('click', function (e) {
      e.stopPropagation(); e.preventDefault();
      var curPx = sheetEl.getBoundingClientRect().height;
      var mp = minPx();
      if (curPx > mp + 8) {                /* 펼쳐진 상태 → 제목줄만 남기고 최소화 */
        lastExpandedPx = Math.round(curPx);
        sheetEl.style.height = mp + 'px';
        sheetSnap = Math.round(minPct());
        minBtn.textContent = '▔';
      } else {                             /* 최소화 상태 → 이전 높이로 복귀 */
        var target = (lastExpandedPx > mp + 8) ? lastExpandedPx : Math.round(window.innerHeight * 0.5);
        sheetEl.style.height = target + 'px';
        sheetSnap = Math.round(target / window.innerHeight * 100);
        minBtn.textContent = '▁';
      }
      setTimeout(updateBottomBtnsPos, 190);
    });
    /* 드래그로 높이를 바꾸면 최소화 버튼 표시만 되돌린다 */
    window._sheetResetMinFlag = function () { if (minBtn) minBtn.textContent = '▁'; };
  })();

  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  /* ================= 검색 마커 ================= */
  /* [v5-8] SVG 물방울 핀 — 꼭짓점이 viewBox 하단 중앙(12,29.4)에 있어
     anchor:'bottom' 이면 좌표에 정확히 수직으로 꽂힌다. */
  /* [v11-8] cropName 이 있으면 핀 위쪽에 작물명 라벨로 표시 (핀 안 이모지는 없음) */
  function makePinElement(hex, cropName) {
    var e = document.createElement('div');
    e.className = 'pin';
    e.style.setProperty('--pin-color', hex);
    e.innerHTML =
      '<svg width="24" height="30" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg">' +
      '<path d="M12 29.4C12 29.4 21.6 17.6 21.6 11.1A9.6 9.6 0 1 0 2.4 11.1C2.4 17.6 12 29.4 12 29.4Z" ' +
      'fill="' + hex + '" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>' +
      '</svg>' +
      (cropName ? '<span class="pin-crop">' + escapeHtml(cropName) + '</span>' : '');
    return e;
  }

  /* [v11-3] 줌에 따라 핀 크기 조절 — 축소해도 핀 끝(실제 좌표)이 어긋나 보이지 않게.
       확대 16 이상: 기본 핀(작물명 표시)
       확대 13~15 : 작은 핀
       확대 13 미만: 점(정확한 좌표만 표시)  ※ 겹쳐도 위치는 그대로 */
  function applyPinScale() {
    var z = map.getZoom();
    var mode = (z >= 16) ? '' : (z >= 13 ? 'pin-sm' : 'pin-dot');
    document.querySelectorAll('.pin').forEach(function (p) {
      p.classList.remove('pin-sm', 'pin-dot');
      if (mode) p.classList.add(mode);
    });
  }

  var searchMarker = null;
  function clearSearchMarker() { if (searchMarker) { searchMarker.remove(); searchMarker = null; } }
  function showSearchMarker(result) {
    clearSearchMarker();
    var e = makePinElement('#e5342a', '');
    var rows = '<div><b>검색어</b><br>' + escapeHtml(result.query) + '</div>';
    if (result.parcel) rows += '<div style="margin-top:5px;"><b>지번주소</b><br>' + escapeHtml(result.parcel) + '</div>';
    if (result.road) rows += '<div style="margin-top:5px;"><b>도로명주소</b><br>' + escapeHtml(result.road) + '</div>';
    rows += '<div style="margin-top:5px;color:#555;">경도 ' + result.lng.toFixed(6) + '<br>위도 ' + result.lat.toFixed(6) + '</div>';
    searchMarker = new maplibregl.Marker({ element: e, anchor: 'bottom' })
      .setLngLat([result.lng, result.lat])
      .setPopup(new maplibregl.Popup({ offset: 18 }).setHTML(rows))
      .addTo(map);
  }

  /* ================= 브이월드 지오코더 (JSONP) ================= */
  var jsonpSeq = 0;
  function vworldJsonp(url, cbName) {
    return new Promise(function (resolve, reject) {
      var script = document.createElement('script');
      var timer = null;
      function cleanup() {
        if (timer) clearTimeout(timer);
        try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      window[cbName] = function (data) { cleanup(); resolve(data); };
      script.onerror = function () { cleanup(); reject(new Error('network')); };
      timer = setTimeout(function () { cleanup(); reject(new Error('timeout')); }, 10000);
      script.src = url;
      document.head.appendChild(script);
    });
  }
  function requestVWorldGeocode(query, type) {
    var cb = '__vwGeo' + (++jsonpSeq);
    var url = 'https://api.vworld.kr/req/address?service=address&request=getCoord&version=2.0' +
      '&crs=EPSG:4326&type=' + type + '&address=' + encodeURIComponent(query) +
      '&format=json&errorformat=json&refine=true&simple=false&callback=' + cb +
      '&key=' + encodeURIComponent(VWORLD_API_KEY);
    return vworldJsonp(url, cb);
  }
  /* 역지오코딩: 좌표 → 지번/도로명/우편번호 */
  function requestVWorldReverse(lng, lat) {
    var cb = '__vwRev' + (++jsonpSeq);
    var url = 'https://api.vworld.kr/req/address?service=address&request=GetAddress&version=2.0' +
      '&crs=EPSG:4326&point=' + lng + ',' + lat + '&type=BOTH&zipcode=true&simple=false' +
      '&format=json&errorformat=json&callback=' + cb +
      '&key=' + encodeURIComponent(VWORLD_API_KEY);
    return vworldJsonp(url, cb).then(function (data) {
      var out = { jibunAddress: '', roadAddress: '', postalCode: '' };
      if (!data || !data.response || data.response.status !== 'OK') return out;
      var list = data.response.result || [];
      list.forEach(function (r) {
        var t = String(r.type || '').toLowerCase();
        if (t === 'parcel' && !out.jibunAddress) out.jibunAddress = r.text || '';
        if (t === 'road' && !out.roadAddress) out.roadAddress = r.text || '';
        if (!out.postalCode && r.zipcode) out.postalCode = r.zipcode;
      });
      return out;
    });
  }
  function parseGeocode(data, type) {
    if (!data || !data.response || data.response.status !== 'OK') return null;
    var res = data.response.result;
    if (!res || !res.point) return null;
    var lng = parseFloat(res.point.x), lat = parseFloat(res.point.y);
    if (!isFinite(lng) || !isFinite(lat)) return null;
    var text = (data.response.refined || {}).text || '';
    return { lng: lng, lat: lat, parcel: type === 'PARCEL' ? text : '', road: type === 'ROAD' ? text : '' };
  }
  function isKeyError(data) {
    if (!data || !data.response) return false;
    var err = data.response.error;
    if (data.response.status !== 'ERROR' || !err) return false;
    return /KEY|key|DOMAIN|domain|INVALID|권한|인증/.test((err.text || '') + ' ' + (err.code || ''));
  }

  /* ================= 주소·지번 검색 ================= */
  var searchInput = document.getElementById('searchInput');
  var clearBtn = document.getElementById('clearBtn');
  var searching = false;

  function searchAddress() {
    var query = searchInput.value.trim();
    if (!query) { showToast('주소 또는 지번을 입력해주세요.', 3000, 'info'); return; }
    if (!hasApiKey()) { showToast('브이월드 API 키를 입력해주세요.', 0); return; }
    if (searching) return;
    searching = true;
    showToast('주소를 검색하고 있습니다.', 0, 'info');

    requestVWorldGeocode(query, 'PARCEL')
      .then(function (data) {
        var hit = parseGeocode(data, 'PARCEL');
        if (hit) return hit;
        if (isKeyError(data)) throw new Error('apikey');
        return requestVWorldGeocode(query, 'ROAD').then(function (d2) {
          if (isKeyError(d2)) throw new Error('apikey');
          return parseGeocode(d2, 'ROAD');
        });
      })
      .then(function (hit) {
        searching = false;
        if (!hit) { showToast('검색 결과를 찾을 수 없습니다.\n주소 또는 지번을 다시 확인해주세요.', 5000); return; }
        hit.query = query;
        map.flyTo({ center: [hit.lng, hit.lat], zoom: 18, essential: true }); /* 회전각 유지 */
        showSearchMarker(hit);
        showToast('검색 위치로 이동했습니다.', 3000, 'success');
      })
      .catch(function (err) {
        searching = false;
        console.error('주소 검색 오류:', err);
        if (err && err.message === 'apikey') showToast('브이월드 API 키 또는 등록 도메인을 확인해주세요.', 6000);
        else showToast('검색 서버에 연결할 수 없습니다.\n인터넷 연결을 확인해주세요.', 6000);
      });
  }

  /* ===================================================================
     즐겨찾기(저장핀)
     -------------------------------------------------------------------
     · 기존 map.html 형식 { label, lat, lng, addr, color:'green', locked,
       manualPos, surveyKey, surveyApp, crop } 을 그대로 보존하면서
       요청받은 신규 필드(id/name/jibunAddress/latitude/…)를 함께 저장한다
       (superset). 이렇게 해야 기존 지도와 새 지도가 같은 데이터를 함께 읽는다.
     =================================================================== */
  function normalizeFav(r) {
    r = r || {};
    var lat = isFinite(r.latitude) ? Number(r.latitude) : Number(r.lat);
    var lng = isFinite(r.longitude) ? Number(r.longitude) : Number(r.lng);
    var jibun = r.jibunAddress || r.addr || '';
    var name = r.name || r.label || jibun || '저장 위치';
    var colorKey = r.color || 'green';
    if (/^#/.test(colorKey)) { /* 혹시 HEX로 저장된 값이 있으면 key로 되돌림 */
      var f = FAV_COLORS.filter(function (c) { return c.hex.toLowerCase() === String(colorKey).toLowerCase(); })[0];
      colorKey = f ? f.key : 'green';
    }
    return {
      /* 신규 구조 */
      id: r.id || uid(),
      name: name,
      jibunAddress: jibun,
      roadAddress: r.roadAddress || '',
      postalCode: r.postalCode || '',
      latitude: lat, longitude: lng,
      color: colorKey,
      crop: r.crop || '',
      cropIcon: r.cropIcon || cropIconOf(r.crop || ''),
      memo: r.memo || '',
      locked: !!r.locked,
      surveyType: r.surveyType || r.surveyApp || '',
      surveyId: r.surveyId || r.surveyKey || '',
      linkedRecordId: r.linkedRecordId || '',
      createdAt: r.createdAt || kstNowStr(),
      updatedAt: r.updatedAt || r.createdAt || kstNowStr(),
      /* 기존 map.html 호환 필드 (삭제 금지) */
      label: name.slice(0, 40),
      lat: lat, lng: lng, addr: jibun,
      manualPos: !!r.manualPos,
      surveyKey: r.surveyId || r.surveyKey || '',
      surveyApp: r.surveyType || r.surveyApp || ''
    };
  }
  function getFavs() {
    var arr = loadJSON(FAV_KEY, []);
    if (!Array.isArray(arr)) arr = [];
    return arr.map(normalizeFav).filter(function (r) { return isFinite(r.latitude) && isFinite(r.longitude); });
  }
  function setFavs(arr) {
    /* 보안저장 준비 전에는 기존 데이터를 덮어쓰지 않는다 (데이터 유실 방지) */
    if (!secureReady) { showToast('저장 준비 중입니다.\n잠시 후 다시 시도해주세요.', 3000, 'info'); return; }
    saveJSON(FAV_KEY, arr.map(normalizeFav));
    refreshFavPins();
  }

  /* ══════════════════════════════════════════════════════════════
     [v13] 실측모드에서 저장핀(즐겨찾기)을 측정점으로 사용
       · 일반 지도모드 : 저장핀 터치 → 기존 저장위치 상세시트 (동작 변경 없음)
       · 실측모드      : 저장핀 터치 → 상세시트를 열지 않고, 저장된 실제
                         위도·경도를 현재 실측모드의 다음 측정점으로 추가
       · 저장핀 원본(좌표·색상·작물·잠금)은 절대 변경하지 않는다.
     ══════════════════════════════════════════════════════════════ */

  /* 저장핀 좌표 호환 추출 — 예전 저장분(lat/lng, lon)까지 모두 지원.
     좌표가 없는 오래된 핀은 null 을 돌려준다. */
  function getFavoriteLngLat(f) {
    if (!f) return null;
    var lng = Number(f.longitude != null ? f.longitude : (f.lng != null ? f.lng : f.lon));
    var lat = Number(f.latitude  != null ? f.latitude  : f.lat);
    if (!isFinite(lng) || !isFinite(lat)) return null;
    return { longitude: lng, latitude: lat };
  }

  /* 지금 "측정점을 찍어 넣는" 모드인가?
       polygon(면적) · distance(길이) 만 해당.
       edit(수정)은 기존 점을 옮기는 모드이므로 점 추가 대상이 아니다.
     ※ 앞으로 재배구역 그리기·생산량지점(가·나·다·A끝·B끝)이 추가되면
        아래 배열에 모드명만 넣으면 그대로 동작한다. */
  var SURVEY_POINT_INPUT_MODES = ['polygon', 'distance', 'cropBoundary', 'parcelPick', 'fieldplot'];   /* [v15] 가·나 지정 추가 */
  /* [v17-12] 두 도구 중 하나가 "입력 대기" 상태이면 저장핀은 저장팝업을 열지 않고 입력점으로 쓰인다.
     일반 모드(도구를 안 쓰는 상태)에서는 기존 저장위치 팝업이 그대로 열린다. */
  function getActiveSurveyInputMode() { return surveyMeasureState.mode; }
  function isSurveyPointInputMode() {
    return SURVEY_POINT_INPUT_MODES.indexOf(getActiveSurveyInputMode()) >= 0;
  }

  /* 같은 좌표가 이미 마지막/기존 점으로 들어가 있는지 (중복 추가 방지) */
  function _samePt(a, b) {
    return a && b && Math.abs(a[0] - b[0]) < 1e-9 && Math.abs(a[1] - b[1]) < 1e-9;
  }

  /* 저장핀을 현재 실측모드의 다음 측정점으로 사용 (공통 진입함수) */
  function useFavoritePinAsSurveyPoint(f) {
    var p = getFavoriteLngLat(f);
    if (!p) { showToast('이 저장핀에는 사용할 수 있는 좌표정보가 없습니다.', 3000, 'info'); return; }
    var lngLat = { lng: p.longitude, lat: p.latitude };
    var pt = [p.longitude, p.latitude];
    var s = surveyMeasureState;

    switch (getActiveSurveyInputMode()) {
      case 'polygon':
        if (s.fieldPoints.some(function (q) { return _samePt(q, pt); })) {
          showToast('이미 선택된 측정 지점입니다.', 2500, 'info'); return;
        }
        addFieldPoint(lngLat);
        showToast('저장핀 위치를 면적 측정점으로 추가했습니다. (' + s.fieldPoints.length + '번 점)', 3000, 'success');
        break;

      case 'distance':
        if (_samePt(s.distancePoints[s.distancePoints.length - 1], pt)) {
          showToast('이미 선택된 측정 지점입니다.', 2500, 'info'); return;
        }
        addDistancePoint(lngLat);
        showToast('저장핀 위치를 길이 측정점으로 추가했습니다. (' + s.distancePoints.length + '번 점)', 3000, 'success');
        break;

      /* [v14] 재배구역 그리기: 다음 경계점으로 추가 */
      case 'cropBoundary':
        if (s.fieldPoints.some(function (q) { return _samePt(q, pt); })) {
          showToast('이미 선택된 측정 지점입니다.', 2500, 'info'); return;
        }
        addFieldPoint(lngLat);
        showToast('저장핀 위치를 재배구역 경계점으로 추가했습니다. (' + s.fieldPoints.length + '번 점)', 3000, 'success');
        break;

      /* [v14] 필지선택: 저장핀이 있는 위치의 필지를 선택 */
      case 'parcelPick':
        pickParcelAt(p.longitude, p.latitude);
        break;

      /* [v15] 가·나 지정: 저장핀 위치를 가 또는 나 지점으로 사용 */
      case 'fieldplot':
        fpSetPoint(p.longitude, p.latitude);
        break;

      /* [v13] 재배구역 그리기·생산량지점(가·나·다·A끝·B끝)이 추가되면
               여기에 case 를 잇는다. 계산 로직은 각 기능의 기존 함수를 그대로 호출할 것. */
      default:
        break;
    }
  }

  /* 저장핀 한 번 터치가 "핀 클릭 + 그 아래 지도 클릭"으로 두 번 처리되어
     점이 두 개 생기는 것을 막는 플래그 (map click 핸들러에서 확인) */
  var suppressNextMapClick = false;

  var favMarkers = [];
  function clearFavPins() { favMarkers.forEach(function (m) { m.remove(); }); favMarkers = []; }
  function refreshFavPins() {
    clearFavPins();
    if (!settings.showFavPins) return;
    var favs = getFavs();
    favs.forEach(function (f) {
      /* [v11-8] 작물별 필터 없음 — 저장핀은 모두 표시, 작물명만 켜고 끔 */
      var e = makePinElement(colorHex(f.color), settings.showCropName ? (f.crop || '') : '');
      /* [v6-2] 작물핀 터치 → 큰 팝업 대신 50% 바텀시트 (위로 끌면 90%까지)
         [v13] 실측모드에서는 상세시트 대신 측정점으로 추가.
               실측모드에서도 핀 정보를 봐야 할 수 있으므로 "길게 누르기"로 상세시트를 연다. */
      var _lpTimer = null, _longPressed = false;
      function _clearLp() { if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; } }
      e.addEventListener('pointerdown', function () {
        if (!isSurveyPointInputMode()) return;
        _longPressed = false;
        _clearLp();
        _lpTimer = setTimeout(function () {
          _longPressed = true;
          openFavPinSheet(f);                       /* 길게 누르면 실측모드에서도 정보 확인 */
        }, 600);
      });
      ['pointerup', 'pointerleave', 'pointercancel'].forEach(function (evt) {
        e.addEventListener(evt, _clearLp);
      });
      e.addEventListener('click', function (ev) {
        ev.preventDefault();
        ev.stopPropagation();
        suppressNextMapClick = true;                /* 핀 아래 지도까지 눌린 것으로 처리되지 않게 */
        setTimeout(function () { suppressNextMapClick = false; }, 350);
        _clearLp();
        if (_longPressed) { _longPressed = false; return; }   /* 길게눌러 정보시트를 이미 열었음 */
        if (isSurveyPointInputMode()) { useFavoritePinAsSurveyPoint(f); return; }
        openFavPinSheet(f);                         /* 일반 지도모드: 기존 동작 그대로 */
      });
      var mk = new maplibregl.Marker({ element: e, anchor: 'bottom' })
        .setLngLat([f.longitude, f.latitude])
        .addTo(map);
      favMarkers.push(mk);
    });
    applyPinScale();   /* [v11-3] 현재 줌에 맞는 핀 크기 적용 */
  }
  map.on('zoomend', applyPinScale);   /* [v11-3] 줌에 따라 핀 크기 갱신 */
  map.on('zoom', updateBearing);      /* [v12-2] 레벨 실시간 표시 */
  window.refreshFavPins = refreshFavPins;

  /* [v6-2] 저장핀 상세 시트 (기본 50% · 위로 끌면 90%) */
  /* [v10-18·19·20] 저장 위치 상세 시트
       1줄: 전체 지번            [복사]
       2줄: 도로명주소
       3줄: 우편번호 · 위도 · 경도 (한 줄)
       하단: 현재 필지 정보 → 토지정보 시트(닫으면 이 화면으로 복귀) */
  function openSavedLocationSheet(f, isRestore) {
    var box = el('div');

    /* ① 전체 지번 + 복사 */
    var addrRow = el('div', 'li-row');
    addrRow.style.marginTop = '0';
    addrRow.appendChild(el('div', 'li-grow',
      '<div class="addr-main" style="font-size:16.5px;">' +
        (f.crop ? '<span class="crop-tag">' + escapeHtml(f.crop) + '</span>' : '') +
        escapeHtml(f.name) + '</div>' +
      '<div class="addr-label">전체 지번</div>' +
      '<div class="addr-value">' + escapeHtml(f.jibunAddress || '주소 없음') + '</div>'));
    var bCopy = el('button', 'copy-btn', '복사');
    bCopy.style.cssText += 'flex-shrink:0;min-height:36px;';
    bCopy.addEventListener('click', function () { copyText(f.jibunAddress || ''); });
    addrRow.appendChild(bCopy);
    box.appendChild(addrRow);

    /* ② 도로명주소 */
    if (f.roadAddress) {
      box.appendChild(el('div', null,
        '<div class="addr-label">도로명주소</div><div class="addr-value">' + escapeHtml(f.roadAddress) + '</div>'));
    }

    /* ③ 우편번호 · 좌표 한 줄 */
    box.appendChild(el('div', 'li-coord',
      (f.postalCode ? '우편번호 ' + escapeHtml(f.postalCode) + ' · ' : '') +
      '위도 ' + f.latitude.toFixed(6) + ' · 경도 ' + f.longitude.toFixed(6)));

    /* 작물·메모·저장일시 */
    var extra = '';
    if (f.crop) extra += '<div class="addr-label">작물</div><div class="addr-value">' + escapeHtml(f.crop) + '</div>';   /* [v14] 이모지 제거, 한글만 */
    if (f.memo) extra += '<div class="addr-label">메모</div><div class="addr-value">' + escapeHtml(f.memo) + '</div>';
    if (f.createdAt) extra += '<div class="addr-label">저장일시</div><div class="addr-value" style="font-size:12px;color:#888;">' + escapeHtml(String(f.createdAt).slice(0, 16).replace('T', ' ')) + '</div>';
    if (extra) box.appendChild(el('div', null, extra));

    var info = { lat: f.latitude, lng: f.longitude, jibunAddress: f.jibunAddress, roadAddress: f.roadAddress, postalCode: f.postalCode, favoriteId: f.id, color: f.color, crop: f.crop };

    var r1 = el('div', 'btn-row');
    r1.style.marginTop = '14px';
    var bNav = el('button', 'sheet-btn primary', '🚗 길찾기');
    bNav.addEventListener('click', function () { openNavSheet(info); });
    var bSurvey = el('button', 'sheet-btn green-soft', '📋 조사표');
    bSurvey.addEventListener('click', function () { openSurveySheet(info); });
    r1.appendChild(bNav); r1.appendChild(bSurvey);

    var r2 = el('div', 'btn-row');
    var bEdit = el('button', 'sheet-btn', '✏️ 핀 수정');
    bEdit.addEventListener('click', function () { openPinEditChoiceSheet(f); });
    var bDel = el('button', 'sheet-btn danger', '🗑 삭제');
    bDel.addEventListener('click', function () {
      if (f.locked) { showToast('잠금된 위치입니다.\n잠금을 해제한 후 삭제해주세요.', 4000); return; }
      if (!window.confirm('이 즐겨찾기 위치를 삭제하시겠습니까?')) return;
      setFavs(getFavs().filter(function (x) { return x.id !== f.id; }));
      closeSheet();
      showToast('삭제되었습니다.', 2000, 'success');
    });
    r2.appendChild(bEdit); r2.appendChild(bDel);

    /* [v10-19] 현재 필지 정보 → 토지정보 시트 (뒤로가기로 이 화면 복귀) */
    var bParcel = el('button', 'sheet-btn', '🧾 현재 필지 정보');
    bParcel.style.cssText += 'width:100%;margin-top:8px;';
    bParcel.addEventListener('click', function () {
      openLandInfoAt(f.longitude, f.latitude, {
        source: 'savedLocation',
        returnSheet: { type: 'savedLocation', data: f }
      });
    });

    box.appendChild(r1); box.appendChild(r2); box.appendChild(bParcel);
    openSheet('저장 위치', box, 'auto');
    sheetIsLandInfo = false;
    if (!isRestore) clearSelectedParcelHighlight();
  }
  /* 이전 이름 호환 */
  function openFavPinSheet(f) { openSavedLocationSheet(f); }

  /* ================= 현재 위치 · 상세 바텀시트 ================= */
  var currentLoc = null;   /* { lat, lng, jibunAddress, roadAddress, postalCode } */

  function openHereSheet(info) {
    currentLoc = info;
    /* [v7-7] 짧게 재구성 —— ①주소+복사(같은 줄) ②우편번호·위도·경도(한 줄) ③버튼 3개 */
    var box = el('div');

    /* ① 지번주소 + [복사] 같은 행 */
    var addrRow = el('div');
    addrRow.style.cssText = 'display:flex;align-items:flex-start;gap:8px;';
    var addrText = el('div', null,
      '<div class="addr-main">📍 ' + escapeHtml(info.jibunAddress || '주소를 찾을 수 없습니다') + '</div>' +
      (info.roadAddress ? '<div class="addr-value" style="color:#888;margin-top:2px;">' + escapeHtml(info.roadAddress) + '</div>' : ''));
    addrText.style.cssText = 'flex:1;min-width:0;';
    var bCopy = el('button', 'copy-btn', '복사');
    bCopy.style.flexShrink = '0';
    bCopy.addEventListener('click', function () { copyAddr('jibun'); });
    addrRow.appendChild(addrText); addrRow.appendChild(bCopy);

    /* ② 우편번호 · 위도 · 경도 한 줄 */
    var meta = el('div');
    meta.style.cssText = 'display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;';
    function metaItem(label, value) {
      return '<div><div class="addr-label" style="margin-top:0;">' + label + '</div>' +
             '<div class="addr-value">' + escapeHtml(value) + '</div></div>';
    }
    meta.innerHTML =
      (info.postalCode ? metaItem('우편번호', info.postalCode) : '') +
      metaItem('위도', info.lat.toFixed(6)) +
      metaItem('경도', info.lng.toFixed(6));

    /* ③ 현재 핀 저장 / 길찾기 / 조사표 — 모두 초록 계열(저장은 진하게, 나머지는 연하게) */
    var row = el('div', 'btn-row');
    row.style.marginTop = '16px';
    var bSave = el('button', 'sheet-btn primary', '⭐ 현재 핀 저장');
    bSave.addEventListener('click', function () { openPinSaveSheet(info); });
    var bNav = el('button', 'sheet-btn green-soft', '🚗 길찾기');
    bNav.addEventListener('click', function () { openNavSheet(info); });
    var bSurvey = el('button', 'sheet-btn green-soft', '📋 조사표');
    bSurvey.addEventListener('click', function () { openSurveySheet(info); });
    row.appendChild(bSave); row.appendChild(bNav); row.appendChild(bSurvey);

    /* [v10-21] 현재 필지정보 — 공통 토지정보 시트로 (닫으면 현재 위치로 복귀) */
    var bParcel = el('button', 'sheet-btn', '🧾 현재 필지정보');
    bParcel.style.cssText += 'width:100%;margin-top:8px;';
    bParcel.addEventListener('click', function () {
      openLandInfoAt(info.lng, info.lat, {
        source: 'currentLocation',
        returnSheet: { type: 'currentLocation', data: info }
      });
    });

    box.appendChild(addrRow); box.appendChild(meta); box.appendChild(row); box.appendChild(bParcel);
    openSheet('현재 위치', box, 'auto');   /* [v8-8] 내용 높이만큼만 (버튼 아래 공백 제거) */
    sheetIsLandInfo = false;
  }
  /* 공통 명칭 (item 21) */
  function openCurrentLocationSheet(locationData) { return openHereSheet(locationData); }

  function copyText(txt) {
    function ok() { showToast('주소가 복사되었습니다.', 2500, 'success'); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(ok).catch(function () { legacyCopy(txt, ok); });
    } else legacyCopy(txt, ok);
  }
  function legacyCopy(txt, ok) {
    try {
      var ta = document.createElement('textarea');
      ta.value = txt; ta.style.cssText = 'position:fixed;top:-1000px;';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); ok();
    } catch (e) { showToast('복사에 실패했습니다.', 3000); }
  }
  function copyAddr(kind) {
    var i = currentLoc; if (!i) return;
    var t = i.jibunAddress || '';
    if (kind === 'road') t = i.roadAddress || i.jibunAddress || '';
    else if (kind === 'coord') t = i.lat.toFixed(6) + ', ' + i.lng.toFixed(6);
    else if (kind === 'all') {
      t = [i.jibunAddress, i.roadAddress, i.postalCode ? '우편번호 ' + i.postalCode : '',
           '위도 ' + i.lat.toFixed(6), '경도 ' + i.lng.toFixed(6)].filter(Boolean).join('\n');
    }
    if (!t) { showToast('복사할 주소가 없습니다.', 2500, 'info'); return; }
    copyText(t);
  }

  function goHere() {
    if (!navigator.geolocation) { showToast('이 브라우저는 위치 기능을 지원하지 않습니다.', 4000); return; }
    showToast('현재 위치를 확인하고 있습니다.', 0, 'info');
    navigator.geolocation.getCurrentPosition(function (pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      setGeoZoom(ZOOM_HERE);       /* [v8-10] 현재위치 = 위치추적과 같은 LOCATION_FOCUS_ZOOM(17) */
      geolocateControl.trigger();  /* 정확도 원·진행방향 표시 */
      /* [v8-10] 팝업(하단시트) 뒤로 핀이 가려지지 않게 중심을 화면 위쪽으로 보정
         (아래로 offset → 지도상 중심이 화면 위쪽에 오도록) */
      map.flyTo({ center: [lng, lat], zoom: ZOOM_HERE, offset: [0, -Math.round(window.innerHeight * 0.18)], essential: true });
      requestVWorldReverse(lng, lat).then(function (a) {
        showToast('현재 위치를 확인했습니다.', 2000, 'success');
        openHereSheet({ lat: lat, lng: lng, jibunAddress: a.jibunAddress, roadAddress: a.roadAddress, postalCode: a.postalCode });
      }).catch(function () {
        openHereSheet({ lat: lat, lng: lng, jibunAddress: '', roadAddress: '', postalCode: '' });
      });
    }, function (err) {
      var msg = '현재 위치를 확인할 수 없습니다.';
      if (err && err.code === 1) msg = '현재 위치 권한이 없습니다.\n아이폰 설정에서 Safari 위치 권한을 허용해주세요.';
      else if (err && err.code === 3) msg = '위치 확인 시간이 초과되었습니다.\n다시 시도해주세요.';
      showToast(msg, 6000);
    }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
  }

  /* ================= 핀 저장 ================= */
  /* ===================================================================
     [v11-9] 핀 수정 —— 「핀 위치 수정」 / 「핀 이름 수정」 선택
       · 위치 수정: 지도를 움직여 중앙 십자에 맞추거나 검색 후 확정 → 좌표만 변경
         (같은 지번에 여러 개의 핀을 저장할 수 있도록 좌표 기준으로 저장)
       · 이름 수정: 기존 핀 저장 화면(이름·색상·작물·메모)
     =================================================================== */
  function openPinEditChoiceSheet(f) {
    var box = el('div');
    box.appendChild(el('div', null,
      '<div class="addr-value" style="margin-bottom:10px;">' + escapeHtml(f.name || '') + '</div>'));

    var b1 = el('button', 'sheet-btn primary', '📍 핀 위치 수정');
    b1.style.cssText += 'width:100%;margin-bottom:8px;';
    b1.addEventListener('click', function () { startPinMove(f); });

    var b2 = el('button', 'sheet-btn green-soft', '✏️ 핀 이름 수정');
    b2.style.cssText += 'width:100%;margin-bottom:8px;';
    b2.addEventListener('click', function () {
      openPinSaveSheet({ lat: f.latitude, lng: f.longitude, jibunAddress: f.jibunAddress, roadAddress: f.roadAddress, postalCode: f.postalCode }, f);
    });

    var c = el('button', 'sheet-btn danger', '취소');
    c.style.cssText += 'width:100%;';
    c.addEventListener('click', function () { openSavedLocationSheet(f); });

    box.appendChild(b1); box.appendChild(b2); box.appendChild(c);
    openSheet('핀 수정', box, 'auto');
  }

  /* 핀 위치 수정 모드: 지도 중앙 십자 + 확정/취소 (검색으로 이동해도 됨) */
  var pinMoveTarget = null;
  function startPinMove(f) {
    pinMoveTarget = f;
    closeSheet();
    map.flyTo({ center: [f.longitude, f.latitude], zoom: Math.max(map.getZoom(), 17), essential: true });
    crosshairEl.style.display = 'block';

    var box = el('div');
    box.appendChild(el('div', null,
      '<div class="addr-value">지도를 움직여 <b>중앙 십자(＋)</b>에 새 위치를 맞추거나,<br>' +
      '위 검색창에서 주소를 검색한 뒤 <b>여기에 저장</b>을 누르세요.</div>' +
      '<div class="lyr-desc" style="margin-top:8px;">주소가 같아도 좌표가 다르면 별개의 핀으로 저장됩니다.</div>'));

    var cur = el('div', 'li-coord');
    cur.id = 'pinMoveCoord';
    box.appendChild(cur);

    var row = el('div', 'btn-row');
    row.style.marginTop = '14px';
    var ok = el('button', 'sheet-btn primary', '✓ 여기에 저장');
    ok.addEventListener('click', function () { commitPinMove(); });
    var cancel = el('button', 'sheet-btn danger', '취소');
    cancel.addEventListener('click', function () { endPinMove(); openSavedLocationSheet(f); });
    row.appendChild(ok); row.appendChild(cancel);
    box.appendChild(row);

    openSheet('핀 위치 수정', box, 'auto');
    updatePinMoveCoord();
    map.on('move', updatePinMoveCoord);
  }
  function updatePinMoveCoord() {
    var c2 = document.getElementById('pinMoveCoord');
    if (!c2) return;
    var ctr = map.getCenter();
    c2.textContent = '새 위치  위도 ' + ctr.lat.toFixed(6) + ' · 경도 ' + ctr.lng.toFixed(6);
  }
  function endPinMove() {
    map.off('move', updatePinMoveCoord);
    crosshairEl.style.display = 'none';
    pinMoveTarget = null;
  }
  function commitPinMove() {
    var f = pinMoveTarget;
    if (!f) return;
    var ctr = map.getCenter();
    var arr = getFavs();
    var idx = -1;
    for (var i = 0; i < arr.length; i++) if (arr[i].id === f.id) { idx = i; break; }
    if (idx < 0) { endPinMove(); showToast('핀을 찾지 못했습니다.', 3000); return; }

    /* 좌표만 갱신하고, 주소는 새 좌표로 다시 조회 */
    arr[idx].latitude = ctr.lat; arr[idx].longitude = ctr.lng;
    arr[idx].lat = ctr.lat; arr[idx].lng = ctr.lng;
    arr[idx].manualPos = true;
    arr[idx].updatedAt = kstNowStr();
    setFavs(arr);

    requestVWorldReverse(ctr.lng, ctr.lat).then(function (a) {
      var arr2 = getFavs();
      for (var k = 0; k < arr2.length; k++) {
        if (arr2[k].id !== f.id) continue;
        if (a.jibunAddress) { arr2[k].jibunAddress = a.jibunAddress; arr2[k].addr = a.jibunAddress; }
        arr2[k].roadAddress = a.roadAddress || '';
        arr2[k].postalCode = a.postalCode || '';
        setFavs(arr2);
        endPinMove();
        showToast('핀 위치를 변경했습니다.', 2500, 'success');
        openSavedLocationSheet(arr2[k]);
        return;
      }
    }).catch(function () {
      endPinMove();
      showToast('핀 위치를 변경했습니다.\n(주소 조회는 실패)', 3000, 'success');
      openSavedLocationSheet(getFavs().filter(function (x) { return x.id === f.id; })[0]);
    });
  }

    list.innerHTML = '';

      list.appendChild(el('div', null, '<div style="color:#888;font-size:13px;padding:18px 2px;">저장된 즐겨찾기 목록이 없습니다.</div>'));
      return;
    }
    favs.forEach(function (f, i) {
      /* [v8-18] 잠금 카드는 연한 파랑, 해제 카드는 연한 아이보리 */
      var card = el('div', 'fav-card' + (f.locked ? ' locked' : ''));
      var num = el('div', 'fav-num', String(favs.length - i));
      num.style.background = colorHex(f.color);

      var body = el('div', 'fav-body',
        '<div class="fav-name">' +
        (f.crop ? '<span class="crop-tag">' + escapeHtml(f.crop) + '</span>' : '') +
        escapeHtml(f.name) + '</div>' +
        '<div class="fav-addr">' + escapeHtml(f.jibunAddress || '-') + '</div>' +
        (f.roadAddress ? '<div class="fav-addr" style="color:#888;">' + escapeHtml(f.roadAddress) + '</div>' : '') +
        '<div class="fav-coord">' + f.latitude.toFixed(6) + ', ' + f.longitude.toFixed(6) + '</div>');

      body.addEventListener('click', function () {
        closeSheet();
        map.flyTo({ center: [f.longitude, f.latitude], zoom: LOCATION_FOCUS_ZOOM, essential: true });
        setTimeout(function () { openSavedLocationSheet(f); }, 350);
      });

      var acts = el('div', 'fav-acts');
      /* [v8-17] 잠금: 파란 자물쇠 / 해제: 회색 열린 자물쇠 */
      var lock = el('button', 'icon-btn ' + (f.locked ? 'lock-on' : 'lock-off'), f.locked ? '🔒' : '🔓');
      lock.title = '삭제 방지 잠금';   /* [v8-20] 잠금은 삭제 방지용 (암호화와 별개) */
      lock.addEventListener('click', function (ev) {
        ev.stopPropagation();
        var arr = getFavs();
        for (var k = 0; k < arr.length; k++) if (arr[k].id === f.id) { arr[k].locked = !arr[k].locked; arr[k].updatedAt = kstNowStr(); }
        setFavs(arr); renderFavList();
      });
      /* [v8-17] 잠금 시 삭제 버튼은 회색 비활성 / 해제 시 빨강 활성 */
      var del = el('button', 'icon-btn ' + (f.locked ? 'del-off' : 'del-on'), '🗑');
      del.addEventListener('click', function (ev) {
        ev.stopPropagation();
        if (f.locked) { showToast('잠금된 위치입니다.\n잠금을 해제한 후 삭제해주세요.', 4000); return; }
        if (!window.confirm('이 즐겨찾기 위치를 삭제하시겠습니까?')) return;
        setFavs(getFavs().filter(function (x) { return x.id !== f.id; }));
        renderFavList();
        showToast('삭제되었습니다.', 2000, 'success');
      });
      acts.appendChild(lock); acts.appendChild(del);

      card.appendChild(num); card.appendChild(body); card.appendChild(acts);
      list.appendChild(card);
    });

  function favFitBounds() {
    var favs = getFavs();
    if (!favs.length) { showToast('저장된 즐겨찾기 위치가 없습니다.', 3000, 'info'); return; }
    closeSheet();
    if (favs.length === 1) {
      map.flyTo({ center: [favs[0].longitude, favs[0].latitude], zoom: 18, essential: true });
      return;
    }
    var b = new maplibregl.LngLatBounds();
    favs.forEach(function (f) { b.extend([f.longitude, f.latitude]); });
    map.fitBounds(b, { padding: 70, maxZoom: 17, duration: 700 });
  }

  function favShare() {
    var favs = getFavs();
    if (!favs.length) { showToast('저장된 즐겨찾기 위치가 없습니다.', 3000, 'info'); return; }
    window._tenarBuildExport({ app: 'map', type: 'favorites', savedAt: kstNowStr(), favorites: favs }, 'map')
      .then(function (out) {
        if (!out) return;
        var file = new File([out.text], 'tenar_map_favs_' + Date.now() + '.json', { type: 'application/json' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          return navigator.share({ files: [file], title: '텐아르 즐겨찾기' });
        }
        if (navigator.share) return navigator.share({ title: '텐아르 즐겨찾기', text: out.text });
        copyText(out.text);
      })
      .catch(function (e) { console.error('공유 실패', e); });
  }
  function favExport() {
    var favs = getFavs();
    if (!favs.length) { showToast('저장된 즐겨찾기 위치가 없습니다.', 3000, 'info'); return; }
    window._tenarBuildExport({ app: 'map', type: 'favorites', savedAt: kstNowStr(), favorites: favs }, 'map')
      .then(function (out) {
        if (!out) return;
        var blob = new Blob([out.text], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'tenar_map_favs_' + Date.now() + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 3000);
        showToast('내보내기 파일을 저장했습니다.' + (out.encrypted ? '\n(암호화됨)' : ''), 3500, 'success');
      });
  }
  function favImport() {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.addEventListener('change', function () {
      var file = inp.files && inp.files[0];
      if (!file) return;
      var rd = new FileReader();
      rd.onload = function () {
        var obj = null;
        try { obj = JSON.parse(rd.result); } catch (e) { showToast('JSON 파일을 읽을 수 없습니다.', 4000); return; }
        window._tenarParseImport(obj, 'map').then(function (data) {
          var incoming = (data && data.favorites) || (Array.isArray(data) ? data : null);
          if (!incoming || !incoming.length) { showToast('불러올 즐겨찾기가 없습니다.', 4000); return; }
          return window._tenarChoice3({
            title: '즐겨찾기 불러오기',
            message: '불러올 위치 ' + incoming.length + '개\n\n기존 목록에 추가하거나 교체할 수 있습니다.',
            addLabel: '추가', replaceLabel: '교체', cancelLabel: '취소'
          }).then(function (choice) {
            if (choice === 'cancel') return;
            var cur = getFavs();
            var next = (choice === 'replace') ? incoming.map(normalizeFav)
                                              : incoming.map(normalizeFav).concat(cur);
            setFavs(next);
            renderFavList();
            showToast('즐겨찾기 ' + incoming.length + '개를 불러왔습니다.', 3000, 'success');
          });
        }).catch(function (e) {
          if (e && e.code === 'CANCELLED') return;
          if (e && e.code === 'APP_MISMATCH') { showToast('다른 앱(' + window._tenarAppKo(e.app) + ')의 파일입니다.', 4500); return; }
          showToast('파일을 불러오지 못했습니다.', 4000);
        });
      };
      rd.readAsText(file);
    });
    inp.click();
  }
  function favDeleteAll() {
