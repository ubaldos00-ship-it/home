<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1f5132" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>작물 홈런왕 · 텐아르 게임센터</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{ --green:#1f5132; --green2:#2e7a4e; --greenDark:#143820; --gold:#c9962b; --gold2:#e6b955; --bg:#eaf1e6; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;}
  html,body{height:100%;}
  body{ background:var(--green); color:var(--greenDark);
    font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden; touch-action:manipulation; }
  html,*{ touch-action:manipulation; }
  .wrap{ max-width:520px; margin:0 auto; height:100%; display:flex; flex-direction:column;
    background:var(--bg); position:relative; }
  .hidden{ display:none !important; }
  .screen{ flex:1; display:flex; flex-direction:column; padding:16px 15px calc(16px + env(safe-area-inset-bottom)); overflow-y:auto; }
  /* 시작/결과 카드 */
  .card{ background:#fff; border-radius:22px; padding:22px 18px; text-align:center;
    box-shadow:0 10px 28px rgba(20,56,32,.14); }
  h1{ font-size:26px; font-weight:900; color:var(--green); letter-spacing:-.02em; }
  .sub{ font-size:13.5px; color:#5b6358; line-height:1.6; margin-top:8px; }
  .nick{ margin-top:14px; font-size:13px; font-weight:700; color:var(--greenDark);
    background:#eef6ea; border-radius:999px; padding:8px 14px; display:inline-block; }
  .myrec{ margin-top:10px; font-size:12.5px; color:#7a8172; }
  .btn{ display:flex; align-items:center; justify-content:center; gap:7px; width:100%;
    min-height:54px; border:none; border-radius:15px; font-size:16px; font-weight:800;
    font-family:inherit; cursor:pointer; }
  .btn:active{ transform:scale(.97); }
  .btn-main{ background:linear-gradient(135deg,var(--green),var(--green2)); color:#fff; box-shadow:0 6px 16px rgba(31,81,50,.28); }
  .btn-gold{ background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#3a2900; }
  .btn-ghost{ background:#eef1e9; color:#4a5245; }
  .btn-sm{ min-height:46px; font-size:14.5px; border-radius:13px; }
  .btn-row{ display:flex; gap:9px; margin-top:10px; }
  .mt{ margin-top:11px; }
  /* 게임 화면 */
  #gameScreen{ padding:0; }
  .hud{ display:flex; gap:7px; padding:10px 10px 8px; }
  .hud .cell{ flex:1; background:#fff; border-radius:13px; padding:7px 4px; text-align:center; box-shadow:0 2px 8px rgba(20,56,32,.08); }
  .hud .v{ font-size:20px; font-weight:900; color:var(--green); font-variant-numeric:tabular-nums; line-height:1; }
  .hud .v.gold{ color:var(--gold); }
  .hud .l{ font-size:10.5px; color:#7a8172; margin-top:3px; font-weight:700; }
  .canvas-wrap{ flex:1; position:relative; margin:0 10px; }
  #gameCanvas{ width:100%; height:100%; display:block; border-radius:16px;
    background:linear-gradient(#bfe3ff 0%, #9fd88f 34%, #5fae54 100%);
    box-shadow:inset 0 0 0 2px rgba(31,81,50,.18), 0 6px 18px rgba(31,81,50,.14); touch-action:manipulation; }
  .msg{ position:absolute; left:50%; top:26%; transform:translateX(-50%) scale(1);
    background:rgba(20,56,32,.9); color:#fff; padding:10px 22px; border-radius:999px;
    font-size:22px; font-weight:900; box-shadow:0 8px 22px rgba(0,0,0,.28); display:none; white-space:nowrap; }
  .msg.hr{ background:linear-gradient(135deg,#ff8f00,#ffca28); color:#3a2500; }
  .msg.hit{ background:linear-gradient(135deg,#2e7a4e,#66bb6a); }
  .msg.show{ display:block; animation:pop .28s ease; }
  @keyframes pop{ 0%{transform:translateX(-50%) scale(.6);opacity:0;} 100%{transform:translateX(-50%) scale(1);opacity:1;} }
  .swing-row{ padding:9px 10px calc(12px + env(safe-area-inset-bottom)); }
  #swingBtn{ width:100%; min-height:64px; border:none; border-radius:17px;
    background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#3a2500;
    font-size:24px; font-weight:900; font-family:inherit; cursor:pointer; box-shadow:0 6px 18px rgba(201,150,43,.4); }
  #swingBtn:active{ transform:scale(.97); }
  .top-btns{ display:flex; justify-content:space-between; align-items:center; padding:8px 12px 0; }
  .mini{ background:rgba(255,255,255,.85); border:1px solid #cfe0c6; border-radius:10px; padding:6px 12px; font-size:12.5px; font-weight:700; color:var(--green); cursor:pointer; font-family:inherit; }
  /* 결과 통계 */
  .big-hr{ font-size:46px; font-weight:900; color:var(--gold); line-height:1; }
  .stats{ display:flex; gap:8px; margin-top:14px; }
  .stat{ flex:1; background:#f2f6ef; border-radius:13px; padding:10px 4px; }
  .stat .v{ font-size:20px; font-weight:900; color:var(--green); }
  .stat .l{ font-size:11px; color:#7a8172; margin-top:2px; font-weight:700; }
  .grade{ margin-top:13px; font-size:16px; font-weight:900; color:var(--greenDark); }
  .rankline{ margin-top:6px; font-size:13px; color:var(--gold); font-weight:800; }
  .savemsg{ margin-top:8px; font-size:12px; color:#7a8172; min-height:16px; }
  /* 랭킹 모달 */
  .modal{ display:none; position:absolute; inset:0; z-index:20; background:rgba(0,0,0,.5); align-items:center; justify-content:center; padding:22px; }
  .modal.show{ display:flex; }
  .modal-box{ background:#fff; border-radius:20px; width:100%; max-width:400px; overflow:hidden; }
  .modal-head{ background:var(--green); color:#fff; padding:14px 16px; font-size:16px; font-weight:900; display:flex; justify-content:space-between; align-items:center; }
  .modal-head button{ background:rgba(255,255,255,.2); border:none; color:#fff; width:30px; height:30px; border-radius:8px; font-size:16px; cursor:pointer; }
  .modal-body{ padding:12px 14px 16px; max-height:60vh; overflow-y:auto; }
  .rank-row{ display:flex; align-items:center; gap:10px; padding:9px 6px; border-bottom:1px solid #eee; }
  .rank-row.me{ background:#eef6ea; border-radius:10px; }
  .rank-pos{ width:30px; text-align:center; font-weight:900; color:#7a8172; }
  .rank-pos.top{ font-size:20px; }
  .rank-nick{ flex:1; font-weight:800; color:var(--greenDark); }
  .rank-nick small{ font-size:11px; color:var(--gold); margin-left:5px; }
  .rank-sc{ font-weight:900; color:var(--green); }
  .empty{ text-align:center; color:#9aa08f; font-size:13px; padding:22px 0; }
  #fxCanvas{ display:none; position:absolute; inset:0; z-index:30; pointer-events:none; }
</style>
</head>
<body>
<div class="wrap">
  <!-- 시작 -->
  <div id="startScreen" class="screen">
    <div class="top-btns"><button class="mini" id="homeBtn">← 게임센터</button><span></span></div>
    <div style="flex:1;display:flex;align-items:center;">
      <div class="card" style="width:100%;">
        <div style="font-size:44px;">⚾</div>
        <h1>작물 홈런왕</h1>
        <div class="sub">공 <b>20개</b>를 던집니다.<br>타이밍 맞춰 <b>스윙!</b> — <b>홈런존</b>에 넣으면 홈런!<br>연속으로 치면 <b>콤보 보너스</b> 점수.</div>
        <div class="nick" id="nickBox">준비 완료</div>
        <div class="myrec" id="myRecord">내 최고점 –</div>
        <button class="btn btn-main mt" id="startBtn">🏏 게임 시작</button>
        <div class="btn-row">
          <button class="btn btn-gold btn-sm" id="rankBtn">🏆 주간랭킹</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 게임 -->
  <div id="gameScreen" class="screen hidden">
    <div class="hud">
      <div class="cell"><div class="v" id="hudLeft">20</div><div class="l">남은 공</div></div>
      <div class="cell"><div class="v gold" id="hudHr">0</div><div class="l">홈런</div></div>
      <div class="cell"><div class="v" id="hudCombo">0</div><div class="l">콤보</div></div>
      <div class="cell"><div class="v" id="hudScore">0</div><div class="l">점수</div></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="msg" id="msgEl"></div>
    </div>
    <div class="swing-row"><button id="swingBtn">스윙!</button></div>
  </div>

  <!-- 결과 -->
  <div id="resultScreen" class="screen hidden">
    <div style="flex:1;display:flex;align-items:center;">
      <div class="card" style="width:100%;">
        <div style="font-size:13px;font-weight:800;color:#7a8172;">⚾ 경기 종료</div>
        <div class="big-hr" id="resHr">0</div>
        <div style="font-size:13px;font-weight:800;color:var(--gold);">홈런</div>
        <div class="stats">
          <div class="stat"><div class="v" id="resScore">0</div><div class="l">점수</div></div>
          <div class="stat"><div class="v" id="resHit">0</div><div class="l">안타</div></div>
          <div class="stat"><div class="v" id="resCombo">0</div><div class="l">최대콤보</div></div>
        </div>
        <div class="grade" id="resGrade">–</div>
        <div class="rankline" id="resRank"></div>
        <div class="savemsg" id="saveMsg"></div>
        <button class="btn btn-main mt" id="retryBtn">🔁 다시 하기</button>
        <div class="btn-row">
          <button class="btn btn-gold btn-sm" id="resultRankBtn">🏆 랭킹</button>
          <button class="btn btn-ghost btn-sm" id="copyBtn">📋 결과복사</button>
        </div>
        <div class="btn-row"><button class="btn btn-ghost btn-sm" id="resultCenterBtn">🎮 게임센터</button></div>
      </div>
    </div>
  </div>

  <!-- 랭킹 모달 -->
  <div class="modal" id="rankModal">
    <div class="modal-box">
      <div class="modal-head"><span>🏆 이번 주 홈런왕</span><button id="rankCloseBtn">✕</button></div>
      <div class="modal-body" id="rankList"></div>
    </div>
  </div>
  <canvas id="fxCanvas"></canvas>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc, increment,
    collection, getDocs, query, orderBy, limit, where, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAcU8iZR-B5HdvX1FOh4APCm0hXsz1u_X8",
    authDomain: "tenar-chat-1674c.firebaseapp.com",
    databaseURL: "https://tenar-chat-1674c-default-rtdb.firebaseio.com",
    projectId: "tenar-chat-1674c",
    storageBucket: "tenar-chat-1674c.firebasestorage.app",
    messagingSenderId: "662688468209",
    appId: "1:662688468209:web:0f37484e26943d79946d50"
  };
  const fbApp = initializeApp(firebaseConfig);
  const db = getFirestore(fbApp);
  const GAME_ID = 'crop_baseball';
  const GAME_NAME = '작물 홈런왕';
  const TOTAL = 20;

  function withTimeout(p, ms=4500){ return Promise.race([p, new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]); }
  function currentWeekKey(now=new Date()){
    const kst=new Date(now.getTime()+9*3600*1000);
    const day=kst.getUTCDay(); const dsm=(day+6)%7;
    const kstMid=Date.UTC(kst.getUTCFullYear(),kst.getUTCMonth(),kst.getUTCDate());
    let b=kstMid-dsm*86400000+9*3600*1000;
    if(kst.getTime()<b) b-=7*86400000;
    const d=new Date(b);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
  }
  const WEEK = currentWeekKey();
  const weeklyCol = () => collection(db, 'rankings', GAME_ID, 'wk_' + WEEK);
  const weeklyDoc = (uid) => doc(db, 'rankings', GAME_ID, 'wk_' + WEEK, uid);

  const USER = { userId: localStorage.getItem('tenarGameUserId'), nickname: localStorage.getItem('tenarGameNick') };
  if (!USER.userId || !USER.nickname) location.replace('game_center.html');

  const $ = id => document.getElementById(id);
  const fmt = n => (n||0).toLocaleString('ko-KR');
  const escapeHtml = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const safeGet=(k,f='')=>{try{return localStorage.getItem(k)??f;}catch(e){return f;}};
  const safeSet=(k,v)=>{try{localStorage.setItem(k,String(v));}catch(e){}};

  const CROPS = [
    {e:'🧄',c:'#f3ead2'},{e:'🧅',c:'#e9d0ff'},{e:'🥔',c:'#c79a63'},{e:'🥬',c:'#8fd07f'},
    {e:'🍎',c:'#ff6b6b'},{e:'🍅',c:'#ff7043'},{e:'🌽',c:'#ffd54f'},{e:'🍐',c:'#cddc39'}
  ];

  const canvas=$('gameCanvas'), ctx=canvas.getContext('2d');
  let W=0,H=0, ratio=1;
  let rafId=null, lastTs=0;
  let game=null, ball=null, state='idle';   // idle|ready|pitch|result
  let batSwing=0;                            // 0~1 스윙 애니메이션 진행
  let msgTimer=null, gapTimer=null, pitchStartMs=0, pitchDur=0, curCrop=null, swungThisPitch=false;
  let savedOnce=false;

  function resize(){
    const r=canvas.getBoundingClientRect();
    ratio=Math.max(1, window.devicePixelRatio||1);
    W=r.width; H=r.height;
    canvas.width=Math.floor(W*ratio); canvas.height=Math.floor(H*ratio);
    ctx.setTransform(ratio,0,0,ratio,0,0);
  }
  // 좌표(비율)
  const pitcher = () => ({x:W*0.5, y:H*0.10});
  const batter  = () => ({x:W*0.70, y:H*0.84});
  const hitLineY = () => H*0.80;
  const HR_WIN = () => H*0.05;
  const HIT_WIN= () => H*0.115;
  const hrZoneY = () => H*0.20;

  function newGame(){
    game={ score:0, homeRunCount:0, hitCount:0, missCount:0, combo:0, maxCombo:0,
           pitchNo:0, pitchCount:0, playTime:0, startTime:Date.now(), difficulty:'arcade' };
    savedOnce=false;
  }

  function showScreen(name){ ['start','game','result'].forEach(s=>$(s+'Screen').classList.toggle('hidden', s!==name)); }
  function goCenter(){ location.href='game_center.html'; }

  function init(){
    $('nickBox').textContent = `${USER.nickname}님, 타석에 서보세요!`;
    loadMyRecord();
    $('startBtn').addEventListener('click', startGame);
    $('retryBtn').addEventListener('click', startGame);
    $('rankBtn').addEventListener('click', openRanking);
    $('resultRankBtn').addEventListener('click', openRanking);
    $('rankCloseBtn').addEventListener('click', ()=>$('rankModal').classList.remove('show'));
    $('rankModal').addEventListener('click', e=>{ if(e.target===$('rankModal')) $('rankModal').classList.remove('show'); });
    $('copyBtn').addEventListener('click', copyResult);
    $('homeBtn').addEventListener('click', goCenter);
    $('resultCenterBtn').addEventListener('click', goCenter);
    $('swingBtn').addEventListener('click', swing);
    window.addEventListener('keydown', e=>{ if((e.code==='Space'||e.code==='Enter') && state==='pitch'){ e.preventDefault(); swing(); } });
    window.addEventListener('resize', resize);
    canvas.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
    resize(); drawIdle();
  }

  async function loadMyRecord(){
    const localBest=parseInt(safeGet('cropBaseballBestScore','0'),10)||0;
    const plays=parseInt(safeGet('cropBaseballPlayCount','0'),10)||0;
    $('myRecord').textContent=`내 최고점 ${fmt(localBest)}점 · 플레이 ${fmt(plays)}회`;
    try{
      const snap=await withTimeout(getDoc(doc(db,'rankings',GAME_ID,'scores',USER.userId)));
      if(snap.exists()){ const best=Math.max(localBest, snap.data().score||0); safeSet('cropBaseballBestScore',best);
        $('myRecord').textContent=`내 최고점 ${fmt(best)}점 · 플레이 ${fmt(plays)}회`; }
    }catch(e){}
  }

  function startGame(){
    clearTimeout(gapTimer); clearTimeout(msgTimer); cancelAnimationFrame(rafId);
    newGame(); showScreen('game'); resize(); updateHud();
    state='ready'; ball=null; batSwing=0;
    loop(performance.now());
    gapTimer=setTimeout(nextPitch, 650);
  }

  function nextPitch(){
    if(game.pitchNo>=TOTAL){ endGame(); return; }
    game.pitchNo++; game.pitchCount++;
    curCrop=CROPS[(Math.random()*CROPS.length)|0];
    swungThisPitch=false;
    pitchDur = 620 + Math.random()*220;           // 빠른 공 (0.62~0.84s)
    const curve = (Math.random()-0.5) * W*0.18;    // 좌우 살짝 휨
    const p=pitcher();
    ball={ x:p.x, y:p.y, x0:p.x, curve, state:'pitch', vx:0, vy:0, rot:0 };
    pitchStartMs=performance.now();
    state='pitch';
    updateHud();
  }

  function swing(){
    if(state!=='pitch' || swungThisPitch || !ball || ball.state!=='pitch') return;
    swungThisPitch=true;
    batSwing=1;   // 애니메이션 시작(감소)
    const err=Math.abs(ball.y - hitLineY());
    if(err<=HR_WIN()){        // 홈런
      game.combo++; game.maxCombo=Math.max(game.maxCombo,game.combo);
      game.homeRunCount++; game.hitCount++;
      const bonus=(game.combo-1)*15;
      game.score += 100 + bonus;
      ball.state='fly'; ball.vx=-(4.5+Math.random()*1.5); ball.vy=-(13+Math.random()*2);
      flash('🚀 홈런!'+(game.combo>1?` ${game.combo}연속!`:''), 'hr');
      miniBurst();
    } else if(err<=HIT_WIN()){ // 안타
      game.combo++; game.maxCombo=Math.max(game.maxCombo,game.combo);
      game.hitCount++;
      const bonus=(game.combo-1)*8;
      game.score += 25 + bonus;
      ball.state='fly'; ball.vx=-(2+Math.random()*2); ball.vy=-(7+Math.random()*2);
      flash('안타! +'+(25+bonus), 'hit');
    } else {                   // 헛스윙
      game.combo=0; game.missCount++;
      flash('헛스윙…', '');
    }
    updateHud();
    endPitchSoon();
  }

  function endPitchSoon(){ clearTimeout(gapTimer); gapTimer=setTimeout(()=>{ if(state==='pitch'){ nextPitch(); } }, 760); }

  function flash(text, cls){
    const el=$('msgEl'); el.className='msg show'+(cls?(' '+cls):''); el.textContent=text;
    clearTimeout(msgTimer); msgTimer=setTimeout(()=>{ el.classList.remove('show'); }, 750);
  }

  function updateHud(){
    $('hudLeft').textContent=Math.max(0, TOTAL-game.pitchNo);
    $('hudHr').textContent=game.homeRunCount;
    $('hudCombo').textContent=game.combo;
    $('hudScore').textContent=fmt(game.score);
  }

  function loop(ts){
    const dt=Math.min(50, ts-(lastTs||ts)); lastTs=ts;
    if(batSwing>0) batSwing=Math.max(0, batSwing - dt/180);
    if(state==='pitch' && ball){
      if(ball.state==='pitch'){
        const prog=(ts-pitchStartMs)/pitchDur;      // 0~1+
        ball.y = pitcher().y + (H*1.08 - pitcher().y)*prog;
        ball.x = ball.x0 + ball.curve*Math.sin(prog*Math.PI);
        ball.rot += dt*0.02;
        if(prog>=1.12 && !swungThisPitch){           // 놓침
          swungThisPitch=true; game.combo=0; game.missCount++; flash('놓침!', ''); updateHud(); endPitchSoon();
        }
      } else if(ball.state==='fly'){
        ball.x+=ball.vx; ball.y+=ball.vy; ball.vy+=0.34; ball.rot+=dt*0.05;
      }
    }
    draw();
    rafId=requestAnimationFrame(loop);
  }

  function drawIdle(){ resize(); draw(); }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // 홈런존 배너(상단)
    const hz=hrZoneY();
    const g=ctx.createLinearGradient(0,0,0,hz);
    g.addColorStop(0,'rgba(255,193,7,.92)'); g.addColorStop(1,'rgba(255,193,7,.55)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,hz);
    ctx.strokeStyle='#fff'; ctx.setLineDash([9,7]); ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,hz); ctx.lineTo(W,hz); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#7a4b00'; ctx.font='900 15px Pretendard,sans-serif'; ctx.textAlign='center';
    ctx.fillText('🏟  HOME RUN ZONE  🏟', W/2, hz*0.6);

    // 타격 라인(스윗스팟)
    const hl=hitLineY();
    ctx.strokeStyle='rgba(255,255,255,.65)'; ctx.setLineDash([6,6]); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(W*0.12,hl); ctx.lineTo(W*0.88,hl); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='rgba(20,56,32,.5)'; ctx.font='700 11px Pretendard,sans-serif';
    ctx.fillText('여기서 스윙!', W*0.28, hl-6);

    // 홈플레이트 — 타자 왼쪽(투수 쪽)에 두어 타자가 옆에 서도록
    const b=batter();
    const px=b.x-48, py=b.y+30;
    ctx.fillStyle='#f2f2ee'; ctx.beginPath();
    ctx.moveTo(px-24,py-6); ctx.lineTo(px+24,py-6); ctx.lineTo(px+24,py+2);
    ctx.lineTo(px,py+12); ctx.lineTo(px-24,py+2); ctx.closePath(); ctx.fill();

    drawBatter(b);
    // 투수 마운드
    const p=pitcher();
    ctx.fillStyle='rgba(120,80,40,.35)'; ctx.beginPath(); ctx.ellipse(p.x,p.y+8,26,10,0,0,7); ctx.fill();
    ctx.font='22px serif'; ctx.textAlign='center'; ctx.fillStyle='#333'; ctx.fillText('🧢', p.x, p.y+4);

    // 공
    if(ball && (state==='pitch')){
      ctx.save(); ctx.translate(ball.x,ball.y); ctx.rotate(ball.rot);
      ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(curCrop?curCrop.e:'⚾', 0, 0);
      ctx.restore();
    }
  }

  function drawBatter(b){
    ctx.save();
    // 몸
    ctx.strokeStyle='#2b3a24'; ctx.lineWidth=7; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(b.x, b.y+16); ctx.lineTo(b.x, b.y-14); ctx.stroke();
    // 머리 + 헬멧
    ctx.fillStyle='#f0c9a0'; ctx.beginPath(); ctx.arc(b.x, b.y-26, 11, 0, 7); ctx.fill();
    ctx.fillStyle='#1f5132'; ctx.beginPath(); ctx.arc(b.x, b.y-28, 12, Math.PI, 2*Math.PI); ctx.fill();
    // 다리
    ctx.strokeStyle='#2b3a24'; ctx.lineWidth=6;
    ctx.beginPath(); ctx.moveTo(b.x, b.y+16); ctx.lineTo(b.x-11, b.y+34); ctx.moveTo(b.x, b.y+16); ctx.lineTo(b.x+11, b.y+34); ctx.stroke();
    // 배트 (스윙 애니메이션: 대기 -50° → 스윙 +75°)
    const rest=-2.35, swing=-2.35 + (1-batSwing)*2.6;   // batSwing 1→0 진행
    const ang = batSwing>0 ? swing : rest;
    const hx=b.x-2, hy=b.y-10;
    ctx.strokeStyle='#a9712f'; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(hx,hy);
    ctx.lineTo(hx+Math.cos(ang)*46, hy+Math.sin(ang)*46); ctx.stroke();
    // 손
    ctx.fillStyle='#f0c9a0'; ctx.beginPath(); ctx.arc(hx,hy,5,0,7); ctx.fill();
    ctx.restore();
  }

  function endGame(){
    state='result'; cancelAnimationFrame(rafId); ball=null;
    game.playTime=Math.round((Date.now()-game.startTime)/1000);
    $('resHr').textContent=game.homeRunCount;
    $('resScore').textContent=fmt(game.score);
    $('resHit').textContent=game.hitCount;
    $('resCombo').textContent=game.maxCombo;
    $('resGrade').textContent=grade(game.score);
    $('resRank').textContent=''; $('saveMsg').textContent='기록 저장 중…';
    const localBest=parseInt(safeGet('cropBaseballBestScore','0'),10)||0;
    if(game.score>localBest) safeSet('cropBaseballBestScore', game.score);
    safeSet('cropBaseballPlayCount', (parseInt(safeGet('cropBaseballPlayCount','0'),10)||0)+1);
    showScreen('result');
    submitScore();
  }

  function grade(s){
    if(s>=2400) return '작물 홈런왕 ⚾🚜';
    if(s>=1600) return '수확 타격왕 🌾';
    if(s>=900)  return '텐아르 강타자 🔥';
    if(s>=400)  return '작물 야구 유망주 🌱';
    return '다시 타석에! 💪';
  }
  const xpForScore = s => 10 + Math.floor(s/100) + game.homeRunCount*3;

  async function submitScore(){
    if(savedOnce) return; savedOnce=true;
    const score=game.score, xpGain=xpForScore(score);
    try{
      const allRef=doc(db,'rankings',GAME_ID,'scores',USER.userId);
      let prevBest=0; try{ const p=await withTimeout(getDoc(allRef)); prevBest=p.exists()?(p.data().score||0):0; }catch(e){}
      if(score>prevBest){
        await withTimeout(setDoc(allRef,{ userId:USER.userId, nickname:USER.nickname, score, difficulty:'arcade',
          hitCount:game.hitCount, homeRunCount:game.homeRunCount, maxCombo:game.maxCombo, playedAt:serverTimestamp() }));
      }
      const wkRef=weeklyDoc(USER.userId);
      let wkPrev=0; try{ const w=await withTimeout(getDoc(wkRef)); wkPrev=w.exists()?(w.data().score||0):0; }catch(e){}
      if(score>wkPrev){
        await withTimeout(setDoc(wkRef,{ userId:USER.userId, nickname:USER.nickname, score, difficulty:'arcade',
          pitchCount:game.pitchCount, hitCount:game.hitCount, homeRunCount:game.homeRunCount,
          maxCombo:game.maxCombo, playTime:game.playTime, weekKey:WEEK, playedAt:serverTimestamp() }));
      }
      withTimeout(setDoc(doc(collection(db,'playLogs')),{ gameId:GAME_ID, userId:USER.userId, nickname:USER.nickname,
        score, homeRunCount:game.homeRunCount, hitCount:game.hitCount, playedAt:serverTimestamp() })).catch(()=>{});
      withTimeout(updateDoc(doc(db,'users',USER.userId),{ totalPlayCount:increment(1), totalScore:increment(score),
        xp:increment(xpGain), lastLogin:serverTimestamp() })).catch(()=>{});
      const wkBest=Math.max(wkPrev,score);
      try{
        const higher=await withTimeout(getDocs(query(weeklyCol(), where('score','>',wkBest))));
        $('resRank').textContent='이번 주 '+(higher.size+1)+'위';
        if(higher.size===0 && wkBest>0) celebrate();
      }catch(e){ $('resRank').textContent=''; }
      $('saveMsg').textContent=`+${xpGain} XP · 기록 저장 완료`;
    }catch(e){ $('saveMsg').textContent='랭킹 저장 실패(결과는 정상). 잠시 후 다시 시도하세요.'; }
  }

  async function openRanking(){
    $('rankModal').classList.add('show');
    const list=$('rankList'); list.innerHTML='<div class="empty">불러오는 중…</div>';
    try{
      const qs=await withTimeout(getDocs(query(weeklyCol(), orderBy('score','desc'), limit(10))));
      if(qs.empty){ list.innerHTML='<div class="empty">이번 주 기록이 없어요.<br>첫 홈런왕에 도전!</div>'; return; }
      const medals=['🥇','🥈','🥉']; let html='',pos=0;
      qs.forEach(d=>{ pos++; const r=d.data(); const mine=r.userId===USER.userId;
        const pc=pos<=3?`<div class="rank-pos top">${medals[pos-1]}</div>`:`<div class="rank-pos">${pos}</div>`;
        html+=`<div class="rank-row ${mine?'me':''}">${pc}<div class="rank-nick">${escapeHtml(r.nickname||'익명')}${mine?'<small>나</small>':''}</div><div class="rank-sc">${fmt(r.score)}점</div></div>`; });
      list.innerHTML=html;
    }catch(e){ list.innerHTML='<div class="empty">랭킹을 불러오지 못했습니다.</div>'; }
  }

  async function copyResult(){
    const text=`[텐아르 작물 홈런왕]\n닉네임: ${USER.nickname}\n홈런: ${game.homeRunCount}개\n점수: ${fmt(game.score)}점\n최대콤보: ${game.maxCombo}연속\n등급: ${grade(game.score)}\n\n나도 도전!`;
    try{ if(navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(text);
      else { const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px';
        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
      $('saveMsg').textContent='결과가 복사되었습니다.';
    }catch(e){ $('saveMsg').textContent='복사 실패 — 직접 선택해 복사하세요.'; }
  }

  function miniBurst(){ /* 홈런 시 작은 반짝임 */ celebrate(true); }
  function celebrate(mini){
    const cv=$('fxCanvas'); cv.style.display='block'; cv.width=cv.clientWidth; cv.height=cv.clientHeight;
    const c=cv.getContext('2d'); const parts=[], colors=['#ff5252','#ffd740','#69f0ae','#40c4ff','#ffab40','#e040fb'];
    const bursts = mini?1:5, maxT = mini?60:150;
    function burst(x,y){ const n=mini?18:26; for(let i=0;i<n;i++){ const a=Math.PI*2*i/n, s=2+Math.random()*4;
      parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color:colors[(Math.random()*colors.length)|0]}); } }
    if(mini) burst(cv.width*0.72, cv.height*0.5);
    let t=0;
    (function frame(){ c.clearRect(0,0,cv.width,cv.height);
      if(!mini && t%14===0 && t<70) burst(40+Math.random()*(cv.width-80), 60+Math.random()*cv.height*.45);
      for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.06; p.life-=.02;
        if(p.life<=0){ parts.splice(i,1); continue; } c.globalAlpha=p.life; c.fillStyle=p.color; c.beginPath(); c.arc(p.x,p.y,3,0,7); c.fill(); }
      c.globalAlpha=1; t++;
      if(t<maxT || parts.length) requestAnimationFrame(frame); else cv.style.display='none';
    })();
  }

  init();
</script>
