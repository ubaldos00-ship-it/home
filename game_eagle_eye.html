<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
        getFirestore, doc, getDoc, setDoc, updateDoc, increment,
        collection, getDocs, query, orderBy, limit, where, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAcU8iZR-B5HdvX1FOh4APCm0hXsz1u_X8",
        authDomain: "tenar-chat-1674c.firebaseapp.com",
        databaseURL: "https://tenar-chat-1674c-default-rtdb.firebaseio.com",
        projectId: "tenar-chat-1674c",
        storageBucket: "tenar-chat-1674c.firebasestorage.app",
        messagingSenderId: "662688468209",
        appId: "1:662688468209:web:0f37484e26943d79946d50"
    };
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const GAME_ID = 'eagle_eye';

    /* Firestore가 비활성/지연돼도 결과 화면이 멈추지 않도록 시간제한을 둔다 */
    function withTimeout(promise, ms = 4500) {
        return Promise.race([
            promise,
            new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
        ]);
    }

    /* ===== 주간 키 (매주 월요일 09:00 KST 리셋) ===== */
    function currentWeekKey(now = new Date()) {
        const kst = new Date(now.getTime() + 9 * 3600 * 1000);
        const day = kst.getUTCDay();
        const daysSinceMon = (day + 6) % 7;
        const kstMid = Date.UTC(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate());
        let boundary = kstMid - daysSinceMon * 86400000 + 9 * 3600 * 1000;
        if (kst.getTime() < boundary) boundary -= 7 * 86400000;
        const b = new Date(boundary);
        return `${b.getUTCFullYear()}-${String(b.getUTCMonth()+1).padStart(2,'0')}-${String(b.getUTCDate()).padStart(2,'0')}`;
    }
    const WEEK = currentWeekKey();
    const weeklyCol = () => collection(db, 'rankings', GAME_ID, 'wk_' + WEEK);
    const weeklyDoc = (uid) => doc(db, 'rankings', GAME_ID, 'wk_' + WEEK, uid);

    /* ===== 사용자 (없으면 게임센터로) ===== */
    const USER = {
        userId: localStorage.getItem('tenarGameUserId'),
        nickname: localStorage.getItem('tenarGameNick')
    };
    if (!USER.userId || !USER.nickname) {
        location.replace('game_center.html');
    }

    /* ===== 게임 본체 (원본 매의 눈 로직 유지) ===== */
    const game = {
        level: 1,
        highScore: parseInt(localStorage.getItem('spyCropHighScore') || '1', 10),
        time: 100,
        timerInterval: null,
        isPlaying: false,
        stageData: [
            ['🍎', '🍅'], ['🥬', '🥦'], ['🥔', '🍠'], ['🍇', '🫐'],
            ['🧅', '🧄'], ['🍊', '🍋'], ['🌽', '🌾'], ['🍄', '🪵'],
            ['🍒', '🍓'], ['🍐', '🍏'], ['🍉', '🎃'], ['🥕', '🥖'],
            ['🌵', '🌳'], ['🌻', '🌼'], ['🍆', '🥒'], ['🥨', '🥐']
        ],
        init() {
            this.board = document.getElementById('game-board');
            this.levelText = document.getElementById('current-level');
            this.topLevelText = document.getElementById('top-level');
            this.timerBar = document.getElementById('timer-bar');
            this.topLevelText.innerText = this.highScore;
        },
        start() {
            try { ensureAudio(); } catch (e) {}   // 사용자 동작 시점에 오디오 준비
            this.level = 1; this.time = 100; this.isPlaying = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            this.render(); this.startTimer();
        },
        startTimer() {
            if (this.timerInterval) clearInterval(this.timerInterval);
            this.timerInterval = setInterval(() => {
                this.time -= (0.7 + (this.level * 0.06));
                this.updateTimerBar();
                if (this.time <= 0) this.gameOver();
            }, 100);
        },
        updateTimerBar() {
            this.timerBar.style.width = Math.max(0, this.time) + '%';
            if (this.time < 30) this.timerBar.style.background = '#ff4d4d';
            else if (this.time < 60) this.timerBar.style.background = '#ffa500';
            else this.timerBar.style.background = '#c9962b';
        },
        render() {
            this.levelText.innerText = this.level;
            this.board.innerHTML = '';
            let size = 2 + Math.floor(this.level / 3);
            if (size > 8) size = 8;
            this.board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            const pairIndex = Math.floor(Math.random() * this.stageData.length);
            let [normal, spy] = this.stageData[pairIndex];
            if (Math.random() > 0.5) [normal, spy] = [spy, normal];
            const totalCells = size * size;
            const spyIndex = Math.floor(Math.random() * totalCells);
            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = (i === spyIndex) ? spy : normal;
                const handleTouch = (e) => {
                    e.preventDefault();
                    if (!this.isPlaying) return;
                    if (i === spyIndex) this.nextLevel();
                    else this.wrongChoice(cell);
                };
                cell.addEventListener('mousedown', handleTouch);
                cell.addEventListener('touchstart', handleTouch, { passive: false });
                this.board.appendChild(cell);
            }
        },
        nextLevel() {
            this.level++;
            const bonus = Math.max(10, 20 - Math.floor(this.level / 2));
            this.time = Math.min(100, this.time + bonus);
            this.updateTimerBar(); this.render();
        },
        wrongChoice(cell) {
            this.time -= 12; this.updateTimerBar();
            cell.classList.add('wrong');
            setTimeout(() => cell.classList.remove('wrong'), 200);
        },
        gameOver() {
            this.isPlaying = false;
            clearInterval(this.timerInterval);
            // 점수 = 도달 레벨
            const score = this.level;
            // 로컬 최고점 (오프라인 백업)
            if (score > this.highScore) {
                this.highScore = score;
                localStorage.setItem('spyCropHighScore', this.highScore);
                this.topLevelText.innerText = this.highScore;
            }
            document.getElementById('final-level').innerText = score;
            let rank = "";
            if (score > 25) rank = "🏅 신의 경지에 오른 조사관";
            else if (score > 15) rank = "👁️ 매의 눈을 가진 베테랑";
            else if (score > 8) rank = "👨‍🌾 숙련된 현장 농부";
            else rank = "🌱 초보 관찰자";
            document.getElementById('rank-text').innerText = rank;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            submitScore(score);
        }
    };

    /* ===== 점수 저장 / XP / 랭킹 ===== */
    const XP_PER_PLAY = 10;       // 플레이 기본 XP
    function xpForScore(score) { return XP_PER_PLAY + score; } // 레벨이 높을수록 추가 XP

    async function submitScore(score) {
        const xpGain = xpForScore(score);
        // 결과 화면 임시 표시 (네트워크 전이라도 점수는 보임)
        document.getElementById('xpGain').textContent = `+${xpGain} XP 획득`;
        document.getElementById('resBest').textContent = '…';
        document.getElementById('resRank').textContent = '…';
        document.getElementById('newBest').classList.add('hidden');

        if (!USER.userId) return;

        // 1) 개인 통산 최고점 (계속 유지)
        const scoreRef = doc(db, 'rankings', GAME_ID, 'scores', USER.userId);
        let prevBest = 0, isNewBest = false;
        try {
            const prev = await withTimeout(getDoc(scoreRef));
            prevBest = prev.exists() ? (prev.data().score || 0) : 0;
            isNewBest = score > prevBest;
            if (isNewBest) {
                await withTimeout(setDoc(scoreRef, {
                    userId: USER.userId, nickname: USER.nickname,
                    score: score, playedAt: serverTimestamp()
                }));
            }
        } catch (e) {}

        // 2) 이번 주 최고점 (주간랭킹)
        const wkRef = weeklyDoc(USER.userId);
        let wkPrev = 0;
        try {
            const wp = await withTimeout(getDoc(wkRef));
            wkPrev = wp.exists() ? (wp.data().score || 0) : 0;
            if (score > wkPrev) {
                await withTimeout(setDoc(wkRef, {
                    userId: USER.userId, nickname: USER.nickname,
                    score: score, weekKey: WEEK, playedAt: serverTimestamp()
                }));
            }
        } catch (e) {}

        // 3) 플레이 로그 + 사용자 누적 XP
        withTimeout(setDoc(doc(collection(db, 'playLogs')), {
            gameId: GAME_ID, userId: USER.userId, nickname: USER.nickname,
            score: score, playedAt: serverTimestamp()
        })).catch(() => {});
        withTimeout(updateDoc(doc(db, 'users', USER.userId), {
            totalPlayCount: increment(1),
            totalScore: increment(score),
            xp: increment(xpGain),
            lastLogin: serverTimestamp()
        })).catch(() => {});

        // 통산 최고점 표시
        const myBest = Math.max(prevBest, score);
        document.getElementById('resBest').textContent = myBest + ' LV';
        if (isNewBest) document.getElementById('newBest').classList.remove('hidden');

        // 주간 순위 계산 + 1등이면 폭죽
        const wkBest = Math.max(wkPrev, score);
        try {
            const higher = await withTimeout(getDocs(query(weeklyCol(), where('score', '>', wkBest))));
            const weekRank = higher.size + 1;
            document.getElementById('resRank').textContent = weekRank + '위';
            if (weekRank === 1 && wkBest > 0) celebrate();
        } catch (e) {
            document.getElementById('resRank').textContent = '-';
        }
    }

    /* ===== 폭죽 + 팡파르 ===== */
    let _actx = null;
    function ensureAudio() {
        if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
        if (_actx.state === 'suspended') _actx.resume();
    }
    function playFanfare() {
        try {
            ensureAudio();
            const now = _actx.currentTime;
            const seq = [523.25, 659.25, 783.99, 1046.5];
            seq.forEach((f, i) => {
                const o = _actx.createOscillator(), g = _actx.createGain();
                o.type = 'triangle'; o.frequency.value = f;
                const t0 = now + i * 0.16;
                g.gain.setValueAtTime(0.0001, t0);
                g.gain.exponentialRampToValueAtTime(0.25, t0 + 0.03);
                g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.42);
                o.connect(g).connect(_actx.destination);
                o.start(t0); o.stop(t0 + 0.45);
            });
            [523.25, 659.25, 783.99, 1046.5].forEach(f => {
                const o = _actx.createOscillator(), g = _actx.createGain();
                o.type = 'triangle'; o.frequency.value = f;
                const t0 = now + 0.66;
                g.gain.setValueAtTime(0.0001, t0);
                g.gain.exponentialRampToValueAtTime(0.22, t0 + 0.04);
                g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.0);
                o.connect(g).connect(_actx.destination);
                o.start(t0); o.stop(t0 + 1.05);
            });
        } catch (e) {}
    }
    function runFireworks() {
        const cv = document.getElementById('fxCanvas');
        cv.style.display = 'block';
        cv.width = cv.clientWidth; cv.height = cv.clientHeight;
        const ctx = cv.getContext('2d');
        const parts = [];
        const colors = ['#ff5252','#ffd740','#69f0ae','#40c4ff','#e040fb','#ffab40'];
        function burst(x, y) {
            const n = 34;
            for (let i = 0; i < n; i++) {
                const a = (Math.PI * 2) * i / n, s = 2 + Math.random() * 4.5;
                parts.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color: colors[(Math.random()*colors.length)|0] });
            }
        }
        let t = 0;
        function frame() {
            ctx.clearRect(0, 0, cv.width, cv.height);
            if (t % 16 === 0 && t < 100) burst(40 + Math.random()*(cv.width-80), 40 + Math.random()*cv.height*0.55);
            for (let i = parts.length - 1; i >= 0; i--) {
                const p = parts[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life -= 0.011;
                if (p.life <= 0) { parts.splice(i, 1); continue; }
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill();
            }
            ctx.globalAlpha = 1;
            t++;
            if (t < 210 || parts.length) requestAnimationFrame(frame);
            else cv.style.display = 'none';
        }
        frame();
    }
    function celebrate() {
        playFanfare();
        runFireworks();
        const b = document.getElementById('champBanner');
        b.classList.add('show');
        setTimeout(() => { b.classList.remove('show'); b.style.display = 'none'; }, 3200);
    }

    /* ===== 랭킹 모달 ===== */
    const rankModal = document.getElementById('rankModal');
    async function openRanking() {
        rankModal.classList.add('show');
        const list = document.getElementById('rankList');
        list.innerHTML = '<div class="rank-loading">불러오는 중…</div>';
        try {
            const qs = await withTimeout(getDocs(query(weeklyCol(), orderBy('score', 'desc'), limit(10))));
            if (qs.empty) { list.innerHTML = '<div class="rank-empty">이번 주 기록이 아직 없어요.<br>첫 1위에 도전해보세요!</div>'; return; }
            const medals = ['🥇', '🥈', '🥉'];
            let html = '', pos = 0;
            qs.forEach((d) => {
                pos++;
                const r = d.data();
                const mine = r.userId === USER.userId;
                const posCell = pos <= 3 ? `<div class="rank-pos top">${medals[pos-1]}</div>` : `<div class="rank-pos">${pos}</div>`;
                html += `<div class="rank-row ${mine ? 'me' : ''}">${posCell}
                    <div class="rank-nick">${escapeHtml(r.nickname || '익명')}${mine ? '<small>나</small>' : ''}</div>
                    <div class="rank-sc">${r.score} LV</div></div>`;
            });
            list.innerHTML = html;
        } catch (e) {
            list.innerHTML = '<div class="rank-empty">랭킹을 불러오지 못했습니다.</div>';
        }
    }
    function closeRanking() { rankModal.classList.remove('show'); }
    function goCenter() { location.href = 'game_center.html'; }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    /* ===== 이벤트 바인딩 ===== */
    document.getElementById('startBtn').addEventListener('click', () => game.start());
    document.getElementById('retryBtn').addEventListener('click', () => game.start());
    document.getElementById('startRankBtn').addEventListener('click', openRanking);
    document.getElementById('resultRankBtn').addEventListener('click', openRanking);
    document.getElementById('rankCloseBtn').addEventListener('click', closeRanking);
    document.getElementById('startCenterBtn').addEventListener('click', goCenter);
    document.getElementById('resultCenterBtn').addEventListener('click', goCenter);
    document.getElementById('homeBtn').addEventListener('click', goCenter);
    rankModal.addEventListener('click', (e) => { if (e.target === rankModal) closeRanking(); });

    game.init();
</script>
