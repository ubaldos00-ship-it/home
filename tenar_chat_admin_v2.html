<!-- tenar_chat_admin_v1.html · 텐아르 채팅 관리자 페이지 (회원 승인/거절/정지) · role=admin & status=approved 만 접근 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>텐아르 채팅 · 회원 관리</title>
<style>
  :root{ --green:#27500A; --line:#e3e0d5; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif; background:#f4f2ea; color:#222; }
  header{ background:linear-gradient(135deg,#f28c28,#d96f00); color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; position:sticky; top:0; z-index:10; }
  header .t{ font-size:17px; font-weight:800; }
  header .me{ font-size:12px; display:flex; align-items:center; gap:8px; }
  header img{ width:28px; height:28px; border-radius:50%; }
  .wrap{ max-width:820px; margin:0 auto; padding:14px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.05); }
  .btn{ border:none; border-radius:10px; padding:9px 14px; font-size:14px; font-weight:800; cursor:pointer; font-family:inherit; }
  .btn.google{ background:#fff; color:#333; border:1px solid #ddd; display:inline-flex; align-items:center; gap:8px; }
  .btn.g{ background:#2e7a4e; color:#fff; } .btn.r{ background:#c0392b; color:#fff; }
  .btn.o{ background:#d97706; color:#fff; } .btn.n{ background:#8a8a8a; color:#fff; }
  .btn.small{ padding:6px 10px; font-size:12.5px; }
  .center{ text-align:center; padding:40px 16px; }
  .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin:12px 0; }
  .tab{ border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 13px; font-size:13px; font-weight:700; cursor:pointer; }
  .tab.on{ background:var(--green); color:#fff; border-color:var(--green); }
  .search{ width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; margin-bottom:10px; font-family:inherit; }
  .row{ display:flex; gap:12px; align-items:center; padding:12px 0; border-top:1px solid var(--line); }
  .row img{ width:44px; height:44px; border-radius:50%; flex-shrink:0; background:#eee; }
  .row .info{ flex:1; min-width:0; }
  .row .name{ font-weight:800; font-size:14.5px; }
  .row .email{ font-size:12px; color:#666; word-break:break-all; }
  .row .meta{ font-size:11px; color:#999; margin-top:2px; }
  .row .acts{ display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; flex-shrink:0; }
  .badge{ font-size:11px; font-weight:800; padding:2px 8px; border-radius:999px; }
  .b-pending{ background:#fff3cd; color:#8a6d00; } .b-approved{ background:#e7f4ea; color:#1f5132; }
  .b-rejected{ background:#fdecec; color:#b3261e; } .b-blocked{ background:#eceff1; color:#455; }
  .empty{ color:#999; text-align:center; padding:26px; }
  .muted{ color:#777; font-size:12.5px; line-height:1.6; }
</style>
</head>
<body>
<header>
  <span class="t">텐아르 채팅 · 회원 관리</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="btn small" id="goChatBtn" style="background:#fff;color:#d96f00;">💬 채팅방</button>
    <span class="me" id="me"></span>
  </div>
</header>
<div class="wrap">
  <!-- 로그인 전 -->
  <div id="loginView" class="card center" style="display:none;">
    <div style="font-size:34px;">🔐</div>
    <h3>관리자 로그인</h3>
    <p class="muted">채팅 회원을 관리하려면 관리자 Google 계정으로 로그인하세요.</p>
    <button class="btn google" id="loginBtn">🅶 Google 계정으로 로그인</button>
  </div>

  <!-- 권한 없음 -->
  <div id="denyView" class="card center" style="display:none;">
    <div style="font-size:34px;">🚫</div>
    <h3>관리자 권한이 없습니다</h3>
    <p class="muted" id="denyMsg"></p>
    <button class="btn n" id="logoutBtn2">로그아웃</button>
  </div>

  <!-- 관리자 화면 -->
  <div id="adminView" style="display:none;">
    <div class="card">
      <input class="search" id="search" placeholder="이름 또는 이메일 검색" />
      <div class="tabs" id="tabs">
        <button class="tab on" data-f="pending">승인 대기 <span id="c-pending"></span></button>
        <button class="tab" data-f="approved">승인됨 <span id="c-approved"></span></button>
        <button class="tab" data-f="rejected">거절 <span id="c-rejected"></span></button>
        <button class="tab" data-f="blocked">정지 <span id="c-blocked"></span></button>
        <button class="tab" data-f="all">전체</button>
      </div>
      <div id="list"></div>
    </div>
    <p class="muted" style="margin-top:12px;">
      · 관리자 권한 부여(role=admin)는 보안상 이 화면에서 제공하지 않습니다. Firebase 콘솔에서만 설정하세요.<br>
      · 처리 내역은 실시간으로 반영됩니다.
    </p>
  </div>

  <div id="loading" class="card center"><div class="muted">불러오는 중…</div></div>
</div>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, collection, doc, getDoc, updateDoc, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAcU8iZR-B5HdvX1FOh4APCm0hXsz1u_X8",
    authDomain: "tenar-chat-1674c.firebaseapp.com",
    databaseURL: "https://tenar-chat-1674c-default-rtdb.firebaseio.com",
    projectId: "tenar-chat-1674c",
    storageBucket: "tenar-chat-1674c.firebasestorage.app",
    messagingSenderId: "662688468209",
    appId: "1:662688468209:web:0f37484e26943d79946d50"
  };
  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const $ = id => document.getElementById(id);

// 관리자 → 채팅방 이동 (Firebase 로그인 세션 유지)
$('goChatBtn').addEventListener('click', ()=>{
  location.href = 'tenar_chat.html';
});
  const views = { login:$('loginView'), deny:$('denyView'), admin:$('adminView'), loading:$('loading') };
  function show(name){ Object.keys(views).forEach(k=> views[k].style.display = (k===name?'':'none')); }

  let allUsers = [];
  let curFilter = 'pending';
  let unsub = null;

  $('loginBtn').addEventListener('click', async ()=>{
    try{ await signInWithPopup(auth, provider); }
    catch(e){
      if(e && (e.code==='auth/popup-blocked' || e.code==='auth/cancelled-popup-request' || e.code==='auth/popup-closed-by-user')){
        try{ await signInWithRedirect(auth, provider); }catch(_){ alert('로그인에 실패했습니다: '+(e.message||e.code)); }
      } else { alert('로그인에 실패했습니다: '+(e.message||e.code)); }
    }
  });
  $('logoutBtn2').addEventListener('click', ()=> signOut(auth));

  getRedirectResult(auth).catch(()=>{});

  onAuthStateChanged(auth, async (user)=>{
    if(unsub){ unsub(); unsub=null; }
    if(!user){ $('me').innerHTML=''; show('login'); return; }
    $('me').innerHTML = (user.photoURL?`<img src="${user.photoURL}" referrerpolicy="no-referrer">`:'') +
      `<span>${escapeHtml(user.displayName||'관리자')}</span> <button class="btn n small" id="logoutBtn">로그아웃</button>`;
    $('logoutBtn') && $('logoutBtn').addEventListener('click', ()=> signOut(auth));
    show('loading');
    // 본인 회원문서 확인 → 관리자만 통과
    try{
      const snap = await getDoc(doc(db,'tenarChatUsers', user.uid));
      const d = snap.exists() ? snap.data() : null;
      if(!d || d.status!=='approved' || d.role!=='admin'){
        $('denyMsg').textContent = !d
          ? '회원 문서가 없습니다. 먼저 채팅방에서 한 번 로그인한 뒤, Firebase 콘솔에서 이 계정을 role=admin, status=approved 로 설정하세요.'
          : '이 계정은 관리자(role=admin, status=approved)가 아닙니다.';
        show('deny'); return;
      }
    }catch(e){ $('denyMsg').textContent='권한 확인 중 오류: '+(e.message||e.code); show('deny'); return; }
    startAdmin();
  });

  function startAdmin(){
    show('admin');
    unsub = onSnapshot(collection(db,'tenarChatUsers'), (qs)=>{
      allUsers = [];
      qs.forEach(s=> allUsers.push({ id:s.id, ...s.data() }));
      renderCounts(); renderList();
    }, (e)=>{ alert('회원 목록을 불러오지 못했습니다: '+(e.message||e.code)); });
  }

  function renderCounts(){
    const c = { pending:0, approved:0, rejected:0, blocked:0 };
    allUsers.forEach(u=>{ if(c[u.status]!==undefined) c[u.status]++; });
    ['pending','approved','rejected','blocked'].forEach(k=> $('c-'+k).textContent = '('+c[k]+')');
  }

  function tsText(t){ try{ if(!t) return '-'; const d=t.toDate?t.toDate():new Date(t); return d.toLocaleString('ko-KR'); }catch(e){ return '-'; } }

  function renderList(){
    const q = ($('search').value||'').trim().toLowerCase();
    let list = allUsers.filter(u=> curFilter==='all' ? true : u.status===curFilter);
    if(q) list = list.filter(u=> (u.displayName||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q));
    list.sort((a,b)=> (tsMs(b.requestedAt)) - (tsMs(a.requestedAt)));
    if(!list.length){ $('list').innerHTML='<div class="empty">해당하는 사용자가 없습니다.</div>'; return; }
    $('list').innerHTML = list.map(u=>{
      const badge = `<span class="badge b-${u.status}">${statusKo(u.status)}</span>`;
      return `<div class="row">
        <img src="${u.photoURL||''}" referrerpolicy="no-referrer" onerror="this.style.visibility='hidden'">
        <div class="info">
          <div class="name">${escapeHtml(u.displayName||'(이름없음)')} ${badge} ${u.role==='admin'?'<span class="badge b-approved">관리자</span>':''}</div>
          <div class="email">${escapeHtml(u.email||'')}</div>
          <div class="meta">신청 ${tsText(u.requestedAt)} · 최근로그인 ${tsText(u.lastLoginAt)}</div>
        </div>
        <div class="acts">${actionsFor(u)}</div>
      </div>`;
    }).join('');
    $('list').querySelectorAll('[data-act]').forEach(b=> b.addEventListener('click', onAction));
  }
  function actionsFor(u){
    const id=u.id;
    if(u.status==='pending') return `<button class="btn g small" data-act="approve" data-id="${id}">승인</button><button class="btn r small" data-act="reject" data-id="${id}">거절</button>`;
    if(u.status==='approved') return `<button class="btn o small" data-act="block" data-id="${id}">이용정지</button>`;
    if(u.status==='rejected') return `<button class="btn g small" data-act="approve" data-id="${id}">승인</button>`;
    if(u.status==='blocked') return `<button class="btn g small" data-act="unblock" data-id="${id}">정지해제</button>`;
    return '';
  }
  async function onAction(e){
    const act=e.currentTarget.getAttribute('data-act'); const id=e.currentTarget.getAttribute('data-id');
    const u = allUsers.find(x=>x.id===id); if(!u) return;
    const me = auth.currentUser;
    try{
      if(act==='approve'){ if(!confirm(`${u.displayName||u.email} 님을 승인할까요?`)) return;
        await updateDoc(doc(db,'tenarChatUsers',id), { status:'approved', approvedAt:serverTimestamp(), approvedBy:me.uid, blockedAt:null, blockedReason:'' }); }
      else if(act==='reject'){ if(!confirm(`${u.displayName||u.email} 님을 거절할까요?`)) return;
        await updateDoc(doc(db,'tenarChatUsers',id), { status:'rejected', approvedAt:null, approvedBy:me.uid }); }
      else if(act==='block'){ const reason=prompt('이용정지 사유(선택):','')||''; if(reason===null) return;
        await updateDoc(doc(db,'tenarChatUsers',id), { status:'blocked', blockedAt:serverTimestamp(), blockedReason:reason }); }
      else if(act==='unblock'){ if(!confirm('정지를 해제하고 승인 상태로 되돌릴까요?')) return;
        await updateDoc(doc(db,'tenarChatUsers',id), { status:'approved', blockedAt:null, blockedReason:'', approvedAt:serverTimestamp(), approvedBy:me.uid }); }
    }catch(err){ alert('처리 실패: '+(err.message||err.code)); }
  }

  $('tabs').addEventListener('click', e=>{ const t=e.target.closest('.tab'); if(!t) return;
    curFilter=t.getAttribute('data-f'); $('tabs').querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x===t)); renderList(); });
  $('search').addEventListener('input', renderList);

  function statusKo(s){ return {pending:'승인대기',approved:'승인됨',rejected:'거절',blocked:'정지'}[s]||s; }
  function tsMs(t){ try{ return t&&t.toMillis?t.toMillis():(t?new Date(t).getTime():0); }catch(e){ return 0; } }
  function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
</script>
</body>
</html>
