<!-- 텐아르통합앱_v1.html · 저장: 2026-06-06 11:42 KST -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#27500A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>텐아르(10a) 통합 앱 · TEN-AR</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    --color-accent-light:#e6b955;
    --header-h:78px;
    --tabbar-h:50px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:#27500A;}
  html,body{
    margin:0;padding:0;
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    /* 100dvh: 모바일 주소창 높이 대응 */
    height:100vh;height:100dvh;
    overflow:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    background:#E8E5DE;
  }

  /* ═══ 헤더 (홈 화면 헤더 재사용) ═══ */
  header.app-header{
    flex-shrink:0;
    background:#27500A;color:#fff;
    padding:10px 16px 9px;
    padding-top:calc(10px + env(safe-area-inset-top));
    box-shadow:0 4px 14px rgba(20,56,32,.18);
    display:flex;flex-direction:column;justify-content:center;
    z-index:100;
  }
  header.app-header .top-row{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  header.app-header .system-title{
    font-size:11px;font-weight:500;letter-spacing:.02em;
    color:rgba(255,255,255,.78);margin:0;
  }
  header.app-header .brand{
    display:flex;align-items:baseline;gap:8px;margin-top:2px;
  }
  header.app-header .brand-name{
    font-size:23px;font-weight:800;letter-spacing:-.02em;color:#fff;
    background:linear-gradient(180deg,#ffffff 0%,var(--color-accent-light) 130%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1.1;
  }
  header.app-header .brand-eng{
    font-size:12px;font-weight:600;color:var(--color-accent-light);letter-spacing:.04em;
  }
  header.app-header .ver-line{
    font-size:9.5px;font-weight:500;color:rgba(255,255,255,.55);margin-top:3px;letter-spacing:.02em;
  }
  header.app-header .clock{
    font-variant-numeric:tabular-nums;font-size:11.5px;font-weight:500;
    color:rgba(255,255,255,.92);background:rgba(0,0,0,.18);
    padding:5px 10px;border-radius:999px;white-space:nowrap;flex-shrink:0;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  }

  /* ═══ 탭바 ═══ */
  nav.tab-bar{
    flex-shrink:0;
    display:flex;
    background:#1f4408;
    border-bottom:2px solid #163305;
    z-index:90;
  }
  nav.tab-bar .tab-btn{
    flex:1;
    border:none;
    background:transparent;
    color:rgba(255,255,255,.62);
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    letter-spacing:-.01em;
    padding:13px 4px 12px;
    cursor:pointer;
    position:relative;
    transition:color .15s,background .15s;
    -webkit-tap-highlight-color:transparent;
  }
  nav.tab-bar .tab-btn:active{background:rgba(255,255,255,.06);}
  nav.tab-bar .tab-btn.active{
    color:#fff;
    background:rgba(255,255,255,.10);
  }
  nav.tab-bar .tab-btn.active::after{
    content:'';
    position:absolute;left:14%;right:14%;bottom:0;height:3px;
    background:var(--color-accent-light);
    border-radius:3px 3px 0 0;
  }
  nav.tab-bar .tab-btn .tab-ico{font-size:15px;margin-right:3px;vertical-align:-1px;}

  /* ═══ 콘텐츠 (iframe 영역) ═══ */
  main.tab-content{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#E8E5DE;
  }
  main.tab-content iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    display:none;
    background:#E8E5DE;
  }
  main.tab-content iframe.active{display:block;}

  /* 로딩 표시 */
  .frame-loading{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:12px;
    color:#3B6D11;font-size:14px;font-weight:600;
    background:#E8E5DE;pointer-events:none;z-index:5;
  }
  .frame-loading.hide{display:none;}
  .spinner{
    width:34px;height:34px;border:3px solid #C0DD97;border-top-color:#3B6D11;
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:360px){
    nav.tab-bar .tab-btn{font-size:12.5px;}
    header.app-header .brand-name{font-size:21px;}
  }
</style>
</head>
<body>

<!-- ═══════════ 헤더 (텐아르 브랜드) ═══════════ -->
<header class="app-header">
  <div class="top-row">
    <div>
      <p class="system-title">농작물생산조사 통합시스템</p>
      <div class="brand">
        <span class="brand-name">텐아르(10a)</span>
        <span class="brand-eng">TEN-AR</span>
      </div>
      <div class="ver-line">통합앱 v1 · 저장 2026-06-06 11:42 (KST)</div>
    </div>
    <div class="clock" id="clock">--.--.(--) --:--:--</div>
  </div>
</header>

<!-- ═══════════ 탭바 ═══════════ -->
<nav class="tab-bar">
  <button type="button" class="tab-btn active" data-tab="tonghab" onclick="switchTab('tonghab')"><span class="tab-ico">🌾</span>통합계산기</button>
  <button type="button" class="tab-btn" data-tab="chungchi" onclick="switchTab('chungchi')"><span class="tab-ico">🎙️</span>청취계산기</button>
  <button type="button" class="tab-btn" data-tab="graph" onclick="switchTab('graph')"><span class="tab-ico">📊</span>생산량조회</button>
</nav>

<!-- ═══════════ 콘텐츠 (각 계산기 iframe) ═══════════ -->
<main class="tab-content">
  <!-- 통합계산기: 즉시 로드 -->
  <iframe id="frame-tonghab" class="active"
    src="https://ubaldos00-ship-it.github.io/home/tonghab.html"
    title="통합계산기" loading="eager"></iframe>
  <!-- 청취계산기: 첫 활성화 시 로드 -->
  <iframe id="frame-chungchi"
    data-src="https://ubaldos00-ship-it.github.io/chungchi_cal/"
    title="청취계산기"></iframe>
  <!-- 생산량조회기: 첫 활성화 시 로드 -->
  <iframe id="frame-graph"
    data-src="https://ubaldos00-ship-it.github.io/home/graph.html"
    title="생산량조회기"></iframe>

  <div class="frame-loading" id="frameLoading">
    <div class="spinner"></div>
    <div id="frameLoadingTxt">불러오는 중…</div>
  </div>
</main>

<script>
/* ═══ 시계 (홈 헤더와 동일) ═══ */
(function(){
  var days=['일','월','화','수','목','금','토'];
  var pad=function(n){return String(n).padStart(2,'0');};
  function tick(){
    var d=new Date();
    var txt=(d.getMonth()+1)+'.'+d.getDate()+'.('+days[d.getDay()]+') '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    var el=document.getElementById('clock');
    if(el) el.textContent=txt;
  }
  tick();
  setInterval(tick,1000);
})();

/* ═══ 탭 전환 (데이터 보존: iframe은 숨기기만, 재로드 안 함) ═══ */
var _loadedTabs={tonghab:true}; /* tonghab은 즉시 로드됨 */
var _tabLabel={tonghab:'통합계산기',chungchi:'청취계산기',graph:'생산량조회기'};

function switchTab(tab){
  /* 버튼 활성화 표시 */
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  /* iframe 표시 전환 */
  document.querySelectorAll('main.tab-content iframe').forEach(function(f){
    f.classList.toggle('active', f.id==='frame-'+tab);
  });

  var frame=document.getElementById('frame-'+tab);
  /* 최초 활성화 시에만 src 설정 (이후엔 그대로 유지 → 입력 데이터 보존) */
  if(frame && !_loadedTabs[tab] && frame.dataset.src){
    showLoading(_tabLabel[tab]);
    frame.addEventListener('load', hideLoading, {once:true});
    frame.src=frame.dataset.src;
    _loadedTabs[tab]=true;
  } else {
    hideLoading();
  }
}

function showLoading(label){
  var box=document.getElementById('frameLoading');
  var txt=document.getElementById('frameLoadingTxt');
  if(txt) txt.textContent=(label||'')+' 불러오는 중…';
  if(box) box.classList.remove('hide');
}
function hideLoading(){
  var box=document.getElementById('frameLoading');
  if(box) box.classList.add('hide');
}

/* 첫 화면(통합계산기)은 즉시 로드되므로 로딩표시 숨김 */
window.addEventListener('load', function(){
  var first=document.getElementById('frame-tonghab');
  if(first && first.contentWindow){ hideLoading(); }
  /* tonghab 로드 완료 시 로딩 숨김 (안전망) */
  if(first){ first.addEventListener('load', hideLoading, {once:true}); }
  setTimeout(hideLoading, 4000); /* 4초 후 강제 숨김 */
});
</script>
</body>
</html>
