<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>난수표 조회기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #f4f8fc;
      color: #1f2937;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }
    .card {
      background: #fff;
      border: 1px solid #d9e7f7;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(31, 90, 150, 0.08);
      padding: 24px;
    }
    /* 헤더 영역: 제목과 홈 버튼 정렬 */
    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      color: #12385f;
      font-size: 28px;
    }
    .home-btn {
      text-decoration: none;
      background: #f0f4f8;
      color: #4b6074;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid #d1d9e0;
      transition: background 0.2s;
    }
    .home-btn:hover {
      background: #e2eaf1;
    }
    .desc {
      margin: 0 0 24px;
      color: #5b6b7c;
      line-height: 1.6;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #12385f;
    }
    input {
      width: 100%;
      height: 48px;
      border: 1px solid #b9d3ee;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 18px;
      outline: none;
    }
    input:focus {
      border-color: #367cc3;
      box-shadow: 0 0 0 4px rgba(54, 124, 195, 0.14);
    }
    /* 버튼 우측 정렬 */
    .buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin: 18px 0;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary { background: #2f75bd; color: #fff; }
    .secondary { background: #e8f1fb; color: #174a7d; }
    
    .result {
      margin-top: 18px;
      padding: 22px;
      border-radius: 16px;
      background: #edf6ff;
      border: 1px solid #c9e0f6;
      text-align: center;
    }
    .result .small {
      color: #4b6074;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .result .number {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #0f3e6f;
    }
    .converted {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #c9e0f6;
      color: #174a7d;
      font-size: 18px;
      font-weight: 800;
    }
    .converted strong {
      font-size: 30px;
      color: #0f3e6f;
    }
    .error {
      margin-top: 14px;
      color: #b42318;
      font-weight: 700;
      min-height: 24px;
    }
    .help {
      margin-top: 20px;
      padding: 16px;
      border-radius: 14px;
      background: #f8fbff;
      color: #536577;
      line-height: 1.7;
      font-size: 14px;
    }
    
    /* 틀 고정 테이블 설정 */
    .table-area {
      margin-top: 24px;
      overflow: auto;
      max-height: 600px;
      border: 1px solid #d9e7f7;
      border-radius: 14px;
      position: relative;
    }
    table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      min-width: 680px;
      background: #fff;
    }
    th, td {
      border: 0.5px solid #d7e7f8;
      padding: 9px 10px;
      text-align: center;
      font-size: 14px;
      white-space: nowrap;
      scroll-margin: 50px;
    }
    th {
      background: #c8dff6;
      color: #0f2f50;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    td:first-child, th:first-child {
      background: #eef6ff;
      font-weight: 700;
      color: #12385f;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    th:first-child {
      z-index: 15;
    }
    
    .highlight {
      background: #ffeeb8 !important;
      color: #111827;
      font-weight: 900;
      outline: 2px solid #e0a800;
    }
    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .result .number { font-size: 36px; }
      .card { padding: 18px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header-area">
        <h1>난수표 조회기</h1>
        <a href="https://ubaldos00-ship-it.github.io/home" class="home-btn">홈으로</a>
      </div>
      <p class="desc">가로값을 먼저 입력하고, 세로값을 입력하면 난수표에서 해당 값을 가져옵니다.</p>

      <div class="form-grid">
        <div>
          <label for="colInput">가로값</label>
          <input id="colInput" type="number" min="0" max="9" placeholder="예: 0" />
        </div>
        <div>
          <label for="rowInput">세로값</label>
          <input id="rowInput" type="number" min="0" max="79" placeholder="예: 40" />
        </div>
      </div>

      <div class="buttons">
        <button class="secondary" onclick="resetForm()">초기화</button>
        <button class="primary" onclick="lookupNumber()">조회하기</button>
      </div>

      <div id="error" class="error"></div>

      <div class="result" id="resultBox" style="display:none;">
        <div class="small" id="positionText"></div>
        <div class="number" id="resultNumber"></div>
        <div class="converted" id="decimalNumber"></div>
      </div>

      <div class="help">
        <strong>사용 예시</strong><br />
        가로값 0, 세로값 40을 입력하면 전체 난수 <strong>79152</strong>가 조회됩니다.<br />
        가로와 세로 헤더가 고정되어 있어 스크롤 시에도 위치 확인이 편리합니다.
      </div>

      <div class="table-area">
        <table id="dataTable"></table>
      </div>
    </div>
  </div>

    function getRandomNumber(row, col) {
      return randomTable[row]?.[col] ?? null;
    }

    function lookupNumber() {
      const row = Number(document.getElementById("rowInput").value);
      const col = Number(document.getElementById("colInput").value);
      const error = document.getElementById("error");
      const resultBox = document.getElementById("resultBox");
      const resultNumber = document.getElementById("resultNumber");
      const decimalNumber = document.getElementById("decimalNumber");
      const positionText = document.getElementById("positionText");

      clearHighlight();
      error.textContent = "";
      resultBox.style.display = "none";

      if (!Number.isInteger(row) || row < 0 || row > 79) {
        error.textContent = "세로값은 0부터 79까지의 정수로 입력해주세요.";
        return;
      }
      if (!Number.isInteger(col) || col < 0 || col > 9) {
        error.textContent = "가로값은 0부터 9까지의 정수로 입력해주세요.";
        return;
      }

      const value = getRandomNumber(row, col);
      if (value === null) {
        error.textContent = "해당 위치의 데이터를 찾을 수 없습니다.";
        return;
      }

      const decimalValue = `${value[0]}.${value[1]}`;
      positionText.textContent = `가로값 ${col}, 세로값 ${row}의 조회 결과`;
      resultNumber.textContent = `전체 난수: ${value}`;
      decimalNumber.innerHTML = `앞 두 자리 소수점 변환: <strong>${decimalValue}</strong>`;
      resultBox.style.display = "block";

      const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      if (cell) {
        cell.classList.add("highlight");
        cell.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
      }
    }

    function resetForm() {
      document.getElementById("rowInput").value = "";
      document.getElementById("colInput").value = "";
      document.getElementById("error").textContent = "";
      document.getElementById("resultBox").style.display = "none";
      clearHighlight();
    }

    function clearHighlight() {
      document.querySelectorAll(".highlight").forEach(cell => cell.classList.remove("highlight"));
    }

    function renderTable() {
      const table = document.getElementById("dataTable");
      let html = "<thead><tr><th>세로\\가로</th>";
      for (let col = 0; col <= 9; col++) html += `<th>${col}</th>`;
      html += "</tr></thead><tbody>";

      for (let row = 0; row <= 79; row++) {
        html += `<tr><td>${row}</td>`;
        for (let col = 0; col <= 9; col++) {
          html += `<td data-row="${row}" data-col="${col}">${randomTable[row][col]}</td>`;
        }
        html += "</tr>";
      }
      html += "</tbody>";
      table.innerHTML = html;
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderTable();
      document.getElementById("colInput").focus();
      document.getElementById("colInput").addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("rowInput").focus();
      });
      document.getElementById("rowInput").addEventListener("keydown", e => {
        if (e.key === "Enter") lookupNumber();
      });
    });
  </script>
</body>
</html>
