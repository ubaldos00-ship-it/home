<script>
const APP_VERSION='v133'; const SAVED_AT_KST='2026-06-07 23:58 KST';
const TAB_BASE_URL='https://ubaldos00-ship-it.github.io/home/tonghabb.html';

const tabNames={tonghab:'실측계산기',chungchi:'청취계산기',graph:'생산량조회기'}; let activeTab='tonghab';
function getActiveFrame(){return document.getElementById('frame-'+activeTab)} function getActiveWin(){const f=getActiveFrame();return f&&f.contentWindow}
function normalizeTab(raw){raw=(raw||'').replace('#','').replace('?tab=','');return ['tonghab','chungchi','graph'].includes(raw)?raw:'tonghab'}
function getTabUrl(key){key=normalizeTab(key);return TAB_BASE_URL+'#'+key}
function updateTabLinks(){document.querySelectorAll('.tab-btn').forEach(b=>{const u=getTabUrl(b.dataset.tab);b.dataset.href=u;b.setAttribute('data-url',u);b.setAttribute('href',u);});}
function setTabAddress(key){const url=getTabUrl(key);try{if(location.origin==='https://ubaldos00-ship-it.github.io'){history.replaceState(null,'',url)}else{history.replaceState(null,'','tonghabb.html#'+key)}}catch(e){try{history.replaceState(null,'','tonghabb.html#'+key)}catch(_){}}}
function switchTab(key,push){key=normalizeTab(key);if(push&&key!==activeTab){if(!confirm('다른 탭으로 넘어가면 입력 데이터가 초기화될 수 있습니다.\n계속 하시겠습니까?'))return;}activeTab=key;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===key));document.querySelectorAll('.tool-frame').forEach(f=>f.classList.toggle('active',f.id==='frame-'+key));document.getElementById('savePanelTitle').textContent=tabNames[key]||'';setSaveRail(false);if(push)setTabAddress(key);setTimeout(()=>{try{getActiveWin().dispatchEvent(new Event('resize'))}catch(e){}},100);updateCropIndicator()}
function initTabFromUrl(){const p=new URLSearchParams(location.search);switchTab(normalizeTab(location.hash||p.get('tab')),false)}
function setSaveRail(open){const rail=document.getElementById('saveRail');const arrow=document.getElementById('saveArrow');rail.classList.toggle('open',!!open);if(arrow)arrow.textContent=rail.classList.contains('open')?'›':'‹'}
function setRailModalHidden(hidden){const rail=document.getElementById('saveRail');rail.classList.toggle('modal-hidden',!!hidden);if(hidden)setSaveRail(false)}
function toggleSaveRail(){if(document.getElementById('saveRail').classList.contains('modal-hidden'))return;setSaveRail(!document.getElementById('saveRail').classList.contains('open'))}
function openActiveCalc(){const w=getActiveWin();try{if(w&&typeof w.openCalcModal==='function'){w.openCalcModal();return}}catch(e){} openParentCalc()}
function openActiveSaveLoad(){setSaveRail(false);setRailModalHidden(true);const w=getActiveWin();try{if(w&&typeof w.openSaveLoadModal==='function'){w.openSaveLoadModal();return}}catch(e){} setRailModalHidden(false);showToast('현재 탭에서 저장/불러오기 기능을 찾지 못했습니다.')}
function saveActiveImage(){setSaveRail(false);setRailModalHidden(true);const w=getActiveWin();const funcs=['captureResult','captureAllNonbye','captureRyield','saveAsImage','saveImg'];for(const fn of funcs){try{if(w&&typeof w[fn]==='function'){w[fn]();return}}catch(e){}}setRailModalHidden(false);showToast('현재 탭에서 이미지 저장 기능을 찾지 못했습니다.')}
function cleanCropText(txt){return(txt||'').replace(/[✓\n\t]/g,' ').replace(/\s+/g,' ').replace(/^작물\s*/,'').replace(/\d+$/,'').trim()}
function getActiveCropLabel(){const w=getActiveWin();try{const d=w&&w.document;if(!d)return'';let el=d.querySelector('.crop-btn.active');if(el)return el.getAttribute('data-crop')||cleanCropText(el.textContent);el=d.querySelector('.bc.on[data-crop], .crop-chip.on, .bc.on');if(el)return el.getAttribute('data-crop')||cleanCropText(el.textContent);const tag=d.querySelector('#headerCropTag, #prodCropDisplay, .hdr-crop-badge');if(tag)return cleanCropText(tag.textContent)}catch(e){}return''}
function updateCropIndicator(){const crop=getActiveCropLabel();const rail=document.getElementById('cropRailBadge');const chip=document.getElementById('panelCropChip');if(rail)rail.textContent=crop||'선택전';if(chip)chip.textContent=crop||'선택 전'}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>{t.style.display='none'},1800)}
function updateClock(){const now=new Date();const parts=new Intl.DateTimeFormat('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'2-digit',day:'2-digit',weekday:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).formatToParts(now).reduce((a,p)=>(a[p.type]=p.value,a),{});document.getElementById('clock').textContent=`${parts.year}.${parts.month}.${parts.day}.(${parts.weekday}) ${parts.hour}:${parts.minute}:${parts.second}`}

let pcExpr='';function openParentCalc(){document.getElementById('parentCalcModal').classList.add('show')}function closeParentCalc(){document.getElementById('parentCalcModal').classList.remove('show')}function pcRender(){document.getElementById('pcExpr').textContent=pcExpr.replace(/\*/g,'×').replace(/\//g,'÷');try{if(pcExpr){let v=Function('return ('+pcExpr.replace(/%/g,'/100')+')')();document.getElementById('pcVal').textContent=isFinite(v)?Number(v.toFixed(10)).toLocaleString('ko-KR'):'오류'}else document.getElementById('pcVal').textContent='0'}catch(e){document.getElementById('pcVal').textContent='0'}}function pcInput(x){if(/[+\-*/]/.test(x)&&/[+\-*/]$/.test(pcExpr))pcExpr=pcExpr.slice(0,-1);pcExpr+=x;pcRender()}function pcBack(){pcExpr=pcExpr.slice(0,-1);pcRender()}function pcClear(){pcExpr='';pcRender()}function pcEqual(){try{let v=Function('return ('+pcExpr.replace(/%/g,'/100')+')')();pcExpr=isFinite(v)?String(Number(v.toFixed(10))):'';pcRender()}catch(e){document.getElementById('pcVal').textContent='오류'}}


function lockOuterVerticalBounce(){
  const block=function(e){
    if(e.target&&e.target.closest&&e.target.closest('iframe')) return;
    e.preventDefault();
  };
  document.addEventListener('touchmove',block,{passive:false});
  document.addEventListener('gesturestart',function(e){e.preventDefault();},{passive:false});
}

  if(confirm('모든 데이터가 초기화 됩니다. 홈으로 가시겠습니까?')){
    location.href='https://ubaldos00-ship-it.github.io/home/';

  try{const u=location.href;history.pushState({tenarBackBlock:1},'',u);history.pushState({tenarBackBlock:2},'',u);history.pushState({tenarBackBlock:3},'',u)}catch(e){}
  window.addEventListener('popstate',function(){
    try{history.pushState({tenarBackBlock:true},'',location.href)}catch(e){}
    showToast('뒤로가기 차단중입니다. 초기화, 홈버튼이 안 눌러지면 새로고침 후 눌러주세요.');
  });
}
function isAnyChildModalOpen(){const w=getActiveWin();try{const d=w&&w.document;if(!d)return false;const selectors=['.sl-modal.show','.img-modal.open','.modal.open','.prod-cap-modal.show','.calc-modal.show','#imgSaveModal.open'];return selectors.some(sel=>d.querySelector(sel))}catch(e){return false}}
function monitorOverlayState(){const parentCalc=document.getElementById('parentCalcModal').classList.contains('show');setRailModalHidden(parentCalc||isAnyChildModalOpen())}
lockOuterVerticalBounce();setupBackBlock();updateTabLinks();initTabFromUrl();updateClock();updateCropIndicator();monitorOverlayState();setInterval(updateClock,1000);setInterval(updateCropIndicator,600);setInterval(monitorOverlayState,250);window.addEventListener('hashchange',initTabFromUrl);
</script>
