let __zoomTimer=null;
function clampZoom(v){return Math.max(0.6, Math.min(4.0, Math.round((Number(v)||1)*1000)/1000));}

el.searchToggle.onclick=()=>{el.tools.classList.toggle('show'); if(el.tools.classList.contains('show')){setTimeout(()=>el.searchInput.focus(),50);} else {closeResults();} syncSearchPad();}; el.searchBtn.onclick=searchPdf; el.searchInput.onkeydown=e=>{if(e.key==='Enter')searchPdf()};
async function getPageText(n){if(pageTexts.has(n))return pageTexts.get(n); const p=await pdf.getPage(n); const tc=await p.getTextContent(); const s=tc.items.map(x=>x.str).join(' ').replace(/\s+/g,' '); pageTexts.set(n,s); return s;}
async function prefetchTextAround(n){if(!pdf)return; [n,n+1,n-1].filter(x=>x>=1&&x<=pdf.numPages&&!pageTexts.has(x)).forEach(x=>getPageText(x).catch(()=>{}));}
async function searchPdf(){if(!pdf)return; const term=el.searchInput.value.trim(); if(!term){toast('검색어를 입력해주세요.');return;} el.searchResults.classList.add('show'); el.resGrab.classList.add('show'); if(!el.searchResults.style.height) el.searchResults.style.height='34vh'; el.searchResults.innerHTML='<div class="res">검색 중입니다...</div>'; syncSearchPad(); const found=[]; const lower=term.toLowerCase(); for(let i=1;i<=pdf.numPages;i++){let text=''; try{text=await getPageText(i)}catch(e){} const idx=text.toLowerCase().indexOf(lower); if(idx>=0){const snip=text.slice(Math.max(0,idx-35),Math.min(text.length,idx+70)); found.push({page:i,snip}); if(found.length>=60)break;} if(i%12===0) el.searchResults.innerHTML=`<div class="res">${i}/${pdf.numPages}쪽 검색 중... 발견 ${found.length}개</div>`; }
 if(!found.length){el.searchResults.innerHTML='<div class="res">검색 결과가 없습니다. 스캔본 PDF는 검색이 어려울 수 있습니다.</div>'; syncSearchPad(); return;} el.searchResults.innerHTML=found.map(r=>`<div class="res" data-page="${r.page}"><b>${r.page}쪽</b> <span class="go">이동</span><br>${highlight(esc(r.snip),esc(term))}</div>`).join(''); el.searchResults.querySelectorAll('.res').forEach(r=>r.onclick=()=>{go(r.dataset.page);}); syncSearchPad();}
function highlight(s,t){return s.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<b>${m}</b>`)}
function getObj(key){try{return JSON.parse(localStorage.getItem(key)||'{}')}catch(e){return {}}} function setObj(key,o){localStorage.setItem(key,JSON.stringify(o))}
function favs(){return getObj(LS_FAV)} function memos(){return getObj(LS_MEMO)}
el.favSave.onclick=()=>{const name=prompt('즐겨찾기 이름을 입력하세요.',`${doc.title} ${pageNum}쪽`); if(name===null)return; const all=favs(); const arr=Array.isArray(all[id])?all[id]:[]; const exists=arr.find(x=>x.page===pageNum); if(exists) exists.name=name.trim()||`${pageNum}쪽`; else arr.push({page:pageNum,name:name.trim()||`${pageNum}쪽`,createdAt:Date.now()}); all[id]=arr.sort((a,b)=>a.page-b.page); setObj(LS_FAV,all); toast('즐겨찾기에 저장했습니다.');};
el.favOpen.onclick=()=>{renderFavList(); el.favSheet.classList.add('show')};
function renderFavList(){const arr=(favs()[id]||[]).slice().sort((a,b)=>a.page-b.page); if(!arr.length){el.favList.innerHTML='<div style="text-align:center;color:#8a8780;padding:20px;font-weight:800">저장한 페이지가 없습니다.</div>';return;} el.favList.innerHTML=arr.map((f,i)=>`<div class="favitem"><div class="fi"><b>${esc(f.name||f.page+'쪽')}</b><span>${f.page}쪽</span></div><button class="goto" data-p="${f.page}">이동</button><button class="del" data-i="${i}">×</button></div>`).join(''); el.favList.querySelectorAll('.goto').forEach(b=>b.onclick=()=>{el.favSheet.classList.remove('show');go(b.dataset.p)}); el.favList.querySelectorAll('.del').forEach(b=>b.onclick=()=>{const all=favs(); all[id].splice(Number(b.dataset.i),1); setObj(LS_FAV,all); renderFavList();});}
el.memoOpen.onclick=()=>{el.memoTitle.textContent=`${pageNum}쪽 메모`; el.memoText.value=(memos()[id]?.[pageNum]||''); el.memoSheet.classList.add('show'); setTimeout(()=>el.memoText.focus(),80)};
el.memoSave.onclick=()=>{const all=memos(); if(!all[id])all[id]={}; const v=el.memoText.value.trim(); if(v) all[id][pageNum]=v; else delete all[id][pageNum]; setObj(LS_MEMO,all); updateNoteChip(); el.memoSheet.classList.remove('show'); toast('메모를 저장했습니다.');};
function updateNoteChip(){const has=!!(memos()[id]?.[pageNum]); el.noteChip.classList.toggle('show',has)}
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>by(b.dataset.close).classList.remove('show')); document.querySelectorAll('.sheet').forEach(s=>s.addEventListener('click',e=>{if(e.target===s)s.classList.remove('show')}));
el.shareBtn.onclick=async()=>{
  const oldText=el.shareBtn.textContent;
  try{
    el.shareBtn.disabled=true;
    el.shareBtn.textContent='준비 중...';
    toast('PDF 화면을 준비한 뒤 캡처합니다.');
    await waitForPageReady();
    const canvas=await html2canvas(by('captureArea'),{
      backgroundColor:'#f6f4ec',
      scale:Math.min(devicePixelRatio||1,2),
      useCORS:true,
      logging:false,
      onclone:(docClone)=>{
        const loading=docClone.getElementById('loading');
        if(loading) loading.style.display='none';
        const zb=docClone.getElementById('zoomBar');
        if(zb) zb.style.display='none';
      }
    });
    canvas.toBlob(async blob=>{
      el.shareBtn.disabled=false;
      el.shareBtn.textContent=oldText;
      if(!blob){toast('이미지 생성 실패');return;}
      const file=new File([blob],`${doc.id}_${pageNum}p.png`,{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:`${doc.title} ${pageNum}쪽`,text:`텐아르 PDF 뷰어 · ${pageNum}쪽`});
      }else{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=file.name;
        a.click();
        URL.revokeObjectURL(a.href);
        toast('이미지로 저장했습니다.');
      }
    },'image/png',.92);
  }catch(e){
    console.error(e);
    el.shareBtn.disabled=false;
    el.shareBtn.textContent=oldText;
    el.loading.style.display='none';
    toast('공유가 지원되지 않습니다.');
  }
};
function showError(msg){el.loading.style.display='none'; el.err.className='err show'; el.err.innerHTML=msg;} function by(id){return document.getElementById(id)} function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))} function toast(msg){el.toast.textContent=msg; el.toast.classList.add('show'); clearTimeout(window.__tt); window.__tt=setTimeout(()=>el.toast.classList.remove('show'),1600)} function debounce(fn,ms){let t; return (...a)=>{clearTimeout(t); t=setTimeout(()=>fn(...a),ms)}}

/* ===== 저장한 페이지 시트: 위 손잡이 잡고 아래로 쓸어내리면 닫힘 (req6) ===== */
function enableSheetSwipe(panelId, grabId, sheetId){
  const panel=by(panelId), sheet=by(sheetId), grab=by(grabId); if(!panel||!grab)return;
  let startY=0, cur=0, dragging=false;
  const start=y=>{startY=y;cur=0;dragging=true;panel.style.transition='none';};
  const move=y=>{ if(!dragging)return; cur=Math.max(0,y-startY); panel.style.transform='translateY('+cur+'px)'; };
  const end=()=>{ if(!dragging)return; dragging=false; panel.style.transition='transform .22s ease';
    if(cur>110){ panel.style.transform='translateY(100%)'; setTimeout(()=>{ sheet.classList.remove('show'); panel.style.transform=''; panel.style.transition=''; },200); }
    else { panel.style.transform=''; } };
  grab.addEventListener('touchstart',e=>start(e.touches[0].clientY),{passive:true});
  grab.addEventListener('touchmove',e=>{ move(e.touches[0].clientY); if(cur>0&&e.cancelable)e.preventDefault(); },{passive:false});
  grab.addEventListener('touchend',end);
  grab.addEventListener('mousedown',e=>{ e.preventDefault(); start(e.clientY); const mm=ev=>move(ev.clientY); const mu=()=>{ end(); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); }; document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu); });
}
enableSheetSwipe('favPanel','favGrab','favSheet');

/* ===== 검색 결과창: 하단 손잡이로 높이 조절 · 끝까지 올리면 닫힘 (req7) ===== */
// 검색 패널이 본문을 가리지 않도록, 열려있는 동안 본문(stage)을 패널 높이만큼 아래로 내림
function syncSearchPad(){ const stage=document.querySelector('.stage'); if(!stage)return; if(el.tools.classList.contains('show')){ stage.style.paddingTop=(el.tools.getBoundingClientRect().height + 4)+'px'; } else { stage.style.paddingTop=''; } }
function closeResults(){ el.searchResults.classList.remove('show'); el.searchResults.style.height=''; el.resGrab.classList.remove('show'); syncSearchPad(); }
(function(){
  const grab=el.resGrab, res=el.searchResults; if(!grab)return;
  let sy=0, sh=0, drag=false;
  const H=()=>res.getBoundingClientRect().height;
  const start=y=>{ sy=y; sh=H(); drag=true; res.style.transition='none'; };
  const move=y=>{ if(!drag)return; const nh=Math.max(0, Math.min(window.innerHeight*0.78, sh+(y-sy))); res.style.height=nh+'px'; };
  const end=()=>{ if(!drag)return; drag=false; res.style.transition=''; syncSearchPad(); };
  grab.addEventListener('touchstart',e=>start(e.touches[0].clientY),{passive:true});
  grab.addEventListener('touchmove',e=>{ move(e.touches[0].clientY); if(e.cancelable)e.preventDefault(); },{passive:false});
  grab.addEventListener('touchend',end);
  grab.addEventListener('mousedown',e=>{ e.preventDefault(); start(e.clientY); const mm=ev=>move(ev.clientY); const mu=()=>{ end(); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); }; document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu); });
})();

// ===== 화면 전체 확대 방지 + PDF 영역 전용 확대/축소 =====
// Mac 트랙패드/마우스 휠: 메뉴·상단·하단은 브라우저 확대를 막고, PDF 영역에서만 PDF 배율을 조절합니다.
document.addEventListener('wheel', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  e.preventDefault();
  if (el.box && el.box.contains(e.target)) {
    const delta = e.deltaY < 0 ? 0.12 : -0.12;
    applyZoom(scale + delta);
  }
}, { passive: false });

// Safari Mac/iPhone의 pinch gesture: 기본 페이지 확대는 차단하고 PDF 영역에서만 배율을 바꿉니다.
let __gestureStartScale = 1;
document.addEventListener('gesturestart', e => {
  e.preventDefault();
  __gestureStartScale = scale;
}, { passive: false });
document.addEventListener('gesturechange', e => {
  e.preventDefault();
  if (el.box && el.box.contains(e.target)) applyZoom(__gestureStartScale * e.scale);
}, { passive: false });
document.addEventListener('gestureend', e => {
  e.preventDefault();
}, { passive: false });

// 키보드 확대 단축키 차단: Cmd/Ctrl + +, -, 0 로 메뉴가 커지는 것을 막습니다.
document.addEventListener('keydown', e => {
  if (!(e.ctrlKey || e.metaKey)) return;
  const k = e.key;
  if (k === '+' || k === '=' || k === '-' || k === '0') {
    e.preventDefault();
    if (k === '+' || k === '=') applyZoom(scale + 0.2, true);
    else if (k === '-') applyZoom(scale - 0.2, true);
    else if (k === '0') applyZoom(1, true);
  }
}, { passive: false });


// PDF가 확대되지 않은 상태에서는 PDF 박스만 따로 밀리지 않게 하고,
// 확대된 상태에서만 한 손가락/트랙패드로 PDF 안을 이동할 수 있게 합니다.
el.box.addEventListener('touchmove', e=>{
  if(!el.box.classList.contains('zoomed') && e.cancelable) e.preventDefault();
}, {passive:false});
el.box.addEventListener('wheel', e=>{
  if(!el.box.classList.contains('zoomed') && !(e.ctrlKey||e.metaKey)) return;
  // 확대된 상태의 일반 휠/트랙패드 이동은 PDF 박스 안에서만 처리되게 하여 전체 페이지 흔들림을 줄입니다.
  if(el.box.classList.contains('zoomed') && !(e.ctrlKey||e.metaKey)) e.stopPropagation();
}, {passive:false});

// 가벼운 다운로드 억제 장치
['copy','cut','dragstart'].forEach(ev=>document.addEventListener(ev,e=>{if(!['INPUT','TEXTAREA'].includes(e.target.tagName)) e.preventDefault()})); document.addEventListener('contextmenu',e=>e.preventDefault());

// 두 번 터치(더블탭) 확대 차단 — 입력창/버튼/링크만 예외(그 외 본문·메뉴·팝업 전부 차단)
let __lastTap=0;
document.addEventListener('touchend',function(e){
  const now=Date.now();
  if(now-__lastTap<=340 && !(e.target.closest && e.target.closest('input,textarea,button,a'))){ if(e.cancelable) e.preventDefault(); }
  __lastTap=now;
},{passive:false});
document.addEventListener('dblclick',function(e){ if(e.cancelable) e.preventDefault(); },{passive:false});
// 두 손가락(핀치) 확대 전면 차단 — 페이지/메뉴/팝업 확대 방지 (PDF 본문 핀치는 iOS gesture 이벤트로 별도 처리)
document.addEventListener('touchmove',function(e){
  if(e.touches && e.touches.length>1){ if(e.cancelable) e.preventDefault(); }
},{passive:false});
</script>
