<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#27500A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>텐아르 PDF CENTER</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<script src="pdf_config.js"></script>
<style>
:root{--g:#27500A;--g2:#2e7a4e;--gold:#c9962b;--bg:#f6f4ec;--card:#fff;--txt:#1a1f1a;--soft:#5b6358;--bd:#e6e2d5;--danger:#c0392b;--shadow:0 6px 18px rgba(20,56,32,.10);--r:16px;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html{touch-action:manipulation} a,button,input,textarea{touch-action:manipulation} html{background:var(--g)} body{margin:0;font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:30px;background-image:radial-gradient(circle at 0 0,rgba(39,80,10,.08),transparent 38%),radial-gradient(circle at 100% 100%,rgba(201,150,43,.09),transparent 35%)}
.header{position:sticky;top:0;z-index:20;background:var(--g);color:#fff;padding:calc(12px + env(safe-area-inset-top)) 16px 13px;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.hrow{display:flex;align-items:center;gap:10px}.back{width:42px;height:42px;border-radius:13px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.14);color:#fff;font-size:20px;text-decoration:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}.htxt{min-width:0}.kicker{font-size:11px;color:rgba(255,255,255,.68);font-weight:700}.title{font-size:22px;font-weight:900;letter-spacing:-.03em;line-height:1.15}.sub{font-size:12px;color:#e6b955;margin-top:2px;font-weight:700}
main{max-width:640px;margin:0 auto;padding:14px}.searchbox{background:#fff;border:1px solid var(--bd);border-radius:18px;padding:13px;box-shadow:var(--shadow);margin-bottom:13px}.searchrow{display:flex;gap:8px}.searchrow input{flex:1;border:1.5px solid #d7d2c4;border-radius:13px;padding:13px 14px;font-size:15px;font-family:inherit;outline:none}.searchrow input:focus{border-color:var(--g2);box-shadow:0 0 0 3px rgba(46,122,78,.12)}.pillrow{display:flex;gap:6px;overflow-x:auto;margin-top:10px;padding-bottom:2px}.pill{border:1px solid #d8d2c0;border-radius:99px;background:#faf8ef;color:#5b6358;padding:7px 12px;font-size:12px;font-weight:800;white-space:nowrap;cursor:pointer}.pill.on{background:var(--g);color:#fff;border-color:var(--g)}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}.qcard{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:12px;box-shadow:0 2px 9px rgba(20,56,32,.06)}.qnum{font-size:20px;font-weight:900;color:var(--g)}.qlbl{font-size:11px;font-weight:800;color:var(--soft);margin-top:2px}.list{display:flex;flex-direction:column;gap:10px}.doc{background:#fff;border:1px solid var(--bd);border-radius:18px;padding:14px;box-shadow:var(--shadow);text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden}.doc:active{transform:scale(.985)}.doc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--cat,var(--g2))}.doc-top{display:flex;gap:12px;align-items:flex-start}.ico{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#eaf5e8,#fff8e6);border:1px solid #d8e2d0;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}.dmain{flex:1;min-width:0}.dtitle{font-size:15.5px;font-weight:900;line-height:1.3;color:#143820}.drow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px}.dsub{font-size:11px;font-weight:800;color:#fff;background:var(--cat,#5b6358);padding:3px 9px;border-radius:99px;flex-shrink:0}.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.tag{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:99px;background:#f2f0e7;color:#6e6758}.tag.year{background:#eef1f4;color:#444}.last{font-size:11.5px;color:#0A3A8C;font-weight:800;margin-top:8px;background:#EBF3FF;border:1px solid #c9dbff;border-radius:10px;padding:6px 9px;display:inline-flex;gap:4px}.openbtn{margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--g);color:#fff;border-radius:13px;padding:12px;font-size:14px;font-weight:900}.empty{padding:34px 14px;text-align:center;color:#8a8780;font-weight:700}.notice{margin-top:14px;background:#fff8e6;border:1px solid #f0d68a;border-left:4px solid var(--gold);border-radius:14px;padding:12px;font-size:12px;line-height:1.6;color:#6b4f0a;font-weight:700}.notice b{color:#8a5d00}.small{font-size:11px;color:#8a8780;margin-top:8px;line-height:1.55;text-align:center}
</style>
</head>
<body>
<header class="header"><div class="hrow"><a class="back" href="../index.html" aria-label="홈">‹</a><div class="htxt"><div class="kicker">농작물생산조사 통합시스템</div><div class="title">PDF CENTER</div><div class="sub">지침서·조사표·작물자료 · 바로 열람 · 검색 · 즐겨찾기 · 메모</div></div></div></header>
<main>
  <section class="searchbox">
    <div class="searchrow"><input id="q" type="search" placeholder="지침서, 조사표, 작물명으로 검색" autocomplete="off" /></div>
    <div class="pillrow" id="cats"></div>
  </section>
  <section class="quick"><div class="qcard"><div class="qnum" id="docCount">0</div><div class="qlbl">등록 자료</div></div><div class="qcard"><div class="qnum" id="favCount">0</div><div class="qlbl">저장 페이지</div></div></section>
  <section class="list" id="list"></section>
  <div class="notice"><b>파일 추가 방법</b><br>큰 PDF는 <b>Cloudflare R2</b>에 올리고 <b>pdf_config.js</b> 목록에 Worker 주소만 추가하면 자동으로 자료실에 표시됩니다.</div>
  <div class="small">※ 정적 웹에서는 원본 PDF 다운로드를 100% 차단할 수 없습니다. 이 뷰어는 다운로드 버튼을 노출하지 않는 모바일 열람용입니다.</div>
</main>
<script>
(function(){
  const docs = Array.isArray(window.TENAR_PDF_LIBRARY)? window.TENAR_PDF_LIBRARY : [];
  const list = document.getElementById('list'), q=document.getElementById('q'), cats=document.getElementById('cats');
  const allCats=['전체', ...Array.from(new Set(docs.map(d=>d.category||'기타')))], LAST='tenar_pdf_last_page_', FAV='tenar_pdf_favorites_v1';
  let cat='전체';
  const CAT_COLORS={'농작물생산조사':'#27500A','농업면적조사':'#0A6BB0','축산물생산비조사':'#B4690E','산지쌀값조사':'#7C3AED','농가판매및구입가격조사':'#C2306B','가축동향조사':'#0F766E'};
  function catColor(c){return CAT_COLORS[c]||'#5b6358';}
  function docIcon(d){const s=(d.subtitle||'')+(d.title||''); if(/조사표/.test(s))return '📋'; if(/분류/.test(s))return '🗂️'; return '📘';}
  function getFavs(){try{return JSON.parse(localStorage.getItem(FAV)||'{}')}catch(e){return {}}}
  function lastPage(id){return Number(localStorage.getItem(LAST+id)||0)}
  function renderCats(){cats.innerHTML=allCats.map(c=>{const col=c==='전체'?'#27500A':catColor(c); const on=c===cat; const st=on?`background:${col};border-color:${col};color:#fff`:`border-color:${col};color:${col}`; return `<button class="pill${on?' on':''}" data-cat="${esc(c)}" style="${st}">${esc(c)}</button>`}).join(''); cats.querySelectorAll('button').forEach(b=>b.onclick=()=>{cat=b.dataset.cat;renderCats();render()});}
  function render(){const term=(q.value||'').trim().toLowerCase(); let arr=docs.filter(d=>(cat==='전체'||(d.category||'기타')===cat)); if(term) arr=arr.filter(d=>[d.title,d.subtitle,d.category,d.year,(d.tags||[]).join(' ')].join(' ').toLowerCase().includes(term)); document.getElementById('docCount').textContent=docs.length; const favs=getFavs(); document.getElementById('favCount').textContent=Object.values(favs).reduce((a,b)=>a+(Array.isArray(b)?b.length:0),0); if(!arr.length){list.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;} list.innerHTML=arr.map(d=>{const lp=lastPage(d.id); const col=catColor(d.category); return `<a class="doc" style="--cat:${col}" href="pdf_viewer.html?id=${encodeURIComponent(d.id)}"><div class="doc-top"><div class="ico">${docIcon(d)}</div><div class="dmain"><div class="dtitle">${esc(d.title)}</div><div class="drow">${d.subtitle?`<span class="dsub">${esc(d.subtitle)}</span>`:''}${d.year?`<span class="tag year">${esc(d.year)}</span>`:''}${d.category?`<span class="tag cat" style="color:${col};background:${col}1a">${esc(d.category)}</span>`:''}</div>${lp?`<div class="last">↻ 최근 본 페이지 ${lp}쪽</div>`:''}</div></div><div class="openbtn">열람하기 ›</div></a>`}).join('')}
  function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  q.addEventListener('input',render); renderCats(); render();
})();
</script>

<script>
  // v58: Mac/Safari 트랙패드·키보드로 홈 메뉴가 확대되는 현상 방지
  document.addEventListener('wheel', function(e){
    if (e.ctrlKey || e.metaKey) e.preventDefault();
  }, { passive:false });
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('keydown', function(e){
    if ((e.ctrlKey || e.metaKey) && ['+','=','-','0'].includes(e.key)) e.preventDefault();
  }, { passive:false });
  // 두 번 터치(더블탭) 확대 차단
  var __lastTap=0;
  document.addEventListener('touchend', function(e){
    var now=Date.now();
    if(now-__lastTap<=320 && !(e.target.closest && e.target.closest('input,textarea,button,a'))){ if(e.cancelable) e.preventDefault(); }
    __lastTap=now;
  }, { passive:false });
  document.addEventListener('dblclick', function(e){ if(e.cancelable) e.preventDefault(); }, { passive:false });
</script>
</body>
</html>
