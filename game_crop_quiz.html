<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import {
        getFirestore, doc, getDoc, setDoc, updateDoc, increment,
        collection, getDocs, query, orderBy, limit, where, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAcU8iZR-B5HdvX1FOh4APCm0hXsz1u_X8",
        authDomain: "tenar-chat-1674c.firebaseapp.com",
        databaseURL: "https://tenar-chat-1674c-default-rtdb.firebaseio.com",
        projectId: "tenar-chat-1674c",
        storageBucket: "tenar-chat-1674c.firebasestorage.app",
        messagingSenderId: "662688468209",
        appId: "1:662688468209:web:0f37484e26943d79946d50"
    };
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const GAME_ID = 'crop_quiz';

    function withTimeout(promise, ms = 4500) {
        return Promise.race([promise, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))]);
    }

    /* ===== 사용자 ===== */
    const USER = {
        userId: localStorage.getItem('tenarGameUserId'),
        nickname: localStorage.getItem('tenarGameNick')
    };
    if (!USER.userId || !USER.nickname) location.replace('game_center.html');

    /* ===== 작물 데이터 (파일명 = 정답, 같은 분류에서 오답 보기 추출) ===== */
    const IMG_BASE = 'quiz_crops/';
    const CROPS = [
        { n:'복숭아',      c:'과수',     f:['복숭아.JPG'] },
        { n:'자두',        c:'과수',     f:['자두.JPG'] },
        { n:'매실',        c:'과수',     f:['매실.JPG'] },
        { n:'보리수',      c:'과수',     f:['보리수.JPG'] },
        { n:'양배추',      c:'채소',     f:['양배추.JPG','양배추2.JPG','양배추3.JPG'] },
        { n:'케일',        c:'채소',     f:['케일.JPG','케일2.JPG'] },
        { n:'아스파라거스', c:'채소',     f:['아스파라거스.JPG'] },
        { n:'오이',        c:'채소',     f:['오이.JPG'] },
        { n:'여주',        c:'채소',     f:['여주.JPG'] },
        { n:'주키니',      c:'채소',     f:['주키니.JPG'] },
        { n:'참외',        c:'채소',     f:['참외.JPG'] },
        { n:'더덕',        c:'뿌리채소', f:['더덕.JPG'] },
        { n:'우엉',        c:'뿌리채소', f:['우엉.JPG'] },
        { n:'도라지',      c:'뿌리채소', f:['도라지.JPG'] },
        { n:'감자',        c:'뿌리채소', f:['감자.JPG'] },
        { n:'밀',          c:'곡물콩',   f:['밀.JPG'] },
        { n:'율무',        c:'곡물콩',   f:['율무.JPG'] },
        { n:'참깨',        c:'곡물콩',   f:['참깨.JPG'] },
        { n:'유월콩',      c:'곡물콩',   f:['유월콩.JPG'] },
        { n:'결명자',      c:'약용허브', f:['결명자.JPG'] },
        { n:'엉겅퀴',      c:'약용허브', f:['엉겅퀴.JPG'] },
        { n:'바질',        c:'약용허브', f:['바질.JPG'] },
        { n:'삼립국화',    c:'약용허브', f:['삼립국화.JPG'] },
    ];

    const TOTAL_Q = 20;
    const TIME_PER_Q = 3;       // 초
    const POINT_PER_Q = 5;      // 문제당 점수

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }
    function imgUrl(file) { return IMG_BASE + encodeURIComponent(file); }

    /* 문제 생성: 20개 서로 다른 작물, 보기는 같은 분류 우선 */
    function buildQuestions() {
        const pick = shuffle(CROPS).slice(0, Math.min(TOTAL_Q, CROPS.length));
        return pick.map(crop => {
            // 같은 분류의 다른 작물에서 오답 3개
            let pool = CROPS.filter(x => x.c === crop.c && x.n !== crop.n);
            pool = shuffle(pool);
            let distractors = pool.slice(0, 3).map(x => x.n);
            // 같은 분류가 3개 미만이면 전체에서 보충
            if (distractors.length < 3) {
                const extra = shuffle(CROPS.filter(x => x.n !== crop.n && !distractors.includes(x.n)))
                    .map(x => x.n);
                for (const e of extra) {
                    if (distractors.length >= 3) break;
                    distractors.push(e);
                }
            }
            const file = crop.f[Math.floor(Math.random() * crop.f.length)];
            return {
                answer: crop.n,
                file,
                choices: shuffle([crop.n, ...distractors])
            };
        });
    }

    /* ===== 게임 상태 ===== */
    let questions = [];
    let qIndex = 0;
    let correctCount = 0;
    let answers = [];      // {answer, mine, ok}
    let timerInt = null;
    let timeLeft = 0;
    let locked = false;

    const imgEl = document.getElementById('q-img');
    const choicesEl = document.getElementById('choices');
    const timerBar = document.getElementById('timer-bar');
    const qCur = document.getElementById('q-cur');

    function startGame() {
        questions = buildQuestions();
        qIndex = 0; correctCount = 0; answers = [];
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        locked = false;
        const q = questions[qIndex];
        qCur.textContent = qIndex + 1;
        imgEl.src = imgUrl(q.file);
        choicesEl.innerHTML = '';
        q.choices.forEach(name => {
            const b = document.createElement('button');
            b.className = 'choice-btn';
            b.textContent = name;
            b.addEventListener('click', () => choose(name, b));
            choicesEl.appendChild(b);
        });
        startTimer();
    }

    function startTimer() {
        timeLeft = TIME_PER_Q * 1000;
        timerBar.style.transition = 'width 0.1s linear';
        timerBar.style.width = '100%';
        timerBar.style.background = '#c9962b';
        if (timerInt) clearInterval(timerInt);
        timerInt = setInterval(() => {
            timeLeft -= 100;
            const pct = Math.max(0, timeLeft / (TIME_PER_Q * 1000) * 100);
            timerBar.style.width = pct + '%';
            if (pct < 34) timerBar.style.background = '#ff4d4d';
            else if (pct < 67) timerBar.style.background = '#ffa500';
            if (timeLeft <= 0) { clearInterval(timerInt); timeUp(); }
        }, 100);
    }

    function choose(name, btn) {
        if (locked) return;
        locked = true;
        clearInterval(timerInt);
        btn.classList.add('picked');
        [...choicesEl.children].forEach(c => c.disabled = true);
        const q = questions[qIndex];
        const ok = (name === q.answer);
        if (ok) correctCount++;
        answers.push({ answer: q.answer, mine: name, ok });
        setTimeout(nextQuestion, 220);
    }

    function timeUp() {
        if (locked) return;
        locked = true;
        [...choicesEl.children].forEach(c => c.disabled = true);
        const q = questions[qIndex];
        answers.push({ answer: q.answer, mine: '시간초과', ok: false });
        setTimeout(nextQuestion, 220);
    }

    function nextQuestion() {
        qIndex++;
        if (qIndex >= questions.length) finishGame();
        else showQuestion();
    }

    /* ===== 결과 ===== */
    function finishGame() {
        clearInterval(timerInt);
        const score = correctCount * POINT_PER_Q;   // 최대 100
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').textContent = score;
        document.getElementById('resCorrect').textContent = correctCount + '개';

        let rank = "";
        if (score === 100) rank = "🏅 작물 박사";
        else if (score >= 80) rank = "👨‍🌾 베테랑 조사관";
        else if (score >= 50) rank = "🌿 성장하는 조사원";
        else rank = "🌱 새내기 관찰자";
        document.getElementById('rank-text').textContent = rank;

        // 정답 리뷰
        const rv = document.getElementById('reviewList');
        rv.innerHTML = answers.map((a, i) => {
            const mark = a.ok ? '✅' : '❌';
            const mineTxt = a.ok ? '' : `<span class="rv-mine">내 답: ${escapeHtml(a.mine)}</span>`;
            return `<div class="review-item">
                <span class="rv-no">${i+1}</span>
                <span class="rv-mark">${mark}</span>
                <span class="rv-ans"><span class="rv-correct">${escapeHtml(a.answer)}</span> ${mineTxt}</span>
            </div>`;
        }).join('');

        submitScore(score);
    }

    /* ===== 점수 저장 / XP / 랭킹 ===== */
    const XP_PER_PLAY = 10;
    function xpForScore(score) { return XP_PER_PLAY + correctCount; }

    async function submitScore(score) {
        const xpGain = xpForScore(score);
        document.getElementById('xpGain').textContent = `+${xpGain} XP 획득`;
        document.getElementById('resBest').textContent = '…';
        document.getElementById('resRank').textContent = '…';
        document.getElementById('newBest').classList.add('hidden');

        if (!USER.userId) return;
        const scoreRef = doc(db, 'rankings', GAME_ID, 'scores', USER.userId);
        let prevBest = 0, isNewBest = false;
        try {
            const prev = await withTimeout(getDoc(scoreRef));
            prevBest = prev.exists() ? (prev.data().score || 0) : 0;
            isNewBest = score > prevBest;
            if (isNewBest) {
                await withTimeout(setDoc(scoreRef, {
                    userId: USER.userId, nickname: USER.nickname,
                    score: score, playedAt: serverTimestamp()
                }));
            }
        } catch (e) {}

        withTimeout(setDoc(doc(collection(db, 'playLogs')), {
            gameId: GAME_ID, userId: USER.userId, nickname: USER.nickname,
            score: score, playedAt: serverTimestamp()
        })).catch(() => {});

        withTimeout(updateDoc(doc(db, 'users', USER.userId), {
            totalPlayCount: increment(1),
            totalScore: increment(score),
            xp: increment(xpGain),
            lastLogin: serverTimestamp()
        })).catch(() => {});

        const myBest = Math.max(prevBest, score);
        document.getElementById('resBest').textContent = myBest + '점';
        if (isNewBest) document.getElementById('newBest').classList.remove('hidden');

        try {
            const higher = await withTimeout(getDocs(query(collection(db, 'rankings', GAME_ID, 'scores'), where('score', '>', myBest))));
            document.getElementById('resRank').textContent = (higher.size + 1) + '위';
        } catch (e) {
            document.getElementById('resRank').textContent = '-';
        }
    }

    /* ===== 랭킹 모달 ===== */
    const rankModal = document.getElementById('rankModal');
    async function openRanking() {
        rankModal.classList.add('show');
        const list = document.getElementById('rankList');
        list.innerHTML = '<div class="rank-loading">불러오는 중…</div>';
        try {
            const qs = await withTimeout(getDocs(query(collection(db, 'rankings', GAME_ID, 'scores'), orderBy('score', 'desc'), limit(10))));
            if (qs.empty) { list.innerHTML = '<div class="rank-empty">아직 기록이 없어요.<br>첫 번째 기록의 주인공이 되어보세요!</div>'; return; }
            const medals = ['🥇', '🥈', '🥉'];
            let html = '', pos = 0;
            qs.forEach((d) => {
                pos++;
                const r = d.data();
                const mine = r.userId === USER.userId;
                const posCell = pos <= 3 ? `<div class="rank-pos top">${medals[pos-1]}</div>` : `<div class="rank-pos">${pos}</div>`;
                html += `<div class="rank-row ${mine ? 'me' : ''}">${posCell}
                    <div class="rank-nick">${escapeHtml(r.nickname || '익명')}${mine ? '<small>나</small>' : ''}</div>
                    <div class="rank-sc">${r.score}점</div></div>`;
            });
            list.innerHTML = html;
        } catch (e) {
            list.innerHTML = '<div class="rank-empty">랭킹을 불러오지 못했습니다.</div>';
        }
    }
    function closeRanking() { rankModal.classList.remove('show'); }
    function goCenter() { location.href = 'game_center.html'; }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    /* ===== 이미지 미리 로드 (3초 타이머 공정성) ===== */
    function preloadImages() {
        const startBtn = document.getElementById('startBtn');
        const files = [];
        CROPS.forEach(c => c.f.forEach(f => files.push(f)));
        let loaded = 0;
        const done = () => {
            loaded++;
            if (loaded >= files.length) {
                startBtn.disabled = false;
                startBtn.textContent = '퀴즈 시작';
            }
        };
        files.forEach(f => {
            const im = new Image();
            im.onload = done; im.onerror = done;
            im.src = imgUrl(f);
        });
        // 안전장치: 6초 후 무조건 활성화
        setTimeout(() => { startBtn.disabled = false; startBtn.textContent = '퀴즈 시작'; }, 6000);
    }

    /* ===== 이벤트 ===== */
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('retryBtn').addEventListener('click', startGame);
    document.getElementById('startRankBtn').addEventListener('click', openRanking);
    document.getElementById('resultRankBtn').addEventListener('click', openRanking);
    document.getElementById('rankCloseBtn').addEventListener('click', closeRanking);
    document.getElementById('startCenterBtn').addEventListener('click', goCenter);
    document.getElementById('resultCenterBtn').addEventListener('click', goCenter);
    document.getElementById('homeBtn').addEventListener('click', goCenter);
    document.getElementById('reviewToggle').addEventListener('click', () => {
        const rv = document.getElementById('reviewList');
        const t = document.getElementById('reviewToggle');
        const hidden = rv.classList.toggle('hidden');
        t.textContent = hidden ? '정답 확인하기 ▾' : '정답 접기 ▴';
    });
    rankModal.addEventListener('click', (e) => { if (e.target === rankModal) closeRanking(); });

    preloadImages();
</script>
