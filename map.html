<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>현재 위치 지도</title>

<!--
  App    : map2
  KeyID  : yoa6avx1h4
  ※ Client Secret은 서버사이드 전용 — HTML 절대 포함 금지
-->
<!--
  navermap_authFailure / 스크립트 로드 실패 공통 핸들러
  body 스크립트보다 먼저 선언 필요
-->
<script>
window.navermap_authFailure = function(){
  window.__naverAuthFailed = true;
  setTimeout(function(){
    if(typeof window.onNaverFail === 'function')
      window.onNaverFail('API 키 인증 실패 (ncpKeyId 확인 필요)');
  }, 200);
};
window.__naverScriptError = false;
</script>

<script type="text/javascript"
    src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=yoa6avx1h4&submodules=geocoder&callback=initNaverMap"
    onerror="window.__naverScriptError=true;setTimeout(function(){if(typeof window.onNaverFail==='function')window.onNaverFail('스크립트 로드 실패');},200);">
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#f0f2f5;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}

/* ── 지도 영역 (전체화면) ── */
#map{position:fixed;top:0;left:0;right:0;bottom:0;}

/* ── 상단 검색 오버레이 (지도 위에 떠 있음) ── */
#search-bar{
  position:fixed;
  top:calc(8px + env(safe-area-inset-top));
  left:10px;right:10px;
  z-index:600;display:flex;align-items:center;gap:8px;
}
.back-btn{
  flex-shrink:0;width:44px;height:44px;border:none;border-radius:50%;
  background:rgba(255,255,255,.98);color:#111;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.20);
}
.back-btn:active{ transform:scale(.92); }

/* ── 오버레이 (로딩/에러) ── */
#overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#f0f2f5;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:800;gap:12px;padding:28px 24px;
}
.spinner{
  width:44px;height:44px;
  border:4px solid #d1fae5;border-top-color:#0d6640;
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#ov-title{font-size:15px;font-weight:700;color:#111;text-align:center}
#ov-sub{font-size:13px;color:#6b7280;text-align:center;line-height:1.7;max-width:280px}
#ov-btns{display:flex;flex-direction:column;gap:9px;width:100%;max-width:270px;margin-top:6px;display:none}
.ov-btn{
  padding:13px 16px;border-radius:13px;border:none;
  font-size:13.5px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:-.2px;
}
.ov-btn-primary  {background:#0d6640;color:#fff;}
.ov-btn-primary:active  {background:#0a5030}
.ov-btn-secondary{background:#fff;color:#374151;border:1px solid #d1d5db;}
.ov-btn-secondary:active{background:#f9fafb}

/* ── 현재 위치 버튼 ── */
#locate-btn{
  position:fixed;right:14px;bottom:32px;
  width:50px;height:50px;
  background:#fff;border:none;border-radius:50%;
  box-shadow:0 3px 14px rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:400;transition:transform .12s;
}
#locate-btn:active{transform:scale(.9)}

/* ── 즐겨찾기·추적 버튼 (현재위치 버튼 위로 세로 스택) ── */
#fav-btn, #track-btn{
  position:fixed;right:14px;
  width:50px;height:50px;
  background:#fff;border:none;border-radius:50%;
  box-shadow:0 3px 14px rgba(0,0,0,.18);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:400;transition:transform .12s;
}
#fav-btn{ bottom:90px; }
#track-btn{ bottom:148px; }
#fav-btn:active, #track-btn:active{ transform:scale(.9); }
/* 추적 ON 상태 */
#track-btn.active{ background:#0d6640; }
#track-btn.active svg{ stroke:#fff; }
#track-btn.active svg circle:nth-of-type(2){ fill:#fff; }

/* ── 즐겨찾기 패널 (하단 시트) ── */
#fav-modal{
  display:none;position:fixed;inset:0;z-index:1200;
  background:rgba(0,0,0,.4);align-items:flex-end;justify-content:center;
}
#fav-modal.show{ display:flex; }
#fav-sheet{
  width:100%;max-width:480px;background:#fff;
  border-radius:20px 20px 0 0;padding:14px 16px calc(20px + env(safe-area-inset-bottom));
  max-height:70vh;display:flex;flex-direction:column;
  box-shadow:0 -6px 24px rgba(0,0,0,.22);
}
#fav-head{
  display:flex;align-items:center;justify-content:space-between;
  font-size:16px;font-weight:800;color:#111;margin-bottom:10px;
}
#fav-close{
  width:30px;height:30px;border:none;border-radius:50%;
  background:#f3f4f6;color:#6b7280;font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
#fav-add-btn{
  width:100%;border:none;border-radius:12px;
  background:#0d6640;color:#fff;font-family:inherit;
  font-size:14px;font-weight:700;padding:12px;cursor:pointer;
  margin-bottom:10px;flex-shrink:0;
}
#fav-add-btn:active{ background:#0a5030; }
#fav-list{ overflow-y:auto;-webkit-overflow-scrolling:touch; }
.fav-empty{ text-align:center;color:#9ca3af;font-size:13px;padding:20px 0; }
.fav-item{
  display:flex;align-items:center;gap:10px;
  padding:11px 10px;border-radius:11px;background:#f8f7f1;
  border:1px solid #ece8d8;margin-bottom:7px;
}
.fav-item .fi-text{ flex:1;min-width:0;cursor:pointer; }
.fav-item .fi-label{ font-size:14px;font-weight:700;color:#111;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.fav-item .fi-coord{ font-size:11px;color:#9ca3af;margin-top:1px; }
.fav-item .fi-del{
  flex-shrink:0;border:none;background:transparent;color:#c0392b;
  font-size:12px;font-weight:800;cursor:pointer;padding:6px 8px;
}

/* ── 검색 입력/버튼 (상단 오버레이 안) ── */
#search-input{
  flex:1;height:44px;border:none;border-radius:999px;
  padding:0 16px;font-size:15px;outline:none;
  background:rgba(255,255,255,.98);
  box-shadow:0 2px 12px rgba(0,0,0,.20);
  -webkit-appearance:none;appearance:none;
}
#search-btn{
  height:44px;padding:0 18px;border:none;border-radius:999px;
  background:#0d6640;color:#fff;font-weight:700;font-size:14px;
  font-family:inherit;cursor:pointer;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,.20);
}
#search-btn:active{background:#0a5030}

/* ── 지도 타입(위성/일반) 토글 버튼 ── */
#layer-btn{
  position:fixed;right:14px;
  top:calc(64px + env(safe-area-inset-top));
  width:46px;height:46px;border:none;border-radius:50%;
  background:rgba(0,0,0,.78);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 14px rgba(0,0,0,.25);z-index:400;
  transition:transform .12s;
}
#layer-btn:active{ transform:scale(.9); }

/* ── 현재 위치 방향 마커 ── */
.me-marker{ width:40px;height:40px;position:relative; }
.me-cone-wrap{
  position:absolute;left:50%;top:50%;
  width:40px;height:40px;margin:-20px 0 0 -20px;
  transform:rotate(0deg);transition:transform .15s ease-out;
  pointer-events:none;
}
.me-cone{
  position:absolute;left:50%;top:0;
  width:0;height:0;margin-left:-11px;
  border-left:11px solid transparent;
  border-right:11px solid transparent;
  border-bottom:16px solid rgba(26,115,232,.55);
}
.me-dot{
  position:absolute;left:50%;top:50%;
  width:16px;height:16px;margin:-8px 0 0 -8px;
  border-radius:50%;background:#1a73e8;
  border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);
}
.me-pulse{
  position:absolute;left:50%;top:50%;
  width:16px;height:16px;margin:-8px 0 0 -8px;
  border-radius:50%;background:rgba(26,115,232,.25);
  animation:gpsPulse 2s ease-in-out infinite;
}

/* ── 하단 정보 시트 (현재위치·주소) ── */
#info-sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:500;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -4px 22px rgba(0,0,0,.18);
  padding:8px 18px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(115%);transition:transform .3s ease;
}
#info-sheet.show{ transform:translateY(0); }
.sheet-handle{
  width:40px;height:4px;border-radius:99px;background:#d1d5db;
  margin:2px auto 10px;cursor:pointer;
}
#infoLine1{
  font-size:17px;font-weight:800;color:#111;line-height:1.3;
  word-break:keep-all;
}
#infoLine2{
  font-size:13px;color:#6b7280;line-height:1.45;margin-top:4px;
  word-break:keep-all;
}
.info-actions{ display:flex;gap:8px;margin-top:12px; }
.info-actions button{
  flex:1;border:none;border-radius:12px;font-family:inherit;
  font-size:14px;font-weight:700;padding:11px;cursor:pointer;
}
#info-fav{ background:#fff7e6;color:#a06d00;border:1px solid #f0d68a !important; }
#info-fav:active{ background:#fdecc8; }
#info-close{ background:#f3f4f6;color:#374151; }
#info-close:active{ background:#e5e7eb; }


#info-route{
  background:#e8f3ff;
  color:#0066cc;
  border:1px solid #b8d8ff !important;
}
#info-route:active{
  background:#d8ebff;
}

/* ── 토스트 ── */

#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(17,24,39,.85);color:#fff;
  padding:9px 20px;border-radius:22px;
  font-size:13px;font-weight:600;white-space:nowrap;
  z-index:900;opacity:0;transition:opacity .25s;pointer-events:none;
}
#toast.show{opacity:1}

/* ── 디버그 패널 (제목 5탭) ── */
#dbg{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.9);color:#4ade80;
  font-family:ui-monospace,monospace;font-size:10.5px;line-height:1.75;
  padding:8px 12px 16px;z-index:2000;
  display:none;max-height:220px;overflow-y:auto;
}
</style>
</head>
<body>

<!-- 지도 (전체화면) -->
<div id="map"></div>

<!-- 상단 검색 오버레이 (뒤로가기 + 검색) -->
<div id="search-bar">
  <button class="back-btn" onclick="goBack()" title="홈으로">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <input id="search-input" type="search" placeholder="주소 검색 (예: 상주시 신봉동)"
         onkeydown="if(event.key==='Enter')searchByAddress()" />
  <button id="search-btn" onclick="searchByAddress()">검색</button>
</div>

<!-- 지도 타입(위성/일반) 토글 -->
<button id="layer-btn" onclick="toggleLayer()" title="위성/일반 전환">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M12 3 3 8l9 5 9-5-9-5z"/>
    <path d="M3 13l9 5 9-5"/>
  </svg>
</button>

<!-- 오버레이 (로딩/에러) -->
<div id="overlay">
  <div class="spinner" id="ovSpinner"></div>
  <div id="ov-title">🗺 지도 초기화 중</div>
  <div id="ov-sub">Naver Maps API 로드 중…</div>
  <div id="ov-btns"></div>
</div>

<!-- 실시간 추적 버튼 -->
<button id="track-btn" onclick="toggleTrack()" title="실시간 추적">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#0d6640" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="3.2" fill="#0d6640" stroke="none"/>
    <path d="M12 1v3M12 20v3M1 12h3M20 12h3"/>
  </svg>
</button>

<!-- 즐겨찾기 버튼 -->
<button id="fav-btn" onclick="openFavPanel()" title="즐겨찾기">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#c9962b" stroke-width="2" stroke-linejoin="round">
    <path d="M12 3l2.6 5.3 5.9.85-4.25 4.15 1 5.8L12 16.9l-5.25 2.8 1-5.8L3.5 9.15l5.9-.85L12 3z"/>
  </svg>
</button>

<!-- 현재 위치 버튼 -->
<button id="locate-btn" onclick="startGPS()" title="현재 위치">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#0d6640" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22"/>
    <circle cx="12" cy="12" r="7"/>
  </svg>
</button>

<!-- 하단 정보 시트 (현재위치·주소) -->
<div id="info-sheet">
  <div class="sheet-handle" id="sheetHandle" onclick="hideInfoSheet()"></div>
  <div id="infoLine1">📍 현재 위치</div>
  <div id="infoLine2">위치를 조회하면 주소가 표시됩니다</div>
  <div class="info-actions">
    <button id="info-fav" onclick="addCurrentFav()">⭐ 즐겨찾기 저장</button>
    <button id="info-route" onclick="openNaverRoute()">🚗 네이버 길찾기</button>
    <button id="info-close" onclick="hideInfoSheet()">닫기</button>
  </div>
</div>

<!-- 즐겨찾기 패널 (하단 시트) -->
<div id="fav-modal" onclick="if(event.target===this)closeFavPanel()">
  <div id="fav-sheet">
    <div id="fav-head">
      <span>⭐ 즐겨찾기 위치</span>
      <button onclick="closeFavPanel()" id="fav-close">×</button>
    </div>
    <button id="fav-add-btn" onclick="addCurrentFav()">＋ 현재 보고 있는 위치 저장</button>
    <div id="fav-list"></div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 디버그 패널 -->
<div id="dbg"></div>

<script>
(function(){
'use strict';

/* ── 설정 ── */
var CFG = {
  defaultLat : 35.8239,
  defaultLng : 128.7358,
  gpsTimeout : 14000
};

/* ── 상태 ── */
var S = { map:null, marker:null, circle:null, pickMarker:null,
          lat:null, lng:null, acc:null, watchId:null,
          heading:null, compassOn:false, isHybrid:true,
          naverReady:false, gpsOk:false, tapCount:0 };

/* ── 뒤로가기 (새 탭으로 열린 경우 창 닫기 → 안되면 홈으로) ── */
window.goBack = function(){
  if(window.history.length > 1){
    history.back();
    /* 새 탭이라 back이 동작하지 않으면 홈으로 이동 */
    setTimeout(function(){
      window.location.href = 'https://ubaldos00-ship-it.github.io/home/';
    }, 400);
  } else {
    window.close();
    window.location.href = 'https://ubaldos00-ship-it.github.io/home/';
  }
};

/* ── DOM ── */
var overlay   = document.getElementById('overlay');
var ovSpinner = document.getElementById('ovSpinner');
var ovTitle   = document.getElementById('ov-title');
var ovSub     = document.getElementById('ov-sub');
var ovBtns    = document.getElementById('ov-btns');
var ahLine1   = document.getElementById('infoLine1');
var ahLine2   = document.getElementById('infoLine2');
var infoSheet = document.getElementById('info-sheet');
var toastEl   = document.getElementById('toast');

/* ── 하단 정보 시트 표시/숨김 (열리면 우측 버튼을 시트 위로 올림) ── */
function adjustControls(){
  var open = infoSheet.classList.contains('show');
  var h = open ? infoSheet.offsetHeight : 0;
  var base = h ? (h + 14) : 32;
  var lb = document.getElementById('locate-btn');
  var fb = document.getElementById('fav-btn');
  var tb = document.getElementById('track-btn');
  if(lb) lb.style.bottom = base + 'px';
  if(fb) fb.style.bottom = (base + 58) + 'px';
  if(tb) tb.style.bottom = (base + 116) + 'px';
}
function showInfoSheet(){ infoSheet.classList.add('show'); requestAnimationFrame(adjustControls); }
window.hideInfoSheet = function(){ infoSheet.classList.remove('show'); adjustControls(); };

/* ── 정보 시트 주소 표시 헬퍼 (앞에 위치 이모지 📍) ── */
function showAddr(jibun, road, zip){
  selectedName = road || jibun || '목적지';
  ahLine1.textContent = '📍 ' + (jibun || road || '주소 없음');
  var parts = [];
  if(road) parts.push('도로명 ' + road);
  if(zip)  parts.push('우편 ' + zip);
  ahLine2.textContent = parts.length ? parts.join('  ·  ') : '';
  showInfoSheet();
}
var dbgEl     = document.getElementById('dbg');
var toastTmr;
var selectedLat=null;
var selectedLng=null;
var selectedName='';

/* ── 디버그 로그 ── */
function log(msg, lv){
  var t   = new Date().toTimeString().slice(0,8);
  var col = lv==='err'?'#f87171':lv==='warn'?'#fbbf24':'#86efac';
  dbgEl.innerHTML += '<span style="color:#6b7280">['+t+']</span> <span style="color:'+col+'">'+msg+'</span><br>';
  dbgEl.scrollTop  = dbgEl.scrollHeight;
  console[lv==='err'?'error':lv==='warn'?'warn':'log']('[MAP]', msg);
}

/* 시트 핸들 5탭 → 디버그 패널 */
document.getElementById('sheetHandle').addEventListener('click', function(){
  if(++S.tapCount >= 5){
    S.tapCount = 0;
    dbgEl.style.display = dbgEl.style.display==='none'?'block':'none';
  }
});

/* ── 오버레이 헬퍼 ── */
function showOv(title, sub, spinner){
  overlay.style.display   = 'flex';
  ovTitle.textContent     = title;
  ovSub.innerHTML         = sub;
  ovSpinner.style.display = spinner ? 'block' : 'none';
  ovBtns.innerHTML        = '';
  ovBtns.style.display    = 'none';
}
function hideOv(){ overlay.style.display = 'none'; }
function addBtn(label, cls, fn){
  var b = document.createElement('button');
  b.className   = 'ov-btn ' + cls;
  b.textContent = label;
  b.onclick     = fn;
  ovBtns.appendChild(b);
  ovBtns.style.display = 'flex';
}
function toast(msg){
  clearTimeout(toastTmr);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTmr = setTimeout(function(){ toastEl.classList.remove('show'); }, 2800);
}

/* ================================================================
   ✅ Naver API callback — 로드 완료 시 자동 호출
================================================================ */
window.initNaverMap = function(){
  log('✅ Naver API 콜백 수신 — 준비 완료');
  S.naverReady = true;
  /* URL ?q=주소 가 있으면 GPS 대신 그 주소를 바로 검색 (통합계산기 연동) */
  var q = '';
  try { q = (new URLSearchParams(location.search).get('q') || '').trim(); } catch(e){}
  if(q){
    log('URL 주소 검색: ' + q);
    renderMap(CFG.defaultLat, CFG.defaultLng, 0, true);  /* 지도만 생성 */
    var inp = document.getElementById('search-input');
    if(inp) inp.value = q;
    setTimeout(function(){ window.searchByAddress(); }, 700);
  } else {
    startGPS();
  }
};

/* ✅ Naver API 실패 (onerror / authFailure 공통 처리) */
window.onNaverFail = function(reason){
  log('❌ Naver API 실패: ' + reason, 'err');
  showOv('⚠️ 지도를 불러올 수 없음',
    '<b>Naver Maps API 오류</b><br>' +
    '<small style="color:#9ca3af">' + reason + '</small><br><br>' +
    'GPS 위치 조회는 계속 진행합니다.', false);
  addBtn('📡 GPS 위치 확인', 'ov-btn-primary', gpsOnlyFlow);
  addBtn('🌐 네이버지도 열기', 'ov-btn-secondary', openNaverWeb);
};

/* ================================================================
   GPS 조회
================================================================ */
window.startGPS = function(){
  if(!navigator.geolocation){
    log('geolocation 미지원', 'err');
    showOv('GPS 미지원', '이 브라우저는 위치 조회를 지원하지 않습니다.', false);
    addBtn('기본 위치로 지도 보기', 'ov-btn-primary', function(){
      renderMap(CFG.defaultLat, CFG.defaultLng, 0);
    });
    return;
  }

  showOv('📡 GPS 조회 중',
    'GPS 권한 팝업이 뜨면 <b>허용</b>을 눌러주세요<br>' +
    '<small style="color:#9ca3af">iOS: 설정 → 개인 정보 → 위치 서비스 → 브라우저</small>',
    true);
  log('GPS 요청 시작');

  navigator.geolocation.getCurrentPosition(
    onGPSOk, onGPSErr,
    { enableHighAccuracy:true, timeout:CFG.gpsTimeout, maximumAge:0 }
  );
};

function onGPSOk(pos){
  S.lat = pos.coords.latitude;
  S.lng = pos.coords.longitude;
  S.acc = pos.coords.accuracy;
  S.gpsOk = true;
  log('GPS 성공 — ' + S.lat.toFixed(6) + ', ' + S.lng.toFixed(6) + ' ±' + Math.round(S.acc) + 'm');

  if(S.naverReady){
    renderMap(S.lat, S.lng, S.acc);
  } else {
    gpsOnlyFlow();
  }
}

function onGPSErr(err){
  var msg = 'GPS 오류', guide = '';
  switch(err.code){
    case 1:
      msg   = '위치 권한이 거부되었습니다';
      guide = '① 브라우저 주소창 🔒 아이콘 터치<br>' +
              '② <b>위치 → 허용</b> 선택 후 새로고침<br>' +
              '<small style="color:#9ca3af">iOS: 설정 → 개인정보 → 위치 서비스</small>';
      break;
    case 2:
      msg   = 'GPS 신호 없음';
      guide = '실내이거나 신호가 약합니다.<br>Wi-Fi를 켜거나 야외에서 다시 시도하세요.';
      break;
    case 3:
      msg   = '위치 조회 시간 초과';
      guide = '잠시 후 다시 시도해 주세요.';
      break;
  }
  log('GPS 실패 code:' + err.code + ' — ' + msg, 'err');
  showOv('📡 ' + msg, guide || err.message, false);
  addBtn('🔄 다시 시도', 'ov-btn-primary', window.startGPS);
  addBtn('기본 위치로 지도 보기', 'ov-btn-secondary', function(){
    renderMap(CFG.defaultLat, CFG.defaultLng, 0);
  });
}

/* ================================================================
   지도 렌더링
================================================================ */
function renderMap(lat, lng, acc, skipMe){
  if(!S.naverReady){ log('renderMap: Naver 미준비', 'warn'); return; }

  /* 오버레이를 먼저 숨겨서 #map 컨테이너가 실제 크기를 갖게 한 뒤
     지도 인스턴스를 생성해야 Naver Maps가 크기를 0으로 계산하지 않음 */
  hideOv();

  setTimeout(function(){
    /* 컨테이너 크기를 화면 전체로 강제 지정 — iOS Safari fixed 레이아웃 대응 */
    var mapEl = document.getElementById('map');
    mapEl.style.position = 'fixed';
    mapEl.style.top      = '0';
    mapEl.style.left     = '0';
    mapEl.style.width    = window.innerWidth  + 'px';
    mapEl.style.height   = window.innerHeight + 'px';
    log('컨테이너 크기: ' + window.innerWidth + 'x' + window.innerHeight);

    var pos = new naver.maps.LatLng(lat, lng);

    if(!S.map){
      S.map = new naver.maps.Map('map', {
        center : pos,
        zoom   : 17,
        mapTypeId : naver.maps.MapTypeId.HYBRID,  /* 기본: 위성(하이브리드 - 위성+지명) */
        mapTypeControl : false,   /* 커스텀 레이어 버튼 사용 */
        zoomControl : false,      /* 줌 바 제거 (손가락 핀치줌 사용) */
        scaleControl : false,
        logoControl : true,
        mapDataControl : false
      });
      log('지도 인스턴스 생성 완료');

      /* 지도를 길게 누르면 그 지점의 지번·도로명 주소 조회 */
      naver.maps.Event.addListener(S.map, 'longtap', function(e){
        if(S.pickMarker){ S.pickMarker.setMap(null); }
        S.pickMarker = new naver.maps.Marker({ map:S.map, position:e.coord });
        searchAddress(e.coord, '📍 선택 위치');
      });
    } else {
      naver.maps.Event.trigger(S.map, 'resize');
      S.map.setCenter(pos);
      S.map.setZoom(17);
    }

    /* skipMe: URL 주소검색 모드 — 지도만 만들고 현재위치 마커/주소조회 생략 */
    if(skipMe){
      log('지도 생성 (주소검색 모드)');
      return;
    }

    /* 오차 범위 원 */
    if(S.circle){ S.circle.setMap(null); }
    if(acc > 0){
      S.circle = new naver.maps.Circle({
        map:S.map, center:pos,
        radius      : Math.min(acc, 500),
        fillColor   : 'rgba(26,115,232,.08)',
        fillOpacity : 1,
        strokeColor : 'rgba(26,115,232,.4)',
        strokeWeight: 1.5
      });
    }

    /* 현재 위치 방향 마커 (파란 점 + 방향 부채꼴) */
    if(S.marker){ S.marker.setMap(null); }
    S.marker = new naver.maps.Marker({
      map:S.map, position:pos,
      icon:{
        content:
          '<div class="me-marker">' +
            '<div class="me-cone-wrap" id="meConeWrap"><div class="me-cone"></div></div>' +
            '<div class="me-pulse"></div>' +
            '<div class="me-dot"></div>' +
          '</div>',
        anchor: new naver.maps.Point(20,20)
      }
    });
    updateMarkerHeading();

    log('렌더링 완료');
    toast('📍 현재 위치 표시 완료');

    /* 나침반(방향) 센서 시작 */
    startCompass();

    /* 현재 위치의 주소 자동 조회 */
    searchAddress(pos, '📍 현재 위치');
  }, 200);
}

/* ================================================================
   주소·지명 검색 → 좌표 변환 (Geocoding) → 지도에 마커
================================================================ */
window.searchByAddress = function(){
  var q = (document.getElementById('search-input').value || '').trim();
  if(!q){ return; }
  if(!S.map){ toast('지도 로딩 후 검색해주세요'); return; }
  if(!naver.maps.Service || !naver.maps.Service.geocode){
    toast('검색 모듈 미로드'); return;
  }
  toast('🔍 검색 중…');
  naver.maps.Service.geocode({ query:q }, function(status, response){
    if(status !== naver.maps.Service.Status.OK){
      log('검색 실패: status=' + status, 'err');
      toast('검색 실패 (' + status + ')');
      return;
    }
    var items = (response.v2 && response.v2.addresses) || [];
    if(!items.length){ toast('검색 결과가 없습니다'); return; }

    var item = items[0];
    var ll   = new naver.maps.LatLng(Number(item.y), Number(item.x));
    selectedLat = Number(item.y);
    selectedLng = Number(item.x);
    S.map.setCenter(ll);
    S.map.setZoom(17);

    /* 검색 위치 마커 */
    if(S.pickMarker){ S.pickMarker.setMap(null); }
    S.pickMarker = new naver.maps.Marker({ map:S.map, position:ll });

    /* 상단바에 주소 표시 (지번·도로명·우편번호) */
    var jibun = item.jibunAddress || '';
    var road  = item.roadAddress  || '';
    var zip   = extractZip(item.addressElements);
    showAddr(jibun, road, zip);
    log('검색 성공: ' + (road || jibun));

    /* 키보드 닫기 */
    document.getElementById('search-input').blur();
  });
};

/* addressElements 배열에서 우편번호(POSTAL_CODE) 추출 */
function extractZip(elements){
  if(!elements || !elements.length) return '';
  for(var i=0;i<elements.length;i++){
    var t = elements[i].types || [];
    if(t.indexOf('POSTAL_CODE') >= 0 && elements[i].longName){
      return elements[i].longName;
    }
  }
  return '';
}

/* ================================================================
   좌표 → 주소(지번·도로명) 변환 (Reverse Geocoding)
================================================================ */
function searchAddress(coord, label){
  selectedLat = coord.lat();
  selectedLng = coord.lng();
  if(!naver.maps.Service || !naver.maps.Service.reverseGeocode){
    log('주소 모듈(geocoder) 미로드', 'warn');
    return;
  }
  naver.maps.Service.reverseGeocode({
    coords : coord,
    orders : 'addr,roadaddr'
  }, function(status, response){
    if(status !== naver.maps.Service.Status.OK){
      log('주소 조회 실패: status=' + status, 'err');
      toast('주소 조회 실패 (' + status + ')');
      ahLine1.textContent = '주소 조회 실패: ' + status;
      ahLine2.textContent = '';
      showInfoSheet();
      return;
    }
    var addr  = (response.v2 && response.v2.address) || {};
    var jibun = addr.jibunAddress || '';
    var road  = addr.roadAddress  || '';
    /* reverseGeocode 응답엔 우편번호가 없으므로,
       도로명(우선)·지번 주소를 geocode로 재조회해 우편번호를 보강한다 */
    var qAddr = road || jibun;
    if(qAddr && naver.maps.Service && naver.maps.Service.geocode){
      naver.maps.Service.geocode({ query:qAddr }, function(st, res){
        var zip = '';
        if(st === naver.maps.Service.Status.OK && res.v2 && res.v2.addresses && res.v2.addresses.length){
          zip = extractZip(res.v2.addresses[0].addressElements);
        }
        showAddr(jibun, road, zip);
      });
    } else {
      showAddr(jibun, road, '');
    }
    log('주소: ' + (jibun || road || '없음'));
  });
}

/* ================================================================
   폴백 — Naver 실패 시 GPS 좌표 + 외부 지도
================================================================ */
function gpsOnlyFlow(){
  if(!S.gpsOk){
    navigator.geolocation.getCurrentPosition(function(pos){
      S.lat = pos.coords.latitude;
      S.lng = pos.coords.longitude;
      S.acc = pos.coords.accuracy;
      S.gpsOk = true;
      gpsOnlyFlow();
    }, onGPSErr, { enableHighAccuracy:true, timeout:CFG.gpsTimeout, maximumAge:0 });
    return;
  }

  ahLine1.textContent = '📍 GPS 위치 확인됨';
  ahLine2.textContent = S.lat.toFixed(5) + ', ' + S.lng.toFixed(5) + '  ±' + Math.round(S.acc) + 'm';

  showOv('📍 GPS 위치 확인됨',
    '<b style="font-size:16px">' + S.lat.toFixed(6) + '</b><br>' +
    '<b style="font-size:16px">' + S.lng.toFixed(6) + '</b><br>' +
    '<span style="color:#9ca3af;font-size:12px">오차 ±' + Math.round(S.acc) + 'm</span><br><br>' +
    '<small style="color:#9ca3af">지도 API 오류 — 외부 지도를 이용하세요</small>',
    false);
  addBtn('🗺 네이버지도로 보기', 'ov-btn-primary', openNaverWeb);
  addBtn('🗺 카카오지도로 보기', 'ov-btn-secondary', openKakaoWeb);
}

function openNaverWeb(){
  var la = S.lat||CFG.defaultLat, ln = S.lng||CFG.defaultLng;
  window.open('https://map.naver.com/p/search/'+la+','+ln, '_blank');
}
function openKakaoWeb(){
  var la = S.lat||CFG.defaultLat, ln = S.lng||CFG.defaultLng;
  window.open('https://map.kakao.com/link/map/현재위치,'+la+','+ln, '_blank');
}

/* ================================================================
   지도 타입 토글 (위성 하이브리드 ↔ 일반)
================================================================ */
window.toggleLayer = function(){
  if(!S.map){ return; }
  S.isHybrid = !S.isHybrid;
  S.map.setMapTypeId(S.isHybrid ? naver.maps.MapTypeId.HYBRID : naver.maps.MapTypeId.NORMAL);
  toast(S.isHybrid ? '🛰 위성 지도' : '🗺 일반 지도');
};

/* ================================================================
   방향(나침반) 표시 — 현재 위치 마커의 부채꼴 회전
================================================================ */
function startCompass(){
  if(S.compassOn) return;
  if(!window.DeviceOrientationEvent) return;
  /* iOS 13+ 는 사용자 제스처에서 권한 요청 필요 */
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(function(res){
      if(res === 'granted'){
        window.addEventListener('deviceorientation', onOrient, true);
        S.compassOn = true;
        log('나침반 권한 허용');
      } else { log('나침반 권한 거부', 'warn'); }
    }).catch(function(e){ log('나침반 요청 오류', 'warn'); });
  } else {
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
    S.compassOn = true;
  }
}
function onOrient(e){
  var h = null;
  if(e.webkitCompassHeading != null){
    h = e.webkitCompassHeading;            /* iOS: 0=북, 시계방향 */
  } else if(e.alpha != null){
    h = (360 - e.alpha) % 360;             /* Android 보정(대략) */
  }
  if(h == null) return;
  S.heading = h;
  updateMarkerHeading();
}
function updateMarkerHeading(){
  var wrap = document.getElementById('meConeWrap');
  if(!wrap) return;
  if(S.heading == null){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  wrap.style.transform = 'rotate(' + S.heading + 'deg)';
}

/* ================================================================
   실시간 위치 추적 (watchPosition 토글)
================================================================ */
window.toggleTrack = function(){
  var btn = document.getElementById('track-btn');
  if(S.watchId != null){
    /* 추적 정지 */
    navigator.geolocation.clearWatch(S.watchId);
    S.watchId = null;
    btn.classList.remove('active');
    toast('실시간 추적 정지');
    log('추적 정지');
    /* 정지 시 마지막 위치 주소 1회 갱신 */
    if(S.map && S.lat != null) searchAddress(new naver.maps.LatLng(S.lat, S.lng), '📍 현재 위치');
    return;
  }
  if(!navigator.geolocation){ toast('이 기기는 위치 추적 미지원'); return; }
  if(!S.map){ toast('지도 로딩 후 사용해주세요'); return; }
  btn.classList.add('active');
  toast('🛰 실시간 추적 시작');
  log('추적 시작');
  startCompass();              /* 추적 중 방향도 함께 표시 */
  showInfoSheet();
  S.watchId = navigator.geolocation.watchPosition(onTrack, onTrackErr,
    { enableHighAccuracy:true, maximumAge:1000, timeout:12000 });
};
function onTrack(pos){
  S.lat = pos.coords.latitude;
  S.lng = pos.coords.longitude;
  S.acc = pos.coords.accuracy;
  /* GPS heading(이동 방향)이 있으면 나침반 대신 사용 */
  if(pos.coords.heading != null && !isNaN(pos.coords.heading)){
    S.heading = pos.coords.heading;
    updateMarkerHeading();
  }
  var ll = new naver.maps.LatLng(S.lat, S.lng);
  S.map.setCenter(ll);
  /* 마커 위치 갱신 (없으면 생성) */
  if(S.marker){ S.marker.setPosition(ll); }
  else { renderMap(S.lat, S.lng, S.acc); }
  /* 정확도 원 갱신 */
  if(S.circle){ S.circle.setCenter(ll); S.circle.setRadius(Math.min(S.acc, 500)); }
  /* 추적 중에는 좌표만 빠르게 표시 (주소 호출 절약) */
  ahLine1.textContent = '📍 실시간 위치 추적 중';
  ahLine2.textContent = '🛰 ' + S.lat.toFixed(5) + ', ' + S.lng.toFixed(5) + '  ±' + Math.round(S.acc) + 'm';
}
function onTrackErr(err){
  log('추적 오류 code:' + err.code, 'warn');
  toast('추적 신호 약함 — 재시도 중');
}

/* ================================================================
   즐겨찾기 위치 (이 앱에 직접 저장 · localStorage)
================================================================ */
var FAV_KEY = 'tenar_map_favs_v1';
function getFavs(){
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
  catch(e){ return []; }
}
function setFavs(arr){ localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }

window.openFavPanel  = function(){ renderFavs(); document.getElementById('fav-modal').classList.add('show'); };
window.closeFavPanel = function(){ document.getElementById('fav-modal').classList.remove('show'); };

window.addCurrentFav = function(){
  if(!S.map){ toast('지도 로딩 후 저장해주세요'); return; }
  var c = S.map.getCenter();
  var lat = c.lat(), lng = c.lng();
  /* 현재 상단바 주소를 기본 이름으로 (이모지 제거) */
  var def = (ahLine1.textContent || '').replace('📍','').trim();
  if(!def || def === '현재 위치' || def === '주소 없음') def = lat.toFixed(5) + ', ' + lng.toFixed(5);
  var name = prompt('저장할 위치 이름을 입력하세요.', def);
  if(name === null) return;
  name = (name.trim() || def).slice(0, 40);
  var favs = getFavs();
  favs.unshift({ label:name, lat:lat, lng:lng });
  setFavs(favs);
  renderFavs();
  toast('⭐ 즐겨찾기에 저장했습니다');
};

window.delFav = function(idx){
  var favs = getFavs();
  favs.splice(idx, 1);
  setFavs(favs);
  renderFavs();
};

window.gotoFav = function(idx){
  var favs = getFavs();
  var f = favs[idx];
  if(!f || !S.map) return;
  var ll = new naver.maps.LatLng(f.lat, f.lng);
  S.map.setCenter(ll);
  S.map.setZoom(17);
  if(S.pickMarker){ S.pickMarker.setMap(null); }
  S.pickMarker = new naver.maps.Marker({ map:S.map, position:ll });
  searchAddress(ll, '📍 ' + f.label);
  closeFavPanel();
  toast('📍 ' + f.label + ' (으)로 이동');
};

function renderFavs(){
  var list = document.getElementById('fav-list');
  var favs = getFavs();
  if(!favs.length){
    list.innerHTML = '<div class="fav-empty">저장된 위치가 없습니다.<br>지도를 원하는 곳으로 옮긴 뒤<br>「현재 보고 있는 위치 저장」을 눌러보세요.</div>';
    return;
  }
  list.innerHTML = favs.map(function(f, i){
    return '<div class="fav-item">' +
      '<div class="fi-text" onclick="gotoFav(' + i + ')">' +
        '<div class="fi-label">' + escapeHtml(f.label) + '</div>' +
        '<div class="fi-coord">' + f.lat.toFixed(5) + ', ' + f.lng.toFixed(5) + '</div>' +
      '</div>' +
      '<button class="fi-del" onclick="delFav(' + i + ')">삭제</button>' +
    '</div>';
  }).join('');
}
function escapeHtml(s){
  return String(s).replace(/[&<>'"]/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];
  });
}

   시작 안내:
   API 로드 성공 → window.initNaverMap() 콜백 자동 호출
   API 로드 실패 → onerror / navermap_authFailure 자동 호출
   별도 waitAndRun 폴링 불필요
── */

window.openNaverRoute = function(){
  if(selectedLat == null || selectedLng == null){
    toast('길찾기 위치를 먼저 선택해주세요');
    return;
  }

  var dname = encodeURIComponent(selectedName || '목적지');

  var appUrl =
    'nmap://route/car?dlat=' + selectedLat +
    '&dlng=' + selectedLng +
    '&dname=' + dname +
    '&appname=com.tenar.map';

  window.location.href = appUrl;

  setTimeout(function(){
    window.open(
      'https://map.naver.com/v5/directions/-/-/' +
      selectedLng + ',' + selectedLat + ',' + dname,
      '_blank'
    );
  }, 700);
};

log('페이지 로드. Naver API 콜백 대기 중…');

})();
</script>
