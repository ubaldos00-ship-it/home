.me-dot{
  position:absolute;left:50%;top:50%;
  width:19px;height:19px;margin:-9.5px 0 0 -9.5px;
  border-radius:50%;background:#1565ff;
  border:3.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.55);
}
.me-pulse{
  position:absolute;left:50%;top:50%;
  width:16px;height:16px;margin:-8px 0 0 -8px;
  border-radius:50%;background:rgba(26,115,232,.25);
  animation:gpsPulse 2s ease-in-out infinite;
}

/* ── 하단 정보 시트 (현재위치·주소) ── */
#info-sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:500;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -4px 22px rgba(0,0,0,.18);
  padding:8px 18px calc(16px + env(safe-area-inset-bottom));
  transform:translateY(115%);transition:transform .3s ease;
}
#info-sheet.show{ transform:translateY(0); }
/* 축소 상태: 핸들·주소만 보이고 버튼 숨김 (아래로 쓸어내리면) */
#info-sheet.collapsed .info-actions{ display:none; }
.sheet-handle{
  width:46px;height:5px;border-radius:99px;background:#cfd3da;
  margin:4px auto 11px;cursor:grab;touch-action:none;
}
/* 핸들 터치 영역 확대 */
.sheet-handle::before{
  content:'';position:absolute;left:0;right:0;height:34px;margin-top:-14px;
}
#fav-sheet, #save-sheet, #color-sheet, #layer-sheet, #route-sheet, #survey-pick-sheet, #measure-panel{ position:relative; }
.info-line1-row{ display:flex;align-items:center;gap:8px; }
#infoLine1{
  flex:1;min-width:0;
  font-size:17px;font-weight:800;color:#111;line-height:1.3;
  word-break:keep-all;
}
#info-copy{
  flex-shrink:0;border:1px solid #cdd9c0;background:#eef6e8;color:#27500A;
  font-family:inherit;font-size:12px;font-weight:700;border-radius:8px;
  padding:5px 9px;cursor:pointer;line-height:1;
}
#info-copy:active{ background:#dceccf; }
#infoLine2{
  font-size:13px;color:#6b7280;line-height:1.45;margin-top:4px;
  word-break:keep-all;
}
.info-actions{ display:flex;gap:8px;margin-top:12px; }
.info-actions button{
  flex:1;border:none;border-radius:12px;font-family:inherit;
  font-size:14px;font-weight:700;padding:11px 6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.2;
}
#info-fav{ background:#fff7e6;color:#a06d00;border:1px solid #f0d68a !important; }
#info-fav:active{ background:#fdecc8; }
#info-route{ background:#e7f0ff;color:#1a56c4;border:1px solid #b9d2ff !important; }
#info-route:active{ background:#d4e4ff; }
#info-survey{ background:#eafaf0;color:#0d7a43;border:1px solid #b6e6cb !important; }
#info-survey:active{ background:#d4f3e1; }
#info-close{ background:#f3f4f6;color:#374151; }
#info-close:active{ background:#e5e7eb; }

/* ── 거리·면적 측정 패널 (하단) ── */
#measure-panel{
  display:none;
  position:fixed;left:0;right:0;bottom:0;z-index:520;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -4px 22px rgba(0,0,0,.18);
  padding:10px 16px calc(14px + env(safe-area-inset-bottom));
}
#measure-panel.show{ display:block; }
.mp-head{ display:flex;align-items:center;gap:8px;margin-bottom:10px; }
.mp-tab{
  flex:1;border:1px solid #ddd6ea;border-radius:11px;
  background:#f6f3fc;color:#6b6280;font-family:inherit;
  font-size:14px;font-weight:700;padding:9px;cursor:pointer;
}
.mp-tab.active{ background:#7c3aed;color:#fff;border-color:#7c3aed; }
.mp-x{
  flex-shrink:0;width:38px;height:38px;border:none;border-radius:50%;
  background:#f3f4f6;color:#6b7280;font-size:16px;cursor:pointer;
}
#mp-result{
  font-size:15px;font-weight:700;color:#111;line-height:1.45;
  background:#faf7ff;border:1px solid #ece5fb;border-radius:11px;
  padding:11px 13px;margin-bottom:10px;word-break:keep-all;min-height:44px;
}
#mp-result .mp-sub{ display:block;font-size:12.5px;font-weight:600;color:#7c3aed;margin-top:3px; }
.mp-actions{ display:flex;gap:7px; }
.mp-btn{
  flex:1;border:none;border-radius:11px;background:#f3f4f6;color:#374151;
  font-family:inherit;font-size:13px;font-weight:700;padding:11px 6px;cursor:pointer;
}
.mp-btn:active{ background:#e5e7eb; }
.mp-fav{ background:#fff7e6;color:#a06d00; }
.mp-fav:active{ background:#fdecc8; }
/* 측정 구간 거리 라벨 (지도 위) */
.m-label{
  background:rgba(255,255,255,.68);color:#b91c1c;font-size:12px;font-weight:900;
  padding:3px 7px;border-radius:8px;white-space:nowrap;line-height:1.35;text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,.28);border:1px solid rgba(185,28,28,.55);
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  text-shadow:0 1px 1px rgba(255,255,255,.95);
  pointer-events:none;
}
.m-label.start{ background:rgba(255,255,255,.62);color:#6d28d9;border-color:rgba(109,40,217,.55); }
.m-label.area{
  color:#7c3aed;border-color:#d9ccf5;text-align:center;line-height:1.3;
  background:rgba(255,255,255,.96);
}

/* ── 길찾기 앱 선택 모달 ── */
#route-modal{
  display:none;position:fixed;inset:0;z-index:1300;
  background:rgba(0,0,0,.45);align-items:flex-end;justify-content:center;
}
#route-modal.show{ display:flex; }
#route-sheet{
  width:100%;max-width:480px;background:#fff;
  border-radius:20px 20px 0 0;
  padding:16px 16px calc(18px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 24px rgba(0,0,0,.22);
}
.route-title{ font-size:16px;font-weight:800;color:#111;margin-bottom:4px; }
#route-dest{
  font-size:12.5px;color:#6b7280;margin-bottom:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.route-app{
  display:flex;align-items:center;width:100%;border:none;border-radius:13px;
  font-family:inherit;font-size:15px;font-weight:700;
  padding:14px 16px;margin-bottom:9px;cursor:pointer;color:#fff;
}
.route-app:active{ filter:brightness(.93); }
.rb-naver{ background:#03c75a; }
.rb-kakao{ background:#fee500;color:#3a1d1d !important; }
.rb-tmap{  background:#1a4fd6; }
/* 조사표 선택창 (route-modal 스타일 재사용) */
#survey-pick-modal{
  display:none;position:fixed;inset:0;z-index:1300;
  background:rgba(0,0,0,.45);align-items:flex-end;justify-content:center;
}
#survey-pick-modal.show{ display:flex; }
#survey-pick-sheet{
  width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;
  padding:16px 16px calc(18px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 24px rgba(0,0,0,.22);
}
#sp-addr{
  font-size:12.5px;color:#6b7280;margin-bottom:12px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.sp-tonghab{ background:#27500A; }
.sp-chungchi{ background:#1558D6; }
.route-cancel{
  width:100%;border:none;border-radius:13px;background:#f3f4f6;color:#374151;
  font-family:inherit;font-size:14px;font-weight:700;padding:12px;cursor:pointer;
  margin-top:2px;
}
.route-cancel:active{ background:#e5e7eb; }
/* 정보시트 안 길찾기 행(사용 안 함 대비) */
.route-row{ display:none; }


#info-route{
  background:#e8f3ff;
  color:#0066cc;
  border:1px solid #b8d8ff !important;
}
#info-route:active{
  background:#d8ebff;
}


/* ── 토스트 ── */
#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(17,24,39,.85);color:#fff;
  padding:9px 20px;border-radius:22px;
  font-size:13px;font-weight:600;white-space:nowrap;
  z-index:900;opacity:0;transition:opacity .25s;pointer-events:none;
}
#toast.show{opacity:1}

/* ── 디버그 패널 (제목 5탭) ── */
#dbg{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.9);color:#4ade80;
  font-family:ui-monospace,monospace;font-size:10.5px;line-height:1.75;
  padding:8px 12px 16px;z-index:2000;
  display:none;max-height:220px;overflow-y:auto;
}
#dbg-btn{
  position:fixed;left:6px;bottom:calc(6px + env(safe-area-inset-bottom));
  width:22px;height:22px;border:none;border-radius:50%;
  background:rgba(0,0,0,.18);color:rgba(255,255,255,.55);
  font-size:14px;line-height:1;font-weight:900;cursor:pointer;z-index:460;
  display:flex;align-items:center;justify-content:center;padding:0;
}
</style>
</head>
<body>

<!-- 지도 (전체화면) -->
<div id="map"></div>

<!-- 상단 검색 오버레이 (뒤로가기 + 검색) -->
<div id="search-bar">
  <button class="back-btn" onclick="goBack()" title="홈으로">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <input id="search-input" type="search" placeholder="주소 검색 (예: 자인면 북사리 359)"
         onkeydown="if(event.key==='Enter')searchByAddress()" />
  <button id="search-btn" onclick="searchByAddress()">검색</button>
</div>

<!-- 지도 타입(위성/일반) 토글 -->
<button id="layer-btn" onclick="openLayerSheet()" title="지도 유형">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <path d="M12 3 3 8l9 5 9-5-9-5z"/>
    <path d="M3 13l9 5 9-5"/>
  </svg>
</button>

<!-- 지도 유형 선택 시트 -->
<div id="layer-modal" onclick="if(event.target===this)closeLayerSheet()">
  <div id="layer-sheet">
    <div class="sheet-handle" id="layerHandle"></div>
    <div class="ls-head"><span>지도 유형</span><button class="ls-x" onclick="closeLayerSheet()">✕</button></div>
    <div class="ls-grid">
      <button class="ls-opt" data-type="normal"    onclick="setLayer('normal')">
        <span class="ls-ic" style="background:#e8efe1">🗺</span>일반</button>
      <button class="ls-opt active" data-type="satellite" onclick="setLayer('satellite')">
        <span class="ls-ic" style="background:#cfe0f5">🛰</span>위성</button>
      <button class="ls-opt" data-type="hybrid" onclick="setLayer('hybrid')">
        <span class="ls-ic" style="background:#dfe7c8">🏷</span>위성+지명</button>
      <button class="ls-opt" data-type="terrain"   onclick="setLayer('terrain')">
        <span class="ls-ic" style="background:#e6ddc8">⛰</span>지형</button>
    </div>
    <div class="ls-overlay-title">겹쳐보기</div>
    <button class="ls-overlay" id="cadastralBtn" onclick="toggleCadastral()">
      <span class="ls-ic" style="background:#fdf0c8">📐</span>
      <span class="ls-ov-text">지적도(브이월드) 필지경계</span>
      <span class="ls-ov-state" id="cadState">OFF</span>
    </button>
  </div>
</div>

<!-- 오버레이 (로딩/에러) -->
<div id="overlay">
  <div class="spinner" id="ovSpinner"></div>
  <div id="ov-title">🗺 지도 초기화 중</div>
  <div id="ov-sub">Naver Maps API 로드 중…</div>
  <div id="ov-btns"></div>
</div>

<!-- 측정(거리·면적) 버튼 -->
<button id="measure-btn" onclick="openMeasure()" title="면적·거리 측정">📐</button>

<!-- 작물명 표시 토글 버튼 (측정 위) -->
<button id="crop-btn" class="active" onclick="toggleCropLabels()" title="즐겨찾기 작물명 표시">🌱</button>

<!-- 실시간 추적 버튼 -->
<button id="track-btn" onclick="toggleTrack()" title="실시간 추적">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#0d6640" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="3.2" fill="#0d6640" stroke="none"/>
    <path d="M12 1v3M12 20v3M1 12h3M20 12h3"/>
  </svg>
</button>

<!-- 즐겨찾기 버튼 -->
<button id="fav-btn" onclick="openFavPanel()" title="즐겨찾기">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#c9962b" stroke-width="2" stroke-linejoin="round">
    <path d="M12 3l2.6 5.3 5.9.85-4.25 4.15 1 5.8L12 16.9l-5.25 2.8 1-5.8L3.5 9.15l5.9-.85L12 3z"/>
  </svg>
</button>

<!-- 현재 위치 버튼 -->
<button id="locate-btn" onclick="startGPS()" title="현재 위치">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
       stroke="#0d6640" stroke-width="2.2"
       stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22"/>
    <circle cx="12" cy="12" r="7"/>
  </svg>
</button>

<!-- 하단 정보 시트 (현재위치·주소) -->
<div id="info-sheet">
  <div class="sheet-handle" id="sheetHandle"></div>
  <div class="info-line1-row">
    <div id="infoLine1">📍 현재 위치</div>
    <button id="info-copy" onclick="copyInfoAddr()" title="주소 복사">복사</button>
  </div>
  <div id="infoLine2">위치를 조회하면 주소가 표시됩니다</div>
  <div class="info-actions">
    <button id="info-fav" onclick="addCurrentFav()">⭐ 저장</button>
    <button id="info-move" onclick="enterPinMoveMode()" style="display:none"><span>📍 위치<br>변경</span></button>
    <button id="info-route" onclick="openRouteMenu()">🚗 길찾기</button>
    <button id="info-survey" onclick="fillSurvey()">📋 조사표 입력</button>
  </div>
</div>

<!-- 핀 위치 변경 모드: 가운데 십자선 + 하단 확인바 -->
<div id="pin-move-cross" aria-hidden="true">
  <svg width="46" height="46" viewBox="0 0 46 46">
    <circle cx="23" cy="23" r="18" fill="none" stroke="#e23b2e" stroke-width="2.5"/>
    <line x1="23" y1="1"  x2="23" y2="14" stroke="#e23b2e" stroke-width="2.5"/>
    <line x1="23" y1="32" x2="23" y2="45" stroke="#e23b2e" stroke-width="2.5"/>
    <line x1="1"  y1="23" x2="14" y2="23" stroke="#e23b2e" stroke-width="2.5"/>
    <line x1="32" y1="23" x2="45" y2="23" stroke="#e23b2e" stroke-width="2.5"/>
    <circle cx="23" cy="23" r="3.2" fill="#e23b2e"/>
  </svg>
</div>
<div id="pin-move-bar">
  <div id="pmb-text">지도를 움직여 십자선을 정확한 위치에 맞추세요</div>
  <div id="pmb-btns">
    <button id="pmb-cancel" onclick="cancelPinMove()">취소</button>
    <button id="pmb-ok" onclick="confirmPinMove()">✓ 여기로 저장</button>
  </div>
</div>

<!-- 거리·면적 측정 패널 -->
<div id="measure-panel">
  <div class="sheet-handle" id="measureHandle"></div>
  <div class="mp-head">
    <button class="mp-tab active" id="mpTabArea" onclick="setMeasureMode('area')">📐 면적</button>
    <button class="mp-tab" id="mpTabDist" onclick="setMeasureMode('dist')">📏 거리</button>
    <button class="mp-x" onclick="exitMeasure()" title="측정 종료">✕</button>
  </div>
  <div id="mp-result">지도를 탭하여 점을 찍으세요</div>
  <div class="mp-actions">
    <button class="mp-btn" onclick="undoMeasure()">↩︎ 한 점 취소</button>
    <button class="mp-btn" onclick="clearMeasure()">전체 지우기</button>
    <button class="mp-btn mp-fav" id="mpFavBtn" onclick="saveMeasureFav()">⭐ 끝점 저장</button>
  </div>
</div>

<!-- 길찾기 앱 선택 모달 -->
<div id="route-modal" onclick="if(event.target===this)closeRouteMenu()">
  <div id="route-sheet">
    <div class="sheet-handle" id="routeHandle"></div>
    <div class="route-title">🚗 길찾기 앱 선택</div>
    <div id="route-dest">목적지: —</div>
    <button class="route-app rb-naver" onclick="openRoute('naver')">N&nbsp; 네이버지도로 길찾기</button>
    <button class="route-app rb-kakao" onclick="openRoute('kakao')">K&nbsp; 카카오맵으로 길찾기</button>
    <button class="route-app rb-tmap"  onclick="openRoute('tmap')">T&nbsp; 티맵으로 길찾기</button>
    <button class="route-cancel" onclick="closeRouteMenu()">취소</button>
  </div>
</div>

<!-- 조사표 선택창 (실측/청취) — 주소를 어느 계산기에 넣을지 선택 -->
<div id="survey-pick-modal" onclick="if(event.target===this)closeSurveyPick()">
  <div id="survey-pick-sheet">
    <div class="sheet-handle" id="surveyHandle"></div>
    <div class="route-title">📋 어느 조사표에 주소를 넣을까요?</div>
    <div id="sp-addr">—</div>
    <button class="route-app sp-tonghab" onclick="pickSurvey('tonghab')">📐&nbsp; 실측조사표(통합계산기)</button>
    <button class="route-app sp-chungchi" onclick="pickSurvey('chungchi')">🎧&nbsp; 청취조사표(청취계산기)</button>
    <button class="route-cancel" onclick="closeSurveyPick()">취소</button>
  </div>
</div>

<!-- 즐겨찾기 패널 (하단 시트) -->
<div id="fav-modal" onclick="if(event.target===this)closeFavPanel()">
  <div id="fav-sheet">
    <div class="sheet-handle" id="favHandle"></div>
    <div id="fav-head">
      <span>⭐ 즐겨찾기 위치</span>
      <button onclick="closeFavPanel()" id="fav-close">×</button>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:8px;">
      <button id="fav-add-btn" onclick="addCurrentFav()" style="flex:1;margin-bottom:0;">＋ 현재 위치 저장</button>
      <button id="fav-all-btn" onclick="showAllFavs()">🗺 전체보기</button>
    </div>
    <div class="fav-tools">
      <button class="fav-tool t-share" onclick="shareFavs()">🔗 공유</button>
      <button class="fav-tool t-export" onclick="exportFavs()">📤 내보내기</button>
      <button class="fav-tool t-import" onclick="document.getElementById('favImport').click()">📥 불러오기</button>
      <button class="fav-tool t-clear" onclick="clearAllFavs()">🗑 전체삭제</button>
    </div>
    <input type="file" id="favImport" accept=".json,application/json" style="display:none" onchange="importFavs(event)">
    <div id="fav-list"></div>
  </div>
</div>

<!-- 즐겨찾기 저장 모달 (이름 + 색상 선택) -->
<div id="save-modal" onclick="if(event.target===this)closeSaveModal()">
  <div id="save-sheet">
    <div class="sheet-handle"></div>
    <div class="ss-title">⭐ 즐겨찾기 저장</div>
    <input id="saveName" type="text" placeholder="이름(제목)을 입력하세요" maxlength="40" autocomplete="off">
    <div class="ss-label">핀 색상</div>
    <div class="ss-colors" id="saveColors"></div>
    <div class="ss-actions">
      <button class="ss-cancel" onclick="closeSaveModal()">취소</button>
      <button class="ss-save" onclick="confirmSaveFav()">저장</button>
    </div>
  </div>
</div>

<!-- 핀 색상 변경 모달 (목록 번호 동그라미 탭 시) -->
<div id="color-modal" onclick="if(event.target===this)closeColorModal()">
  <div id="color-sheet">
    <div class="sheet-handle"></div>

/* ================================================================
   ✅ Naver API callback — 로드 완료 시 자동 호출
================================================================ */
window.initNaverMap = function(){
  log('✅ Naver API 콜백 수신 — 준비 완료');
  S.naverReady = true;
  /* URL ?q=주소 가 있으면 GPS 대신 그 주소를 바로 검색 (통합계산기 연동) */
  var q = '', bulk = '';
  try { var sp = new URLSearchParams(location.search); q = (sp.get('q')||'').trim(); bulk = (sp.get('bulk')||'').trim(); } catch(e){}
  if(bulk === '1'){
    log('일괄 지도반영 모드');
    renderMap(CFG.defaultLat, CFG.defaultLng, 0, true);  /* 지도만 생성 */
    setTimeout(_runBulkSave, 900);
  } else if(q){
    log('URL 주소 검색: ' + q);
    renderMap(CFG.defaultLat, CFG.defaultLng, 0, true);  /* 지도만 생성 */
    var inp = document.getElementById('search-input');
    if(inp) inp.value = q;
    setTimeout(function(){ window.searchByAddress(); }, 700);
    /* v48: 주소검색으로 지도에 들어온 경우에도, 계산기 저장 시 쌓인 주소-only 지도반영 대기열을 함께 처리한다.
       좌표가 없는 저장자료는 map.html에서 주소 지오코딩 후 핀으로 저장된다. */
    setTimeout(function(){ try{ _processBulkQueue(false); }catch(_){} }, 1800);
  } else {
    startGPS();
    /* 지도가 닫혀 있는 동안 계산기에서 저장된 항목이 대기열에 있으면 지도 열 때 자동 반영 */
    setTimeout(function(){ try{ _processBulkQueue(false); }catch(_){} }, 1600);
  }
  /* 어느 경로로 들어오든, 좌표 없이 주소만 있는 즐겨찾기가 있으면 자동 지오코딩해 핀 표시 */
  setTimeout(function(){ try{ _healFavsNeedingGeocode(); }catch(_){} }, 2600);
};

/* ================================================================
   계산기 저장목록 일괄 지도반영 (?bulk=1)
   계산기가 localStorage['tenar_map_bulk'] 에 [{addr,crop,app,surveyKey},…] 를 넣고
   map.html?bulk=1 로 열면, 각 주소를 지오코딩해 즐겨찾기로 한꺼번에 저장한다.
================================================================ */
/* ?bulk=1 진입용 — 대기열 있으면 처리(화면도 맞춤), 없으면 일반 GPS 시작 */
function _runBulkSave(){
  if(!_processBulkQueue(true)) startGPS();
}
/* 대기열(tenar_map_bulk) 처리 핵심.
   fit=true 면 처리 후 전체 핀이 보이도록 화면을 맞춤(명시적 지도반영용),
   fit=false 면 화면을 움직이지 않고 핀만 갱신(저장 시 실시간 자동반영용).
   처리할 게 있으면 true 반환. */

/* v47: 주소만 입력한 조사표가 엉뚱한 곳으로 지오코딩되는 문제 보완
   - 예: "북사리 359"처럼 시군구가 빠진 주소는 네이버 geocode 첫 결과가 다른 지역으로 잡힐 수 있음
   - 주소 토큰이 실제 결과 주소에 얼마나 들어있는지 점수화하고, 짧은 주소는 경산시/경북 접두 검색을 먼저 시도 */
function _tenarAddrTokens(q){
  q = String(q||'').replace(/\([^)]*\)/g,' ').replace(/[,_]/g,' ').trim();
  if(!q) return [];
  var raw = q.split(/\s+/).filter(Boolean);
  var out = [];
  raw.forEach(function(t){
    t = t.trim(); if(!t) return;
    if(/^(경상북도|경북|대한민국|주소|필지주소)$/.test(t)) return;
    out.push(t);
  });
  return out;
}
function _tenarAddressScore(q, item){
  var text = ((item.jibunAddress||'') + ' ' + (item.roadAddress||'') + ' ' + (item.englishAddress||''));
  text = text.replace(/\s+/g,' ');
  var toks = _tenarAddrTokens(q);
  var score = 0;
  toks.forEach(function(t){
    if(!t) return;
    if(text.indexOf(t) >= 0) score += 8;
    if(/^\d+(-\d+)?$/.test(t)){
      var re = new RegExp('(^|[^0-9])' + t.replace('-', '\\-') + '([^0-9]|$)');
      if(re.test(text)) score += 4;
    }
  });
  if(/(^|\s)산\s*\d/.test(text) && !/(^|\s)산\s*\d/.test(q)) score -= 8;
  if(/경산시/.test(text)) score += 3;
  return score;
}
function _tenarBuildGeocodeQueries(addr){
  addr = String(addr||'').trim();
  var arr = [];
  function add(x){ x=String(x||'').replace(/\s+/g,' ').trim(); if(x && arr.indexOf(x)<0) arr.push(x); }
  var hasSgg = /(시|군|구)\s*/.test(addr);
  if(addr && !hasSgg){
    add('경상북도 경산시 ' + addr);
    add('경산시 ' + addr);
  }
  add(addr);
  return arr;
}
function _tenarGeocodeSmart(addr, cb){
  if(!naver.maps.Service || !naver.maps.Service.geocode){ cb(null); return; }
  var queries = _tenarBuildGeocodeQueries(addr), qi = 0, best = null, bestScore = -999;
  function tryNext(){
    if(qi >= queries.length){ cb(best); return; }
    var q = queries[qi++];
    naver.maps.Service.geocode({ query:q }, function(st, res){
      try{
        if(st === naver.maps.Service.Status.OK && res.v2 && res.v2.addresses && res.v2.addresses.length){
          var items = res.v2.addresses;
          for(var i=0;i<items.length;i++){
            var sc = _tenarAddressScore(addr, items[i]) + _tenarAddressScore(q, items[i]) * 0.25;
            if(sc > bestScore){ bestScore = sc; best = items[i]; }
          }
          var toks = _tenarAddrTokens(addr);
          var required = toks.filter(function(t){ return /[가-힣]/.test(t) || /^\d+(-\d+)?$/.test(t); });
          if(best){
            var tx = (best.jibunAddress||'') + ' ' + (best.roadAddress||'');
            var ok = required.length ? required.every(function(t){ return tx.indexOf(t) >= 0; }) : true;
            if(ok && bestScore >= 8){ cb(best); return; }
          }
        }
      }catch(e){}
      tryNext();
    });
  }
  tryNext();
}

var _bulkBusy = false;
function _processBulkQueue(fit){
  if(_bulkBusy) return true;                       /* 진행 중이면 중복 실행 방지 */
  if(!S.map || !naver.maps.Service || !naver.maps.Service.geocode) return false;
  var raw = null;
  try { raw = localStorage.getItem('tenar_map_bulk'); } catch(e){}
  if(!raw) return false;
  var items = [];
  try { items = JSON.parse(raw) || []; } catch(e){ items = []; }
  if(!items.length){ try{ localStorage.removeItem('tenar_map_bulk'); }catch(e){} return false; }
  try { localStorage.removeItem('tenar_map_bulk'); } catch(e){}   /* 처리 시작과 동시에 비움 */
  _bulkBusy = true;
  var i = 0, done = 0, fail = 0;
  toast('🗺 ' + items.length + '곳 지도에 반영 중…');
  function step(){
    if(i >= items.length){
      _bulkBusy = false;
      toast('✅ 지도반영: ' + done + '곳' + (fail ? (' / 실패 ' + fail) : ''));
      refreshFavPins();
      if(fit){ try { if(getFavs().length) showAllFavs(); } catch(e){} }
      try{ _healFavsNeedingGeocode(); }catch(_){}   /* 좌표 못 채운 항목 자가복구 */
      return;
    }
    var it = items[i++];
    var addr = (it.addr || '').trim();
    var lat0 = Number(it.lat), lng0 = Number(it.lng);
    /* v29: 조사표 저장자료에 지도에서 찍은 좌표가 있으면 주소 재검색 없이 그 좌표를 우선 사용한다.
       같은 지번 안의 여러 지점도 각각 다른 핀으로 보존하기 위함. */
    if(isFinite(lat0) && isFinite(lng0)){
      _saveBulkFav(it, lat0, lng0, addr || (lat0.toFixed(6) + ', ' + lng0.toFixed(6)));
      done++;
      return setTimeout(step, 40);
    }
    if(!addr){ fail++; return step(); }
    _tenarGeocodeSmart(addr, function(a){
      try{
        if(a){
          _saveBulkFav(it, Number(a.y), Number(a.x), a.roadAddress || a.jibunAddress || addr);
          done++;
        } else { fail++; }
      }catch(e){ fail++; }
      setTimeout(step, 250);   /* 지오코딩 간격 (과다호출 방지) */
    });
  }
  step();
  return true;
}
/* 다른 탭(계산기)에서 저장/덮어쓰기로 대기열이 바뀌면 → 화면 안 움직이고 즉시 자동반영 */
window.addEventListener('storage', function(e){
  if(e.key === 'tenar_map_bulk' && e.newValue){
    try{ _processBulkQueue(false); }catch(_){}
  }
  /* v46: 다른 창(실측/청취/지도)에서 즐겨찾기 핀이 삭제·변경되면 지도 화면도 즉시 갱신 */
  if(e.key === FAV_KEY){
    try{
      if(typeof _syncSelectedFavAfterChange === 'function') _syncSelectedFavAfterChange();
      if(typeof refreshFavPins === 'function') refreshFavPins();
      var fm = document.getElementById('fav-modal');
      if(fm && fm.classList.contains('show') && typeof renderFavs === 'function') renderFavs();
      try{ _healFavsNeedingGeocode(); }catch(_){}   /* 좌표 없는 즐겨찾기 자동 지오코딩 */
    }catch(_){}
  }
});
/* ★ 자가복구: 주소는 있으나 좌표가 비어있는(또는 needsGeocode) 즐겨찾기를
   자동으로 지오코딩해 좌표를 채우고 핀으로 표시한다.
   (계산기에서 주소만 저장돼 좌표 변환이 안 된 채 핀이 안 찍히는 문제 보완) */
var _healBusy = false;
function _healFavsNeedingGeocode(){
  if(_healBusy) return;
  if(!S.map || !naver.maps.Service || !naver.maps.Service.geocode) return;
  var favs = getFavs(), todo = [];
  for(var i=0;i<favs.length;i++){
    var f = favs[i] || {}, lat = Number(f.lat), lng = Number(f.lng);
    var bad = (!isFinite(lat) || !isFinite(lng) || (Math.abs(lat) < 0.0001 && Math.abs(lng) < 0.0001));
    if((f.addr||'').trim() && (bad || f.needsGeocode)) todo.push(i);
  }
  if(!todo.length) return;
  _healBusy = true;
  var k = 0;
  toast('📍 주소를 좌표로 변환 중… (' + todo.length + '곳)');
  function step(){
    if(k >= todo.length){ _healBusy = false; refreshFavPins(); return; }
    var idx = todo[k++];
    var f0 = getFavs()[idx] || {}, addr = (f0.addr||'').trim();
    if(!addr){ return setTimeout(step, 10); }
    _tenarGeocodeSmart(addr, function(a){
      try{
        if(a){
          var favs2 = getFavs(), ff = favs2[idx];
          if(ff){
            ff.lat = Number(a.y); ff.lng = Number(a.x);
            if(ff.needsGeocode) delete ff.needsGeocode;
            localStorage.setItem(FAV_KEY, JSON.stringify(favs2));   /* 갱신만, 핀은 마지막에 한 번 */
          }
        }
      }catch(e){}
      setTimeout(step, 250);   /* 지오코딩 간격 */
    });
  }
  step();
}
/* 일괄 저장용 — 중복(같은 surveyKey/좌표)은 갱신 */
function _saveBulkFav(it, lat, lng, addr){
  if(!isFinite(lat) || !isFinite(lng)) return;
  var crop  = (it.crop || '').trim();
  var label = (crop ? crop + ' · ' : '') + addr;
  var favs = getFavs();
  var dup = -1;

  /* v33: 조사표 저장 직후에는 기존 위치핀을 조사표핀으로 승격한다.
     - surveyKey가 같으면 같은 조사자료 갱신
     - surveyKey가 있고 같은 좌표에 아직 조사표가 연결되지 않은 기존 위치핀이 있으면 그 핀을 갱신
     - 이때 기존 핀 색상(보라/빨강 등)은 유지한다. */
  for(var k=0;k<favs.length;k++){
    if(it.surveyKey && favs[k].surveyKey === it.surveyKey){ dup = k; break; }
  }
  if(dup < 0 && it.surveyKey){
    for(var k2=0;k2<favs.length;k2++){
      var close = Math.abs((favs[k2].lat||0)-lat) < 0.0001 && Math.abs((favs[k2].lng||0)-lng) < 0.0001;
      if(close && !favs[k2].surveyKey){ dup = k2; break; }
    }
  }
  if(dup < 0 && !it.surveyKey){
    for(var k3=0;k3<favs.length;k3++){
      if(Math.abs((favs[k3].lat||0)-lat) < 0.0001 && Math.abs((favs[k3].lng||0)-lng) < 0.0001){ dup = k3; break; }
    }
  }

  var defaultColor = (it.app === 'chungchi') ? 'blue' : 'green';
  var color = (dup>=0 && favs[dup].color) ? favs[dup].color : ((it.color || '').trim() || defaultColor);
  var _ck=false; for(var ci=0;ci<FAV_COLORS.length;ci++){ if(FAV_COLORS[ci].key===color){ _ck=true; break; } }
  if(!_ck) color = defaultColor;

  /* 손으로 위치를 정한(manualPos) 기존 핀은 좌표를 보존한다.
     단, 계산기가 보정좌표(it.lat/lng)를 명시적으로 넘긴 경우는 그 값을 따른다. */
  var manual = (dup>=0 && favs[dup].manualPos) || false;
  if(manual && !(isFinite(Number(it.lat)) && isFinite(Number(it.lng)))){
    lat = favs[dup].lat; lng = favs[dup].lng;
  }
  var rec = { label:label.slice(0,40), lat:lat, lng:lng, addr:addr, color:color,
              locked:(dup>=0 ? !!favs[dup].locked : false),
              manualPos: manual,
              surveyKey:it.surveyKey||'', surveyApp:it.app||'', crop:crop };
  if(dup>=0) favs[dup] = rec; else favs.unshift(rec);
  setFavs(favs);
}

/* ================================================================
   GPS 조회
================================================================ */
window.startGPS = function(){
  if(typeof hideActionMenu === 'function') hideActionMenu();   /* 현재위치 버튼 → 롱탭 메뉴 닫기 */
  if(!navigator.geolocation){
    log('geolocation 미지원', 'err');
    showOv('GPS 미지원', '이 브라우저는 위치 조회를 지원하지 않습니다.', false);
    addBtn('기본 위치로 지도 보기', 'ov-btn-primary', function(){
      renderMap(CFG.defaultLat, CFG.defaultLng, 0);
    });
    return;
  }

  showOv('📡 GPS 조회 중',
    'GPS 권한 팝업이 뜨면 <b>허용</b>을 눌러주세요<br>' +
    '<small style="color:#9ca3af">iOS: 설정 → 개인 정보 → 위치 서비스 → 브라우저</small>',
    true);
  log('GPS 요청 시작');

  navigator.geolocation.getCurrentPosition(
    onGPSOk, onGPSErr,
    { enableHighAccuracy:true, timeout:CFG.gpsTimeout, maximumAge:0 }
  );
};

function onGPSOk(pos){
  S.lat = pos.coords.latitude;
  S.lng = pos.coords.longitude;
  S.acc = pos.coords.accuracy;
  S.gpsOk = true;
  log('GPS 성공 — ' + S.lat.toFixed(6) + ', ' + S.lng.toFixed(6) + ' ±' + Math.round(S.acc) + 'm');

  if(S.naverReady){
    renderMap(S.lat, S.lng, S.acc);
  } else {
    gpsOnlyFlow();
  }
}

function onGPSErr(err){
  var msg = 'GPS 오류', guide = '';
  switch(err.code){
    case 1:
      msg   = '위치 권한이 거부되었습니다';
      guide = '① 브라우저 주소창 🔒 아이콘 터치<br>' +
              '② <b>위치 → 허용</b> 선택 후 새로고침<br>' +
              '<small style="color:#9ca3af">iOS: 설정 → 개인정보 → 위치 서비스</small>';
      break;
    case 2:
      msg   = 'GPS 신호 없음';
      guide = '실내이거나 신호가 약합니다.<br>Wi-Fi를 켜거나 야외에서 다시 시도하세요.';
      break;
    case 3:
      msg   = '위치 조회 시간 초과';
      guide = '잠시 후 다시 시도해 주세요.';
      break;
  }
  log('GPS 실패 code:' + err.code + ' — ' + msg, 'err');
  showOv('📡 ' + msg, guide || err.message, false);
  addBtn('🔄 다시 시도', 'ov-btn-primary', window.startGPS);
  addBtn('기본 위치로 지도 보기', 'ov-btn-secondary', function(){
    renderMap(CFG.defaultLat, CFG.defaultLng, 0);
  });
}

/* ================================================================
   지도 렌더링
================================================================ */
function renderMap(lat, lng, acc, skipMe){
  if(!S.naverReady){ log('renderMap: Naver 미준비', 'warn'); return; }

  /* 오버레이를 먼저 숨겨서 #map 컨테이너가 실제 크기를 갖게 한 뒤
     지도 인스턴스를 생성해야 Naver Maps가 크기를 0으로 계산하지 않음 */
  hideOv();

  setTimeout(function(){
    /* 컨테이너 크기를 화면 전체로 강제 지정 — iOS Safari fixed 레이아웃 대응 */
    var mapEl = document.getElementById('map');
    mapEl.style.position = 'fixed';
    mapEl.style.top      = '0';
    mapEl.style.left     = '0';
    mapEl.style.width    = window.innerWidth  + 'px';
    mapEl.style.height   = window.innerHeight + 'px';
    log('컨테이너 크기: ' + window.innerWidth + 'x' + window.innerHeight);

    var pos = new naver.maps.LatLng(lat, lng);

    if(!S.map){
      S.map = new naver.maps.Map('map', {
        center : pos,
        zoom   : 17,
        mapTypeId : naver.maps.MapTypeId.SATELLITE,  /* 기본: 위성 */
        mapTypeControl : false,   /* 커스텀 레이어 버튼 사용 */
        zoomControl : false,      /* 줌 바 제거 (손가락 핀치줌 사용) */
        scaleControl : false,
        logoControl : true,
        mapDataControl : false,
        disableDoubleTapZoom : true,    /* 더블탭 확대 끔 (버튼 연속터치 시 확대 방지) */
        disableDoubleClickZoom : true,
        disableTwoFingerTapZoom : true  /* 두 손가락 탭 축소도 끔 */
      });
      log('지도 인스턴스 생성 완료');

      /* 지도를 길게 누르면(롱탭) 액션 메뉴(도착·면적측정·주소·공유·저장) 표시 */
      naver.maps.Event.addListener(S.map, 'longtap', function(e){
        if(S.measureMode !== 'off') return;   /* 측정 중이면 무시 */
        if(S.pickMarker){ S.pickMarker.setMap(null); }
        S.pickMarker = new naver.maps.Marker({ map:S.map, position:e.coord, icon:pickPinIcon() });
        S.actLat = e.coord.lat(); S.actLng = e.coord.lng();
        showActionMenu(e);
      });

      /* 측정 모드: 지도를 탭하면 측정 점 추가 */
      naver.maps.Event.addListener(S.map, 'click', function(e){
        if(S.measureMode === 'off') return;
        addMeasurePoint(e.coord);
      });

      /* 지도 준비 직후와 이동/확대 완료 후, 저장핀·작물명 라벨을 안정적으로 다시 확인 */
      if(!S._favIdle){
        S._favIdle = naver.maps.Event.addListener(S.map, 'idle', function(){ scheduleStableLayerRefresh(140); });
      }
      setTimeout(function(){ try{ refreshFavPins(); }catch(_){} }, 400);
    } else {
      naver.maps.Event.trigger(S.map, 'resize');
      S.map.setCenter(pos);
      S.map.setZoom(17);
    }

    /* skipMe: URL 주소검색 모드 — 지도만 만들고 현재위치 마커/주소조회 생략 */
    if(skipMe){
      log('지도 생성 (주소검색 모드)');
      return;
    }

    /* 오차 범위 원 */
    if(S.circle){ S.circle.setMap(null); }
    if(acc > 0){
      S.circle = new naver.maps.Circle({
        map:S.map, center:pos,
        radius      : Math.min(acc, 500),
        fillColor   : 'rgba(26,115,232,.08)',
        fillOpacity : 1,
        strokeColor : 'rgba(26,115,232,.4)',
        strokeWeight: 1.5
      });
    }

    /* 현재 위치 방향 마커 (파란 점 + 방향 부채꼴) */
    if(S.marker){ S.marker.setMap(null); }
    S.marker = new naver.maps.Marker({
      map:S.map, position:pos,
      icon:{
        content:
          '<div class="me-marker">' +
            '<div class="me-cone-wrap" id="meConeWrap"><div class="me-cone"></div></div>' +
            '<div class="me-pulse"></div>' +
            '<div class="me-dot"></div>' +
          '</div>',
        anchor: new naver.maps.Point(20,20)
      }
    });
    updateMarkerHeading();

    log('렌더링 완료');
    toast('📍 현재 위치 표시 완료');

    /* 나침반(방향) 센서 시작 */
    startCompass();

    /* 현재 위치의 주소 자동 조회 */
    searchAddress(pos, '📍 현재 위치');
  }, 200);
}

/* ================================================================
   주소·지명 검색 → 좌표 변환 (Geocoding) → 지도에 마커
================================================================ */
window.searchByAddress = function(){
  var q = (document.getElementById('search-input').value || '').trim();
  if(!q){ return; }
  if(!S.map){ toast('지도 로딩 후 검색해주세요'); return; }
  if(!naver.maps.Service || !naver.maps.Service.geocode){
    toast('검색 모듈 미로드'); return;
  }
  toast('🔍 검색 중…');
  _tenarGeocodeSmart(q, function(item){
    if(!item){ toast('검색 결과가 없습니다'); return; }

    var ll   = new naver.maps.LatLng(Number(item.y), Number(item.x));
    selectedLat = Number(item.y);
    selectedLng = Number(item.x);
    S.map.setCenter(ll);
    S.map.setZoom(17);

    /* 위치변경 모드 중 검색: 지도만 그 위치로 이동(빨강 십자선이 검색위치 가운데로) →
       선택된 핀/하단 저장바는 그대로 유지하여, 멀리 떨어진 곳도 검색으로 찾아가 저장 가능 */
    if(_pinMoving){
      var _si2 = document.getElementById('search-input');
      if(_si2){ _si2.blur(); _si2.value = ''; }
      toast('🔍 검색 위치로 이동 — 십자선을 맞추고 [여기로 저장]');
      return;
    }

    /* 검색 위치 마커 */
    if(S.pickMarker){ S.pickMarker.setMap(null); }
    S.pickMarker = new naver.maps.Marker({ map:S.map, position:ll });

    /* 상단바에 주소 표시 (지번·도로명·우편번호) */
    var jibun = item.jibunAddress || '';
    var road  = item.roadAddress  || '';
    var zip   = extractZip(item.addressElements);
    setDest(item.y, item.x, jibun || road || q);   /* 길찾기 목적지 */
    showAddr(jibun, road, zip);
    log('검색 성공: ' + (road || jibun));

    /* 계산기 연동: URL ?save=1 이면 즐겨찾기에 자동 저장(중복은 갱신) */
    var _savedFav = _maybeAutoFav(jibun, road, selectedLat, selectedLng);
    /* 📍로 들어온 경우 해당 핀을 바로 '선택' 상태로 만든다 → 핀을 다시 안 눌러도
       하단시트(조사표 열기·위치변경)가 바로 활성화. 저장된(?save=1) 핀이 아니어도
       그 위치 근처에 저장된 즐겨찾기가 있으면 그 핀을 선택한다. */
    if(_savedFav){
      showFavInfo(_savedFav);
    } else {
      var _near = _findFavNear(selectedLat, selectedLng);
      if(_near) showFavInfo(_near);
    }

    /* 키보드 닫고 검색란 비우기 (주소는 상단바·핀에 표시되므로 입력칸은 초기화) */
    var _si = document.getElementById('search-input');
    if(_si){ _si.blur(); _si.value = ''; }
  });
};

/* addressElements 배열에서 우편번호(POSTAL_CODE) 추출 */
function extractZip(elements){
  if(!elements || !elements.length) return '';
  for(var i=0;i<elements.length;i++){
    var t = elements[i].types || [];
    if(t.indexOf('POSTAL_CODE') >= 0 && elements[i].longName){
      return elements[i].longName;
    }
  }
  return '';
}

/* ================================================================
   좌표 → 주소(지번·도로명) 변환 (Reverse Geocoding)
================================================================ */
function searchAddress(coord, label){
  selectedLat = coord.lat();
  selectedLng = coord.lng();
  setDest(coord.lat(), coord.lng(), label || '선택 위치');   /* 길찾기 목적지(주소 확인 후 이름 갱신) */
  if(!naver.maps.Service || !naver.maps.Service.reverseGeocode){
    log('주소 모듈(geocoder) 미로드', 'warn');
    return;
  }
  naver.maps.Service.reverseGeocode({
    coords : coord,
    orders : 'addr,roadaddr'
  }, function(status, response){
    if(status !== naver.maps.Service.Status.OK){
      log('주소 조회 실패: status=' + status, 'err');
      toast('주소 조회 실패 (' + status + ')');
      ahLine1.textContent = '주소 조회 실패: ' + status;
      ahLine2.textContent = '';
      showInfoSheet();
      return;
    }
    var addr  = (response.v2 && response.v2.address) || {};
    var jibun = addr.jibunAddress || '';
    var road  = addr.roadAddress  || '';
    if(jibun || road) S.destName = jibun || road;   /* 길찾기 목적지 이름 갱신 */
    /* reverseGeocode 응답엔 우편번호가 없으므로,
       도로명(우선)·지번 주소를 geocode로 재조회해 우편번호를 보강한다 */
    var qAddr = road || jibun;
    if(qAddr && naver.maps.Service && naver.maps.Service.geocode){
      naver.maps.Service.geocode({ query:qAddr }, function(st, res){
        var zip = '';
        if(st === naver.maps.Service.Status.OK && res.v2 && res.v2.addresses && res.v2.addresses.length){
          zip = extractZip(res.v2.addresses[0].addressElements);
        }
        showAddr(jibun, road, zip);
      });
    } else {
      showAddr(jibun, road, '');
    }
    log('주소: ' + (jibun || road || '없음'));
  });
}

/* ================================================================
   폴백 — Naver 실패 시 GPS 좌표 + 외부 지도
================================================================ */
function gpsOnlyFlow(){
  if(!S.gpsOk){
    navigator.geolocation.getCurrentPosition(function(pos){
      S.lat = pos.coords.latitude;
      S.lng = pos.coords.longitude;
      S.acc = pos.coords.accuracy;
      S.gpsOk = true;
      gpsOnlyFlow();
    }, onGPSErr, { enableHighAccuracy:true, timeout:CFG.gpsTimeout, maximumAge:0 });
    return;
  }

  ahLine1.textContent = '📍 GPS 위치 확인됨';
  ahLine2.textContent = S.lat.toFixed(5) + ', ' + S.lng.toFixed(5) + '  ±' + Math.round(S.acc) + 'm';

  showOv('📍 GPS 위치 확인됨',
    '<b style="font-size:16px">' + S.lat.toFixed(6) + '</b><br>' +
    '<b style="font-size:16px">' + S.lng.toFixed(6) + '</b><br>' +
    '<span style="color:#9ca3af;font-size:12px">오차 ±' + Math.round(S.acc) + 'm</span><br><br>' +
    '<small style="color:#9ca3af">지도 API 오류 — 외부 지도를 이용하세요</small>',
    false);
  addBtn('🗺 네이버지도로 보기', 'ov-btn-primary', openNaverWeb);
  addBtn('🗺 카카오지도로 보기', 'ov-btn-secondary', openKakaoWeb);
}

/* ================================================================
   길찾기 (네이버 / 카카오 / 티맵 선택 → 앱·웹 연결)
================================================================ */
window.openRouteMenu = function(){
  if(typeof hideActionMenu==='function') hideActionMenu();   /* 다른 팝업 열릴 때 롱탭 메뉴 닫기 */
  if(S.destLat == null){ toast('먼저 위치를 조회해주세요'); return; }
  document.getElementById('route-dest').textContent = '목적지: ' + (S.destName || '선택 위치');
  document.getElementById('route-modal').classList.add('show');
};
window.closeRouteMenu = function(){
  document.getElementById('route-modal').classList.remove('show');
};
window.openRoute = function(provider){
  if(S.destLat == null){ toast('목적지가 없습니다'); return; }
  var dLat = S.destLat, dLng = S.destLng, dName = S.destName || '목적지';
  var sLat = S.lat, sLng = S.lng, hasStart = (sLat != null && sLng != null);
  var enc = encodeURIComponent;
  var appUrl = '', webUrl = '';

  if(provider === 'naver'){
    appUrl = 'nmap://route/car?' +
             (hasStart ? ('slat=' + sLat + '&slng=' + sLng + '&sname=' + enc('현재위치') + '&') : '') +
             'dlat=' + dLat + '&dlng=' + dLng + '&dname=' + enc(dName) +
             '&appname=ubaldos00-ship-it.github.io';
    webUrl = 'https://map.naver.com/p/directions/' +
             (hasStart ? (sLng + ',' + sLat + ',' + enc('현재위치') + ',,') : '-') +
             '/' + dLng + ',' + dLat + ',' + enc(dName) + ',,/-/car';
  } else if(provider === 'kakao'){
    appUrl = 'kakaomap://route?' + (hasStart ? ('sp=' + sLat + ',' + sLng + '&') : '') +
             'ep=' + dLat + ',' + dLng + '&by=CAR';
    webUrl = 'https://map.kakao.com/link/to/' + enc(dName) + ',' + dLat + ',' + dLng;
  } else if(provider === 'tmap'){
    appUrl = 'tmap://route?goalname=' + enc(dName) + '&goalx=' + dLng + '&goaly=' + dLat;
    webUrl = '';  /* 티맵은 웹 길찾기 미지원 — 앱 전용 */
  }
  closeRouteMenu();
  openAppOrWeb(appUrl, webUrl, provider);
};
function openAppOrWeb(appUrl, webUrl, provider){
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  /* ✅ map.html 은 그대로 두고, 길찾기는 항상 새 탭/창에서 연다
     (window.location.href 로 현재 탭을 이동시키지 않음) */
  var url = isMobile ? appUrl : webUrl;
  if(!url){

function addMeasurePoint(coord){

    }

function clearMeasureLabels(){
  S.mLabels.forEach(function(l){ l.setMap(null); });
  S.mLabels = [];
}
function redrawMeasure(){
  /* 선/다각형/라벨 초기화 */
  if(S.mLine){ S.mLine.setMap(null); S.mLine = null; }
  if(S.mPoly){ S.mPoly.setMap(null); S.mPoly = null; }
  clearMeasureLabels();
  if(S.mPoints.length < 1) return;

  if(S.measureMode === 'area'){
    if(S.mPoints.length >= 2){
      S.mPoly = new naver.maps.Polygon({
        map:S.map, paths:S.mPoints,
        fillColor:'#7c3aed', fillOpacity:0.18,
        strokeColor:'#7c3aed', strokeWeight:3, strokeOpacity:0.9
      });
    }
    /* 면적 3점 이상이면 다각형 중심에 ㎡·평 라벨 표시 */
    if(S.mPoints.length >= 3){
      var sx = 0, sy = 0;
      S.mPoints.forEach(function(p){ sx += p.lat(); sy += p.lng(); });
      var center = new naver.maps.LatLng(sx/S.mPoints.length, sy/S.mPoints.length);
      var a = areaM2(S.mPoints);
      var lab = new naver.maps.Marker({
        map:S.map, position:center,
        icon:{
          content:'<div class="m-label area">'+Math.round(a).toLocaleString()+'㎡<br>'+fmtPyeong(a)+'평</div>',
          anchor:new naver.maps.Point(28, 16)   /* 라벨이 중심에 오도록 */
        },
        clickable:false
      });
      S.mLabels.push(lab);
    }
    return;
  }

  /* 거리 모드: 선 + 각 점 옆 구간거리와 시작점부터 누적거리 라벨 */
  if(S.mPoints.length >= 2){
    S.mLine = new naver.maps.Polyline({
      map:S.map, path:S.mPoints,
      strokeColor:'#7c3aed', strokeWeight:4, strokeOpacity:0.95
    });
  }
  var cum = 0;
  for(var i=0;i<S.mPoints.length;i++){
    var txt, cls;
    if(i === 0){
      txt = '시작'; cls = 'm-label start';
    } else {
      var seg = distM(S.mPoints[i-1], S.mPoints[i]);
      cum += seg;
      txt = '구간 ' + fmtDist(seg) + '<br>누적 ' + fmtDist(cum);
      cls = 'm-label';
    }
    var lab = new naver.maps.Marker({
      map:S.map, position:S.mPoints[i],
      icon:{
        content:'<div class="'+cls+'">'+txt+'</div>',
        anchor:new naver.maps.Point(-12, 50)   /* 점을 가리지 않도록 라벨을 더 위쪽·오른쪽에 배치 */
      },
      clickable:false
    });
    S.mLabels.push(lab);
  }
}

/* Haversine 거리(m) */
function distM(a, b){
  var R = 6378137, toRad = Math.PI/180;
  var dLat = (b.lat()-a.lat())*toRad, dLng = (b.lng()-a.lng())*toRad;
  var la1 = a.lat()*toRad, la2 = b.lat()*toRad;
  var h = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(h));
}
/* 구면 다각형 면적(㎡) */
function areaM2(pts){
  var R = 6378137, toRad = Math.PI/180, n = pts.length;
  if(n < 3) return 0;
  var area = 0;
  for(var i=0;i<n;i++){
    var p1 = pts[i], p2 = pts[(i+1)%n];
    area += (p2.lng()-p1.lng())*toRad *
            (2 + Math.sin(p1.lat()*toRad) + Math.sin(p2.lat()*toRad));
  }
  return Math.abs(area * R * R / 2);
}
function fmtDist(m){
  if(m < 1000) return m.toFixed(2) + 'm';                  /* 항상 소수 둘째자리 */
  return (m/1000).toFixed(2) + 'km';
}
function fmtPyeong(m2){ return Math.round(m2 / 3.305785).toLocaleString(); }

function copyText(t){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t); return;
    }
  }catch(e){}
  var ta = document.createElement('textarea');
  ta.value = t; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

/* ================================================================
   브이월드 지적도(필지경계) 오버레이 — 네이버 지도 위에 겹쳐보기
================================================================ */
/* 위경도 → EPSG:3857(웹메르카토르) 변환 */
function lngLatTo3857(lat, lng){
  var x = lng * 20037508.342789244 / 180;
  var y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180);
  y = y * 20037508.342789244 / 180;
  return [x, y];
}
/* 커스텀 오버레이(OverlayView) — 투명 PNG 를 직접 <img> 로 그려서
   ① 흰 배경 없이 경계선만 표시(뿌염 제거)  ② pointer-events:none 으로 클릭 통과 */
function ensureCadOverlay(){
  if(S.cadOverlay) return S.cadOverlay;
  function Cad(){}
  Cad.prototype = new naver.maps.OverlayView();
  Cad.prototype.onAdd = function(){
    var img = document.createElement('img');
    /* VWorld 지적도 PNG는 이미 배경이 투명(경계선·지번만) → 그대로 얹는다.
       (mix-blend-mode 는 네이버 레이어 격리 때문에 오히려 뿌옇게 보여 제거) */
    /* 뿌염 제거: 반투명(opacity)·색필터 제거하고 불투명·선명 렌더링.
       image-rendering 으로 늘림 시 흐려짐을 막아 경계선·지번을 또렷하게 표시 */
    img.style.cssText = 'position:absolute;pointer-events:none;opacity:1;' +
                        'image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;' +
                        'user-select:none;-webkit-user-select:none;';
    img.draggable = false;
    this._img = img;
    this.getPanes().overlayLayer.appendChild(img);   /* 위성 위 · 마커 아래 */
  };
  Cad.prototype.draw = function(){
    if(!this._img || !this._b) return;
    var proj = this.getProjection();
    var sw = proj.fromCoordToOffset(this._b.getSW());
    var ne = proj.fromCoordToOffset(this._b.getNE());
    var s = this._img.style;
    s.left   = Math.min(sw.x, ne.x) + 'px';
    s.top    = Math.min(sw.y, ne.y) + 'px';
    s.width  = Math.abs(ne.x - sw.x) + 'px';
    s.height = Math.abs(sw.y - ne.y) + 'px';
  };
  Cad.prototype.onRemove = function(){
    if(this._img && this._img.parentNode) this._img.parentNode.removeChild(this._img);
    this._img = null;
  };
  Cad.prototype.setData = function(url, b){
    if(!this._img) return;
    var im = this._img;
    /* v34: 새 브이월드 이미지가 완전히 로드되기 전까지 기존 이미지를 유지한다.
       확대/이동 중 visibility:hidden 처리로 레이어가 깜빡이던 현상을 줄이기 위한 방식이다. */
    if(im.getAttribute('data-url') !== url){
      var self = this;
      var pre = new Image();
      pre.onload = function(){
        self._b = b;
        im.setAttribute('data-url', url);
        im.src = url;
        im.style.visibility = 'visible';
        self.draw();
      };
      pre.onerror = function(){
        /* 오류가 나도 기존 지적도 이미지는 유지한다. 기존 이미지가 없을 때만 숨긴다. */
        if(!im.getAttribute('data-url')) im.style.visibility = 'hidden';
      };
      pre.src = url;
    } else {

var CAD_WMS_LABEL_SCALE = 0.5;

function updateCadOverlay(){
  if(!S.cadOn || !CFG.vworldKey || !S.map) return;

  var b  = S.map.getBounds();

        ③ 축척이 과하게 커지지 않아 모든 줌 단계에서 표시됨 */
  var baseW = mapEl.clientWidth  || 1024;

  var w = Math.max(320, Math.min(Math.round(baseW * CAD_WMS_LABEL_SCALE), 2048));

  var p1 = lngLatTo3857(sw.lat(), sw.lng());

  var bbox = p1[0] + ',' + p1[1] + ',' + p2[0] + ',' + p2[1];   /* minx,miny,maxx,maxy */

            '?SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0' +
            '&LAYERS=' + CAD_WMS_LAYERS + '&STYLES=' + CAD_WMS_STYLES +
            '&CRS=EPSG:900913&BBOX=' + bbox +
            '&WIDTH=' + w + '&HEIGHT=' + h +
            '&FORMAT=image/png&TRANSPARENT=true&EXCEPTIONS=BLANK' +  /* 오류 시 노란 에러타일 대신 투명 처리(뿌염·노란필터 방지) */

/* ================================================================
   방향(나침반) 표시 — 현재 위치 마커의 부채꼴 회전
================================================================ */
function startCompass(){
  if(S.compassOn) return;
  if(!window.DeviceOrientationEvent) return;
  /* iOS 13+ 는 사용자 제스처에서 권한 요청 필요 */
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(function(res){
      if(res === 'granted'){
        window.addEventListener('deviceorientation', onOrient, true);
        S.compassOn = true;
        log('나침반 권한 허용');
      } else { log('나침반 권한 거부', 'warn'); }
    }).catch(function(e){ log('나침반 요청 오류', 'warn'); });
  } else {
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
    S.compassOn = true;
  }
}
function onOrient(e){
  var h = null;
  if(e.webkitCompassHeading != null){
    h = e.webkitCompassHeading;            /* iOS: 0=북, 시계방향 */
  } else if(e.alpha != null){
    h = (360 - e.alpha) % 360;             /* Android 보정(대략) */
  }
  if(h == null) return;
  S.heading = h;
  updateMarkerHeading();
}
function updateMarkerHeading(){
  var wrap = document.getElementById('meConeWrap');
  if(!wrap) return;
  if(S.heading == null){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  wrap.style.transform = 'rotate(' + S.heading + 'deg)';
}

function onTrack(pos){
  S.lat = pos.coords.latitude;
  S.lng = pos.coords.longitude;
  S.acc = pos.coords.accuracy;
  /* GPS heading(이동 방향)이 있으면 나침반 대신 사용 */
  if(pos.coords.heading != null && !isNaN(pos.coords.heading)){
    S.heading = pos.coords.heading;
    updateMarkerHeading();
  }
  var ll = new naver.maps.LatLng(S.lat, S.lng);
  S.map.setCenter(ll);

  if(S.marker){ S.marker.setPosition(ll); }
  else { renderMap(S.lat, S.lng, S.acc); }
  /* 정확도 원 갱신 */
  if(S.circle){ S.circle.setCenter(ll); S.circle.setRadius(Math.min(S.acc, 500)); }
  /* 추적 중: 좌표는 매번 갱신 + 주소는 4초마다 1회 조회해 좌표 뒤에 표시 */

  ahLine2.textContent = coordStr + (_trackAddrStr ? '  ·  ' + _trackAddrStr : '');
  var now = Date.now();
  if(now - _trackAddrT > 4000 && naver.maps.Service && naver.maps.Service.reverseGeocode){
    _trackAddrT = now;
    naver.maps.Service.reverseGeocode({ coords:ll, orders:'addr,roadaddr' }, function(st, res){

        var a = (res.v2 && res.v2.address) || {};

        if(S.watchId != null) ahLine2.textContent = coordStr + (_trackAddrStr ? '  ·  ' + _trackAddrStr : '');
      }
    });
  }
}

/* 같은 필지·같은 좌표의 핀도 모두 보이도록 화면 표시 위치만 원형으로 살짝 분산한다.
   저장 좌표는 절대 변경하지 않는다. */
function _favDisplayPositions(favs){
  var groups = {};
  favs.forEach(function(f, i){
    var lat = Number(f.lat), lng = Number(f.lng);
    if(!isFinite(lat) || !isFinite(lng)) return;
    var key = lat.toFixed(6) + ',' + lng.toFixed(6);   /* 약 10cm 단위 그룹 */
    (groups[key] = groups[key] || []).push(i);
  });
  var out = favs.map(function(f){ return {lat:Number(f.lat), lng:Number(f.lng)}; });
  Object.keys(groups).forEach(function(k){
    var arr = groups[k];
    if(arr.length <= 1) return;
    var base = out[arr[0]];
    var latRad = base.lat * Math.PI / 180;
    var meters = 2.2;   /* 현장 핀 분리 거리: 저장좌표가 아닌 화면표시용 */
    var dLat = meters / 111320;
    var dLng = meters / (111320 * Math.max(0.25, Math.cos(latRad)));
    arr.forEach(function(idx, j){
      var ang = (Math.PI * 2 * j / arr.length) - Math.PI / 2;
      out[idx] = { lat: base.lat + Math.sin(ang) * dLat, lng: base.lng + Math.cos(ang) * dLng };
    });
  });
  return out;
}
/* 즐겨찾기에 연결된 작물명 추출 (명시적 crop 우선, 없으면 라벨 "작물 · 주소"에서) */
function favCropOf(f){
  var crop = (f.crop || '').trim();
  if(!crop){
    var seg = (f.label || '').split(' · ');
    if(seg.length >= 2) crop = (seg[0] || '').trim();   /* 작물명이 들어간 경우만 */
  }
  return crop;
}
