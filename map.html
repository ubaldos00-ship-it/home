/* ── 현재 위치 방향 마커 ── */
.me-marker{ width:40px;height:40px;position:relative; }
.me-cone-wrap{
  position:absolute;left:50%;top:50%;

  transform:rotate(0deg);transition:transform .15s ease-out;
  pointer-events:none;
}

  position:absolute;left:50%;top:-5px;

}

  font-size:14px;line-height:1;font-weight:900;cursor:pointer;z-index:460;

}
</style>
</head>
<body>

<!-- 지도 (전체화면) -->

<!-- 지도 유형 선택 시트 -->
<div id="layer-modal" onclick="if(event.target===this)closeLayerSheet()">

<!-- 현재 위치 버튼 -->
<button id="locate-btn" onclick="startGPS()" title="현재 위치">

<!-- 하단 정보 시트 (현재위치·주소) -->

<!-- 디버그 토글 버튼 (좌하단 작은 점) -->
<button id="dbg-btn" onclick="toggleDbg()" title="디버그">·</button>

<!-- 디버그 패널 -->
<div id="dbg"></div>

<script>
(function(){
'use strict';

/* ── 설정 ── */
var CFG = {
  defaultLat : 35.8239,
  defaultLng : 128.7358,
  gpsTimeout : 14000,
  /* 브이월드(VWorld) 지적도 오버레이용 API 키.
     https://www.vworld.kr 에서 무료 발급(인증키 유형: WMTS, 도메인 등록 필요).
     발급 후 아래 빈 문자열에 키를 넣으면 지적도 겹쳐보기가 작동합니다. */
  vworldKey : '00EB5BC0-22B4-3B7E-89D1-341699F7CE05'
};

/* ── 상태 ── */
var S = { map:null, marker:null, circle:null, pickMarker:null,
          lat:null, lng:null, acc:null, watchId:null,
          heading:null, compassOn:false, isHybrid:true,
          destLat:null, destLng:null, destName:'',
          measureMode:'off', mPoints:[], mMarkers:[], mLabels:[], mLine:null, mPoly:null,
          favMarkers:[], cadOverlay:null, cadOn:false, _cadIdle:null,
          naverReady:false, gpsOk:false, tapCount:0 };

/* ── 뒤로가기 (새 탭으로 열린 경우 창 닫기 → 안되면 홈으로) ── */
window.goBack = function(){
  if(window.history.length > 1){
    history.back();
    /* 새 탭이라 back이 동작하지 않으면 홈으로 이동 */
    setTimeout(function(){
      window.location.href = 'https://ubaldos00-ship-it.github.io/home/';
    }, 400);
  } else {
    window.close();
    window.location.href = 'https://ubaldos00-ship-it.github.io/home/';
  }
};

/* ── DOM ── */
var overlay   = document.getElementById('overlay');
var ovSpinner = document.getElementById('ovSpinner');
var ovTitle   = document.getElementById('ov-title');
var ovSub     = document.getElementById('ov-sub');
var ovBtns    = document.getElementById('ov-btns');
var ahLine1   = document.getElementById('infoLine1');
var ahLine2   = document.getElementById('infoLine2');
var infoSheet = document.getElementById('info-sheet');
var toastEl   = document.getElementById('toast');

/* ── 하단 정보 시트 표시/숨김 (열리면 우측 버튼을 시트 위로 올림) ── */
function adjustControls(){
  var open = infoSheet.classList.contains('show');
  var h = open ? infoSheet.offsetHeight : 0;
  var base = h ? (h + 14) : 32;
  var lb = document.getElementById('locate-btn');
  var fb = document.getElementById('fav-btn');
  var tb = document.getElementById('track-btn');
  var mb = document.getElementById('measure-btn');
  if(lb) lb.style.bottom = base + 'px';
  if(fb) fb.style.bottom = (base + 58) + 'px';
  if(tb) tb.style.bottom = (base + 116) + 'px';
  if(mb) mb.style.bottom = (base + 174) + 'px';
}
function showInfoSheet(){ infoSheet.classList.add('show'); requestAnimationFrame(adjustControls); }
window.hideInfoSheet = function(){ infoSheet.classList.remove('show'); adjustControls(); };

/* ── 길찾기 목적지 설정 ── */
function setDest(lat, lng, name){
  S.destLat = Number(lat); S.destLng = Number(lng);
  S.destName = name || '선택 위치';
}

/* ── 정보 시트 주소 표시 헬퍼 (앞에 위치 이모지 📍) ── */
function showAddr(jibun, road, zip){
  ahLine1.textContent = '📍 ' + (jibun || road || '주소 없음');
  var parts = [];
  if(road) parts.push('도로명 ' + road);
  if(zip)  parts.push('우편 ' + zip);
  ahLine2.textContent = parts.length ? parts.join('  ·  ') : '';
  showInfoSheet();
}
var dbgEl     = document.getElementById('dbg');
var toastTmr;
var selectedLat = null;
var selectedLng = null;

/* ── 디버그 로그 ── */
function log(msg, lv){
  var t   = new Date().toTimeString().slice(0,8);
  var col = lv==='err'?'#f87171':lv==='warn'?'#fbbf24':'#86efac';
  dbgEl.innerHTML += '<span style="color:#6b7280">['+t+']</span> <span style="color:'+col+'">'+msg+'</span><br>';
  dbgEl.scrollTop  = dbgEl.scrollHeight;
  console[lv==='err'?'error':lv==='warn'?'warn':'log']('[MAP]', msg);
}

/* 좌하단 작은 점 버튼 → 디버그 패널 토글 (지도 제목이 없어 별도 버튼) */
window.toggleDbg = function(){
  dbgEl.style.display = (dbgEl.style.display === 'none' || !dbgEl.style.display) ? 'block' : 'none';
};

/* ── 오버레이 헬퍼 ── */
function showOv(title, sub, spinner){
  overlay.style.display   = 'flex';
  ovTitle.textContent     = title;
  ovSub.innerHTML         = sub;
  ovSpinner.style.display = spinner ? 'block' : 'none';
  ovBtns.innerHTML        = '';
  ovBtns.style.display    = 'none';
}
function hideOv(){ overlay.style.display = 'none'; }
function addBtn(label, cls, fn){
  var b = document.createElement('button');
  b.className   = 'ov-btn ' + cls;
  b.textContent = label;
  b.onclick     = fn;
  ovBtns.appendChild(b);
  ovBtns.style.display = 'flex';
}
function toast(msg){
  clearTimeout(toastTmr);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTmr = setTimeout(function(){ toastEl.classList.remove('show'); }, 2800);
}

/* ================================================================
   ✅ Naver API callback — 로드 완료 시 자동 호출
================================================================ */
window.initNaverMap = function(){
  log('✅ Naver API 콜백 수신 — 준비 완료');
  S.naverReady = true;
  /* URL ?q=주소 가 있으면 GPS 대신 그 주소를 바로 검색 (통합계산기 연동) */
  var q = '';
  try { q = (new URLSearchParams(location.search).get('q') || '').trim(); } catch(e){}
  if(q){
    log('URL 주소 검색: ' + q);
    renderMap(CFG.defaultLat, CFG.defaultLng, 0, true);  /* 지도만 생성 */
    var inp = document.getElementById('search-input');
    if(inp) inp.value = q;
    setTimeout(function(){ window.searchByAddress(); }, 700);
  } else {
    startGPS();
  }
};

/* ✅ Naver API 실패 (onerror / authFailure 공통 처리) */
window.onNaverFail = function(reason){
  log('❌ Naver API 실패: ' + reason, 'err');
  showOv('⚠️ 지도를 불러올 수 없음',
    '<b>Naver Maps API 오류</b><br>' +
    '<small style="color:#9ca3af">' + reason + '</small><br><br>' +
    'GPS 위치 조회는 계속 진행합니다.', false);
  addBtn('📡 GPS 위치 확인', 'ov-btn-primary', gpsOnlyFlow);
  addBtn('🌐 네이버지도 열기', 'ov-btn-secondary', openNaverWeb);
};

/* ================================================================
   GPS 조회
================================================================ */
window.startGPS = function(){
  if(!navigator.geolocation){
    log('geolocation 미지원', 'err');
    showOv('GPS 미지원', '이 브라우저는 위치 조회를 지원하지 않습니다.', false);
    addBtn('기본 위치로 지도 보기', 'ov-btn-primary', function(){
      renderMap(CFG.defaultLat, CFG.defaultLng, 0);
    });
    return;
  }

  showOv('📡 GPS 조회 중',
    'GPS 권한 팝업이 뜨면 <b>허용</b>을 눌러주세요<br>' +
    '<small style="color:#9ca3af">iOS: 설정 → 개인 정보 → 위치 서비스 → 브라우저</small>',
    true);
  log('GPS 요청 시작');

  navigator.geolocation.getCurrentPosition(
    onGPSOk, onGPSErr,
    { enableHighAccuracy:true, timeout:CFG.gpsTimeout, maximumAge:0 }
  );
};

function onGPSOk(pos){
  S.lat = pos.coords.latitude;
  S.lng = pos.coords.longitude;
  S.acc = pos.coords.accuracy;
  S.gpsOk = true;
  log('GPS 성공 — ' + S.lat.toFixed(6) + ', ' + S.lng.toFixed(6) + ' ±' + Math.round(S.acc) + 'm');

  if(S.naverReady){
    renderMap(S.lat, S.lng, S.acc);
  } else {
    gpsOnlyFlow();
  }
}

function onGPSErr(err){
  var msg = 'GPS 오류', guide = '';
  switch(err.code){
    case 1:
      msg   = '위치 권한이 거부되었습니다';
      guide = '① 브라우저 주소창 🔒 아이콘 터치<br>' +
              '② <b>위치 → 허용</b> 선택 후 새로고침<br>' +
              '<small style="color:#9ca3af">iOS: 설정 → 개인정보 → 위치 서비스</small>';
      break;
    case 2:
      msg   = 'GPS 신호 없음';
      guide = '실내이거나 신호가 약합니다.<br>Wi-Fi를 켜거나 야외에서 다시 시도하세요.';
      break;
    case 3:
      msg   = '위치 조회 시간 초과';
      guide = '잠시 후 다시 시도해 주세요.';
      break;
  }
  log('GPS 실패 code:' + err.code + ' — ' + msg, 'err');
  showOv('📡 ' + msg, guide || err.message, false);
  addBtn('🔄 다시 시도', 'ov-btn-primary', window.startGPS);
  addBtn('기본 위치로 지도 보기', 'ov-btn-secondary', function(){
    renderMap(CFG.defaultLat, CFG.defaultLng, 0);
  });
}

/* ================================================================
   지도 렌더링
================================================================ */
function renderMap(lat, lng, acc, skipMe){
  if(!S.naverReady){ log('renderMap: Naver 미준비', 'warn'); return; }

  /* 오버레이를 먼저 숨겨서 #map 컨테이너가 실제 크기를 갖게 한 뒤
     지도 인스턴스를 생성해야 Naver Maps가 크기를 0으로 계산하지 않음 */
  hideOv();

  setTimeout(function(){
    /* 컨테이너 크기를 화면 전체로 강제 지정 — iOS Safari fixed 레이아웃 대응 */
    var mapEl = document.getElementById('map');
    mapEl.style.position = 'fixed';
    mapEl.style.top      = '0';
    mapEl.style.left     = '0';
    mapEl.style.width    = window.innerWidth  + 'px';
    mapEl.style.height   = window.innerHeight + 'px';
    log('컨테이너 크기: ' + window.innerWidth + 'x' + window.innerHeight);

    var pos = new naver.maps.LatLng(lat, lng);

    if(!S.map){
      S.map = new naver.maps.Map('map', {
        center : pos,
        zoom   : 17,
        mapTypeId : naver.maps.MapTypeId.HYBRID,  /* 기본: 위성(하이브리드 - 위성+지명) */
        mapTypeControl : false,   /* 커스텀 레이어 버튼 사용 */
        zoomControl : false,      /* 줌 바 제거 (손가락 핀치줌 사용) */
        scaleControl : false,
        logoControl : true,
        mapDataControl : false
      });
      log('지도 인스턴스 생성 완료');

      /* 지도를 길게 누르면 그 지점의 지번·도로명 주소 조회 */
      naver.maps.Event.addListener(S.map, 'longtap', function(e){
        if(S.measureMode !== 'off') return;   /* 측정 중이면 무시 */
        if(S.pickMarker){ S.pickMarker.setMap(null); }
        S.pickMarker = new naver.maps.Marker({ map:S.map, position:e.coord });
        searchAddress(e.coord, '📍 선택 위치');
      });

      /* 측정 모드: 지도를 탭하면 측정 점 추가 */
      naver.maps.Event.addListener(S.map, 'click', function(e){
        if(S.measureMode === 'off') return;
        addMeasurePoint(e.coord);
      });
    } else {
      naver.maps.Event.trigger(S.map, 'resize');
      S.map.setCenter(pos);
      S.map.setZoom(17);
    }

    /* skipMe: URL 주소검색 모드 — 지도만 만들고 현재위치 마커/주소조회 생략 */
    if(skipMe){
      log('지도 생성 (주소검색 모드)');
      return;
    }

    /* 오차 범위 원 */
    if(S.circle){ S.circle.setMap(null); }

      S.circle = new naver.maps.Circle({
        map:S.map, center:pos,
        radius      : Math.min(acc, 500),
        fillColor   : 'rgba(26,115,232,.08)',
        fillOpacity : 1,
        strokeColor : 'rgba(26,115,232,.4)',
        strokeWeight: 1.5
      });
    }

    /* 현재 위치 방향 마커 (파란 점 + 방향 부채꼴) */
    if(S.marker){ S.marker.setMap(null); }
    S.marker = new naver.maps.Marker({
      map:S.map, position:pos,
      icon:{
        content:
          '<div class="me-marker">' +
            '<div class="me-cone-wrap" id="meConeWrap"><div class="me-cone"></div></div>' +
            '<div class="me-pulse"></div>' +
            '<div class="me-dot"></div>' +
          '</div>',
        anchor: new naver.maps.Point(20,20)
      }
    });
    updateMarkerHeading();

    log('렌더링 완료');
    toast('📍 현재 위치 표시 완료');

    /* 나침반(방향) 센서 시작 */
    startCompass();

    /* 현재 위치의 주소 자동 조회 */
    searchAddress(pos, '📍 현재 위치');
  }, 200);
}

/* ================================================================
   주소·지명 검색 → 좌표 변환 (Geocoding) → 지도에 마커
================================================================ */
window.searchByAddress = function(){
  var q = (document.getElementById('search-input').value || '').trim();
  if(!q){ return; }
  if(!S.map){ toast('지도 로딩 후 검색해주세요'); return; }
  if(!naver.maps.Service || !naver.maps.Service.geocode){
    toast('검색 모듈 미로드'); return;
  }
  toast('🔍 검색 중…');
  naver.maps.Service.geocode({ query:q }, function(status, response){
    if(status !== naver.maps.Service.Status.OK){
      log('검색 실패: status=' + status, 'err');
      toast('검색 실패 (' + status + ')');
      return;
    }
    var items = (response.v2 && response.v2.addresses) || [];
    if(!items.length){ toast('검색 결과가 없습니다'); return; }

    var item = items[0];
    var ll   = new naver.maps.LatLng(Number(item.y), Number(item.x));
    selectedLat = Number(item.y);
    selectedLng = Number(item.x);
    S.map.setCenter(ll);
    S.map.setZoom(17);

    /* 검색 위치 마커 */
    if(S.pickMarker){ S.pickMarker.setMap(null); }
    S.pickMarker = new naver.maps.Marker({ map:S.map, position:ll });

    /* 상단바에 주소 표시 (지번·도로명·우편번호) */
    var jibun = item.jibunAddress || '';
    var road  = item.roadAddress  || '';
    var zip   = extractZip(item.addressElements);
    setDest(item.y, item.x, jibun || road || q);   /* 길찾기 목적지 */
    showAddr(jibun, road, zip);
    log('검색 성공: ' + (road || jibun));

    /* 키보드 닫기 */
    document.getElementById('search-input').blur();
  });
};

/* addressElements 배열에서 우편번호(POSTAL_CODE) 추출 */
function extractZip(elements){
  if(!elements || !elements.length) return '';
  for(var i=0;i<elements.length;i++){
    var t = elements[i].types || [];
    if(t.indexOf('POSTAL_CODE') >= 0 && elements[i].longName){
      return elements[i].longName;
    }
  }
  return '';
}

/* ================================================================
   좌표 → 주소(지번·도로명) 변환 (Reverse Geocoding)
================================================================ */
function searchAddress(coord, label){
  selectedLat = coord.lat();
  selectedLng = coord.lng();
  setDest(coord.lat(), coord.lng(), label || '선택 위치');   /* 길찾기 목적지(주소 확인 후 이름 갱신) */
  if(!naver.maps.Service || !naver.maps.Service.reverseGeocode){
    log('주소 모듈(geocoder) 미로드', 'warn');
    return;
  }
  naver.maps.Service.reverseGeocode({
    coords : coord,
    orders : 'addr,roadaddr'
  }, function(status, response){
    if(status !== naver.maps.Service.Status.OK){
      log('주소 조회 실패: status=' + status, 'err');
      toast('주소 조회 실패 (' + status + ')');
      ahLine1.textContent = '주소 조회 실패: ' + status;
      ahLine2.textContent = '';
      showInfoSheet();
      return;
    }
    var addr  = (response.v2 && response.v2.address) || {};
    var jibun = addr.jibunAddress || '';
    var road  = addr.roadAddress  || '';
    if(jibun || road) S.destName = jibun || road;   /* 길찾기 목적지 이름 갱신 */
    /* reverseGeocode 응답엔 우편번호가 없으므로,
       도로명(우선)·지번 주소를 geocode로 재조회해 우편번호를 보강한다 */
    var qAddr = road || jibun;
    if(qAddr && naver.maps.Service && naver.maps.Service.geocode){
      naver.maps.Service.geocode({ query:qAddr }, function(st, res){
        var zip = '';
        if(st === naver.maps.Service.Status.OK && res.v2 && res.v2.addresses && res.v2.addresses.length){
          zip = extractZip(res.v2.addresses[0].addressElements);
        }
        showAddr(jibun, road, zip);
      });
    } else {
      showAddr(jibun, road, '');
    }
    log('주소: ' + (jibun || road || '없음'));
  });
}

window.openRouteMenu = function(){

window.openRoute = function(provider){

  var dLat = S.destLat, dLng = S.destLng, dName = S.destName || '목적지';
  var sLat = S.lat, sLng = S.lng, hasStart = (sLat != null && sLng != null);
  var enc = encodeURIComponent;
  var appUrl = '', webUrl = '';

  if(provider === 'naver'){
    appUrl = 'nmap://route/car?' +
             (hasStart ? ('slat=' + sLat + '&slng=' + sLng + '&sname=' + enc('현재위치') + '&') : '') +
             'dlat=' + dLat + '&dlng=' + dLng + '&dname=' + enc(dName) +
             '&appname=ubaldos00-ship-it.github.io';
    webUrl = 'https://map.naver.com/p/directions/' +
             (hasStart ? (sLng + ',' + sLat + ',' + enc('현재위치') + ',,') : '-') +
             '/' + dLng + ',' + dLat + ',' + enc(dName) + ',,/-/car';
  } else if(provider === 'kakao'){
    appUrl = 'kakaomap://route?' + (hasStart ? ('sp=' + sLat + ',' + sLng + '&') : '') +
             'ep=' + dLat + ',' + dLng + '&by=CAR';
    webUrl = 'https://map.kakao.com/link/to/' + enc(dName) + ',' + dLat + ',' + dLng;

    webUrl = '';  /* 티맵은 웹 길찾기 미지원 — 앱 전용 */
  }
  closeRouteMenu();
  openAppOrWeb(appUrl, webUrl, provider);
};
function openAppOrWeb(appUrl, webUrl, provider){
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  /* ✅ map.html 은 그대로 두고, 길찾기는 항상 새 탭/창에서 연다
     (window.location.href 로 현재 탭을 이동시키지 않음) */
  var url = isMobile ? appUrl : webUrl;
  if(!url){
    toast(provider === 'tmap' ? '티맵 길찾기는 모바일 앱에서만 됩니다' : '길찾기를 열 수 없습니다');
    return;
  }
  window.open(url, '_blank');
}

function clearMeasureLabels(){

function redrawMeasure(){
  /* 선/다각형/라벨 초기화 */
  if(S.mLine){ S.mLine.setMap(null); S.mLine = null; }
  if(S.mPoly){ S.mPoly.setMap(null); S.mPoly = null; }
  clearMeasureLabels();
  if(S.mPoints.length < 1) return;

  if(S.measureMode === 'area'){
    if(S.mPoints.length >= 2){
      S.mPoly = new naver.maps.Polygon({
        map:S.map, paths:S.mPoints,
        fillColor:'#7c3aed', fillOpacity:0.18,
        strokeColor:'#7c3aed', strokeWeight:3, strokeOpacity:0.9
      });
    }
    /* 면적 3점 이상이면 다각형 중심에 ㎡·평 라벨 표시 */
    if(S.mPoints.length >= 3){
      var sx = 0, sy = 0;
      S.mPoints.forEach(function(p){ sx += p.lat(); sy += p.lng(); });
      var center = new naver.maps.LatLng(sx/S.mPoints.length, sy/S.mPoints.length);
      var a = areaM2(S.mPoints);
      var lab = new naver.maps.Marker({
        map:S.map, position:center,
        icon:{
          content:'<div class="m-label area">'+Math.round(a).toLocaleString()+'㎡<br>'+fmtPyeong(a)+'평</div>',
          anchor:new naver.maps.Point(28, 16)   /* 라벨이 중심에 오도록 */
        },
        clickable:false
      });
      S.mLabels.push(lab);
    }
    return;
  }

  /* 거리 모드: 선 + 각 점 옆 구간 거리 라벨 (첫 점은 '시작') */
  if(S.mPoints.length >= 2){
    S.mLine = new naver.maps.Polyline({
      map:S.map, path:S.mPoints,
      strokeColor:'#7c3aed', strokeWeight:4, strokeOpacity:0.95
    });
  }
  for(var i=0;i<S.mPoints.length;i++){
    var txt, cls;
    if(i === 0){ txt = '시작'; cls = 'm-label start'; }
    else { txt = fmtDist(distM(S.mPoints[i-1], S.mPoints[i])); cls = 'm-label'; }
    var lab = new naver.maps.Marker({
      map:S.map, position:S.mPoints[i],
      icon:{
        content:'<div class="'+cls+'">'+txt+'</div>',
        anchor:new naver.maps.Point(-8, 28)   /* 점 오른쪽 위에 배치 */
      },
      clickable:false
    });
    S.mLabels.push(lab);
  }
}

/* Haversine 거리(m) */
function distM(a, b){
  var R = 6378137, toRad = Math.PI/180;
  var dLat = (b.lat()-a.lat())*toRad, dLng = (b.lng()-a.lng())*toRad;
  var la1 = a.lat()*toRad, la2 = b.lat()*toRad;
  var h = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(h));
}
/* 구면 다각형 면적(㎡) */
function areaM2(pts){
  var R = 6378137, toRad = Math.PI/180, n = pts.length;
  if(n < 3) return 0;
  var area = 0;
  for(var i=0;i<n;i++){
    var p1 = pts[i], p2 = pts[(i+1)%n];
    area += (p2.lng()-p1.lng())*toRad *
            (2 + Math.sin(p1.lat()*toRad) + Math.sin(p2.lat()*toRad));
  }
  return Math.abs(area * R * R / 2);
}
function fmtDist(m){
  if(m < 1000) return m.toFixed(2) + 'm';                  /* 항상 소수 둘째자리 */
  return (m/1000).toFixed(2) + 'km';
}
function fmtPyeong(m2){ return Math.round(m2 / 3.305785).toLocaleString(); }

window.fillSurvey = function(){

             : (document.getElementById('infoLine1').textContent || '').replace('📍','').trim();

  try{

        setTimeout(function(){ try{ window.close(); }catch(e){} }, 900);
        return;
      }
    }
  }catch(e){ log('opener 접근 불가: ' + e.message, 'warn'); }
  /* 폴백: 클립보드 복사 */
  copyText(addr);
  toast('📋 주소를 복사했습니다 — 조사표에 붙여넣기 하세요');
};
function copyText(t){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t); return;
    }
  }catch(e){}
  var ta = document.createElement('textarea');
  ta.value = t; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

window.setLayer = function(type){
  if(!S.map){ return; }
  var M = naver.maps.MapTypeId;
  var map = { normal:M.NORMAL, satellite:M.SATELLITE, hybrid:M.HYBRID, terrain:M.TERRAIN };
  var label = { normal:'일반', satellite:'위성', hybrid:'위성+지명', terrain:'지형' };
  S.map.setMapTypeId(map[type] || M.HYBRID);
  S.isHybrid = (type === 'hybrid' || type === 'satellite');
  /* 선택 표시 갱신 */
  document.querySelectorAll('#layer-modal .ls-opt').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-type') === type);
  });
  toast('🗺 ' + (label[type] || '지도') + ' 지도');
  closeLayerSheet();
};

/* ================================================================
   브이월드 지적도(필지경계) 오버레이 — 네이버 지도 위에 겹쳐보기
================================================================ */
/* 위경도 → EPSG:3857(웹메르카토르) 변환 */
function lngLatTo3857(lat, lng){
  var x = lng * 20037508.342789244 / 180;
  var y = Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180);
  y = y * 20037508.342789244 / 180;
  return [x, y];
}
/* 커스텀 오버레이(OverlayView) — 투명 PNG 를 직접 <img> 로 그려서
   ① 흰 배경 없이 경계선만 표시(뿌염 제거)  ② pointer-events:none 으로 클릭 통과 */
function ensureCadOverlay(){
  if(S.cadOverlay) return S.cadOverlay;
  function Cad(){}
  Cad.prototype = new naver.maps.OverlayView();
  Cad.prototype.onAdd = function(){
    var img = document.createElement('img');
    /* VWorld 지적도 PNG는 이미 배경이 투명(경계선·지번만) → 그대로 얹는다.
       (mix-blend-mode 는 네이버 레이어 격리 때문에 오히려 뿌옇게 보여 제거) */
    img.style.cssText = 'position:absolute;pointer-events:none;opacity:1;' +
                        'user-select:none;-webkit-user-select:none;';
    img.draggable = false;
    this._img = img;
    this.getPanes().overlayLayer.appendChild(img);   /* 위성 위 · 마커 아래 */
  };
  Cad.prototype.draw = function(){
    if(!this._img || !this._b) return;
    var proj = this.getProjection();
    var sw = proj.fromCoordToOffset(this._b.getSW());
    var ne = proj.fromCoordToOffset(this._b.getNE());
    var s = this._img.style;
    s.left   = Math.min(sw.x, ne.x) + 'px';
    s.top    = Math.min(sw.y, ne.y) + 'px';
    s.width  = Math.abs(ne.x - sw.x) + 'px';
    s.height = Math.abs(sw.y - ne.y) + 'px';
  };
  Cad.prototype.onRemove = function(){
    if(this._img && this._img.parentNode) this._img.parentNode.removeChild(this._img);
    this._img = null;
  };
  Cad.prototype.setData = function(url, b){
    this._b = b;
    if(this._img){ if(this._img.src !== url) this._img.src = url; this.draw(); }
  };
  S.cadOverlay = new Cad();
  return S.cadOverlay;
}
/* 현재 화면 영역의 VWorld 지적도 WMS 이미지를 커스텀 오버레이로 갱신 */
function updateCadOverlay(){
  if(!S.cadOn || !CFG.vworldKey || !S.map) return;
  var b  = S.map.getBounds();
  var sw = b.getSW(), ne = b.getNE();
  var mapEl = document.getElementById('map');
  var w = Math.min(mapEl.clientWidth  || 1024, 2048);
  var h = Math.min(mapEl.clientHeight || 1024, 2048);
  var p1 = lngLatTo3857(sw.lat(), sw.lng());
  var p2 = lngLatTo3857(ne.lat(), ne.lng());
  var bbox = p1[0] + ',' + p1[1] + ',' + p2[0] + ',' + p2[1];   /* minx,miny,maxx,maxy */
  var url = 'https://api.vworld.kr/req/wms' +
            '?SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0' +
            '&LAYERS=lp_pa_cbnd_bubun&STYLES=lp_pa_cbnd_bubun' +
            '&CRS=EPSG:900913&BBOX=' + bbox +
            '&WIDTH=' + w + '&HEIGHT=' + h +
            '&FORMAT=image/png&TRANSPARENT=true' +
            '&KEY=' + CFG.vworldKey +
            '&DOMAIN=https://ubaldos00-ship-it.github.io';
  var ov = ensureCadOverlay();
  if(!ov.getMap()) ov.setMap(S.map);
  ov.setData(url, b);
}
window.toggleCadastral = function(){
  if(!S.map){ toast('지도 로딩 후 사용해주세요'); return; }
  if(!S.cadOn){
    if(!CFG.vworldKey){
      toast('브이월드 API 키가 필요합니다 (무료 발급)');
      alert('지적도(브이월드) 겹쳐보기를 쓰려면 VWorld 인증키가 필요합니다.\n\n' +
            '① https://www.vworld.kr 회원가입 후 [오픈API → 인증키 발급]\n' +
            '② 서비스 분류: WMS, 도메인에 ubaldos00-ship-it.github.io 등록\n' +
            '③ 발급된 키를 map.html 의 CFG.vworldKey 에 입력');
      return;
    }
    S.cadOn = true;
    document.getElementById('cadastralBtn').classList.add('active');
    document.getElementById('cadState').textContent = 'ON';
    /* 지도 이동/줌이 끝날 때마다 지적도 갱신 (1회만 등록) */
    if(!S._cadIdle){
      S._cadIdle = naver.maps.Event.addListener(S.map, 'idle', updateCadOverlay);
    }

  } else {

};

/* ================================================================
   방향(나침반) 표시 — 현재 위치 마커의 부채꼴 회전
================================================================ */
function startCompass(){
  if(S.compassOn) return;
  if(!window.DeviceOrientationEvent) return;
  /* iOS 13+ 는 사용자 제스처에서 권한 요청 필요 */
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(function(res){
      if(res === 'granted'){
        window.addEventListener('deviceorientation', onOrient, true);
        S.compassOn = true;
        log('나침반 권한 허용');
      } else { log('나침반 권한 거부', 'warn'); }
    }).catch(function(e){ log('나침반 요청 오류', 'warn'); });
  } else {
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
    S.compassOn = true;
  }
}
function onOrient(e){
  var h = null;
  if(e.webkitCompassHeading != null){
    h = e.webkitCompassHeading;            /* iOS: 0=북, 시계방향 */
  } else if(e.alpha != null){
    h = (360 - e.alpha) % 360;             /* Android 보정(대략) */
  }
  if(h == null) return;
  S.heading = h;
  updateMarkerHeading();
}
function updateMarkerHeading(){
  var wrap = document.getElementById('meConeWrap');
  if(!wrap) return;
  if(S.heading == null){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  wrap.style.transform = 'rotate(' + S.heading + 'deg)';
}

/* ================================================================
   실시간 위치 추적 (watchPosition 토글)
================================================================ */
window.toggleTrack = function(){
  var btn = document.getElementById('track-btn');
  if(S.watchId != null){
    /* 추적 정지 */
    navigator.geolocation.clearWatch(S.watchId);
    S.watchId = null;
    btn.classList.remove('active');
    toast('실시간 추적 정지');
    log('추적 정지');
    /* 정지 시 마지막 위치 주소 1회 갱신 */
    if(S.map && S.lat != null) searchAddress(new naver.maps.LatLng(S.lat, S.lng), '📍 현재 위치');
    return;
  }
  if(!navigator.geolocation){ toast('이 기기는 위치 추적 미지원'); return; }
  if(!S.map){ toast('지도 로딩 후 사용해주세요'); return; }
  btn.classList.add('active');
  toast('🛰 실시간 추적 시작');
  log('추적 시작');
  startCompass();              /* 추적 중 방향도 함께 표시 */
  showInfoSheet();
  S.watchId = navigator.geolocation.watchPosition(onTrack, onTrackErr,
    { enableHighAccuracy:true, maximumAge:1000, timeout:12000 });
};
function onTrack(pos){
  S.lat = pos.coords.latitude;
  S.lng = pos.coords.longitude;
  S.acc = pos.coords.accuracy;
  /* GPS heading(이동 방향)이 있으면 나침반 대신 사용 */
  if(pos.coords.heading != null && !isNaN(pos.coords.heading)){
    S.heading = pos.coords.heading;
    updateMarkerHeading();
  }
  var ll = new naver.maps.LatLng(S.lat, S.lng);
  S.map.setCenter(ll);
  /* 마커 위치 갱신 (없으면 생성) */
  if(S.marker){ S.marker.setPosition(ll); }
  else { renderMap(S.lat, S.lng, S.acc); }
  /* 정확도 원 갱신 */
  if(S.circle){ S.circle.setCenter(ll); S.circle.setRadius(Math.min(S.acc, 500)); }
  /* 추적 중에는 좌표만 빠르게 표시 (주소 호출 절약) */
  ahLine1.textContent = '📍 실시간 위치 추적 중';
  ahLine2.textContent = '🛰 ' + S.lat.toFixed(5) + ', ' + S.lng.toFixed(5) + '  ±' + Math.round(S.acc) + 'm';
}
function onTrackErr(err){
  log('추적 오류 code:' + err.code, 'warn');
  toast('추적 신호 약함 — 재시도 중');
}

/* ================================================================
   즐겨찾기 위치 (이 앱에 직접 저장 · localStorage)
================================================================ */
var FAV_KEY = 'tenar_map_favs_v1';
function getFavs(){
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
  catch(e){ return []; }
}
function setFavs(arr){ localStorage.setItem(FAV_KEY, JSON.stringify(arr)); }

window.openFavPanel  = function(){ renderFavs(); document.getElementById('fav-modal').classList.add('show'); };
window.closeFavPanel = function(){ document.getElementById('fav-modal').classList.remove('show'); };

window.addCurrentFav = function(){
  if(!S.map){ toast('지도 로딩 후 저장해주세요'); return; }
  var c = S.map.getCenter();
  var lat = c.lat(), lng = c.lng();
  /* 현재 상단바 주소를 기본 이름으로 (이모지 제거) */
  var def = (ahLine1.textContent || '').replace('📍','').trim();
  if(!def || def === '현재 위치' || def === '주소 없음') def = lat.toFixed(5) + ', ' + lng.toFixed(5);
  var name = prompt('저장할 위치 이름을 입력하세요.', def);
  if(name === null) return;
  name = (name.trim() || def).slice(0, 40);
  var favs = getFavs();
  favs.unshift({ label:name, lat:lat, lng:lng });
  setFavs(favs);
  renderFavs();
  toast('⭐ 즐겨찾기에 저장했습니다');
};

window.delFav = function(idx){
  var favs = getFavs();
  var f = favs[idx];
  if(!f) return;
  if(f.locked){ toast('🔒 잠긴 항목입니다 — 잠금 해제 후 삭제하세요'); return; }
  if(!confirm('「' + f.label + '」 을(를) 삭제하시겠습니까?')) return;   /* 삭제 확인 */
  favs.splice(idx, 1);
  setFavs(favs);
  renderFavs();
  toast('삭제했습니다');
};
/* 즐겨찾기 잠금 토글 (잠긴 항목은 삭제·전체삭제에서 제외) */
window.toggleLock = function(idx){
  var favs = getFavs();
  if(!favs[idx]) return;
  favs[idx].locked = !favs[idx].locked;
  setFavs(favs);
  renderFavs();
  toast(favs[idx].locked ? '🔒 잠금 (삭제 방지)' : '🔓 잠금 해제');
};

window.gotoFav = function(idx){
  var favs = getFavs();
  var f = favs[idx];
  if(!f || !S.map) return;
  var ll = new naver.maps.LatLng(f.lat, f.lng);
  S.map.setCenter(ll);
  S.map.setZoom(17);
  if(S.pickMarker){ S.pickMarker.setMap(null); }
  S.pickMarker = new naver.maps.Marker({ map:S.map, position:ll });
  searchAddress(ll, '📍 ' + f.label);
  closeFavPanel();
  toast('📍 ' + f.label + ' (으)로 이동');
};

/* 저장된 즐겨찾기를 지도 전체에 표시하고 한눈에 보이도록 화면 맞춤 */
window.clearFavMarkers = function(){
  S.favMarkers.forEach(function(m){ m.setMap(null); });
  S.favMarkers = [];
};
window.showAllFavs = function(){
  if(!S.map){ toast('지도 로딩 후 사용해주세요'); return; }
  var favs = getFavs();
  if(!favs.length){ toast('저장된 즐겨찾기가 없습니다'); return; }
  clearFavMarkers();
  closeFavPanel();
  var bounds = new naver.maps.LatLngBounds();
  favs.forEach(function(f){
    var ll = new naver.maps.LatLng(f.lat, f.lng);
    bounds.extend(ll);
    var mk = new naver.maps.Marker({
      map:S.map, position:ll,
      title:f.label,
      icon:{
        content:'<div class="fav-pin">⭐ ' + escapeHtml(f.label) + '</div>',
        anchor:new naver.maps.Point(14, 14)
      }
    });
    /* 마커 탭하면 해당 위치 주소 표시 */
    naver.maps.Event.addListener(mk, 'click', function(){
      S.map.setCenter(ll);
      searchAddress(ll, '⭐ ' + f.label);
    });
    S.favMarkers.push(mk);
  });
  if(favs.length === 1){
    S.map.setCenter(new naver.maps.LatLng(favs[0].lat, favs[0].lng));
    S.map.setZoom(16);
  } else {
    S.map.fitBounds(bounds, { top:90, right:40, bottom:160, left:40 });
  }
  toast('⭐ 즐겨찾기 ' + favs.length + '곳 전체보기');
};

function renderFavs(){
  var list = document.getElementById('fav-list');
  var favs = getFavs();
  if(!favs.length){
    list.innerHTML = '<div class="fav-empty">저장된 위치가 없습니다.<br>지도를 원하는 곳으로 옮긴 뒤<br>「현재 보고 있는 위치 저장」을 눌러보세요.</div>';
    return;
  }
  list.innerHTML = favs.map(function(f, i){
    var locked = !!f.locked;
    return '<div class="fav-item' + (locked ? ' locked' : '') + '">' +
      '<div class="fi-text" onclick="gotoFav(' + i + ')">' +
        '<div class="fi-label">' + escapeHtml(f.label) + '</div>' +
        '<div class="fi-coord">' + f.lat.toFixed(5) + ', ' + f.lng.toFixed(5) + '</div>' +
      '</div>' +
      '<button class="fi-lock" onclick="toggleLock(' + i + ')" title="' + (locked?'잠금 해제':'잠금') + '">' + (locked ? '🔒' : '🔓') + '</button>' +
      '<button class="fi-del" onclick="delFav(' + i + ')">삭제</button>' +
    '</div>';
  }).join('');
}

/* ── 즐겨찾기 전체삭제 (잠금 항목 제외) ── */
window.clearAllFavs = function(){
  var favs = getFavs();
  if(!favs.length){ toast('삭제할 항목이 없습니다'); return; }
  var locked   = favs.filter(function(f){ return f.locked; });
  var unlocked = favs.filter(function(f){ return !f.locked; });
  if(!unlocked.length){ toast('🔒 모두 잠겨 있어 삭제할 항목이 없습니다'); return; }
  if(!confirm('잠금(🔒) ' + locked.length + '개를 제외한 ' + unlocked.length + '개를 전체삭제하시겠습니까?')) return;
  setFavs(locked);
  renderFavs();
  toast('전체삭제 완료 (잠금 ' + locked.length + '개 유지)');
};

/* ── 즐겨찾기 파일 저장(내보내기) ── */
window.exportFavs = function(){
  var favs = getFavs();
  if(!favs.length){ toast('저장된 즐겨찾기가 없습니다'); return; }
  var data = JSON.stringify({ app:'tenar-map', type:'favorites', version:1,
                              exportedAt:new Date().toISOString(), favorites:favs }, null, 2);
  var blob = new Blob([data], { type:'application/json' });
  var url  = URL.createObjectURL(blob);
  var d = new Date(), pad = function(n){ return String(n).padStart(2,'0'); };
  var a = document.createElement('a');
  a.href = url;
  a.download = '텐아르_즐겨찾기_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  toast('💾 즐겨찾기 파일을 저장했습니다');
};

/* ── 즐겨찾기 파일 불러오기 ── */
window.importFavs = function(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var obj = JSON.parse(e.target.result);
      var arr = Array.isArray(obj) ? obj : (obj.favorites || []);
      var valid = (arr || []).filter(function(f){
        return f && typeof f.lat === 'number' && typeof f.lng === 'number' && f.label;
      });
      if(!valid.length){ toast('불러올 즐겨찾기가 없습니다 (형식 확인)'); ev.target.value=''; return; }
      var add = confirm('불러온 ' + valid.length + '개를 어떻게 할까요?\n\n[확인] 기존 목록에 추가\n[취소] 기존 삭제 후 교체');
      var merged = add ? getFavs().concat(valid) : valid;
      setFavs(merged);
      renderFavs();
      toast('📂 ' + valid.length + '개 불러오기 완료');
    }catch(err){
      toast('파일을 읽을 수 없습니다 (JSON 오류)');
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
};

/* ── 즐겨찾기 공유 (파일 → 텍스트 → 클립보드 폴백) ── */
window.shareFavs = function(){
  var favs = getFavs();
  if(!favs.length){ toast('공유할 즐겨찾기가 없습니다'); return; }
  var data = JSON.stringify({ app:'tenar-map', type:'favorites', version:1, favorites:favs }, null, 2);
  var fname = '텐아르_즐겨찾기.json';
  try{
    if(navigator.canShare){
      var f = new File([data], fname, { type:'application/json' });
      if(navigator.canShare({ files:[f] })){
        navigator.share({ files:[f], title:'텐아르 즐겨찾기' }).catch(function(){});
        return;
      }
    }
  }catch(e){}
  try{
    if(navigator.share){ navigator.share({ title:'텐아르 즐겨찾기', text:data }).catch(function(){}); return; }
  }catch(e){}
  copyText(data);
  toast('🔗 즐겨찾기 데이터를 클립보드에 복사했습니다');
};
function escapeHtml(s){
  return String(s).replace(/[&<>'"]/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];
  });
}
