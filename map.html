<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>네이버 지도</title>
    
    <!-- 네이버 지도 API (Client ID 적용 완료) -->
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=l300nz0ugi"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }

        /* 상단 컨트롤 바 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .title {
            margin-left: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="window.history.back();" title="뒤로가기">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="title">지도 보기</div>
    </div>

    <div id="map"></div>

    <script>
        window.onload = function() {
            // 경산 펜타힐즈 부근 좌표
            var mapOptions = {
                center: new naver.maps.LatLng(35.8239, 128.7358),
                zoom: 16,
                
                // 지도 유형 컨트롤 (일반/위성 선택 버튼)
                mapTypeControl: true,
                mapTypeControlOptions: {
                    style: naver.maps.MapTypeControlStyle.BUTTON,
                    position: naver.maps.Position.TOP_RIGHT
                },
                
                // 줌 컨트롤
                zoomControl: true,
                zoomControlOptions: {
                    position: naver.maps.Position.RIGHT_CENTER
                }
            };

            var map = new naver.maps.Map('map', mapOptions);
        };
    </script>

</body>
</html>
