<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>현재 위치 지도</title>

    <!-- 네이버 지도 API | App: ubaldos | ncpClientId: w8m4oe36ev -->
    <!-- ⚠ Client Secret은 서버사이드 전용 — 프론트엔드에 절대 포함 금지 -->
    <script type="text/javascript"
        src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=w8m4oe36ev&submodules=geolocation">
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: #f0f2f5;
        }

        /* ── 상단 바 ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
            display: flex; align-items: center;
            padding: 0 12px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            gap: 10px;
        }
        .back-btn {
            background: none; border: none;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; cursor: pointer; color: #111;
            flex-shrink: 0;
        }
        .back-btn:active { background: #f3f4f6; }
        .title {
            font-size: 16px; font-weight: 700; color: #111; flex: 1;
        }
        .coord-info {
            font-size: 10px; color: #6b7280;
            font-family: ui-monospace, monospace; line-height: 1.4;
            text-align: right; flex-shrink: 0; max-width: 140px;
        }

        /* ✅ 수정2: map이 top-bar 아래에서 시작하도록 top 설정 */
        #map {
            position: fixed;
            top: 56px; left: 0; right: 0; bottom: 0;
        }

        /* ── 로딩 오버레이 ── */
        #loading-overlay {
            position: fixed;
            top: 56px; left: 0; right: 0; bottom: 0;
            background: #f0f2f5;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 500; gap: 14px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #d1fae5;
            border-top-color: #0d6640;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #374151; font-weight: 600; }
        .loading-sub  { font-size: 12px; color: #9ca3af; margin-top: -8px; }

        /* ── 현재 위치 버튼 (우하단) ── */
        #locate-btn {
            position: fixed;
            right: 14px; bottom: 30px;
            width: 48px; height: 48px;
            background: #fff;
            border: none;
            border-radius: 50%;
            box-shadow: 0 3px 12px rgba(0,0,0,0.18);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 400;
            transition: transform .15s;
        }
        #locate-btn:active { transform: scale(.93); }

        /* ── 에러 배너 ── */
        #error-banner {
            position: fixed;
            top: 64px; left: 12px; right: 12px;
            background: #fef2f2; border: 1px solid #fca5a5;
            border-left: 4px solid #ef4444;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px; color: #7f1d1d; line-height: 1.5;
            z-index: 600; display: none;
        }
    </style>
</head>
<body>

<!-- 상단 바 -->
<div class="top-bar">
    <button class="back-btn" onclick="window.history.back();" title="뒤로가기">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
    </button>
    <div class="title">📍 현재 위치</div>
    <div class="coord-info" id="coordInfo">위치 조회 중…</div>
</div>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">📡 현재 위치 조회 중</div>
    <div class="loading-sub">GPS 권한을 허용해 주세요</div>
</div>

<!-- 에러 배너 -->
<div id="error-banner" id="errorBanner">
    ⚠️ 위치 조회 실패. 브라우저 위치 권한을 확인하거나,
    <strong>기본 좌표</strong>로 표시합니다.
</div>

<!-- 지도 컨테이너 -->
<div id="map"></div>

<!-- 현재 위치 재조회 버튼 -->
<button id="locate-btn" title="현재 위치로 이동" onclick="locateMe()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="#0d6640" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
        <circle cx="12" cy="12" r="8" stroke-dasharray="2 3"></circle>
    </svg>
</button>

<script>
(function () {
    'use strict';

    // ── 기본 좌표 (경산시청 인근) ──
    var DEFAULT_LAT = 35.8239, DEFAULT_LNG = 128.7358;

    var map, currentMarker, accuracyCircle;

    // ── 지도 초기화 ──
    function initMap(lat, lng) {
        var center = new naver.maps.LatLng(lat, lng);

        map = new naver.maps.Map('map', {
            center: center,
            zoom: 17,
            // ✅ 수정3: 기본지도 + 위성지도 토글 버튼 명시 설정
            mapTypeControl: true,
            mapTypeControlOptions: {
                style: naver.maps.MapTypeControlStyle.BUTTON,
                position: naver.maps.Position.TOP_RIGHT,
                mapTypeIds: [
                    naver.maps.MapTypeId.NORMAL,
                    naver.maps.MapTypeId.SATELLITE,
                    naver.maps.MapTypeId.HYBRID
                ]
            },
            zoomControl: true,
            zoomControlOptions: {
                position: naver.maps.Position.RIGHT_CENTER
            },
            // ✅ 수정4: 상단 바 56px 만큼 지도 여백 보정
            scaleControl: false
        });

        setLocationMarker(lat, lng, 0);
        hideLoading();
    }

    // ✅ 수정5: 현재 위치 마커(파란 점) + 오차 범위 원 구현
    function setLocationMarker(lat, lng, accuracy) {
        var pos = new naver.maps.LatLng(lat, lng);

        // 기존 마커·원 제거
        if (currentMarker) currentMarker.setMap(null);
        if (accuracyCircle) accuracyCircle.setMap(null);

        // 오차 범위 원
        if (accuracy > 0) {
            accuracyCircle = new naver.maps.Circle({
                map: map,
                center: pos,
                radius: accuracy,
                fillColor: 'rgba(13,102,64,0.10)',
                fillOpacity: 1,
                strokeColor: 'rgba(13,102,64,0.35)',
                strokeWeight: 1.5,
                strokeOpacity: 1
            });
        }

        // 파란 점 마커 (SVG 인라인)
        var markerHtml =
            '<div style="width:22px;height:22px;position:relative;">' +
                '<div style="position:absolute;inset:0;border-radius:50%;' +
                     'background:rgba(13,102,64,0.25);animation:pulse 2s ease-in-out infinite;"></div>' +
                '<div style="position:absolute;top:50%;left:50%;' +
                     'transform:translate(-50%,-50%);' +
                     'width:14px;height:14px;border-radius:50%;' +
                     'background:#0d6640;border:2.5px solid #fff;' +
                     'box-shadow:0 1px 6px rgba(0,0,0,0.35);"></div>' +
            '</div>';

        currentMarker = new naver.maps.Marker({
            map: map,
            position: pos,
            icon: {
                content: markerHtml,
                anchor: new naver.maps.Point(11, 11)
            }
        });

        // 좌표 정보 표시
        var coordEl = document.getElementById('coordInfo');
        if (coordEl) {
            coordEl.innerHTML =
                lat.toFixed(5) + '<br>' + lng.toFixed(5) +
                (accuracy > 0 ? '<br>±' + Math.round(accuracy) + 'm' : '');
        }
    }

    // ✅ 수정6: Geolocation으로 현재 위치 탐지
    function locateMe() {
        if (!navigator.geolocation) {
            showError('이 브라우저는 위치 조회를 지원하지 않습니다.');
            if (!map) initMap(DEFAULT_LAT, DEFAULT_LNG);
            return;
        }

        showLoading();

        navigator.geolocation.getCurrentPosition(
            function (pos) {
                var lat = pos.coords.latitude;
                var lng = pos.coords.longitude;
                var acc = pos.coords.accuracy;

                if (!map) {
                    initMap(lat, lng);
                } else {
                    var center = new naver.maps.LatLng(lat, lng);
                    map.setCenter(center);
                    map.setZoom(17);
                    setLocationMarker(lat, lng, acc);
                    hideLoading();
                }

                hideError();
                console.log('[GPS] 위도:', lat, '/ 경도:', lng, '/ 오차:', acc + 'm');
            },
            function (err) {
                var msg = '위치 권한이 거부되었거나 GPS 신호가 없습니다.';
                if (err.code === 1) msg = '위치 접근 권한이 거부되었습니다. 브라우저 설정을 확인하세요.';
                if (err.code === 2) msg = 'GPS 신호를 찾을 수 없습니다. 잠시 후 다시 시도하세요.';
                if (err.code === 3) msg = '위치 조회 시간이 초과되었습니다.';

                showError(msg);
                if (!map) initMap(DEFAULT_LAT, DEFAULT_LNG); // 기본 좌표로 폴백
                else hideLoading();
            },
            { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
        );
    }

    function showLoading() {
        var el = document.getElementById('loading-overlay');
        if (el) el.style.display = 'flex';
    }
    function hideLoading() {
        var el = document.getElementById('loading-overlay');
        if (el) el.style.display = 'none';
    }
    function showError(msg) {
        var el = document.getElementById('error-banner');
        if (el) { el.innerHTML = '⚠️ ' + msg; el.style.display = 'block'; }
        hideLoading();
    }
    function hideError() {
        var el = document.getElementById('error-banner');
        if (el) el.style.display = 'none';
    }

    // CSS 펄스 애니메이션 주입
    var styleTag = document.createElement('style');
    styleTag.textContent =
        '@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(2.2);opacity:0}}';
    document.head.appendChild(styleTag);

    // ── 최초 실행 ──
    window.locateMe = locateMe; // 버튼 onclick용 전역 노출

    // naver API 로드 확인 후 실행
    function waitAndRun() {
        if (typeof naver !== 'undefined' && naver.maps && naver.maps.Map) {
            locateMe();
        } else {
            setTimeout(waitAndRun, 100);
        }
    }
    waitAndRun();

})();
</script>

</body>
</html>
