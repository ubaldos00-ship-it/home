/* ── 계산기 풀왕복 연동: URL 파라미터 기반 즐겨찾기 자동 저장 ──
   tonghab/chungchi 목록의 📍버튼이 ?q=주소&save=1&app=..&surveyKey=..&label=..&color=..
   형태로 열면, 주소 검색이 성공한 시점에 즐겨찾기로 저장한다.
   같은 surveyKey 또는 거의 같은 좌표가 이미 있으면 새로 추가하지 않고 갱신. */
var _urlParams; try{ _urlParams = new URLSearchParams(location.search); }catch(e){ _urlParams = null; }
var _urlAutoFavDone = false;
/* 주어진 좌표 근처(약 60m 이내)에 저장된 즐겨찾기가 있으면 반환 */
function _findFavNear(lat, lng){
  if(!isFinite(lat) || !isFinite(lng)) return null;
  var favs = getFavs();
  for(var i=0;i<favs.length;i++){
    if(Math.abs((favs[i].lat||0) - lat) < 0.0006 && Math.abs((favs[i].lng||0) - lng) < 0.0006) return favs[i];
  }
  return null;
}
function _maybeAutoFav(jibun, road, lat, lng){
  if(_urlAutoFavDone || !_urlParams) return;
  if(_urlParams.get('save') !== '1') return;
  var urlLat = Number(_urlParams.get('lat'));
  var urlLng = Number(_urlParams.get('lng'));
  if(isFinite(urlLat) && isFinite(urlLng)){ lat = urlLat; lng = urlLng; }
  if(!isFinite(lat) || !isFinite(lng)) return;
  _urlAutoFavDone = true;
  var addr  = road || jibun || '';
  var label = (_urlParams.get('label') || '').trim() || addr || '저장 위치';
  var color = (_urlParams.get('color') || '').trim();
  var sKey  = (_urlParams.get('surveyKey') || '').trim();
  var sApp  = (_urlParams.get('app') || '').trim();   /* tonghab | chungchi */
  var _ck = false; for(var c=0;c<FAV_COLORS.length;c++){ if(FAV_COLORS[c].key===color){ _ck=true; break; } }
  if(color && !_ck) color = 'green';                 /* 잘못된 색상 방어 */
  var favs = getFavs();
  var dup = -1;
  for(var i=0;i<favs.length;i++){
    if(sKey && favs[i].surveyKey === sKey){ dup = i; break; }
  }
  if(dup < 0 && sKey){
    for(var i2=0;i2<favs.length;i2++){
      var close2 = Math.abs((favs[i2].lat||0) - lat) < 0.0001 && Math.abs((favs[i2].lng||0) - lng) < 0.0001;
      if(close2 && !favs[i2].surveyKey){ dup = i2; break; }
    }
  }
  if(dup < 0 && !sKey){
    for(var i3=0;i3<favs.length;i3++){
      if(Math.abs((favs[i3].lat||0) - lat) < 0.0001 && Math.abs((favs[i3].lng||0) - lng) < 0.0001){ dup = i3; break; }
    }
  }
  var crop = ''; var _li = label.indexOf(' · '); if(_li > 0) crop = label.slice(0, _li).trim();
  /* 사용자가 손으로 핀 위치를 정한(manualPos) 기존 즐겨찾기는 좌표를 보존한다.
     단, URL에 명시적 lat/lng가 오면(보정된 좌표 전달) 그 값을 우선한다. */
  if(dup>=0 && favs[dup].manualPos && !(isFinite(urlLat) && isFinite(urlLng))){
    lat = favs[dup].lat; lng = favs[dup].lng;
  }
  if(dup>=0 && favs[dup].color){ color = favs[dup].color; }
  else if(!color){ color = (sApp === 'chungchi') ? 'blue' : 'green'; }
  var _ck2 = false; for(var c2=0;c2<FAV_COLORS.length;c2++){ if(FAV_COLORS[c2].key===color){ _ck2=true; break; } }
  if(!_ck2) color = (sApp === 'chungchi') ? 'blue' : 'green';
  var rec = { label:label.slice(0,40), lat:lat, lng:lng, addr:addr, color:color,
              locked: (dup>=0 ? !!favs[dup].locked : false),
              manualPos: (dup>=0 ? !!favs[dup].manualPos : false),
              surveyKey:sKey, surveyApp:sApp, crop:crop };
  if(dup >= 0){ favs[dup] = rec; toast('⭐ 즐겨찾기 갱신됨 (' + label.slice(0,12) + ')'); }
  else { favs.unshift(rec); toast('⭐ 즐겨찾기에 저장됨'); }
  setFavs(favs);
  return rec;   /* 방금 저장/갱신한 즐겨찾기 — 호출부에서 바로 선택 처리 가능 */
}

/* 핀/번호 색상 팔레트 */
var FAV_COLORS = [
  {key:'red',    c:'#e23b2e'}, {key:'orange', c:'#f08c1e'},
  {key:'yellow', c:'#f0b400'}, {key:'green',  c:'#2e9e4f'},
  {key:'blue',   c:'#2d6cdf'}, {key:'purple', c:'#8b5cf6'}
];
function colorOf(key){
  for(var i=0;i<FAV_COLORS.length;i++){ if(FAV_COLORS[i].key===key) return FAV_COLORS[i].c; }
  return FAV_COLORS[0].c;
}

/* 계산기(통합·청취)와 동일한 잠금/휴지통 아이콘 — 시인성 향상 */
var _LOCK_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="11" width="16" height="11" rx="2" fill="#1558D6" stroke="#1558D6" stroke-width="1.2"/><path d="M8 11V8a4 4 0 018 0v3" stroke="#1558D6" stroke-width="2" stroke-linecap="round"/></svg>';
var _UNLOCK_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="4" y="11" width="16" height="11" rx="2" stroke="#888" stroke-width="1.5" fill="none"/><path d="M8 11V8a4 4 0 018 0" stroke="#888" stroke-width="2" stroke-linecap="round"/></svg>';
var _TRASH_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6h14z" stroke="#c0392b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v5M14 11v5" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/></svg>';
/* 잠금 상태일 때 — 삭제 불가 표시용 회색 휴지통 (비활성 잠금과 동일 톤) */
var _TRASH_GRAY_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6h14z" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v5M14 11v5" stroke="#9aa0a6" stroke-width="1.8" stroke-linecap="round"/></svg>';

window.openFavPanel  = function(){
  if(typeof hideActionMenu==='function') hideActionMenu(); /* 롱탭 액션메뉴 닫고 즐겨찾기 열기 */
  renderFavs();
  document.getElementById('fav-modal').classList.add('show');
  /* 모달이 화면에 나타난 뒤(=레이아웃 완료) 선택 항목으로 스크롤해야 동작함 */
  setTimeout(_scrollFavToSelected, 90);
};
/* 선택된(빨강 테두리) 즐겨찾기 항목을 목록 가운데로 스크롤 — 목록이 많아도 바로 찾도록 */
function _scrollFavToSelected(){
  var list = document.getElementById('fav-list');
  if(!list) return;
  var selEl = list.querySelector('.fav-item.sel');
  if(!selEl) return;
  var lr = list.getBoundingClientRect(), sr = selEl.getBoundingClientRect();
  list.scrollTop += (sr.top - lr.top) - (list.clientHeight / 2) + (sr.height / 2);
}
window.closeFavPanel = function(){ document.getElementById('fav-modal').classList.remove('show'); };

/* ── 저장 모달 (이름 + 색상 선택) ── */
var _saveCtx = null, _saveColor = 'red';
window.addCurrentFav = function(){
  if(!S.map){ toast('지도 로딩 후 저장해주세요'); return; }
  var c = S.map.getCenter();
  openSaveModal(c.lat(), c.lng());
};
function openSaveModal(lat, lng){
  if(typeof hideActionMenu==='function') hideActionMenu();   /* 저장창 열릴 때 롱탭 메뉴 닫기 */
  /* 전달받은 좌표(=롱탭으로 지정한 위치 또는 현재위치)를 그대로 저장 대상으로 삼는다.
     이전엔 하단 시트(현재위치) 주소를 가져와 롱탭 저장 시에도 현재위치가 저장되는 버그가 있었음. */
  _saveCtx = { lat:lat, lng:lng, addr:'' };
  _saveColor = 'red';
  var ni = document.getElementById('saveName');
  ni.value = lat.toFixed(5) + ', ' + lng.toFixed(5);   /* 임시 기본값(좌표) — 주소 조회되면 교체 */
  /* 지정 좌표의 실제 주소를 조회해 이름·주소로 채움 */
  if(naver.maps.Service && naver.maps.Service.reverseGeocode){
    naver.maps.Service.reverseGeocode(
      { coords:new naver.maps.LatLng(lat, lng), orders:'addr,roadaddr' },
      function(stt, res){
        if(stt === naver.maps.Service.Status.OK){
          var a = (res.v2 && res.v2.address) || {};
          var ad = a.roadAddress || a.jibunAddress || '';
          if(ad){
            _saveCtx.addr = ad;
            /* 사용자가 아직 직접 수정하지 않았으면(좌표 그대로면) 주소로 교체 */
            if(/^[\d.,\s-]+$/.test(ni.value)) ni.value = ad;
          }
        }
      });
  }
  document.getElementById('saveColors').innerHTML = FAV_COLORS.map(function(col){
    return '<div class="ss-color' + (col.key==='red'?' sel':'') + '" data-color="' + col.key +
           '" style="background:' + col.c + '" onclick="pickSaveColor(\'' + col.key + '\')"></div>';
  }).join('');
  document.getElementById('save-modal').classList.add('show');
  setTimeout(function(){ var el=document.getElementById('saveName'); el.focus(); el.select(); }, 120);
}
window.pickSaveColor = function(key){
  _saveColor = key;
  document.querySelectorAll('#saveColors .ss-color').forEach(function(el){
    el.classList.toggle('sel', el.getAttribute('data-color')===key);
  });
};
window.closeSaveModal = function(){ document.getElementById('save-modal').classList.remove('show'); };
window.confirmSaveFav = function(){
  if(!_saveCtx) return;
  var name = (document.getElementById('saveName').value || '').trim().slice(0,40);
  if(!name) name = _saveCtx.lat.toFixed(5) + ', ' + _saveCtx.lng.toFixed(5);
  var sLat = _saveCtx.lat, sLng = _saveCtx.lng, sColor = _saveColor;
  var favs = getFavs();
  favs.unshift({ label:name, lat:sLat, lng:sLng, addr:_saveCtx.addr||'', color:sColor, locked:false });
  setFavs(favs);                /* → refreshFavPins() 자동 호출: 새 핀 포함 전체 즐겨찾기 핀 표시 */
  closeSaveModal();
  renderFavs();
  /* 롱탭 임시 마커 제거 (즐겨찾기 색상 핀으로 대체됨) */
  if(S.pickMarker){ S.pickMarker.setMap(null); S.pickMarker = null; }
  /* 저장과 동시에 방금 저장한 핀을 '선택' 상태로 → 1.5배 강조 + 하단시트(조사표 입력 등) 바로 활성화 */
  var _nf = getFavs();
  if(_nf[0]) showFavInfo(_nf[0]);
  toast('⭐ 저장했습니다');
};

window.delFav = function(idx){
  var favs = getFavs();
  var f = favs[idx];
  if(!f) return;
  if(f.locked){ toast('🔒 잠긴 항목입니다 — 잠금 해제 후 삭제하세요'); return; }
  if(!confirm('「' + f.label + '」 을(를) 삭제하시겠습니까?')) return;   /* 삭제 확인 */
  var delKey = _favKey(f);
  favs.splice(idx, 1);
  setFavs(favs);
  /* v46: 삭제한 핀이 현재 선택/강조된 핀이면 화면에서 즉시 제거 */
  if(window._selFavKey === delKey){
    window._selFavKey = null;
    window._curFav = null;
    if(S.pickMarker){ S.pickMarker.setMap(null); S.pickMarker = null; }
    hideInfoSheet();
    if(typeof _syncSurveyBtn === 'function') _syncSurveyBtn();
  }
  _forceFavRefreshNow();
  renderFavs();
  toast('삭제했습니다');
};
/* 즐겨찾기 잠금 토글 (잠긴 항목은 삭제·전체삭제에서 제외) */
window.toggleLock = function(idx){
  var favs = getFavs();
  if(!favs[idx]) return;
  favs[idx].locked = !favs[idx].locked;
  setFavs(favs);
  renderFavs();
  toast(favs[idx].locked ? '🔒 잠금 (삭제 방지)' : '🔓 잠금 해제');
};

/* 핀 마커 아이콘(색상별 물방울) */
function favPinIcon(color){
  return {
    content:'<div class="fav-pinmark" style="background:' + colorOf(color) + '"></div>',
    anchor:new naver.maps.Point(11, 22)
  };
}
/* 선택된 즐겨찾기 핀 — 기본 핀(22px)의 1.5배(33px)로 강조 */
function favPinSelIcon(color){
  var s = 33;
  return {
    content:'<div style="width:' + s + 'px;height:' + s + 'px;border-radius:50% 50% 50% 0;'
          + 'transform:rotate(-45deg);background:' + colorOf(color) + ';border:3px solid #fff;'
          + 'box-shadow:0 3px 8px rgba(0,0,0,.5);"></div>',
    anchor:new naver.maps.Point(s/2, s)
  };
}
/* 롱탭 지정위치 핀 — 기존 즐겨찾기 핀(22px)의 약 3배 크기로 크게 표시 */
function pickPinIcon(){
  var s = 46;
  return {
    content:'<div style="width:' + s + 'px;height:' + s + 'px;border-radius:50% 50% 50% 0;'
          + 'transform:rotate(-45deg);background:#ff3b30;border:3px solid #fff;'
          + 'box-shadow:0 4px 10px rgba(0,0,0,.5);"></div>',
    anchor:new naver.maps.Point(s/2, s)   /* 뾰족한 끝이 좌표에 오도록 */
  };
}
/* 즐겨찾기 위치로 이동 + 핀 + 제목 시트 표시 */
window.gotoFav = function(idx){
  var favs = getFavs();
  var f = favs[idx];
  if(!f || !S.map) return;
  var ll = new naver.maps.LatLng(f.lat, f.lng);
  S.map.setCenter(ll);
  S.map.setZoom(17);
  if(S.pickMarker){ S.pickMarker.setMap(null); }
  S.pickMarker = new naver.maps.Marker({ map:S.map, position:ll, icon:favPinIcon(f.color) });
  closeFavPanel();
  showFavInfo(f);
  toast('📍 ' + f.label);
};
/* 즐겨찾기 정보를 하단 시트에 표시 (제목·주소·좌표) */
function showFavInfo(f){
  setDest(f.lat, f.lng, f.label);
  ahLine1.textContent = '⭐ ' + f.label;
  ahLine2.textContent = (f.addr ? f.addr + '  ·  ' : '') + f.lat.toFixed(5) + ', ' + f.lng.toFixed(5);
  /* 계산기 연동: 이 즐겨찾기에 조사표 자료(surveyKey)가 연결돼 있으면 기억 → 조사표 버튼으로 복원 */
  window._curFav = f;
  window._selFavKey = _favKey(f);   /* 선택 핀 표시용 — refreshFavPins가 이 핀을 1.5배로 그림 */
  /* 선택된 핀을 1.5배로 강조: 검색 임시핀 제거 후 refreshFavPins로 다시 그린다(타이밍 무관 항상 적용) */
  if(S.map){
    if(S.pickMarker){ S.pickMarker.setMap(null); S.pickMarker = null; }
    refreshFavPins();
  }
  if(f && f.surveyKey && !_surveyRecordExists(f)){
    setTimeout(function(){ _alertStaleSurveyAndClean(f); }, 80);
  }
  _syncSurveyBtn();
  _setMoveBtn(true);   /* 저장된 핀이므로 위치변경 가능 */
  /* v33: 핀 클릭 시 작물명 팝업은 띄우지 않음 — 작물명 보기 라벨만 사용 */
  showInfoSheet();
}
/* ================================================================
   핀 위치 변경 — 선택된 즐겨찾기를 십자선(지도 가운데)으로 옮겨 좌표 저장.
   애매한 도로명 지오코딩으로 핀이 엉뚱한 곳에 찍혔을 때 정확한 위치로 보정한다.
   저장 시 계산기 저장자료에도 좌표(__mapLat/__mapLng)를 역기록해 이후에도 그 좌표를 사용한다.
================================================================ */
var _pinMoving = false, _pinMoveFav = null;
window.enterPinMoveMode = function(){
  var f = window._curFav;
  if(!f || !isFinite(Number(f.lat)) || !isFinite(Number(f.lng))){ toast('먼저 핀을 선택하세요'); return; }
  if(!S.map){ return; }
  _pinMoving = true; _pinMoveFav = f;
  window.hideInfoSheet();
  if(S.pickMarker){ S.pickMarker.setMap(null); }   /* 십자선이 잘 보이게 선택핀 숨김 */
  S.map.setCenter(new naver.maps.LatLng(Number(f.lat), Number(f.lng)));
  document.getElementById('pin-move-cross').style.display = 'block';
  document.getElementById('pin-move-bar').style.display = 'flex';
  var t = document.getElementById('pmb-text');
  if(t) t.textContent = '「' + (f.label||'') + '」\n지도를 움직여 십자선을 정확한 위치에 맞추세요';
  toast('지도를 움직여 정확한 위치로 맞추세요');
}
function _exitPinMoveMode(){
  _pinMoving = false;
  var c = document.getElementById('pin-move-cross'); if(c) c.style.display = 'none';
  var b = document.getElementById('pin-move-bar');   if(b) b.style.display = 'none';
}
window.cancelPinMove = function(){
  var f = _pinMoveFav; _pinMoveFav = null;
  _exitPinMoveMode();
  refreshFavPins();
  if(f) showFavInfo(f);   /* 원래 선택 상태로 복귀 */
};
window.confirmPinMove = function(){
  if(!_pinMoving || !_pinMoveFav || !S.map){ _exitPinMoveMode(); return; }
  var c = S.map.getCenter();
  var nlat = c.lat(), nlng = c.lng();
  var key = _favKey(_pinMoveFav), sKey = _pinMoveFav.surveyKey || '';
  var favs = getFavs(), idx = -1;
  for(var i=0;i<favs.length;i++){ if(_favKey(favs[i]) === key){ idx = i; break; } }
  if(idx < 0 && sKey){ for(var j=0;j<favs.length;j++){ if(favs[j].surveyKey === sKey){ idx = j; break; } } }
  var moved = null;
  if(idx >= 0){
    favs[idx].lat = nlat; favs[idx].lng = nlng; favs[idx].manualPos = true;
    setFavs(favs);
    moved = favs[idx];
    _writeBackMapCoord(moved);   /* 계산기 저장자료에 좌표 역기록 */
    window._curFav = moved;
  }
  _pinMoveFav = null;
  _exitPinMoveMode();
  refreshFavPins();
  if(moved) showFavInfo(moved);
  /* 위치변경 → 새 위치의 지번주소로 핀 주소를 자동 갱신 (reverse-geocode) */
  if(moved && naver.maps.Service && naver.maps.Service.reverseGeocode){
    toast('📍 새 위치 주소 확인 중…');
    naver.maps.Service.reverseGeocode({ coords:new naver.maps.LatLng(nlat, nlng), orders:'addr,roadaddr' }, function(st, res){
      var newAddr = '';
      try{ if(st === naver.maps.Service.Status.OK){ var a=(res.v2 && res.v2.address)||{}; newAddr=(a.jibunAddress || a.roadAddress || '').trim(); } }catch(e){}
      if(newAddr){
        var fv = getFavs(), k2 = -1;
        for(var i=0;i<fv.length;i++){ if(_favKey(fv[i]) === _favKey(moved)){ k2 = i; break; } }
        if(k2 >= 0){
          fv[k2].addr = newAddr;
          var crop = (fv[k2].crop||'').trim();
          if(crop) fv[k2].label = crop + ' · ' + newAddr;
          else if(!fv[k2].label || fv[k2].label === moved.addr || fv[k2].label === moved.label) fv[k2].label = newAddr;
          setFavs(fv);
          window._curFav = fv[k2];
          showFavInfo(fv[k2]);
          toast('✅ 핀 위치·주소 변경: ' + newAddr.slice(0,20));
          return;
        }
      }
      toast('✅ 핀 위치를 변경했습니다 (주소 확인 실패)');
    });
  } else {
    toast('✅ 핀 위치를 변경했습니다');
  }
};
/* 변경된 좌표를 계산기(통합/청취) 저장자료에 역기록 → 다음에 열 때도 이 좌표 사용 */
function _writeBackMapCoord(f){
  try{
    if(!f || !f.surveyKey) return;
    var pfx = _surveyStoragePrefix(f.surveyApp);
    var raw = localStorage.getItem(pfx + f.surveyKey);
    if(!raw) return;
    var d = JSON.parse(raw);
    d.__mapLat = Number(f.lat);
    d.__mapLng = Number(f.lng);
    if(f.color) d.__mapColor = f.color;
    localStorage.setItem(pfx + f.surveyKey, JSON.stringify(d));
  }catch(e){}
}
/* 즐겨찾기 식별 키 (surveyKey 우선, 없으면 좌표) */
function _favKey(f){
  if(!f) return '';
  if(f.surveyKey) return 'k:' + f.surveyKey;
  return 'c:' + Number(f.lat).toFixed(6) + ',' + Number(f.lng).toFixed(6);
}
/* v46: 선택 중인 즐겨찾기가 삭제되었으면 강조 핀/하단시트를 즉시 정리 */
function _syncSelectedFavAfterChange(){
  var sel = window._selFavKey || '';
  if(!sel) return;
  var favs = getFavs();
  var alive = false;
  for(var i=0;i<favs.length;i++){ if(_favKey(favs[i]) === sel){ alive = true; break; } }
  if(alive) return;
  window._selFavKey = null;
  window._curFav = null;
  if(S.pickMarker){ S.pickMarker.setMap(null); S.pickMarker = null; }
  if(typeof _syncSurveyBtn === 'function') _syncSurveyBtn();
  try{ infoSheet.classList.remove('show'); adjustControls(); }catch(e){}
}
function _forceFavRefreshNow(){
  try{ clearFavMarkers(); }catch(e){}
  try{ refreshFavPins(); }catch(e){}
  setTimeout(function(){ try{ refreshFavPins(); }catch(e){} }, 80);
}
/* 즐겨찾기 핀 클릭 시, 연결된 작물명을 핀 위에 잠시(2.5초) 말풍선으로 표시 */
function _showCropTip(f){
  if(!f || !S.map || typeof naver==='undefined' || !naver.maps.InfoWindow) return;
  var crop = (f.crop || '').trim();
  /* 계산기에서 저장한 즐겨찾기는 label이 "작물 · 주소" 형태 → 앞부분이 작물명 */
  if(!crop && f.surveyApp){
    var seg = (f.label || '').split(' · ');
    if(seg.length >= 2) crop = (seg[0] || '').trim();
  }
  if(!crop) return;   /* 작물 정보 없는(직접 저장한) 핀은 표시 안 함 */
  try{ if(window._cropTip) window._cropTip.close(); }catch(e){}
  var iw = new naver.maps.InfoWindow({
    content:'<div style="padding:4px 11px;font-size:13px;font-weight:800;color:#1a5c22;'
          + 'background:#eaf7e6;border:1.5px solid #8BC34A;border-radius:14px;white-space:nowrap;'
          + 'box-shadow:0 2px 8px rgba(0,0,0,.2);">🌱 ' + escapeHtml(crop) + '</div>',
    borderWidth:0, disableAnchor:true, backgroundColor:'transparent',
    pixelOffset:new naver.maps.Point(0, -10)
  });
  iw.open(S.map, new naver.maps.LatLng(f.lat, f.lng));
  window._cropTip = iw;
  clearTimeout(window._cropTipTimer);
  window._cropTipTimer = setTimeout(function(){ try{ iw.close(); }catch(e){} }, 2500);
}
/* 조사표 입력 버튼 라벨/표시 갱신 (연결된 조사자료 유무에 따라) */
function _syncSurveyBtn(){
  var b = document.getElementById('info-survey');
  if(!b) return;
  if(window._curFav && window._curFav.surveyKey){
    b.innerHTML = '<span>📋 조사표<br>열기</span>';
  } else {
    b.innerHTML = '<span>📋 조사표<br>입력</span>';
  }
}

/* 저장된 즐겨찾기를 지도 전체에 핀으로 표시하고 한눈에 보이도록 화면 맞춤 */
window.clearFavMarkers = function(){
  S.favMarkers.forEach(function(m){ m.setMap(null); });
  S.favMarkers = [];
};
window.showAllFavs = function(){
  if(!S.map){ toast('지도 로딩 후 사용해주세요'); return; }
  var favs = getFavs();
  if(!favs.length){ toast('저장된 즐겨찾기가 없습니다'); return; }
  closeFavPanel();
  /* v34: 전체보기에서도 일반 핀 표시 함수 하나만 사용한다.
     그래야 같은 좌표 분산표시와 작물명 라벨 ON 상태가 항상 동일하게 적용된다. */
  refreshFavPins();
  var bounds = new naver.maps.LatLngBounds();
  favs.forEach(function(f){
    var lat = Number(f.lat), lng = Number(f.lng);
    if(isFinite(lat) && isFinite(lng)) bounds.extend(new naver.maps.LatLng(lat, lng));
  });
  if(favs.length === 1){
    S.map.setCenter(new naver.maps.LatLng(favs[0].lat, favs[0].lng));
    S.map.setZoom(16);
  } else {
    S.map.fitBounds(bounds, { top:90, right:40, bottom:160, left:40 });
  }
  setTimeout(function(){ try{ refreshFavPins(); if(S.cadOn) updateCadOverlay(); }catch(e){} }, 350);
  toast('⭐ 즐겨찾기 ' + favs.length + '곳 전체보기');
};

/* 목록: 왼쪽 번호(아래=1, 최근=맨위 큰수) + 제목·주소·좌표 + 잠금 + 휴지통 */
function renderFavs(){
  var list = document.getElementById('fav-list');
  var favs = getFavs();
  if(!favs.length){
    list.innerHTML = '<div class="fav-empty">저장된 위치가 없습니다.<br>지도를 원하는 곳으로 옮긴 뒤<br>「현재 위치 저장」을 눌러보세요.</div>';
    return;
  }
  var n = favs.length;
  var sel = window._selFavKey || '';
  list.innerHTML = favs.map(function(f, i){
    var locked = !!f.locked;
    var num = n - i;   /* 최근(맨위)=큰 번호, 아래로 갈수록 1 */
    var addrLine = f.addr ? '<div class="fi-addr">' + escapeHtml(f.addr) + '</div>' : '';
    var selCls = (sel && _favKey(f) === sel) ? ' sel' : '';   /* 지도에서 선택된 항목 강조 */
    return '<div class="fav-item' + (locked ? ' locked' : '') + selCls + '" data-favkey="' + escapeHtml(_favKey(f)) + '">' +
      '<div class="fi-num" style="background:' + colorOf(f.color) + '" onclick="openColorModal(' + i + ')" title="색상 변경">' + num + '</div>' +
      '<div class="fi-text" onclick="gotoFav(' + i + ')">' +
        '<div class="fi-label">' + escapeHtml(f.label) + '</div>' +
        addrLine +
        '<div class="fi-coord">' + f.lat.toFixed(5) + ', ' + f.lng.toFixed(5) + '</div>' +
      '</div>' +
      '<button class="fi-lock" onclick="toggleLock(' + i + ')" title="' + (locked?'잠금 해제':'잠금') + '">' + (locked ? _LOCK_SVG : _UNLOCK_SVG) + '</button>' +
      '<button class="fi-del" onclick="delFav(' + i + ')" title="삭제">' + (locked ? _TRASH_GRAY_SVG : _TRASH_SVG) + '</button>' +
    '</div>';
  }).join('');
  /* 선택된 항목이 여러 개 중에 있으면 그 위치로 스크롤 */
  if(sel){
    var selEl = list.querySelector('.fav-item.sel');
    if(selEl){ try{ selEl.scrollIntoView({block:'center'}); }catch(e){ selEl.scrollIntoView(); } }
  }
}

/* ── 목록 번호(색상 동그라미) 탭 → 핀 색상 변경 ── */
var _colorIdx = -1;
window.openColorModal = function(idx){
  if(typeof hideActionMenu==='function') hideActionMenu();   /* 다른 팝업 열릴 때 롱탭 메뉴 닫기 */
  _colorIdx = idx;
  var favs = getFavs();
  var cur = favs[idx] ? favs[idx].color : 'red';
  document.getElementById('colorColors').innerHTML = FAV_COLORS.map(function(col){
    return '<div class="ss-color' + (col.key===cur?' sel':'') + '" style="background:' + col.c +
           '" onclick="setFavColor(\'' + col.key + '\')"></div>';
  }).join('');
  document.getElementById('color-modal').classList.add('show');
};
window.closeColorModal = function(){ document.getElementById('color-modal').classList.remove('show'); };
window.setFavColor = function(key){
  var favs = getFavs();
  if(favs[_colorIdx]){ favs[_colorIdx].color = key; setFavs(favs); renderFavs(); }
  closeColorModal();
  toast('🎨 핀 색상을 변경했습니다');
};

/* ── 즐겨찾기 전체삭제 (잠금 항목 제외) ── */
window.clearAllFavs = function(){
  var favs = getFavs();
  if(!favs.length){ toast('삭제할 항목이 없습니다'); return; }
  var locked   = favs.filter(function(f){ return f.locked; });
  var unlocked = favs.filter(function(f){ return !f.locked; });
  if(!unlocked.length){ toast('🔒 모두 잠겨 있어 삭제할 항목이 없습니다'); return; }
  if(!confirm('잠금(🔒) ' + locked.length + '개를 제외한 ' + unlocked.length + '개를 전체삭제하시겠습니까?')) return;
  setFavs(locked);
  _syncSelectedFavAfterChange();
  _forceFavRefreshNow();
  renderFavs();
  toast('전체삭제 완료 (잠금 ' + locked.length + '개 유지)');
};

/* ── 즐겨찾기 파일 저장(내보내기) ── */
window.exportFavs = function(){
  var favs = getFavs();
  if(!favs.length){ toast('저장된 즐겨찾기가 없습니다'); return; }
  var data = JSON.stringify({ app:'tenar-map', type:'favorites', version:1,
                              exportedAt:new Date().toISOString(), favorites:favs }, null, 2);
  var blob = new Blob([data], { type:'application/json' });
  var url  = URL.createObjectURL(blob);
  var d = new Date(), pad = function(n){ return String(n).padStart(2,'0'); };
  var a = document.createElement('a');
  a.href = url;
  a.download = '텐아르_즐겨찾기_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  toast('💾 즐겨찾기 파일을 저장했습니다');
};

/* ── 즐겨찾기 파일 불러오기 ── */
window.importFavs = function(ev){
  var file = ev.target.files && ev.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var obj = JSON.parse(e.target.result);
      var arr = Array.isArray(obj) ? obj : (obj.favorites || []);
      var valid = (arr || []).filter(function(f){
        return f && typeof f.lat === 'number' && typeof f.lng === 'number' && f.label;
      });
      if(!valid.length){ toast('불러올 즐겨찾기가 없습니다 (형식 확인)'); ev.target.value=''; return; }
      var add = confirm('불러온 ' + valid.length + '개를 어떻게 할까요?\n\n[확인] 기존 목록에 추가\n[취소] 기존 삭제 후 교체');
      var merged = add ? getFavs().concat(valid) : valid;
      setFavs(merged);
      renderFavs();
      toast('📂 ' + valid.length + '개 불러오기 완료');
    }catch(err){
      toast('파일을 읽을 수 없습니다 (JSON 오류)');
    }
    ev.target.value = '';
  };
  reader.readAsText(file);
};

/* ── 즐겨찾기 공유 (파일 → 텍스트 → 클립보드 폴백) ── */
window.shareFavs = function(){
  var favs = getFavs();
  if(!favs.length){ toast('공유할 즐겨찾기가 없습니다'); return; }
  var data = JSON.stringify({ app:'tenar-map', type:'favorites', version:1, favorites:favs }, null, 2);
  var fname = '텐아르_즐겨찾기.json';
  try{
    if(navigator.canShare){
      var f = new File([data], fname, { type:'application/json' });
      if(navigator.canShare({ files:[f] })){
        navigator.share({ files:[f], title:'텐아르 즐겨찾기' }).catch(function(){});
        return;
      }
    }
  }catch(e){}
  try{
    if(navigator.share){ navigator.share({ title:'텐아르 즐겨찾기', text:data }).catch(function(){}); return; }
  }catch(e){}
  copyText(data);
  toast('🔗 즐겨찾기 데이터를 클립보드에 복사했습니다');
};
function escapeHtml(s){
  return String(s).replace(/[&<>'"]/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch];
  });
}

/* ================================================================
   롱탭 액션 메뉴 (도착 · 면적측정 · 주소 · 공유 · 저장)
================================================================ */
/* 롱탭 이벤트에서 화면(viewport) 픽셀 좌표 추출 — 여러 소스 폴백 */
function _evtViewportXY(e){
  var pe = e && (e.pointerEvent || e.originalEvent || e.domEvent);
  if(pe){
    if(pe.clientX != null) return { x:pe.clientX, y:pe.clientY };
    var t = (pe.changedTouches && pe.changedTouches[0]) || (pe.touches && pe.touches[0]);
    if(t) return { x:t.clientX, y:t.clientY };
  }
  var off = e && (e.offset || e.point);   /* Naver: 지도 컨테이너 기준 픽셀 */
  if(off){
    var r = document.getElementById('map').getBoundingClientRect();
    return { x: off.x + r.left, y: off.y + r.top };
  }
  return null;
}
/* 지도좌표 → 화면(viewport) 픽셀 재투영 (지도가 움직이면 핀을 따라가기 위함) */
function _reprojectXY(lat, lng){
  try{
    var off = S.map.getProjection().fromCoordToOffset(new naver.maps.LatLng(lat, lng));
    var r = document.getElementById('map').getBoundingClientRect();
    return { x: off.x + r.left, y: off.y + r.top };
  }catch(_){ return null; }
}
function showActionMenu(e){
  var menu = document.getElementById('action-menu');
  if(typeof hideInfoSheet === 'function') hideInfoSheet();   /* 롱탭 시 하단 현재위치 시트 완전히 닫기 */
  /* 누른 지점의 실제 화면 좌표를 기준점으로 사용 (가장 정확) */
  var anchor = _evtViewportXY(e);
  /* 재투영값과의 차이를 보정값으로 저장 → 지도 이동 시 재투영해도 핀에 정확히 붙어 따라감 */
  S._amCorr = { dx:0, dy:0 };
  if(anchor){
    var rp0 = _reprojectXY(S.actLat, S.actLng);
    if(rp0){ S._amCorr = { dx: anchor.x - rp0.x, dy: anchor.y - rp0.y }; }
    S._amAnchor = anchor;
  }
  menu.classList.add('show');
  positionActionMenu();
  /* 지도가 움직이면 메뉴도 핀 좌표를 따라 이동 (1회만 등록) */
  if(!S._amMove){
    S._amMove = naver.maps.Event.addListener(S.map, 'bounds_changed', positionActionMenu);
  }
}
/* 재투영(+보정)으로 메뉴를 핀 위쪽에 배치 — 지도 이동 시에도 핀을 따라감 */
function positionActionMenu(){
  var menu = document.getElementById('action-menu');
  if(!menu.classList.contains('show') || S.actLat == null) return;
  var px = null, py = null;
  var rp = _reprojectXY(S.actLat, S.actLng);
  if(rp){
    var c = S._amCorr || { dx:0, dy:0 };
    px = rp.x + c.dx; py = rp.y + c.dy;       /* 보정 적용 → 핀에 정확히 고정 */
  } else if(S._amAnchor){
    px = S._amAnchor.x; py = S._amAnchor.y;    /* 재투영 실패 시 최초 누른 좌표 */
  }
  if(px == null || !isFinite(px)) return;
  var mw = menu.offsetWidth || 320, mh = menu.offsetHeight || 70;
  var PIN_H = 54;                    /* 대형 지정핀 높이만큼 더 띄워 핀을 가리지 않게 */
  var left = Math.max(8, Math.min(px - mw/2, window.innerWidth - mw - 8));
  var top  = py - mh - 14 - PIN_H;  /* 핀 위쪽 (핀 높이만큼 추가로 위로) */
  if(top < 56) top = py + 28;        /* 위 공간 부족하면 핀 아래쪽 */
  menu.style.left = left + 'px';
  menu.style.top  = top + 'px';
}
window.hideActionMenu = function(){ document.getElementById('action-menu').classList.remove('show'); };
window.amAct = function(type){
  hideActionMenu();
  if(S.actLat == null) return;
  var ll = new naver.maps.LatLng(S.actLat, S.actLng);
  if(type === 'addr'){
    searchAddress(ll, '📍 선택 위치');
  } else if(type === 'dest'){
    setDest(S.actLat, S.actLng, '선택 위치');
    /* 주소를 먼저 조회해 목적지명 보강 후 길찾기 */
    searchAddress(ll, '📍 선택 위치');
    setTimeout(openRouteMenu, 400);
  } else if(type === 'measure'){
    openMeasure(); setMeasureMode('area');
    addMeasurePoint(ll);
    toast('면적 측정: 지도를 탭해 점을 이어 찍으세요');
  } else if(type === 'share'){
    shareAddressOnly(S.actLat, S.actLng);
  } else if(type === 'save'){
    openSaveModal(S.actLat, S.actLng);
  }
};
/* 선택 위치의 주소만 공유 (좌표·URL 없이 주소 텍스트만) */
function shareAddressOnly(lat, lng){
  function doShare(addr){
    var text = addr || (lat.toFixed(5) + ', ' + lng.toFixed(5));
    try{
      if(navigator.share){ navigator.share({ title:'위치 주소', text:text }).catch(function(){}); return; }
    }catch(e){}
    copyText(text);
    toast('🔗 주소를 복사했습니다');
  }
  if(naver.maps.Service && naver.maps.Service.reverseGeocode){
    toast('주소 확인 중…');
    naver.maps.Service.reverseGeocode(
      { coords:new naver.maps.LatLng(lat, lng), orders:'addr,roadaddr' },
      function(st, res){
        var addr = '';
        if(st === naver.maps.Service.Status.OK){
          var a = (res.v2 && res.v2.address) || {};
          addr = a.roadAddress || a.jibunAddress || '';
        }
        doShare(addr);
      });
  } else {
    doShare('');
  }
}

/* ================================================================
   하단 시트 드래그 (핸들을 쓸어 축소/확대/닫기)
================================================================ */
function addSheetDrag(handle, sheet, opts){
  if(!handle || !sheet) return;
  var startY = 0, dy = 0, dragging = false;
  handle.addEventListener('touchstart', function(e){
    if(e.touches.length !== 1) return;
    startY = e.touches[0].clientY; dy = 0; dragging = true;
    sheet.style.transition = 'none';
  }, { passive:true });
  handle.addEventListener('touchmove', function(e){
    if(!dragging) return;
    dy = e.touches[0].clientY - startY;
    if(dy > 0) sheet.style.transform = 'translateY(' + dy + 'px)';   /* 아래로만 따라감 */
  }, { passive:true });
  handle.addEventListener('touchend', function(){
    if(!dragging) return; dragging = false;
    sheet.style.transition = '';
    sheet.style.transform = '';
    if(dy > 55){ opts.down && opts.down(); }
    else if(dy < -45){ opts.up && opts.up(); }
  }, { passive:true });
}
