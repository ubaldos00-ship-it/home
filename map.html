<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>GPS 현재위치 지도</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;background:#eef2f4;color:#111827;overflow:hidden}
.map-page{position:fixed;inset:0;background:#eef2f4;display:flex;justify-content:center;align-items:stretch}.phone-frame{position:relative;width:100%;max-width:460px;height:100%;background:#f8fafc;overflow:hidden}.status-space{position:absolute;top:0;left:0;right:0;height:30px;background:rgba(255,255,255,.92);z-index:20;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:12px;font-weight:900;color:#111827;backdrop-filter:blur(8px)}.map-top{position:absolute;top:30px;left:0;right:0;height:58px;z-index:21;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.64),rgba(255,255,255,0));pointer-events:none}.back-btn{pointer-events:auto;width:42px;height:42px;border:0;border-radius:50%;background:rgba(255,255,255,.96);box-shadow:0 2px 10px rgba(0,0,0,.18);font-size:30px;line-height:1;color:#111827;display:flex;align-items:center;justify-content:center;cursor:pointer}.type-chip{pointer-events:auto;border:1px solid #d1d5db;background:rgba(255,255,255,.94);border-radius:18px;padding:8px 12px;font-size:13px;font-weight:900;color:#374151;box-shadow:0 2px 8px rgba(0,0,0,.10)}.map-wrap{position:absolute;inset:0;background:#dbe4e9;z-index:1}.map-wrap iframe{width:100%;height:100%;border:0;background:#dbe4e9}.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background:linear-gradient(135deg,#f8fafc,#ecfdf5);z-index:3;color:#374151;font-size:14px;line-height:1.7}.loading strong{color:#0d6640;font-size:17px}.error-box{position:absolute;left:14px;right:14px;top:96px;z-index:30;background:rgba(255,255,255,.97);border:1px solid #fecaca;border-left:4px solid #ef4444;border-radius:14px;padding:14px;color:#991b1b;font-size:13px;line-height:1.6;box-shadow:0 3px 14px rgba(0,0,0,.12);display:none}.pin-dot{position:absolute;left:50%;top:50%;width:20px;height:20px;border-radius:50%;background:#1a73e8;border:4px solid #fff;box-shadow:0 0 0 10px rgba(26,115,232,.18),0 3px 10px rgba(0,0,0,.28);transform:translate(-50%,-50%);z-index:14;display:none;pointer-events:none}.zoom-box{position:absolute;right:16px;top:102px;z-index:12;background:rgba(255,255,255,.94);border:1px solid #d1d5db;border-radius:4px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12)}.zoom-box div{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#555;border-bottom:1px solid #d1d5db}.zoom-box div:last-child{border-bottom:0}.scale{position:absolute;right:12px;bottom:170px;z-index:12;background:rgba(255,255,255,.92);border-radius:4px;padding:2px 5px;font-size:10px;color:#111827;border-bottom:2px solid #111}.map-brand{position:absolute;left:12px;bottom:170px;z-index:12;color:#4285f4;font-size:12px;font-weight:900;letter-spacing:-.2px;text-shadow:0 1px 1px #fff}.info-card{position:absolute;left:12px;right:12px;bottom:12px;z-index:25;background:rgba(255,255,255,.95);border:1px solid #e5e7eb;border-radius:16px;padding:12px 14px;box-shadow:0 6px 22px rgba(0,0,0,.16);backdrop-filter:blur(8px)}.info-title{font-size:13px;font-weight:900;color:#0d6640;margin-bottom:4px}.info-text{font-size:11.5px;color:#4b5563;line-height:1.55;word-break:break-all}.info-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:9px}.info-actions a,.info-actions button{border:0;border-radius:10px;padding:10px 6px;font-size:11.5px;font-weight:900;text-align:center;text-decoration:none;cursor:pointer;white-space:nowrap}.google-btn{background:#1a73e8;color:#fff}.kakao-btn{background:#fee500;color:#191919}.naver-btn{background:#03c75a;color:#fff}.retry-btn{grid-column:1/4;background:#ecfdf5;color:#0d6640;border:1px solid #bbf7d0!important}.fallback-note{color:#6b7280;font-size:11px;margin-top:4px}
</style>
</head>
<body>
<div class="map-page">
  <div class="phone-frame">
    <div class="status-space"><span id="clock">--:--</span><span>GPS</span></div>
    <div class="map-top"><button class="back-btn" type="button" onclick="goBack()" aria-label="뒤로가기">‹</button><div class="type-chip">현재위치 지도</div></div>
    <div class="map-wrap" id="mapWrap"><div class="loading" id="loading"><div><strong>현재 위치를 찾는 중입니다.</strong><br>위치 권한을 허용하면 지도 화면에 표시합니다.</div></div></div>
    <div class="zoom-box" aria-hidden="true"><div>+</div><div>−</div></div>
    <div class="pin-dot" id="pinDot" aria-hidden="true"></div>
    <div class="error-box" id="errorBox"></div>
    <div class="map-brand">GOOGLE</div><div class="scale">100m</div>
    <div class="info-card" id="infoCard">
      <div class="info-title">📍 GPS 현재위치 지도</div>
      <div class="info-text" id="infoText">검색일자: 위치 조회 대기 중</div>
      <div class="info-actions">
        <a class="google-btn" id="openGoogle" href="https://www.google.com/maps" target="_blank" rel="noopener">구글지도</a>
        <a class="kakao-btn" id="openKakao" href="https://map.kakao.com" target="_blank" rel="noopener">카카오지도</a>
        <a class="naver-btn" id="openNaver" href="https://map.naver.com" target="_blank" rel="noopener">네이버지도</a>
        <button class="retry-btn" type="button" onclick="locateNow()">현재 위치 다시 조회</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
  'use strict';
  function pad2(n){return n<10?'0'+n:''+n}
  function fmt(d){return d.getFullYear()+'.'+pad2(d.getMonth()+1)+'.'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes())+':'+pad2(d.getSeconds())}
  function tick(){var d=new Date();var c=document.getElementById('clock');if(c)c.textContent=pad2(d.getHours())+':'+pad2(d.getMinutes())}
  tick();setInterval(tick,1000);window.fmtDateTime=fmt;
})();
function goBack(){if(history.length>1) history.back();else location.href='index.html';}
function googleEmbedUrl(lat,lng){return 'https://maps.google.com/maps?q='+encodeURIComponent(lat+','+lng)+'&z=17&hl=ko&output=embed';}
function googleExternalUrl(lat,lng){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(lat+','+lng);}
function kakaoExternalUrl(lat,lng){return 'https://map.kakao.com/link/map/현재위치,'+lat+','+lng;}
function naverExternalUrl(lat,lng){return 'https://map.naver.com/p/search/'+encodeURIComponent(lat+','+lng);}
function osmFallbackEmbedUrl(lat,lng){lat=parseFloat(lat);lng=parseFloat(lng);var dLat=0.006,dLng=0.004;var bbox=[lng-dLng,lat-dLat,lng+dLng,lat+dLat].join('%2C');return 'https://www.openstreetmap.org/export/embed.html?bbox='+bbox+'&layer=mapnik&marker='+lat+'%2C'+lng;}
function setError(msg){var e=document.getElementById('errorBox');var wrap=document.getElementById('mapWrap');if(wrap){wrap.innerHTML='<div class="loading"><div><strong>지도 표시 대기</strong><br>아래 지도 버튼으로 외부 앱을 열 수 있습니다.</div></div>';}if(e){e.style.display='block';e.innerHTML='⚠️ '+msg+'<br>브라우저 위치 권한을 허용한 뒤 다시 조회해주세요.';}}
function locateNow(){
  var wrap=document.getElementById('mapWrap');var err=document.getElementById('errorBox');var pin=document.getElementById('pinDot');
  var info=document.getElementById('infoText');var g=document.getElementById('openGoogle');var k=document.getElementById('openKakao');var n=document.getElementById('openNaver');
  if(err)err.style.display='none';if(pin)pin.style.display='none';
  if(wrap){wrap.innerHTML='<div class="loading"><div><strong>현재 위치를 찾는 중입니다.</strong><br>위치 권한을 허용해주세요.</div></div>';}
  if(!navigator.geolocation){setError('이 브라우저는 GPS 조회를 지원하지 않습니다.');return;}
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=Number(pos.coords.latitude).toFixed(6);var lng=Number(pos.coords.longitude).toFixed(6);var acc=Math.round(pos.coords.accuracy||0);
    if(g)g.href=googleExternalUrl(lat,lng);if(k)k.href=kakaoExternalUrl(lat,lng);if(n)n.href=naverExternalUrl(lat,lng);
    if(info)info.innerHTML='검색일자: '+window.fmtDateTime(new Date())+'<br>위도 '+lat+' / 경도 '+lng+'<br>오차범위 약 '+acc+'m<div class="fallback-note">화면 지도는 구글 지도 프레임입니다. 보이지 않으면 아래 지도 앱 버튼을 이용하세요.</div>';
    if(wrap){wrap.innerHTML='<iframe id="mapFrame" title="현재위치 구글지도" src="'+googleEmbedUrl(lat,lng)+'" loading="eager" referrerpolicy="no-referrer-when-downgrade" allowfullscreen></iframe>';}
    if(pin)pin.style.display='block';
    window.__mapCheck={provider:'google_embed',lat:lat,lng:lng,accuracy:acc,loadedAt:new Date().toISOString()};
  },function(error){
    var msg='위치 조회에 실패했습니다.';
    if(error){if(error.code===1)msg='위치 권한이 거부되었습니다.';else if(error.code===2)msg='현재 위치를 확인할 수 없습니다.';else if(error.code===3)msg='위치 조회 시간이 초과되었습니다.';else if(error.message)msg=error.message;}
    setError(msg);
  },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}
document.addEventListener('DOMContentLoaded',locateNow);
</script>
</body>
</html>
